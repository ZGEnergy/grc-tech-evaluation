        slug: getting_started_integrity
        description: "Getting-started artifact integrity and versioning"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Are examples pinned to a specific release version? Or do they reference unversioned downloads, main branch, or mutable URLs?"
        depends_on: []
        converges_ac: false
        recorded_metrics: [pinned_examples, mutable_refs]

  - name: fnm_ingestion
    criterion_number: 0
    suite: "G"
    archetype: code-evaluator
    fnm_path_gated: true
    emits: [fnm-data-model, fnm-scale, workaround-needed]
    consumes: []
    tests:
      - id: G-FNM-1
        slug: intermediate_ingestion
        description: "Intermediate format ingestion (FNM gate)"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "All record counts match the manifest exactly. Zero records missing, zero extra records. If any table fails the count check, the tool fails G-FNM-1 and G-FNM-2 through G-FNM-5 are skipped."
        depends_on: []
        converges_ac: false
        gate_for: [G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5]
        recorded_metrics: [pass_fail, wall_clock, per_table_counts]
      - id: G-FNM-2
        slug: field_coverage_audit
        description: "Field coverage audit against criticality matrix"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "100% of DCPF-critical fields must be present across all tables. ACPF-critical field coverage is reported but not gated."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, per_table_coverage]
      - id: G-FNM-3
        slug: dcpf_verification
        description: "DCPF verification against reference solution on cleaned FNM case"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "Pass if all aggregate thresholds are met and no hard-fail condition is triggered, per pass_conditions.json."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, peak_memory, aggregate_metrics]
      - id: G-FNM-4
        slug: acpf_convergence
        description: "ACPF convergence attempt on cleaned FNM case (informational)"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "Convergence is a positive finding, not a requirement. If the tool converges, record as discriminating strength."
        depends_on: [G-FNM-1]
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, peak_memory, converged, residual, iterations]
      - id: G-FNM-5
        slug: supplemental_csv_representability
        description: "Supplemental CSV representability assessment"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "No hard pass/fail gate. Evidence-collection test. For each CSV, report: total fields, count and percentage by achieved representability tier (N/E/X)."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [per_csv_representability, discrepancies]

  - name: p2_readiness
    criterion_number: 0
    suite: "P2"
    archetype: audit-evaluator
    informational: true
    emits: []
    consumes: []
    tests:
      - id: P2-1
        slug: psse_raw_parsing
        description: "PSS/E RAW parsing capability"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Capability (yes/no), supported RAW versions, estimated effort to add if absent."
        depends_on: []
        converges_ac: false
        recorded_metrics: [capability, supported_versions, effort_estimate]
      - id: P2-2
        slug: pwl_cost_curves
        description: "Piecewise-linear cost curve support"
        functional_network: TINY
        grade_network: N/A
        pass_condition: "Capability (yes/no), formulation type (SOS2, lambda, incremental), solver compatibility, any limitations."
        depends_on: []
        converges_ac: false
        recorded_metrics: [capability, formulation_type, solver_compat]
      - id: P2-3
        slug: commitment_injection
        description: "Commitment injection workflow"
        functional_network: TINY
        grade_network: N/A
        pass_condition: "Capability per step, effort level, API friction."
        depends_on: [A-5]
        converges_ac: false
        recorded_metrics: [capability_per_step, effort_level, api_friction]

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]
  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility, fnm_ingestion]
    consumed_by: [extensibility]
  solver-issues:
    description: "Solver-related findings"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]
  convergence-quality:
    description: "Solver reports convergence but diagnostics indicate otherwise"
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]
  unit-mismatch:
    description: "MW vs per-unit inconsistency at analysis boundaries"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility]
  cascaded-failure:
    description: "Scalability test blocked by prerequisite expressiveness failure"
    emitted_by: [scalability]
    consumed_by: [synthesis]
  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]
  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]
  fnm-data-model:
    description: "Data model fidelity findings from FNM ingestion"
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, synthesis]
  fnm-scale:
    description: "Scale-related findings on LARGE (~30K bus) FNM network"
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability, synthesis]
  formulation-difference:
    description: "Differences in mathematical formulation between tool and reference or between tools"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [expressiveness, scalability, synthesis]

execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional — expressiveness core (A-1 to A-5)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-4, A-5]

  - step: 3
    label: "TINY functional — expressiveness advanced (A-6 to A-9)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-7, A-8, A-9]

  - step: 4
    label: "TINY functional — expressiveness formulations (A-10, A-11) + extensibility core"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-10, A-11]
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-4, B-5]

  - step: 5
    label: "TINY functional — extensibility remaining + audits start"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-6, B-7, B-8, B-9]
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-4]

  - step: 6
    label: "FNM ingestion gate"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]

  - step: 7
    label: "FNM ingestion verification"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5]

  - step: 8
    label: "Scale tests — scalability core (C-1 to C-5)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-4, C-5]

  - step: 9
    label: "Scale tests — scalability remaining (C-6 to C-10)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-6, C-7, C-8, C-9, C-10]

  - step: 10
    label: "Audit dimensions — accessibility remaining"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-2, D-3, D-5]

  - step: 11
    label: "Audit dimensions — maturity (5a: development health)"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-5, E-6]

  - step: 12
    label: "Audit dimensions — maturity (5b: sustainability) + supply chain core"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-4, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]

  - step: 13
    label: "Audit dimensions — supply chain remaining"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]

  - step: 14
    label: "Phase 2 readiness findings (informational)"
    dimensions:
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2, P2-3]
