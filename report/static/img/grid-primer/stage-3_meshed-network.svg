<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Stage 3: Meshed Network with Loop Topology</title>
  <desc>A four-bus meshed network with multiple transmission paths forming loops. Generators at buses 1 and 3, loads at buses 2 and 4. Power Transfer Distribution Factors (PTDFs) determine how flow distributes across parallel paths. Prior stage elements are dimmed; new buses, lines, and PTDF labels are highlighted.</desc>

  <!-- === Dimmed prior elements === -->

  <!-- Bus 1 (dimmed) -->
  <circle cx="200" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B1</text>

  <!-- Generator G1 (dimmed) -->
  <line x1="100" y1="150" x2="175" y2="150" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <circle cx="70" cy="150" r="25" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <text x="70" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" opacity="0.35">~</text>
  <text x="70" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32" opacity="0.35">G1</text>

  <!-- Bus 2 (dimmed) -->
  <circle cx="600" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B2</text>

  <!-- Load L1 at B2 (dimmed) -->
  <line x1="625" y1="150" x2="690" y2="150" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <polygon points="710,125 725,125 717,155" fill="none" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <line x1="717" y1="110" x2="717" y2="127" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <text x="717" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c62828" opacity="0.35">L1</text>

  <!-- Line B1-B2 (dimmed) -->
  <line x1="225" y1="150" x2="575" y2="150" stroke="#1565c0" stroke-width="1" opacity="0.35" />

  <!-- === Highlighted Stage 3 elements === -->

  <!-- Bus 3 (new) -->
  <circle cx="200" cy="350" r="25" fill="none" stroke="#333" stroke-width="2" />
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">B3</text>

  <!-- Generator G2 at B3 (new) -->
  <line x1="100" y1="350" x2="175" y2="350" stroke="#2e7d32" stroke-width="2" />
  <circle cx="70" cy="350" r="25" fill="none" stroke="#2e7d32" stroke-width="2" />
  <text x="70" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32">~</text>
  <text x="70" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32" font-weight="bold">G2</text>

  <!-- Bus 4 (new) -->
  <circle cx="600" cy="350" r="25" fill="none" stroke="#333" stroke-width="2" />
  <text x="600" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">B4</text>

  <!-- Load L2 at B4 (new) -->
  <line x1="625" y1="350" x2="690" y2="350" stroke="#c62828" stroke-width="2" />
  <polygon points="710,325 725,325 717,355" fill="none" stroke="#c62828" stroke-width="2" />
  <line x1="717" y1="310" x2="717" y2="327" stroke="#c62828" stroke-width="2" />
  <text x="717" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c62828" font-weight="bold">L2</text>

  <!-- Line B1-B3 (new, vertical left) -->
  <line x1="200" y1="175" x2="200" y2="325" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0" transform="rotate(-90 170 250)">Line 1-3</text>

  <!-- Line B2-B4 (new, vertical right) -->
  <line x1="600" y1="175" x2="600" y2="325" stroke="#1565c0" stroke-width="2" />
  <text x="630" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0" transform="rotate(90 630 250)">Line 2-4</text>

  <!-- Line B3-B4 (new, bottom) -->
  <line x1="225" y1="350" x2="575" y2="350" stroke="#1565c0" stroke-width="2" />
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Line 3-4</text>

  <!-- Diagonal Line B1-B4 (new, mesh cross) -->
  <line x1="218" y1="170" x2="582" y2="330" stroke="#1565c0" stroke-width="2" stroke-dasharray="8,4" />
  <text x="420" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Line 1-4</text>

  <!-- PTDF annotations -->
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">PTDF = 0.40</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">PTDF = 0.35</text>
  <text x="440" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">PTDF = 0.25</text>

  <!-- Legend -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Flow distributes across parallel paths per Power Transfer Distribution Factors</text>
</svg>
