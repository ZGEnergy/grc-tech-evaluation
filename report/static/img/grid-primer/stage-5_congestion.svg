<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Stage 5: Transmission Congestion and LMP Decomposition</title>
  <desc>The four-bus network showing congested transmission lines with thermal limit indicators. Line 1-2 is at its thermal limit (binding constraint), causing LMP separation between buses. LMPs are decomposed into System Marginal Energy Cost (SMEC) and Marginal Congestion Cost (MCC) components.</desc>

  <!-- === Dimmed network topology === -->

  <!-- Bus 1 (dimmed) -->
  <circle cx="200" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B1</text>

  <!-- Generator G1 (dimmed) -->
  <line x1="100" y1="150" x2="175" y2="150" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <circle cx="70" cy="150" r="25" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <text x="70" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" opacity="0.35">~</text>

  <!-- Bus 2 (dimmed) -->
  <circle cx="600" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B2</text>

  <!-- Load L1 (dimmed) -->
  <line x1="625" y1="150" x2="690" y2="150" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <polygon points="710,125 725,125 717,155" fill="none" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <line x1="717" y1="110" x2="717" y2="127" stroke="#c62828" stroke-width="1" opacity="0.35" />

  <!-- Bus 3 (dimmed) -->
  <circle cx="200" cy="350" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B3</text>

  <!-- Generator G2 (dimmed) -->
  <line x1="100" y1="350" x2="175" y2="350" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <circle cx="70" cy="350" r="25" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <text x="70" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" opacity="0.35">~</text>

  <!-- Bus 4 (dimmed) -->
  <circle cx="600" cy="350" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="600" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B4</text>

  <!-- Load L2 (dimmed) -->
  <line x1="625" y1="350" x2="690" y2="350" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <polygon points="710,325 725,325 717,355" fill="none" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <line x1="717" y1="310" x2="717" y2="327" stroke="#c62828" stroke-width="1" opacity="0.35" />

  <!-- Uncongested lines (dimmed) -->
  <line x1="200" y1="175" x2="200" y2="325" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="600" y1="175" x2="600" y2="325" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="225" y1="350" x2="575" y2="350" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="218" y1="170" x2="582" y2="330" stroke="#1565c0" stroke-width="1" opacity="0.35" stroke-dasharray="8,4" />

  <!-- === Highlighted congestion elements === -->

  <!-- Congested Line B1-B2 (red/orange, thick) -->
  <line x1="225" y1="150" x2="575" y2="150" stroke="#e65100" stroke-width="3" />

  <!-- Thermal limit indicator bars on Line 1-2 -->
  <rect x="350" y="137" width="100" height="6" rx="2" fill="#ffccbc" stroke="#e65100" stroke-width="1" />
  <rect x="350" y="137" width="100" height="6" rx="2" fill="#e65100" opacity="0.9" />
  <text x="400" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e65100" font-weight="bold">100/100 MW (BINDING)</text>

  <!-- Thermal limit on Line 3-4 (partially loaded) -->
  <rect x="350" y="340" width="100" height="5" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.5" opacity="0.6" />
  <rect x="350" y="340" width="60" height="5" rx="2" fill="#1565c0" opacity="0.5" />
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">60/150 MW</text>

  <!-- LMP decomposition at Bus 1 -->
  <rect x="145" y="62" width="110" height="55" rx="4" fill="#fff8e1" stroke="#ff8f00" stroke-width="2" />
  <text x="200" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" font-weight="bold">LMP = $25</text>
  <text x="200" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">SMEC = $30</text>
  <text x="200" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100">MCC = -$5</text>

  <!-- LMP decomposition at Bus 2 -->
  <rect x="545" y="62" width="110" height="55" rx="4" fill="#fff8e1" stroke="#ff8f00" stroke-width="2" />
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" font-weight="bold">LMP = $45</text>
  <text x="600" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">SMEC = $30</text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100">MCC = +$15</text>

  <!-- Congestion rent arrow -->
  <line x1="270" y1="170" x2="270" y2="190" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrowOrange)" />
  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100" />
    </marker>
  </defs>
  <text x="310" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100" font-style="italic">Congestion rent = (LMP2 - LMP1) x flow</text>

  <!-- Legend -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Binding line creates LMP spread: LMP = SMEC + MCC (+ MLC)</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">SMEC = System Marginal Energy Cost, MCC = Marginal Congestion Cost</text>
</svg>
