<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Stage 6: Security-Constrained OPF (SCOPF) with N-1 Contingency</title>
  <desc>The four-bus network under a contingency scenario. Line 1-2 is tripped (shown as dashed with an X), forcing power to reroute through remaining paths. Generators re-dispatch to maintain reliability under the N-1 criterion. Prior elements are dimmed while contingency indicators, re-dispatch arrows, and N-1 annotations are highlighted.</desc>

  <!-- === Dimmed network topology === -->

  <!-- Bus 1 (dimmed) -->
  <circle cx="200" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B1</text>

  <!-- Generator G1 (dimmed) -->
  <line x1="100" y1="150" x2="175" y2="150" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <circle cx="70" cy="150" r="25" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <text x="70" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" opacity="0.35">~</text>

  <!-- Bus 2 (dimmed) -->
  <circle cx="600" cy="150" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B2</text>

  <!-- Load L1 (dimmed) -->
  <line x1="625" y1="150" x2="690" y2="150" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <polygon points="710,125 725,125 717,155" fill="none" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <line x1="717" y1="110" x2="717" y2="127" stroke="#c62828" stroke-width="1" opacity="0.35" />

  <!-- Bus 3 (dimmed) -->
  <circle cx="200" cy="350" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B3</text>

  <!-- Generator G2 (dimmed) -->
  <line x1="100" y1="350" x2="175" y2="350" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <circle cx="70" cy="350" r="25" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" />
  <text x="70" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" opacity="0.35">~</text>

  <!-- Bus 4 (dimmed) -->
  <circle cx="600" cy="350" r="25" fill="none" stroke="#333" stroke-width="1" opacity="0.35" />
  <text x="600" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.35" font-weight="bold">B4</text>

  <!-- Load L2 (dimmed) -->
  <line x1="625" y1="350" x2="690" y2="350" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <polygon points="710,325 725,325 717,355" fill="none" stroke="#c62828" stroke-width="1" opacity="0.35" />
  <line x1="717" y1="310" x2="717" y2="327" stroke="#c62828" stroke-width="1" opacity="0.35" />

  <!-- Remaining lines (dimmed) -->
  <line x1="200" y1="175" x2="200" y2="325" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="600" y1="175" x2="600" y2="325" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="225" y1="350" x2="575" y2="350" stroke="#1565c0" stroke-width="1" opacity="0.35" />
  <line x1="218" y1="170" x2="582" y2="330" stroke="#1565c0" stroke-width="1" opacity="0.35" stroke-dasharray="8,4" />

  <!-- === Highlighted SCOPF / contingency elements === -->

  <!-- Tripped Line B1-B2 (dashed, red) -->
  <line x1="225" y1="150" x2="575" y2="150" stroke="#b71c1c" stroke-width="2.5" stroke-dasharray="12,8" />

  <!-- X mark on tripped line -->
  <line x1="385" y1="135" x2="415" y2="165" stroke="#b71c1c" stroke-width="3" />
  <line x1="415" y1="135" x2="385" y2="165" stroke="#b71c1c" stroke-width="3" />

  <!-- Trip label -->
  <rect x="360" y="170" width="80" height="20" rx="3" fill="#ffcdd2" stroke="#b71c1c" stroke-width="1.5" />
  <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b71c1c" font-weight="bold">TRIPPED</text>

  <!-- Re-dispatch arrows on generators -->
  <!-- G1 reduce -->
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b71c1c" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32" />
    </marker>
  </defs>

  <!-- G1 re-dispatch: decrease -->
  <rect x="20" y="100" width="110" height="38" rx="4" fill="#ffebee" stroke="#b71c1c" stroke-width="2" />
  <text x="75" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b71c1c" font-weight="bold">G1: 180 → 140 MW</text>
  <text x="75" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b71c1c">▼ -40 MW</text>

  <!-- G2 re-dispatch: increase -->
  <rect x="20" y="300" width="110" height="38" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="75" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" font-weight="bold">G2: 120 → 160 MW</text>
  <text x="75" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">▲ +40 MW</text>

  <!-- Re-route flow arrows on remaining lines -->
  <!-- Flow arrow on Line 1-3 -->
  <polygon points="190,240 200,225 210,240" fill="#1565c0" />
  <text x="165" y="240" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" font-weight="bold">↑ flow</text>

  <!-- Flow arrow on Line 3-4 -->
  <polygon points="390,345 400,338 410,345" fill="#1565c0" />
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" font-weight="bold">→ rerouted flow</text>

  <!-- Flow arrow on Line 2-4 -->
  <polygon points="590,280 600,265 610,280" fill="#1565c0" />
  <text x="635" y="275" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" font-weight="bold">↑ flow</text>

  <!-- N-1 annotation box -->
  <rect x="550" y="410" width="230" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="665" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">N-1 Security Criterion</text>
  <text x="665" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">System must survive loss of</text>
  <text x="665" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">any single element</text>

  <!-- Legend -->
  <text x="280" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">SCOPF pre-positions dispatch so no</text>
  <text x="280" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">single outage overloads the network</text>
</svg>
