default_language_version:
  python: python3.12

fail_fast: false

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key

  # Ruff linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Shell script linting
  # shellcheck-py wraps the native shellcheck binary in a pip-installable package.
  # v0.11.0.1 tracks shellcheck 0.11.0 (latest stable as of 2025-12).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Dockerfile linting
  # hadolint-py wraps the native hadolint binary. v2.14.0 is the latest
  # hadolint release (2025-10); pure Python wrapper, no Haskell needed.
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint

  # Markdown linting
  # markdownlint-cli2 v0.21.0 (latest stable, 2025-12). Node.js-based;
  # pre-commit manages the node environment automatically.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        exclude: '(matpower8\.1/|\.venv/|\.pytest_cache/)'

  # MATLAB/Octave linting (miss_hit)
  # miss_hit 0.9.44 (latest PyPI release, 2024-08). Only static analysis tool
  # for MATLAB/Octave that runs without a MATLAB license. Local hooks because
  # miss_hit has no official pre-commit repo.
  - repo: local
    hooks:
      - id: forbid-real-grid-names
        name: forbid real grid/operator names
        entry: python -m data.validation.check_no_real_grid_names
        language: python
        pass_filenames: true

      - id: mh-style
        name: mh_style (MATLAB/Octave)
        entry: mh_style
        language: python
        additional_dependencies: ['miss_hit==0.9.44']
        files: '\.m$'
        exclude: 'data/(networks|timeseries)/'
        types: [file]

      - id: mh-lint
        name: mh_lint (MATLAB/Octave)
        entry: mh_lint
        language: python
        additional_dependencies: ['miss_hit==0.9.44']
        files: '\.m$'
        exclude: 'data/(networks|timeseries)/'
        types: [file]

  # Julia formatting
  # Uses JuliaFormatter.jl via the system Julia runtime. Requires Julia to be
  # installed (available in the devcontainer). Devs without Julia can skip:
  #   SKIP=julia-formatter git commit
  - repo: local
    hooks:
      - id: julia-formatter
        name: JuliaFormatter
        entry: julia --project=@format -e 'using JuliaFormatter; format(ARGS)' --
        language: system
        files: '\.jl$'
        types: [file]

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v2.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
