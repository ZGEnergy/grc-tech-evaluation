name: Deploy Report Site

on:
  push:
    branches: [main]
    paths:
      - 'report/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Node.js dependencies
        working-directory: report
        run: npm ci

      - name: Install Python dependencies
        working-directory: report
        run: uv sync

      - name: Build and validate site
        working-directory: report
        run: make validate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        working-directory: report
        run: uv sync

      - name: Smoke test deployed site
        run: make smoke
        working-directory: report
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
