name: Prebuild Devcontainer

on:
  push:
    branches:
      - main
    paths:
      # Devcontainer definition
      - ".devcontainer/**"
      # Python dependency files (any tool)
      - "evaluations/pypsa/pyproject.toml"
      - "evaluations/pypsa/uv.lock"
      - "evaluations/pandapower/pyproject.toml"
      - "evaluations/pandapower/uv.lock"
      - "evaluations/gridcal/pyproject.toml"
      - "evaluations/gridcal/uv.lock"
      # Julia dependency files (any tool)
      - "evaluations/powermodels/Project.toml"
      - "evaluations/powermodels/Manifest.toml"
      - "evaluations/powersimulations/Project.toml"
      - "evaluations/powersimulations/Manifest.toml"
      # MATPOWER setup script
      - "evaluations/matpower/setup.sh"

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/devcontainer" >> "$GITHUB_OUTPUT"

      - name: Build and push devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ steps.meta.outputs.image }}
          cacheFrom: ${{ steps.meta.outputs.image }}:latest
          push: always
          imageTag: latest,${{ github.sha }}
