# ═══════════════════════════════════════════════════════════════════════
# Execution DAG
# ═══════════════════════════════════════════════════════════════════════
# Topological sort respecting:
#   1. Gate tests first
#   2. TINY functional before SMALL/MEDIUM grade assessment
#   3. Test dependencies (A-4 after A-3, A-6 after A-5, A-11 after A-3)
#   4. Audits can run in parallel with code dimensions on same tier
#   5. Observation consumers run after producers complete
#   6. Max 5 test IDs per dimension per DAG step

execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional — expressiveness batch 1 (no deps)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-7, A-8]

  - step: 3
    label: "TINY functional — expressiveness batch 2 (deps on A-3, A-5)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5, A-9, A-10, A-11]
        notes: "A-4 depends on A-3. A-11 compares against A-3."

  - step: 4
    label: "TINY functional — expressiveness batch 3 (dep on A-5) + extensibility batch 1"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6]
        notes: "A-6 depends on A-5."
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-4, B-5]
        notes: "B-1 depends on A-3 (step 2). B-5 depends on A-1 (step 2)."

  - step: 5
    label: "TINY functional — extensibility batch 2 + P2 readiness"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-6, B-7, B-8, B-9]
        notes: "B-7 depends on A-4 (step 3)."
      - name: p2_readiness
        tier: TINY
        test_ids: [P2-1, P2-2, P2-3]
        notes: "P2-3 depends on A-5 (step 3)."

  - step: 6
    label: "Audit dimensions — accessibility, maturity, supply chain (parallel with steps 2-5 but placed here for observation consumption)"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 7
    label: "Audit dimensions — maturity batch 2 + supply chain batch 1"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]

  - step: 8
    label: "Supply chain batch 2"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]
        notes: "F-3 depends on F-2 (step 7)."

  - step: 9
    label: "SMALL/MEDIUM grade — expressiveness batch 1"
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-7]
        notes: "Grade network for A-1, A-2, A-3, A-7 is MEDIUM."

  - step: 10
    label: "SMALL/MEDIUM grade — expressiveness batch 2"
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-8, A-9, A-10, A-11]
        notes: "Grade network for A-5, A-6, A-8, A-9, A-10, A-11 is SMALL."

  - step: 11
    label: "SMALL/MEDIUM grade — expressiveness batch 3 + extensibility batch 1"
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-4]
        notes: "A-4 grade network MEDIUM, depends on A-3."
      - name: expressiveness
        tier: SMALL
        test_ids: [A-6]
        notes: "A-6 grade network SMALL, depends on A-5."
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5]

  - step: 12
    label: "SMALL/MEDIUM grade — extensibility batch 2"
    dimensions:
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-7, B-9]

  - step: 13
    label: "Scalability — batch 1 (no solver variation)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5, C-9]

  - step: 14
    label: "Scalability — batch 2 (SMALL tier + solver swap)"
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]
      - name: scalability
        tier: MEDIUM
        test_ids: [C-7, C-8, C-10]

# ═══════════════════════════════════════════════════════════════════════
# Observation Tags
# ═══════════════════════════════════════════════════════════════════════

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]
  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [extensibility]
  solver-issues:
    description: "Solver-related findings"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]
  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]
  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]
