        solver: "HiGHS, GLPK"

      - id: C-4
        slug: scuc_scale
        description: "SCUC 24hr at scale"
        functional_network: N/A
        grade_network: SMALL
        pass_condition: "Solves to MIP gap <= 10% on SMALL."
        depends_on: [A-5]  # inferred
        converges_ac: false
        recorded_metrics: [wall_clock_per_solver, mip_gap, peak_memory, cpu_utilization]
        solver: "HiGHS, SCIP"

      - id: C-5
        slug: contingency_sweep_scale
        description: "N-M contingency sweep (x=5, m=4) at scale"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Completes within tractable time."
        depends_on: [A-7]  # inferred
        converges_ac: false
        recorded_metrics: [total_time, per_contingency_avg, peak_memory, cases_per_order, pruning_ratio, cpu_utilization]

      - id: C-6
        slug: stochastic_scale
        description: "20-scenario stochastic DCOPF (12hr, independent perturbations by resource type) at scale"
        functional_network: N/A
        grade_network: SMALL
        pass_condition: "Completes. Prices extractable."
        depends_on: [A-8]  # inferred — or B-4 if A-8 not natively supported
        converges_ac: false
        recorded_metrics: [total_time, per_scenario_avg, peak_memory, cpu_utilization]
        solver: "HiGHS"

      - id: C-7
        slug: solver_swap
        description: "Repeat C-3 with each available open-source solver"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Solver swap requires only parameter change, not reformulation."
        depends_on: [C-3]
        converges_ac: false
        recorded_metrics: [reformulation_required, wall_clock_per_solver, cpu_utilization]

      - id: C-8
        slug: scopf_scale
        description: "SCOPF (N-1, 500 contingencies) at scale"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Solves on MEDIUM with 500 contingencies."
        depends_on: [A-9]  # inferred
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, iterations, binding_contingencies, cpu_utilization]
        solver: "HiGHS"
        notes: "SMALL: 50 contingencies. MEDIUM: 500 contingencies."

      - id: C-9
        slug: ptdf_scale
        description: "PTDF matrix computation at scale"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "PTDF matrix computable on MEDIUM network."
        depends_on: [B-9]  # inferred
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, matrix_density, cpu_utilization]

      - id: C-10
        slug: distributed_slack_scale
        description: "Distributed slack DC OPF at scale"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Solves on MEDIUM. LMP comparison vs single-slack."
        depends_on: [A-11]  # inferred
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, lmp_comparison, cpu_utilization]
        solver: "HiGHS"

  # ── Accessibility ─────────────────────────────────────────────────────
  - name: accessibility
    criterion_number: 3
