        pass_condition: "Converges on MEDIUM network."
        depends_on: [A-2]  # inferred
        converges_ac: true
        recorded_metrics: [wall_clock, peak_memory, iterations, cpu_utilization]
        solver: "Ipopt"

      - id: C-3
        slug: dcopf_scale
        description: "DC OPF at scale with multiple solvers"
        functional_network: N/A
