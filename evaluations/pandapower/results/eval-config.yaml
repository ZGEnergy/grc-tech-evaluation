# eval-config.yaml
# Auto-generated from evaluation guides. Do not hand-edit.
# Rubric: evaluation_guides/Phase1_Evaluation_Rubric.md
# Protocol: evaluation_guides/Phase1_Test_Protocol.md
# Tool: pandapower
# Generated: 2026-03-06

tool: pandapower

networks:
  TINY:
    name: "IEEE 39-bus (New England)"
    buses: 39
    branches: 46
    generators: 10
    file: "data/networks/case39.m"
  SMALL:
    name: "ACTIVSg 2k"
    buses: ~2000  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10k"
    buses: ~10000  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg10k.m"

dimensions:
  # ── Gate ──────────────────────────────────────────────────────────────
  - name: gate
    criterion_number: 0
    suite: G
    archetype: gate-evaluator
    emits: []
    consumes: []
    tests:
      - id: G-1
        slug: ingest_tiny
        description: "Ingest IEEE 39-bus reference network"
        functional_network: TINY
        grade_network: N/A
        pass_condition: >-
          Tool loads IEEE 39-bus without error. Bus count, branch count, and
          generator count match expected values (39 buses, 46 branches, 10 generators).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]

      - id: G-2
        slug: ingest_small
        description: "Ingest ACTIVSg 2k reference network"
        functional_network: SMALL
        grade_network: N/A
        pass_condition: >-
          Same verification on ACTIVSg 2k. Bus/branch/gen counts match expected values.
        depends_on: [G-1]
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]

      - id: G-3
        slug: ingest_medium
        description: "Ingest ACTIVSg 10k reference network"
        functional_network: MEDIUM
        grade_network: N/A
        pass_condition: >-
          Same verification on ACTIVSg 10k. Bus/branch/gen counts match expected values.
        depends_on: [G-1]
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]

  # ── Expressiveness ────────────────────────────────────────────────────
  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits: [api-friction, doc-gaps, workaround-needed, solver-issues]
    consumes: []
    tests:
      - id: A-1
        slug: dcpf
        description: "Solve DCPF"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Converges. Nodal injections, line flows, and voltage angles accessible
          as structured output (DataFrame, dict, or named array — not raw solver vector).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-2
        slug: acpf
        description: "Solve ACPF (Newton-Raphson)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Converges. Bus voltage magnitudes and angles, line P/Q flows, and losses
          accessible as structured output.
        depends_on: []
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-3
        slug: dcopf
        description: "Solve DC OPF with gen costs and line flow limits"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Converges. Optimal dispatch and LMPs/shadow prices extractable from solution.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        solver: "HiGHS, GLPK"

      - id: A-4
        slug: ac_feasibility
        description: "Take DC OPF dispatch from A-3, run full ACPF on that dispatch"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Achievable within the same model context (no export to file and reimport).
          Voltage violations and thermal limit violations identifiable from results.
        depends_on: [A-3]
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-5
        slug: scuc
        description: "Solve 24-hour unit commitment as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Solves to feasibility (MIP gap <= 1% on TINY, <= 10% on SMALL).
          Commitment schedule extractable as a time-indexed binary matrix.
          Built-in constraint types vs. user-assembled noted.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, output_format, workarounds]
        solver: "HiGHS, SCIP"

      - id: A-6
        slug: sced
        description: "Fix commitment schedule from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Solves. Dispatch schedule extractable. UC and ED are cleanly separable
          as a two-stage workflow. Ramp rate constraints are demonstrably enforced
          between consecutive dispatch intervals in the ED stage — not just inherited
          from the UC formulation.
        depends_on: [A-5]
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-7
        slug: contingency_sweep
        description: "N-M contingency sweep with graph-distance scoping and pruning"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Completes without full model reconstruction per contingency case.
          Load loss per contingency case collected. Pruning logic is expressible
          without fighting the tool. Combinatorial enumeration and graph-distance
          scoping are achievable via the tool's API or a clean graph library bridge.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, cases_evaluated, pruning_ratio, workarounds]
        notes: "TINY: x=3, m=3. MEDIUM: x=5, m=4."

      - id: A-8
        slug: stochastic_timeseries
        description: "Solve multi-period (12hr, hourly) DCOPF with stochastic load and renewable generation scenarios. Independent perturbations by resource type."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Tool natively supports scenario-indexed timeseries for load, wind, and solar —
          the stochastic structure is part of the optimization formulation (e.g., scenario
          tree, two-stage stochastic program), not just independent deterministic solves
          in a loop. Perturbations are independent by resource type. Prices extractable
          from solution.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        solver: "HiGHS"

      - id: A-9
        slug: scopf
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in the optimization"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Solves. Base-case dispatch respects all contingency flow limits simultaneously.
          Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more
          expensive. Contingency constraints are part of the optimization, not checked
          post-hoc. If achievable only by manually enumerating contingency constraints via
          B-1's custom constraint API, document the effort and classify the workaround.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, cost_vs_a3, workarounds]
        solver: "HiGHS"
        notes: "TINY: all 46 branches as contingency set. SMALL: 50 monitored branches. MEDIUM: 500. Thermal rating relaxation permitted on TINY if infeasible."

      - id: A-10
        slug: lossy_dcopf_lmp
        description: "Solve DC OPF with loss approximation. Decompose LMPs into energy, congestion, and loss components. Compute per-line congestion rent."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Tool produces loss-inclusive LMPs where loss components are non-zero.
          LMP decomposition extractable as structured output. Per-line congestion
          rent computed and reconciled against congestion LMP components (5% tolerance).
          Validate against MATPOWER reference lossy DC OPF solution on same case
          (tolerance: 1% on total LMP, directional consistency on loss component signs).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_decomposition, congestion_rent, workarounds]

      - id: A-11
        slug: distributed_slack_opf
        description: "Solve DC OPF with distributed slack (load-proportional). Compare LMPs to single-slack solution from A-3."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Tool supports distributed slack formulation. LMPs differ from single-slack
          results in a physically consistent manner (SMEC reflects the distributed
          reference). Distributed slack weights are settable via API.
        depends_on: [A-3]  # inferred — comparison against A-3 results
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison, workarounds]

  # ── Extensibility ─────────────────────────────────────────────────────
  - name: extensibility
    criterion_number: 2
    suite: B
    archetype: code-evaluator
    weight_rank: 2
    emits: [api-friction, doc-gaps, workaround-needed, arch-quality]
    consumes: []
    tests:
      - id: B-1
        slug: custom_constraints
        description: "Add a flow gate limit to DC OPF from A-3. Read and assert on dual value. Produce binding constraint report."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Achievable through a documented API or extension mechanism. No source
          patching or forking required. Dual value of custom constraint extractable
          and correctly reflects binding status.
        depends_on: [A-3]  # inferred — builds on A-3 DC OPF formulation
        converges_ac: false
        recorded_metrics: [pass_fail, loc, workaround_durability, workarounds]

      - id: B-2
        slug: graph_access
        description: "From a chosen bus, run BFS to depth 3. Return all buses and branches within that subgraph."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Works via native graph primitives or clean, documented export to NetworkX
          (Python) or Graphs.jl (Julia).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, method_used, workaround_durability]

      - id: B-3
        slug: contingency_loop
        description: "Solve N-1 DCPF contingencies. Collect max line loading across all cases."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Runs in a loop without re-parsing or re-instantiating the base model from
          file each iteration. Base model is modified in-place or cloned efficiently.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, per_contingency_time, workarounds]
        notes: "TINY: all 46 branches (full N-1). MEDIUM: 50 branches."

      - id: B-4
        slug: stochastic_wrapping
        description: "Generate 20 scenarios with correlated perturbations by resource type. Solve 12hr multi-period DCOPF for each. Collect prices and dispatch."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Tool accepts timeseries inputs programmatically (not from config files only).
          Scenario loop is expressible without excessive per-scenario overhead. Results
          (prices, dispatch) are collectable in a structured format.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, per_scenario_time, workarounds]
        solver: "HiGHS"

      - id: B-5
        slug: interoperability
        description: "Export DCPF results from A-1 to a pandas DataFrame and write to CSV."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Trivial — fewer than 5 lines of code beyond the solve. No custom
          serialization logic required.
        depends_on: [A-1]  # inferred — uses A-1 results
        converges_ac: false
        recorded_metrics: [pass_fail, loc]

      - id: B-6
        slug: code_architecture
        description: "Qualitative assessment: trace DCPF solve path from API call to solver invocation."
        functional_network: N/A
        grade_network: N/A
        pass_condition: >-
          Document: number of abstraction layers, whether network model / problem
          formulation / solver interface / results are separated, whether internal
          interfaces are documented.
        depends_on: []
        converges_ac: false
        recorded_metrics: [abstraction_layers, separation_of_concerns, internal_docs]

      - id: B-7
        slug: ac_feasibility_extension
        description: "If AC feasibility check (A-4) required a workaround, document and classify the workaround here."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          Workaround durability assessed. Effort level documented.
        depends_on: [A-4]  # inferred — documents A-4 workaround if any
        converges_ac: false
        recorded_metrics: [workaround_durability, effort_level]

      - id: B-8
        slug: reference_bus_config
        description: "Solve DC OPF on TINY with three slack configurations: (a) default single slack, (b) different single slack bus, (c) custom-weighted distributed slack. Compare LMPs."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >-
          Reference bus / slack formulation is configurable via API without model
          reconstruction. LMP values change consistently across configurations.
          Evaluator documents the API calls required and workaround durability.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, lmp_comparison, workaround_durability]

      - id: B-9
        slug: ptdf_extraction
        description: "Compute the PTDF matrix for TINY (39-bus). Verify dimensions (branches x buses). Verify PTDF-predicted flows match DCPF-solved flows."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >-
          PTDF matrix accessible via native API, internal matrix extraction, or
          unit-injection computation. Flow predictions match DCPF results within
          numerical tolerance (1e-6). On MEDIUM, document computation time and method.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, matrix_dimensions, method_used, workarounds]

  # ── Scalability ───────────────────────────────────────────────────────
  - name: scalability
    criterion_number: 4
    suite: C
    archetype: code-evaluator
    weight_rank: 3
    emits: [solver-issues]
    consumes: [solver-issues]
    tests:
      - id: C-1
        slug: dcpf_scale
        description: "DCPF at scale"
        functional_network: N/A
