        depends_on: [A-1]  # inferred — functional test must pass first
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, cpu_utilization]

      - id: C-2
        slug: acpf_scale
        description: "ACPF at scale"
        functional_network: N/A
