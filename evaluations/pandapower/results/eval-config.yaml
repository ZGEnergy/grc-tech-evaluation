  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits: [api-friction, doc-gaps, workaround-needed, solver-issues, convergence-quality, unit-mismatch]
    consumes: [fnm-data-model, formulation-difference]
    tests:
      - id: A-1
        slug: dcpf
        description: "Solve DCPF"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Converges. Nodal injections, line flows, and voltage angles accessible as structured output (DataFrame, dict, or named array — not raw solver vector)."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        test_hash: "05bc255c"
      - id: A-2
        slug: acpf
        description: "Solve ACPF (Newton-Raphson)"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Converges. AC solve convergence must be verified by checking max bus power mismatch < 1e-4 p.u. Convergence evidence must be documented at the highest tier achievable: (1) residual value reported and below tool's stated tolerance (preferred), (2) NR iteration count via any API including log capture, (3) binary convergence indicator via return type or exception, (4) voltage profile proxy as last resort. Record convergence_evidence_quality in frontmatter: residual_reported, iteration_count_reported, binary_convergence_api, or proxy_voltage. Voltage magnitudes must differ from flat-start defaults (1.0 pu) on >95% of buses. Bus voltage magnitudes and angles, line P/Q flows, and losses accessible as structured output. Tools that can only provide proxy-level convergence evidence receive a documented diagnostic quality finding in the Accessibility dimension."
        depends_on: []
        converges_ac: true
        solver: "Ipopt"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds, convergence_residual, nr_iterations, convergence_evidence_quality]
        test_hash: "eb349d9c"
      - id: A-3
        slug: dcopf
        description: "Solve DC OPF with gen costs and line flow limits"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Converges. Optimal dispatch and LMPs/shadow prices extractable from solution. With differentiated costs and 70% derating, at least 2 branches have non-zero shadow prices (binding flow constraints). Report max LMP spread across buses. Hard constraint verification: No branch may exceed its derated thermal limit in the optimal solution (max_loading <= 1.0 + 1e-4 p.u. tolerance). If the formulation uses soft branch flow constraints (LP slack variables), classify as partial_pass and document the penalty coefficient used. Report max branch loading achieved in the optimal solution."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds, max_lmp_spread, binding_branches, max_branch_loading]
        tiny_params:
          differentiated_costs: true
          branch_derating: 0.70
          binding_branches_min: 2
        test_hash: "4e20f5bb"
      - id: A-4
        slug: ac_feasibility_check
        description: "AC feasibility check on DC OPF dispatch"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Achievable within the same model context (no export to file and reimport). Voltage violations and thermal limit violations identifiable from results."
        depends_on: [A-3]
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        test_hash: "8531c61c"
      - id: A-5
        slug: scuc
        description: "Solve 24-hour SCUC as MILP"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Solves to feasibility (MIP gap <= 1%). MIP gap must be extractable from the solver and reported in result frontmatter. At least 2 generators must cycle (commit/decommit) during the 24-hour horizon. Commitment schedule extractable as a time-indexed binary matrix or equivalent. Built-in constraint types vs. user-assembled noted. Binding verification (mandatory): Re-run SCUC with min_up_time=min_down_time=0 and compare the commitment schedule to the baseline. At least one generator's commitment schedule must change when temporal constraints are removed, confirming min up/down constraints were binding in the baseline solution. Report whether the binary commitment variable is directly readable from the solver model; if not, document this as a formulation transparency finding."
        depends_on: []
        converges_ac: false
        solver: "HiGHS, SCIP"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds, mip_gap, cycling_generators, binding_verification]
        test_hash: "1640c770"
      - id: A-6
        slug: sced
        description: "Fix commitment from A-5, solve economic dispatch"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a two-stage workflow. Ramp rate constraints are demonstrably enforced between consecutive dispatch intervals in the ED stage. Ramp binding evidence (mandatory): Re-run with ramp rates reduced to 10% of baseline values and verify that at least one ramp constraint dual value > 0 (binding), with the generator index, hour, and dual value reported. If ramp constraints cannot be tightened or dual values cannot be extracted, document as a formulation transparency finding. SCED mode classification: Record sced_mode in result frontmatter — full_sced (UC stage performed, security constraints enforced), ed_with_security (no UC stage, security constraints enforced), or ed_only (no UC stage, no security constraints). Only full_sced maps to pass; ed_with_security maps to qualified_pass; ed_only maps to fail."
        depends_on: [A-5]
        converges_ac: false
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds, sced_mode, ramp_binding_evidence]
        test_hash: "aa42ad46"
      - id: A-9
        slug: scopf
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in optimization"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Solves. Base-case dispatch respects all contingency flow limits simultaneously. Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more expensive. Contingency constraints are part of the optimization, not checked post-hoc. Benders/iterative algorithm converges in >= 2 iterations, OR the evaluator demonstrates the joint N-1 problem is feasible and solved optimally in 1 iteration with explicit feasibility confirmation. If achievable only by manually enumerating contingency constraints via B-1's custom constraint API, document the effort and classify the workaround."
        depends_on: [A-3]  # inferred — comparison with A-3 results
        converges_ac: false
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds, objective_value, iterations]
        test_hash: "f98c9cad"
      - id: A-10
        slug: lossy_dcopf_lmp_decomposition
        description: "Solve DC OPF with loss approximation and decompose LMPs"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Tool produces loss-inclusive LMPs where loss components are non-zero. LMP decomposition extractable as structured output. Per-line congestion rent computed and reconciled against congestion LMP components. Validate internal consistency: (a) loss components have physically correct signs (positive marginal loss at load buses far from generation), (b) total losses are 0.5-3% of total load, (c) lossy objective exceeds lossless objective, (d) loss component LMPs sum with energy and congestion components to total LMP within 1% tolerance."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        test_hash: "0a550931"
      - id: A-11
        slug: distributed_slack_opf
        description: "Solve DC OPF with distributed slack"
        functional_network: TINY
        grade_network: TINY
        pass_condition: "Tool supports distributed slack formulation. LMPs differ from single-slack results in a physically consistent manner (SMEC reflects the distributed reference). Distributed slack weights are settable via API (e.g., proportional to load, proportional to generation, or custom weights)."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        test_hash: "95a0e3ae"
      - id: A-12
        slug: multiperiod_dcopf_storage
        description: "Multi-Period DCOPF with Storage and Congestion"
        functional_network: TINY
        grade_network: null
        pass_condition: "Three behavioral pass conditions: (1) Congestion reporting: Mean and std of branch shadow prices computed by hour. At least 2 of 24 hours must have >=2 branches with non-zero shadow prices. (2) BESS arbitrage timing: Mean LMP at the BESS bus during discharge hours (P > 0.01 MW) must exceed mean LMP during charge hours (P < -0.01 MW). Hours with |P| <= 0.01 MW are excluded. (3) SoC feasibility: SoC in [0, energy_capacity] at all timesteps, AND energy balance trajectory consistent: |SoC[t] - SoC[t-1] - eta_ch*P_ch[t] + P_dis[t]/eta_dis| < 1.0 MWh for each t (dt=1h)."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        parameters:
          quadratic_costs: true
          branch_derating: 0.70
          cyclic_soc: true
          eta_charge: 0.92
          eta_discharge: 0.95
        test_hash: "6fc27521"

