    dimension: fnm_ingestion
    description: "Intermediate format ingestion — two-check gate (PSS/E compat + record count)."
    functional_network: LARGE
    grade_network: LARGE
    pass_condition: >-
      G-FNM-1 has two sub-checks. (a) PSS/E compatibility: if the tool fails to parse the
      intermediate CSV tables, record failure_reason: psse_parse_error, emit a blocking
      api-friction observation, and proceed to G-FNM-3/4/5 via MATPOWER fallback — G-FNM-2 is
      blocked. (b) Record count fidelity (only checked if PSS/E parsing succeeds): all record
      counts must match the manifest exactly. Zero records missing, zero extra records.
    solver: null
    recorded_metrics: [pass_fail, psse_compat, record_counts_per_table, wall_clock]
    converges_ac: false
    depends_on: []
    test_hash: "7827a912"

