      required.
    solver: null
    recorded_metrics: [pass_fail, loc]
    converges_ac: false
    depends_on: [A-1]  # inferred — uses DCPF results from A-1
    test_hash: "3d423124"

  - id: B-6
    slug: code_architecture
    dimension: extensibility
    description: "Qualitative assessment of DCPF solve path source code architecture."
    functional_network: N/A
    grade_network: N/A
