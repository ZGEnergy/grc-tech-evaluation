# =============================================================================
# Execution DAG
# =============================================================================
execution_dag:
  # -------------------------------------------------------------------------
  # Step 1: Gate tests — must complete before anything else
  # -------------------------------------------------------------------------
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  # -------------------------------------------------------------------------
  # Step 2: FNM ingestion gate (parallel with TINY functional, FNM_PATH-gated)
  # -------------------------------------------------------------------------
  - step: 2
    label: "FNM ingestion gate"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]

  # -------------------------------------------------------------------------
  # Step 3: TINY functional — Expressiveness (batch 1: independent tests)
  # -------------------------------------------------------------------------
  - step: 3
    label: "TINY expressiveness — independent tests (batch 1)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-5]

  # -------------------------------------------------------------------------
  # Step 4: TINY expressiveness (batch 2: dependent on batch 1)
  # -------------------------------------------------------------------------
  - step: 4
    label: "TINY expressiveness — dependent tests (batch 2)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-6, A-9, A-10, A-11]

  # -------------------------------------------------------------------------
  # Step 5: TINY expressiveness (batch 3: A-12 standalone)
  # -------------------------------------------------------------------------
  - step: 5
    label: "TINY expressiveness — multi-period storage (batch 3)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-12]

  # -------------------------------------------------------------------------
  # Step 6: TINY extensibility (batch 1: independent tests)
  # -------------------------------------------------------------------------
  - step: 6
    label: "TINY extensibility — independent tests (batch 1)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-4, B-5, B-6]

  # -------------------------------------------------------------------------
  # Step 7: TINY extensibility (batch 2: dependent on B-2)
  # -------------------------------------------------------------------------
  - step: 7
    label: "TINY extensibility — dependent tests (batch 2)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-3, B-8, B-9]

  # -------------------------------------------------------------------------
  # Step 8: FNM downstream tests (parallel with scalability, FNM_PATH-gated)
  # -------------------------------------------------------------------------
  - step: 8
    label: "FNM field coverage and DCPF verification"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3]

  # -------------------------------------------------------------------------
  # Step 9: FNM ACPF and supplemental CSV (FNM_PATH-gated)
  # -------------------------------------------------------------------------
  - step: 9
    label: "FNM ACPF convergence and supplemental CSV representability"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-4, G-FNM-5]

  # -------------------------------------------------------------------------
  # Step 10: Scalability SMALL tier (C-SMALL gate)
  # -------------------------------------------------------------------------
  - step: 10
    label: "Scalability SMALL tier"
    c_scale_gate: true
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-5, C-8]

  # -------------------------------------------------------------------------
  # Step 11: Scalability MEDIUM tier (only if SMALL passes)
  # -------------------------------------------------------------------------
  - step: 11
    label: "Scalability MEDIUM tier (batch 1)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5]

  # -------------------------------------------------------------------------
  # Step 12: Scalability MEDIUM tier (batch 2: dependent on C-3)
  # -------------------------------------------------------------------------
  - step: 12
    label: "Scalability MEDIUM tier (batch 2)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-7, C-8, C-9, C-10]

  # -------------------------------------------------------------------------
  # Step 13: Audit dimensions — accessibility, maturity, supply chain
  # (can run in parallel with code dimensions once observation producers complete)
  # -------------------------------------------------------------------------
  - step: 13
    label: "Audit dimensions — accessibility"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]

  - step: 14
    label: "Audit dimensions — maturity"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 15
    label: "Audit dimensions — maturity (batch 2)"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]

  - step: 16
    label: "Audit dimensions — supply chain (batch 1)"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-4, F-5, F-6]

  - step: 17
    label: "Audit dimensions — supply chain (batch 2)"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-3, F-7, F-8, F-9]

  # -------------------------------------------------------------------------
  # Step 18: Phase 2 readiness findings (informational)
  # -------------------------------------------------------------------------
  - step: 18
    label: "Phase 2 readiness findings"
    dimensions:
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2, P2-3]
