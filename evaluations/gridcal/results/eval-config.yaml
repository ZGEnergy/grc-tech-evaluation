      Document: number of abstraction layers, whether network model / problem formulation /
      solver interface / results are separated, whether internal interfaces are documented.
    solver: null
    recorded_metrics: [abstraction_layers, separation_of_concerns, internal_docs]
    converges_ac: false
    depends_on: []
    test_hash: "0f337d8d"

  - id: B-8
    slug: reference_bus_config
    dimension: extensibility
    description: "Solve DC OPF with three slack configurations and compare LMPs."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Reference bus / slack formulation is configurable via API without model reconstruction.
      LMP values change consistently across configurations. Evaluator documents the API calls
      required and workaround durability.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, workaround_class]
    converges_ac: false
    depends_on: []
    test_hash: "8c18d155"

  - id: B-9
    slug: ptdf_extraction
    dimension: extensibility
    description: "Compute PTDF matrix for TINY and verify against DCPF flows."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      PTDF matrix accessible via native API, internal matrix extraction, or unit-injection
      computation. Flow predictions match DCPF results within numerical tolerance (1e-6). If
      the network contains phase-shifting transformers (nonzero SHIFT column in branch data),
      the PTDF validation must either (a) apply Pbusinj/Pfinj correction terms from the
      admittance matrix construction, or (b) exclude branches with nonzero shift angles from
      the accuracy comparison. The 1e-6 tolerance applies to the corrected or filtered comparison.
    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc, ptdf_dimensions, max_flow_error]
    converges_ac: false
    depends_on: [A-1]  # inferred — verifies against DCPF from A-1
    test_hash: "d8e7210b"

