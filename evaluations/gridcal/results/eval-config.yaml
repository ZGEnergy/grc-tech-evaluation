    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc, workaround_class]
    converges_ac: false
    depends_on: [B-2]  # inferred — uses graph access from B-2
    test_hash: "49124456"

  - id: B-4
    slug: stochastic_scenario
    dimension: extensibility
    description: "Generate 20 stochastic scenarios, solve 12hr multi-period DCOPF for each."
