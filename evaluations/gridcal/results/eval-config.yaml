      ACPF-critical field coverage reported but not gated. Informational and Discardable field
      omissions noted but no grade impact.
    solver: null
    recorded_metrics: [pass_fail, dcpf_critical_pct, acpf_critical_pct, informational_pct, discardable_pct]
    converges_ac: false
    depends_on: [G-FNM-1]  # blocked if PSS/E parse fails
