# eval-config.yaml — gridcal
# Auto-generated from Phase 1 Evaluation Rubric (v6) and Test Protocol (v10)
# Tool: gridcal

protocol_version: "v10"
rubric_version: "v6"
tool: gridcal

# =============================================================================
# Network Tiers
# =============================================================================
networks:
  TINY:
    name: "IEEE 39-bus (New England)"
    bus_count: 39
    branch_count: 46
    generator_count: 10
    file_path: "data/networks/case39.m"
    augmented_data: "data/timeseries/case39/"
  SMALL:
    name: "ACTIVSg 2k"
    bus_count: 2000  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10k"
    bus_count: 10000  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg10k.m"
  LARGE:
    name: "FNM Annual S01"
    bus_count: 30000  # approximate
    source_path: "data/fnm/"
    fnm_path_gated: true
    intermediate_format: "data/fnm/docs/intermediate-schema.md"
    cleaned_matpower: "data/fnm/reference/cleaned/fnm_main_island.mat"

# =============================================================================
# Reference Counts (for gate validation)
# =============================================================================
reference_counts:
  TINY:
    buses: 39
    branches: 46
    generators: 10
  SMALL:
    buses: "verify from .m file"
    branches: "verify from .m file"
    generators: "verify from .m file"
  MEDIUM:
    buses: "verify from .m file"
    branches: "verify from .m file"
    generators: "verify from .m file"

# =============================================================================
# Dimensions
# =============================================================================
dimensions:
  - name: gate
    criterion_number: 0
    suite: G
    archetype: gate-evaluator
    weight_rank: 0  # gate — runs first
    emits: []
    consumes: []

  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - convergence-quality
      - unit-mismatch
    consumes: []

  - name: extensibility
    criterion_number: 2
    suite: B
    archetype: code-evaluator
    weight_rank: 2
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - arch-quality
    consumes: []

  - name: scalability
    criterion_number: 3
    suite: C
    archetype: code-evaluator
    weight_rank: 3
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - cascaded-failure
    consumes:
      - solver-issues
      - convergence-quality

  - name: accessibility
    criterion_number: 4
    suite: D
    archetype: audit-evaluator
    weight_rank: 4
    emits: []
    consumes:
      - api-friction
      - doc-gaps
      - convergence-quality
      - unit-mismatch

  - name: maturity
    criterion_number: 5
    suite: E
    archetype: audit-evaluator
    weight_rank: 5
    emits: []
    consumes:
      - doc-gaps
      - arch-quality

  - name: supply_chain
    criterion_number: 6
    suite: F
    archetype: audit-evaluator
    weight_rank: 0  # gate criterion
    emits:
      - license-flags
    consumes: []

  - name: fnm_ingestion
    criterion_number: 0
    suite: G
    archetype: code-evaluator
    weight_rank: 0  # supplementary
    fnm_path_gated: true
    emits:
      - fnm-data-model
      - fnm-scale
      - formulation-difference
    consumes: []

  - name: p2_readiness
    criterion_number: 0
    suite: P2
    archetype: audit-evaluator
    informational: true
    weight_rank: 99  # informational — does not affect Phase 1 grades
    emits: []
    consumes: []

# =============================================================================
# Observation Tag Routing
# =============================================================================
observation_routing:
  api-friction:
    producers: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumers: [accessibility]
  doc-gaps:
    producers: [expressiveness, extensibility, scalability]
    consumers: [accessibility, maturity]
  workaround-needed:
    producers: [expressiveness, extensibility, scalability]
    consumers: []
  solver-issues:
    producers: [expressiveness, extensibility, scalability]
    consumers: [scalability]
  convergence-quality:
    producers: [expressiveness]
    consumers: [scalability, accessibility]
  unit-mismatch:
    producers: [expressiveness]
    consumers: [accessibility]
  arch-quality:
    producers: [extensibility]
    consumers: [maturity]
  cascaded-failure:
    producers: [scalability]
    consumers: []  # synthesis only
  license-flags:
    producers: [supply_chain]
    consumers: []
  fnm-data-model:
    producers: [fnm_ingestion]
    consumers: []  # expressiveness + synthesis
  fnm-scale:
    producers: [fnm_ingestion]
    consumers: []  # scalability + synthesis
  formulation-difference:
    producers: [fnm_ingestion]
    consumers: []  # expressiveness + scalability + synthesis

# =============================================================================
# Tests
# =============================================================================
tests:
  # ---------------------------------------------------------------------------
  # Gate Tests (Suite G — data ingestion)
  # ---------------------------------------------------------------------------
  - id: G-1
    slug: ingest_tiny
    dimension: gate
    description: "Ingest IEEE 39-bus reference network and verify bus/branch/gen counts."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool loads IEEE 39-bus without error. Bus count, branch count, and generator count
      match expected values (39 buses, 46 branches, 10 generators).
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    depends_on: []
    test_hash: "0a74adbf"

  - id: G-2
    slug: ingest_small
    dimension: gate
    description: "Ingest ACTIVSg 2k reference network and verify counts."
    functional_network: SMALL
    grade_network: SMALL
    pass_condition: "Same verification on ACTIVSg 2k."
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    depends_on: []
    test_hash: "84277a12"

  - id: G-3
    slug: ingest_medium
    dimension: gate
    description: "Ingest ACTIVSg 10k reference network and verify counts."
    functional_network: MEDIUM
    grade_network: MEDIUM
    pass_condition: "Same verification on ACTIVSg 10k."
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    depends_on: []
    test_hash: "2da513c6"

  # ---------------------------------------------------------------------------
  # Suite A: Problem Expressiveness
  # ---------------------------------------------------------------------------
  - id: A-1
    slug: dcpf
    dimension: expressiveness
    description: "Solve DC power flow on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Nodal injections, line flows, and voltage angles accessible as structured
      output (DataFrame, dict, or named array — not raw solver vector).
    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc]
    converges_ac: false
    depends_on: []
    test_hash: "05bc255c"

  - id: A-2
    slug: acpf
    dimension: expressiveness
    description: "Solve AC power flow (Newton-Raphson) on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Convergence residual must be reported and below the tool's stated tolerance.
      Number of NR iterations must be reported. Voltage magnitudes must differ from flat-start
      defaults (1.0 pu) on >95% of buses. Bus voltage magnitudes and angles, line P/Q flows,
      and losses accessible as structured output. If the tool cannot report iteration count or
      residual, document this as a diagnostic quality finding.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, loc, convergence_residual, nr_iterations]
    converges_ac: true
    depends_on: []
    test_hash: "fca7353e"

  - id: A-3
    slug: dcopf
    dimension: expressiveness
    description: "Solve DC OPF with differentiated gen costs and 70% branch derating on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Optimal dispatch and LMPs/shadow prices extractable from solution. With
      differentiated costs and 70% derating, at least 2 branches have non-zero shadow prices
      (binding flow constraints). Report max LMP spread across buses.
    tiny_params: "differentiated costs from gen_temporal_params.csv, 70% branch derating"
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, lmp_spread, binding_branch_count]
    converges_ac: false
    depends_on: []
    test_hash: "45d4977c"

  - id: A-4
    slug: ac_feasibility
    dimension: expressiveness
    description: "Take DC OPF dispatch from A-3, run full ACPF on that dispatch."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable within the same model context (no export to file and reimport). Voltage
      violations and thermal limit violations identifiable from results.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, loc, voltage_violations, thermal_violations]
    converges_ac: true
    depends_on: [A-3]

    test_hash: "8531c61c"

  - id: A-5
    slug: scuc
    dimension: expressiveness
    description: "Solve 24-hour SCUC as MILP with min up/down, startup costs, ramp rates, reserves."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves to feasibility (MIP gap <= 1%). At least 2 generators must cycle (commit/decommit)
      during the 24-hour horizon. Commitment schedule extractable as a time-indexed binary
      matrix. Built-in constraint types vs. user-assembled noted.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, cycling_gen_count]
    converges_ac: false
    depends_on: []
    test_hash: "f52c4d21"

  - id: A-6
    slug: sced
    dimension: expressiveness
    description: "Fix commitment from A-5, solve economic dispatch as LP/QP."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a two-stage
      workflow. Ramp rate constraints are demonstrably enforced between consecutive dispatch
      intervals in the ED stage — not just inherited from the UC formulation.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc]
    converges_ac: false
    depends_on: [A-5]
    test_hash: "5577e704"

  - id: A-9
    slug: scopf
    dimension: expressiveness
    description: "Solve DC OPF with N-1 contingency constraints embedded in optimization on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves. Base-case dispatch respects all contingency flow limits simultaneously. Dispatch
      and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more expensive.
      Contingency constraints are part of the optimization, not checked post-hoc. If achievable
      only by manually enumerating contingency constraints via B-1's custom constraint API,
      document the effort and classify the workaround.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, objective_value]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares cost to A-3
    test_hash: "e3ccffc8"

  - id: A-10
    slug: lossy_dcopf_lmp
    dimension: expressiveness
    description: "Solve DC OPF with loss approximation on TINY, decompose LMPs."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool produces loss-inclusive LMPs where loss components are non-zero. LMP decomposition
      extractable as structured output. Per-line congestion rent computed and reconciled against
      congestion LMP components. Validate internal consistency: (a) loss components have
      physically correct signs (positive marginal loss at load buses far from generation),
      (b) total losses are 0.5-3% of total load, (c) lossy objective exceeds lossless
      objective, (d) loss component LMPs sum with energy and congestion components to total
      LMP within 1% tolerance.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, total_losses_pct, lmp_decomposition]
    converges_ac: false
    depends_on: []
    test_hash: "dae00140"

  - id: A-11
    slug: distributed_slack_opf
    dimension: expressiveness
    description: "Solve DC OPF on TINY with distributed slack (load-proportional)."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool supports distributed slack formulation. LMPs differ from single-slack results in a
      physically consistent manner (SMEC reflects the distributed reference). Distributed slack
      weights are settable via API (e.g., proportional to load, proportional to generation, or
      custom weights).
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares LMPs to A-3
    test_hash: "95a0e3ae"

  - id: A-12
    slug: multiperiod_dcopf_storage
    dimension: expressiveness
    description: "Solve 24-hour multi-period DCOPF with storage and congestion on Modified Tiny."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Three behavioral pass conditions: (1) Congestion reporting: Mean and std of branch shadow
      prices computed by hour. At least 2 of 24 hours must have >=2 branches with non-zero
      shadow prices. (2) BESS arbitrage timing: Mean LMP at the BESS bus during discharge hours
      (P > 0.01 MW) must exceed mean LMP during charge hours (P < -0.01 MW). Hours with
      |P| <= 0.01 MW are excluded. (3) SoC feasibility: SoC in [0, energy_capacity] at all
      timesteps, AND energy balance trajectory consistent: |SoC[t] - SoC[t-1] - eta_ch*P_ch[t]
      + P_dis[t]/eta_dis| < 1.0 MWh for each t (dt=1h).
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, congestion_hours, bess_arbitrage, soc_feasibility]
    converges_ac: false
    depends_on: []
    test_hash: "4b7e1360"

  # ---------------------------------------------------------------------------
  # Suite B: Extensibility
  # ---------------------------------------------------------------------------
  - id: B-1
    slug: custom_constraints
    dimension: extensibility
    description: "Add flow gate limit to DC OPF, read dual value of custom constraint."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable through a documented API or extension mechanism. No source patching or forking
      required. Dual value of custom constraint extractable and correctly reflects binding status.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, loc, workaround_class]
    converges_ac: false
    depends_on: [A-3]  # inferred — builds on DC OPF formulation from A-3
    test_hash: "fececf15"

  - id: B-2
