        solver: Ipopt
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: true

      - id: A-5
        slug: scuc
        description: "Solve 24-hour unit commitment as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves to feasibility (MIP gap ≤ 1% on TINY, ≤ 10% on SMALL). Commitment schedule extractable as a time-indexed binary matrix. Built-in constraint types vs. user-assembled noted."
        depends_on: []
        solver: "HiGHS, SCIP"
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, output_format, workarounds]
        converges_ac: false

      - id: A-6
        slug: sced
        description: "Fix commitment schedule from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a two-stage workflow. Ramp rate constraints are demonstrably enforced between consecutive dispatch intervals in the ED stage."
        depends_on: [A-5]
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-7
        slug: contingency_sweep
        description: "N-M contingency sweep: enumerate branches within graph distance x, escalating outage order up to m with pruning"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Completes without full model reconstruction per contingency case. Load loss per contingency case collected. Pruning logic is expressible without fighting the tool. Combinatorial enumeration and graph-distance scoping are achievable via the tool's API or a clean graph library bridge."
        depends_on: []
        solver: N/A
        recorded_metrics: [pass_fail, wall_clock, loc, cases_evaluated, workarounds]
        converges_ac: false

      - id: A-8
        slug: stochastic_timeseries
        description: "Solve multi-period (12hr, hourly) DCOPF with stochastic load and renewable generation scenarios, independent perturbations by resource type, extract prices"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool natively supports scenario-indexed timeseries for load, wind, and solar — the stochastic structure is part of the optimization formulation (e.g., scenario tree, two-stage stochastic program), not just independent deterministic solves in a loop. Perturbations are independent by resource type. Prices extractable from solution."
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-9
        slug: scopf
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in the optimization (preventive SCOPF)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Base-case dispatch respects all contingency flow limits simultaneously. Dispatch and cost differ from unconstrained DC OPF (A-3). Contingency constraints are part of the optimization, not checked post-hoc. If achievable only by manually enumerating contingency constraints via B-1's custom constraint API, document the effort and classify the workaround."
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, num_contingencies, workarounds]
        converges_ac: false

      - id: A-10
        slug: lossy_dcopf_lmp
        description: "Solve DC OPF with loss approximation, decompose LMPs into energy/congestion/loss, compute per-line congestion rent, validate via LMP reconciliation"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool produces loss-inclusive LMPs where loss components are non-zero. LMP decomposition extractable as structured output. Per-line congestion rent computed and reconciled against congestion LMP components (5% tolerance). Validate against MATPOWER reference lossy DC OPF solution on same case (tolerance: 1% on total LMP, directional consistency on loss component signs)."
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-11
        slug: distributed_slack_opf
        description: "Solve DC OPF with distributed slack (load-proportional), compare LMPs to single-slack solution from A-3"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool supports distributed slack formulation. LMPs differ from single-slack results in a physically consistent manner (SMEC reflects the distributed reference). Distributed slack weights are settable via API (e.g., proportional to load, proportional to generation, or custom weights)."
        depends_on: [A-3]  # inferred — comparison to A-3 single-slack results
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

