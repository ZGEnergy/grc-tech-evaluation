      - id: A-1
        slug: dcpf
        description: "Solve DC power flow"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Nodal injections, line flows, and voltage angles accessible as structured output (DataFrame, dict, or named array — not raw solver vector)."
        depends_on: []
        solver: N/A  # direct solve
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-2
        slug: acpf
        description: "Solve AC power flow (Newton-Raphson)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Bus voltage magnitudes and angles, line P/Q flows, and losses accessible as structured output."
        depends_on: []
        solver: Ipopt
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: true

      - id: A-3
        slug: dcopf
        description: "Solve DC OPF with gen costs and line flow limits"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Optimal dispatch and LMPs/shadow prices extractable from solution."
        depends_on: []
        solver: "HiGHS, GLPK"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

