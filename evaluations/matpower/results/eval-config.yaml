# ---------------------------------------------------------------------------
# Execution DAG
# ---------------------------------------------------------------------------
execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "Suite G — FNM ingestion gate (FNM_PATH-gated)"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]

  - step: 3
    label: "TINY functional — Expressiveness batch 1 (core PF/OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]

  - step: 4
    label: "TINY functional — Expressiveness batch 2 (dependent on A-3)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-9, A-10, A-11]

  - step: 5
    label: "TINY functional — Expressiveness batch 3 (UC)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-5]

  - step: 6
    label: "TINY functional — Expressiveness batch 4 (SCED + multi-period storage)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-12]

  - step: 7
    label: "TINY functional — Extensibility batch 1"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-5, B-9]

  - step: 8
    label: "TINY functional — Extensibility batch 2 + architecture audit"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-4, B-8]
      - name: extensibility
        tier: N/A
        test_ids: [B-6]

  - step: 9
    label: "Suite G — FNM ingestion downstream (FNM_PATH-gated)"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5]

  - step: 10
    label: "Suite C — Scalability SMALL tier"
    c_scale_gate: true
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-1, C-2, C-3, C-4, C-5]

  - step: 11
    label: "Suite C — Scalability MEDIUM tier LP/PF (unconditional — not gated by C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5]
        milp_gated: false

  - step: 12
    label: "Suite C — Scalability MEDIUM tier LP/PF batch 2 (unconditional)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-7, C-9, C-10]
        milp_gated: false

  - step: 13
    label: "Suite C — Scalability MEDIUM tier SCOPF (gated by C-3 MEDIUM, not C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-8]
        milp_gated: false
    depends_on_step: [11]  # C-8 gated by C-3 MEDIUM passing

  - step: 14
    label: "Suite C — Scalability MEDIUM tier MILP (gated by C-4 SMALL)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-4]
        milp_gated: true

  - step: 15
    label: "Audit — Accessibility"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]

  - step: 16
    label: "Audit — Maturity & Sustainability batch 1"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 17
    label: "Audit — Maturity & Sustainability batch 2"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]

  - step: 18
    label: "Audit — Supply Chain batch 1 (gate criterion)"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]

  - step: 19
    label: "Audit — Supply Chain batch 2"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]

  - step: 20
    label: "Phase 2 Readiness Findings (informational)"
    dimensions:
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2, P2-3]

