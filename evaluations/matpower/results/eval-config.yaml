  # -------------------------------------------------------------------------
  - id: G-FNM-1
    slug: fnm_ingestion_gate
    dimension: fnm_ingestion
    description: "Two-check gate: PSS/E format compatibility + record count fidelity."
    functional_network: LARGE
    grade_network: LARGE
    pass_condition: >-
      G-FNM-1 has two sub-checks. (a) PSS/E compatibility: if the tool fails to parse
      the intermediate CSV tables, record failure_reason: psse_parse_error and
      ingestion_path: matpower_fallback, emit a blocking api-friction observation, and
      proceed to G-FNM-3/4/5 via MATPOWER fallback — G-FNM-2 is blocked but G-FNM-3/4/5
      proceed. (b) Record count fidelity (only checked if PSS/E parsing succeeds): all
      record counts must match the manifest exactly. Zero records missing, zero extra
      records. If the tool's data model merges record types, the merged count must equal
      the sum of the constituent intermediate format table counts. If count check fails,
      skip G-FNM-2 through G-FNM-5.
    solver: null
    recorded_metrics: [pass/fail, per_table_record_counts, parse_status, ingestion_path]
    converges_ac: false
    test_hash: "62aeab18"

