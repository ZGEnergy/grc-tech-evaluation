      ACPF-critical field coverage is reported but not gated.
    solver: null
    recorded_metrics: [dcpf_critical_pct, acpf_critical_pct, informational_pct, discardable_pct]
    converges_ac: false
    depends_on: [G-FNM-1]  # blocked if PSS/E parse fails
