# eval-config.yaml — matpower
# Auto-generated from Phase 1 Evaluation Rubric and Test Protocol
# Protocol version: v11

tool: matpower
protocol_version: "v11"

# ---------------------------------------------------------------------------
# Network Tiers
# ---------------------------------------------------------------------------
networks:
  TINY:
    name: "IEEE 39-bus (New England)"
    bus_count: 39
    branch_count: 46
    generator_count: 10
    file_path: "data/networks/case39.m"
  SMALL:
    name: "ACTIVSg 2k"
    bus_count: "~2000"  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10k"
    bus_count: "~10000"  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg10k.m"
  LARGE:
    name: "FNM Annual S01"
    bus_count: "~30000"
    source_path: "${FNM_PATH}"
    cleaned_matpower: "data/fnm/reference/cleaned/fnm_main_island.mat"
    cleaned_csv: "data/fnm/reference/cleaned/intermediate/"
    fnm_path_gated: true

# ---------------------------------------------------------------------------
# Dimensions
# ---------------------------------------------------------------------------
dimensions:
  - name: gate
    criterion_number: 0
    suite: G  # Gate tests (G-1, G-2, G-3)
    archetype: gate-evaluator
    weight_rank: 0  # gate — must pass before anything else
    emits: []
    consumes: []

  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - convergence-quality
      - unit-mismatch
    consumes: []

  - name: extensibility
    criterion_number: 2
    suite: B
    archetype: code-evaluator
    weight_rank: 2
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - arch-quality
    consumes: []

  - name: scalability
    criterion_number: 4
    suite: C
    archetype: code-evaluator
    weight_rank: 3
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - cascaded-failure
    consumes:
      - solver-issues
      - convergence-quality

  - name: accessibility
    criterion_number: 3
    suite: D
    archetype: audit-evaluator
    weight_rank: 4
    emits: []
    consumes:
      - api-friction
      - doc-gaps
      - convergence-quality
      - unit-mismatch

  - name: maturity
    criterion_number: 5
    suite: E
    archetype: audit-evaluator
    weight_rank: 5
    emits: []
    consumes:
      - doc-gaps
      - arch-quality

  - name: supply_chain
    criterion_number: 6
    suite: F
    archetype: audit-evaluator
    weight_rank: 0  # gate criterion
    emits:
      - license-flags
    consumes: []

  - name: fnm_ingestion
    criterion_number: 0
    suite: G
    archetype: code-evaluator
    weight_rank: 0  # additive evidence, not independently weighted
    fnm_path_gated: true
    emits:
      - fnm-data-model
      - fnm-scale
      - formulation-difference
    consumes: []

  - name: p2_readiness
    archetype: audit-evaluator
    informational: true
    emits: []
    consumes: []

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
tests:
  # -------------------------------------------------------------------------
  # Gate Tests
  # -------------------------------------------------------------------------
  - id: G-1
    slug: ingest_tiny
    dimension: gate
    description: "Ingest IEEE 39-bus reference network and verify bus/branch/gen counts."
    functional_network: TINY
    grade_network: TINY
    test_category: gate_minimum_bar
    pass_condition: >-
      Tool loads IEEE 39-bus without error. Bus count, branch count, and generator count
      match expected values (39 buses, 46 branches, 10 generators).
    solver: null
    recorded_metrics: [pass/fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "0a74adbf"

  - id: G-2
    slug: ingest_small
    dimension: gate
    description: "Ingest ACTIVSg 2k reference network and verify counts."
    functional_network: SMALL
    grade_network: SMALL
    test_category: gate_minimum_bar
    pass_condition: "Same verification on ACTIVSg 2k."
    solver: null
    recorded_metrics: [pass/fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "84277a12"

  - id: G-3
    slug: ingest_medium
    dimension: gate
    description: "Ingest ACTIVSg 10k reference network and verify counts."
    functional_network: MEDIUM
    grade_network: MEDIUM
    test_category: gate_minimum_bar
    pass_condition: "Same verification on ACTIVSg 10k."
    solver: null
    recorded_metrics: [pass/fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "2da513c6"

  # -------------------------------------------------------------------------
  # Suite A — Problem Expressiveness (TINY only)
  # -------------------------------------------------------------------------
  - id: A-1
    slug: dcpf
    dimension: expressiveness
    description: "Solve DC power flow on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Nodal injections, line flows, and voltage angles accessible as
      structured output (DataFrame, dict, or named array — not raw solver vector).
    solver: null
    recorded_metrics: [pass/fail, wall_clock, loc]
    converges_ac: false
    test_hash: "05bc255c"

  - id: A-2
    slug: acpf
    dimension: expressiveness
    description: "Solve AC power flow (Newton-Raphson) on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. AC solve convergence must be verified by checking max bus power
      mismatch < 1e-4 p.u. Convergence evidence must be documented at the highest
      tier achievable: (1) residual value reported and below tool's stated tolerance
      (preferred), (2) NR iteration count via any API including log capture, (3) binary
      convergence indicator via return type or exception, (4) voltage profile proxy as
      last resort. Record convergence_evidence_quality in frontmatter: residual_reported,
      iteration_count_reported, binary_convergence_api, or proxy_voltage. Voltage
      magnitudes must differ from flat-start defaults (1.0 pu) on >95% of buses. Bus
      voltage magnitudes and angles, line P/Q flows, and losses accessible as structured
      output. Tools that can only provide proxy-level convergence evidence receive a
      documented diagnostic quality finding in the Accessibility dimension.
    solver: "Ipopt"
    recorded_metrics: [pass/fail, wall_clock, loc, convergence_residual, nr_iterations, convergence_evidence_quality]
    converges_ac: true
    test_hash: "eb349d9c"

  - id: A-3
    slug: dcopf
    dimension: expressiveness
    description: "Solve DC OPF with differentiated gen costs and 70% branch derating on TINY."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Optimal dispatch and LMPs/shadow prices extractable from solution.
      With differentiated costs and 70% derating, at least 2 branches have non-zero
      shadow prices (binding flow constraints). Report max LMP spread across buses.
      Hard constraint verification: No branch may exceed its derated thermal limit in the
      optimal solution (max_loading ≤ 1.0 + 1e-4 p.u. tolerance). If the formulation uses
      soft branch flow constraints (LP slack variables), classify as partial_pass and
      document the penalty coefficient used. Soft-constraint DCOPF is not inherently wrong
      but must be explicitly labeled and distinguished from hard-constraint DCOPF. Report
      max branch loading achieved in the optimal solution.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, lmp_spread, binding_branch_count, max_branch_loading]
    converges_ac: false
    test_hash: "a17e7652"

  - id: A-4
    slug: ac_feasibility
    dimension: expressiveness
    description: "Take DC OPF dispatch from A-3, run full ACPF on that dispatch."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable within the same model context (no export to file and reimport).
      Voltage violations and thermal limit violations identifiable from results.
    solver: "Ipopt"
    recorded_metrics: [pass/fail, wall_clock, loc, voltage_violations, thermal_violations]
    converges_ac: true
    depends_on: [A-3]
    test_hash: "8531c61c"

  - id: A-5
    slug: scuc
    dimension: expressiveness
    description: "Solve 24-hour SCUC as MILP with min up/down times, startup costs, ramp rates, reserves."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves to feasibility (MIP gap ≤ 1%). MIP gap must be extractable from the solver
      and reported in result frontmatter. At least 2 generators must cycle (commit/decommit)
      during the 24-hour horizon. Commitment schedule extractable as a time-indexed binary
      matrix or equivalent. Built-in constraint types vs. user-assembled noted. Binding
      verification (mandatory): Re-run SCUC with min_up_time=min_down_time=0 and compare
      the commitment schedule to the baseline. At least one generator's commitment schedule
      must change when temporal constraints are removed, confirming min up/down constraints
      were binding in the baseline solution. Report whether the binary commitment variable
      is directly readable from the solver model; if not, document this as a formulation
      transparency finding.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, mip_gap, cycling_gen_count, binding_verification]
    converges_ac: false
    test_hash: "4acfc0db"

  - id: A-6
    slug: sced
    dimension: expressiveness
    description: "Fix commitment from A-5, solve economic dispatch as LP/QP."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a
      two-stage workflow. Ramp rate constraints are demonstrably enforced between
      consecutive dispatch intervals in the ED stage — not just inherited from the
      UC formulation. Ramp binding evidence (mandatory): Re-run with ramp rates reduced
      to 10% of baseline values and verify that at least one ramp constraint dual value > 0
      (binding), with the generator index, hour, and dual value reported. If ramp constraints
      cannot be tightened or dual values cannot be extracted, document as a formulation
      transparency finding. SCED mode classification: Record sced_mode in result
      frontmatter — full_sced (UC stage performed, security constraints enforced),
      ed_with_security (no UC stage, security constraints enforced), or ed_only (no UC
      stage, no security constraints). Only full_sced maps to pass; ed_with_security maps
      to qualified_pass; ed_only maps to fail with context that the tool does not support
      the UC stage.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, sced_mode, ramp_binding_evidence]
    converges_ac: false
    depends_on: [A-5]
    test_hash: "3343ccf1"

  - id: A-9
    slug: scopf
    dimension: expressiveness
    description: "Solve DC OPF with N-1 contingency constraints embedded in the optimization."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves. Base-case dispatch respects all contingency flow limits simultaneously.
      Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more
      expensive. Contingency constraints are part of the optimization, not checked
      post-hoc. Benders/iterative algorithm converges in ≥ 2 iterations, OR the evaluator
      demonstrates the joint N-1 problem is feasible and solved optimally in 1 iteration
      with explicit feasibility confirmation. If achievable only by manually enumerating
      contingency constraints via B-1's custom constraint API, document the effort and
      classify the workaround.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, cost_comparison_vs_a3, iterations]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares cost to A-3
    test_hash: "b4012049"

  - id: A-10
    slug: lossy_dcopf_lmp
    dimension: expressiveness
    description: "Solve DC OPF with loss approximation. Decompose LMPs into energy, congestion, loss."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool produces loss-inclusive LMPs where loss components are non-zero. LMP
      decomposition extractable as structured output. Per-line congestion rent computed
      and reconciled against congestion LMP components. Validate internal consistency:
      (a) loss components have physically correct signs (positive marginal loss at load
      buses far from generation), (b) total losses are 0.5–3% of total load, (c) lossy
      objective exceeds lossless objective, (d) loss component LMPs sum with energy and
      congestion components to total LMP within 1% tolerance.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, total_loss_pct, lmp_decomposition]
    converges_ac: false
    test_hash: "dae00140"

  - id: A-11
    slug: distributed_slack_opf
    dimension: expressiveness
    description: "Solve DC OPF with distributed slack (load-proportional). Compare LMPs to A-3."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool supports distributed slack formulation. LMPs differ from single-slack results
      in a physically consistent manner (SMEC reflects the distributed reference).
      Distributed slack weights are settable via API (e.g., proportional to load,
      proportional to generation, or custom weights).
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, lmp_comparison_vs_a3]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares LMPs to A-3
    test_hash: "95a0e3ae"

  - id: A-12
    slug: multiperiod_dcopf_storage
    dimension: expressiveness
    description: "Solve 24hr multi-period DCOPF with storage, renewables, quadratic costs, congestion."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Three behavioral pass conditions: (1) Congestion reporting: Mean and std of branch
      shadow prices computed by hour. At least 2 of 24 hours must have ≥2 branches with
      non-zero shadow prices. (2) BESS arbitrage timing: Mean LMP at the BESS bus during
      discharge hours (P > 0.01 MW) must exceed mean LMP during charge hours (P < −0.01 MW).
      Hours with |P| ≤ 0.01 MW are excluded. (3) SoC feasibility: SoC ∈ [0, energy_capacity]
      at all timesteps, AND energy balance trajectory consistent: |SoC[t] − SoC[t−1] −
      η_ch·P_ch[t] + P_dis[t]/η_dis| < 1.0 MWh for each t (dt=1h).
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, congestion_hours, bess_arbitrage_ratio, soc_feasibility]
    converges_ac: false
    test_hash: "4b7e1360"

  # -------------------------------------------------------------------------
  # Suite B — Extensibility (TINY only)
  # -------------------------------------------------------------------------
  - id: B-1
    slug: custom_constraints
    dimension: extensibility
    description: "Add flow gate limit to DC OPF and extract dual values."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable through a documented API or extension mechanism. No source patching or
      forking required. Dual value of custom constraint extractable and correctly reflects
      binding status.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, loc, workaround_class]
    converges_ac: false
    depends_on: [A-3]  # inferred — builds on A-3 DC OPF formulation
    test_hash: "fececf15"

  - id: B-2
    slug: graph_access
    dimension: extensibility
    description: "BFS to depth 3 from a chosen bus, return subgraph."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Works via native graph primitives or clean, documented export to NetworkX (Python)
      or Graphs.jl (Julia).
    solver: null
    recorded_metrics: [pass/fail, loc, workaround_class]
    converges_ac: false
    test_hash: "5068a626"

  - id: B-3
    slug: contingency_sweep
    dimension: extensibility
    description: "Escalating N-M contingency sweep with pruning, graph-distance scoping (x=3, m=3)."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Completes without full model reconstruction per contingency case. Load loss per
      contingency case collected. Pruning logic is expressible without fighting the tool.
      Combinatorial enumeration and graph-distance scoping are achievable via the tool's
      API or a clean graph library bridge.
    solver: null
    recorded_metrics: [pass/fail, wall_clock, loc, workaround_class, contingency_count]
    converges_ac: false
    test_hash: "49124456"

  - id: B-4
    slug: stochastic_scenario
    dimension: extensibility
    description: "Generate 20 scenarios, solve 12hr multi-period DCOPF for each, collect results."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool accepts timeseries inputs programmatically (not from config files only).
      Scenario loop is expressible without excessive per-scenario overhead. Results
      (prices, dispatch) are collectable in a structured format.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, workaround_class]
    converges_ac: false
    test_hash: "341fbe16"

  - id: B-5
    slug: interoperability
    dimension: extensibility
    description: "Export DCPF results to DataFrame and write to CSV."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Trivial — fewer than 5 lines of code beyond the solve. No custom serialization
      logic required.
    solver: null
    recorded_metrics: [pass/fail, loc]
    converges_ac: false
    test_hash: "3d423124"

  - id: B-6
    slug: code_architecture
    dimension: extensibility
    description: "Qualitative assessment of source code architecture for DCPF solve path."
    functional_network: N/A
    grade_network: N/A
    pass_condition: >-
      Document: number of abstraction layers, whether network model / problem formulation /
      solver interface / results are separated, whether internal interfaces are documented.
    solver: null
    recorded_metrics: [abstraction_layers, separation_quality, documentation_quality]
    converges_ac: false
    test_hash: "0f337d8d"

  - id: B-8
    slug: reference_bus_config
    dimension: extensibility
    description: "Solve DC OPF with three slack configurations: default, different single slack, custom-weighted distributed slack."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      The tool allows setting an arbitrary reference bus without error or model
      reconstruction. All three configurations must complete without exception. For DC OPF:
      LMP values are expected to be invariant across configurations (this is physically
      correct behavior for lossless DC OPF — invariance is a pass, not a failure). For AC
      OPF (if supported): LMPs may vary; document any variation. The test is primarily an
      API surface test — the key evaluation point is whether the tool's API allows reference
      bus changes without model reconstruction. Document the API calls required and
      workaround durability.
    solver: "HiGHS"
    recorded_metrics: [pass/fail, wall_clock, loc, workaround_class]
    converges_ac: false
    test_hash: "dad5cf97"

  - id: B-9
    slug: ptdf_extraction
    dimension: extensibility
    description: "Compute PTDF matrix for TINY, verify dimensions and flow accuracy."
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      PTDF matrix accessible via native API, internal matrix extraction, or unit-injection
      computation. Flow predictions match DCPF results within numerical tolerance (1e-6).
      If the network contains phase-shifting transformers (nonzero SHIFT column in branch
      data), the PTDF validation must either (a) apply Pbusinj/Pfinj correction terms from
      the admittance matrix construction, or (b) exclude branches with nonzero shift angles
      from the accuracy comparison. The 1e-6 tolerance applies to the corrected or filtered
      comparison.
    solver: null
    recorded_metrics: [pass/fail, wall_clock, loc, ptdf_dimensions, max_flow_error]
    converges_ac: false
    test_hash: "d8e7210b"

  # -------------------------------------------------------------------------
  # Suite C — Scalability (SMALL then MEDIUM)
  # -------------------------------------------------------------------------
  - id: C-1
    slug: dcpf_scale
    dimension: scalability
    description: "DCPF on MEDIUM — wall-clock time and peak memory."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: "Completes DCPF on MEDIUM within time budget."
    solver: null
    recorded_metrics: [wall_clock, peak_memory, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "5d7a4436"

  - id: C-2
    slug: acpf_scale
    dimension: scalability
    description: "ACPF on MEDIUM — wall-clock time, peak memory, iterations."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: >-
      Completes ACPF on MEDIUM within time budget. Convergence must be verified by
      checking max bus power mismatch < 1e-4 p.u. Record convergence_evidence_quality
      using the same four-tier hierarchy as A-2.
    solver: "Ipopt"
    recorded_metrics: [wall_clock, peak_memory, iterations, convergence_evidence_quality, cpu_threads_used, cpu_threads_available]
    converges_ac: true
    test_hash: "eeb84c0a"

  - id: C-3
    slug: dcopf_scale
    dimension: scalability
    description: "DC OPF on MEDIUM with HiGHS and GLPK."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: >-
      Completes DC OPF on MEDIUM with multiple solvers. Max branch loading must be
      reported; if >1.0 + 1e-4 p.u. in optimal solution, record as soft-constraint finding.
    solver: "HiGHS, GLPK"
    recorded_metrics: [wall_clock_per_solver, peak_memory, objective_value, max_branch_loading, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "a4f62ae7"

  - id: C-4
    slug: scuc_scale
    dimension: scalability
    description: "SCUC 24hr on SMALL with HiGHS and SCIP."
    functional_network: SMALL
    grade_network: SMALL
    pass_condition: >-
      Completes SCUC 24hr on SMALL within time budget. Report both 1-thread and
      max-thread timings if solver supports parallel execution.
    solver: "HiGHS, SCIP"
    recorded_metrics: [wall_clock_per_solver, wall_clock_1thread, wall_clock_maxthread, mip_gap, peak_memory, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "19c1d696"

  - id: C-5
    slug: ac_feasibility_relaxation
    dimension: scalability
    description: "AC feasibility with progressive constraint relaxation (0%/10%/20%) on SMALL/MEDIUM."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: >-
      Progressive relaxation diagnostic — all outcomes produce informational data.
      Record relaxation level achieved (0%, 10%, 20%, or infeasible).
    solver: "Ipopt"
    recorded_metrics: [relaxation_level, wall_clock_per_attempt, peak_memory, cpu_threads_used, cpu_threads_available]
    converges_ac: true
    test_hash: "15688fba"

  - id: C-7
    slug: solver_swap
    dimension: scalability
    description: "Repeat C-3 with each available open-source solver on MEDIUM."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: "Solver swap requires only parameter change, not reformulation."
    solver: "HiGHS, GLPK, SCIP"
    recorded_metrics: [wall_clock_per_solver, reformulation_required, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    depends_on: [C-3]  # inferred — repeats C-3 with different solvers
    test_hash: "e72b8ebd"

  - id: C-8
    slug: scopf_scale
    dimension: scalability
    description: "SCOPF with 50 contingencies on load-scaled congested MEDIUM network."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: >-
      Completes SCOPF with 50 contingencies on load-scaled congested MEDIUM network.
      At least 5 MW aggregate dispatch change vs base-case DCOPF required. Report both
      1-thread and max-thread timings.
    solver: "HiGHS"
    recorded_metrics: [wall_clock, wall_clock_1thread, wall_clock_maxthread, peak_memory, iterations, binding_contingencies, aggregate_redispatch_mw, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    depends_on: [C-3]  # C-8 SCOPF gated only by C-3 (DCOPF MEDIUM), not by C-4
    test_hash: "6cf38e12"

  - id: C-9
    slug: ptdf_scale
    dimension: scalability
    description: "PTDF matrix computation on MEDIUM."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: "PTDF matrix computed on MEDIUM within time budget."
    solver: null
    recorded_metrics: [wall_clock, peak_memory, matrix_density, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "93bf8543"

  - id: C-10
    slug: distributed_slack_scale
    dimension: scalability
    description: "Distributed slack DC OPF on MEDIUM."
    functional_network: SMALL
    grade_network: MEDIUM
    pass_condition: "Distributed slack DC OPF on MEDIUM within time budget."
    solver: "HiGHS"
    recorded_metrics: [wall_clock, peak_memory, lmp_comparison, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "6d5f0305"

  # -------------------------------------------------------------------------
  # Suite D — Workforce Accessibility
  # -------------------------------------------------------------------------
  - id: D-1
    slug: install_to_first_solve
    dimension: accessibility
    description: "Measure time from clean install to first successful DCPF solve on TINY."
    functional_network: N/A
