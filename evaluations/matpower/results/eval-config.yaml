# ════════════════════════════════════════════════════════════════════════════════
# Execution DAG
# ════════════════════════════════════════════════════════════════════════════════
#
# Topological ordering respecting:
#   1. Gate tests first
#   2. TINY functional before SMALL/MEDIUM
#   3. Test dependencies (A-4 after A-3, A-6 after A-5, etc.)
#   4. Audit dimensions parallel with code dimensions
#   5. Observation consumers after producers
#   6. Max 5 test IDs per dimension per step
#
execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional — core power flow & OPF (expressiveness batch 1)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]
      - name: extensibility
        tier: TINY
        test_ids: [B-2, B-5, B-6]
      - name: accessibility
        tier: TINY
        test_ids: [D-1]

  - step: 3
    label: "TINY functional — dependent tests & extensions (expressiveness batch 2)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-7, A-8]  # A-4 depends on A-3
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-3, B-7]  # B-1 depends on A-3; B-7 depends on A-4

  - step: 4
    label: "TINY functional — SCUC, SCOPF, advanced OPF (expressiveness batch 3)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-5, A-9, A-10, A-11]  # A-11 depends on A-3 (already done)
      - name: extensibility
        tier: TINY
        test_ids: [B-8, B-9]
      - name: extensibility
        tier: TINY
        test_ids: [B-4]

  - step: 5
    label: "TINY functional — SCED and P2 readiness"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6]  # depends on A-5
      - name: p2_readiness
        tier: TINY
        test_ids: [P2-1, P2-2, P2-3]  # P2-3 depends on A-5

  - step: 6
    label: "Audit dimensions — accessibility, maturity, supply chain (parallel with code)"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-2, D-3, D-4, D-5]
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 7
    label: "Audit dimensions — maturity (batch 2) and supply chain (batch 1)"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-4, F-5, F-6]

  - step: 8
    label: "Supply chain — remaining audits (F-3 depends on F-2)"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-3, F-7, F-8, F-9]

  - step: 9
    label: "MEDIUM grade — power flow and OPF (scalability batch 1)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3]

  - step: 10
    label: "MEDIUM grade — solver swap, contingency, PTDF (scalability batch 2)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-5, C-7, C-9]  # C-7 depends on C-3

  - step: 11
    label: "SMALL grade — SCUC, stochastic, SCOPF (scalability batch 3)"
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]

  - step: 12
    label: "MEDIUM grade — SCOPF and distributed slack (scalability batch 4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-8, C-10]

# ════════════════════════════════════════════════════════════════════════════════
# Observation Tags
# ════════════════════════════════════════════════════════════════════════════════
observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]

  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]

  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [extensibility]

  solver-issues:
    description: "Solver-related findings"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]

  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]

  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]
