        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count, format_conversion_notes]
        converges_ac: false

      - id: G-2
        slug: ingest_small
        dimension: gate
        description: "Ingest ACTIVSg 2k reference network and verify counts"
        functional_network: SMALL
        grade_network: N/A
        pass_condition: "Tool loads ACTIVSg 2k without error. Bus, branch, and generator counts match expected values from .m file."
