  # --- Suite G: FNM Ingestion ---
  - id: G-FNM-1
    slug: fnm_ingestion_gate
    dimension: fnm_ingestion
    description: "Intermediate format ingestion — two-check gate (PSS/E compat + record counts)"
    functional_network: LARGE
    grade_network: LARGE
    pass_condition: >-
      G-FNM-1 has two sub-checks. (a) PSS/E compatibility: if the tool fails to
      parse the intermediate CSV tables, record failure_reason: psse_parse_error
      and ingestion_path: matpower_fallback, emit a blocking api-friction
      observation, and proceed to G-FNM-3/4/5 via MATPOWER fallback — G-FNM-2 is
      blocked but G-FNM-3/4/5 proceed. PSS/E format support failure is an
      interoperability finding; it does not cascade to block power-system capability
      assessment. (b) Record count fidelity (only checked if PSS/E parsing
      succeeds): all record counts must match the manifest exactly. Zero records
      missing, zero extra records. If the tool's data model merges record types
      (e.g., branches and transformers into a single table), the merged count must
      equal the sum of the constituent intermediate format table counts. If count
      check fails, skip G-FNM-2 through G-FNM-5.
    solver: null
    recorded_metrics: [pass_fail, psse_compat, record_counts, ingestion_path, wall_clock]
    converges_ac: false
    test_hash: "be3122c0"

  - id: G-FNM-2
    slug: fnm_field_coverage
    dimension: fnm_ingestion
    description: "Field coverage audit against criticality matrix"
    functional_network: LARGE
    grade_network: LARGE
    pass_condition: >-
      100% of DCPF-critical fields must be present across all 19 DCPF-critical
      fields. This is a hard requirement — any missing DCPF-critical field is a
      finding that directly impacts the Expressiveness grade. ACPF-critical field
      coverage is reported but not gated. Informational and Discardable field
      omissions are noted but carry no grade impact. The coverage report must
      identify each missing field by name, table, and criticality tier.
    solver: null
    recorded_metrics: [dcpf_critical_pct, acpf_critical_pct, informational_pct, discardable_pct]
    converges_ac: false
    depends_on: [G-FNM-1]
    test_hash: "64518aec"

  - id: G-FNM-3
    slug: fnm_dcpf_verification
    dimension: fnm_ingestion
    description: "DCPF verification against reference solution on FNM"
    functional_network: LARGE
    grade_network: LARGE
    pass_condition: >-
      Pass if all aggregate thresholds are met and no hard-fail condition is
      triggered, per the dcpf section of data/fnm/reference/pass_conditions.json.
      Buses and branches that exceed the aggregate tolerance but are classified as
      known outlier causes are reported as classified outliers, not unqualified
      failures. Bus injection power balance check must pass.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, peak_memory, aggregate_metrics, outlier_counts, input_path, ingestion_path]
    converges_ac: false
    depends_on: [G-FNM-1]  # inferred — needs ingested model
    test_hash: "2a6e1604"

  - id: G-FNM-4
    slug: fnm_acpf_convergence
    dimension: fnm_ingestion
    description: "ACPF convergence — DCPF warm-start + progressive relaxation on FNM"
    functional_network: LARGE
    grade_network: LARGE
    parameters: "DCPF warm-start, progressive relaxation 0%/10%/20%, 30 min/level"
    pass_condition: >-
      No hard pass/fail gate. All outcomes are diagnostic findings (outcome:
      informational). Record relaxation_level_achieved: 0%, 10%, 20%, or infeasible.
      If convergence occurs at any level, record as a discriminating solver
      robustness strength in the Expressiveness narrative. Failure to converge at 20%
      is recorded but not penalized.
    solver: "Ipopt"
    recorded_metrics: [relaxation_level, wall_clock_per_attempt, peak_memory, input_path, ingestion_path, dcpf_init_mean_deg, dcpf_init_max_abs_deg]
    converges_ac: true
    depends_on: [G-FNM-1]  # inferred — needs ingested model
