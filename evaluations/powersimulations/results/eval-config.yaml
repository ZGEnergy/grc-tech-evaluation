# =============================================================================
# EXECUTION DAG
# =============================================================================
execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional — expressiveness core (PF + OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]
      - name: accessibility
        tier: TINY
        test_ids: [D-1, D-4]

  - step: 3
    label: "TINY functional — expressiveness dependent (AC feasibility, SCED chain)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5]

  - step: 4
    label: "TINY functional — expressiveness dependent (SCED, contingency, stochastic)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-7, A-8]

  - step: 5
    label: "TINY functional — expressiveness P2-readiness tests (SCOPF, lossy, distributed slack)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-9, A-10, A-11]

  - step: 6
    label: "TINY functional — extensibility core"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-4, B-5]

  - step: 7
    label: "TINY functional — extensibility dependent + architecture"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-6, B-7, B-8, B-9]

  - step: 8
    label: "SMALL grade — expressiveness (SCUC, SCED, stochastic, SCOPF, lossy, distributed slack)"
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-6, A-8, A-9, A-10]

  - step: 9
    label: "SMALL grade — expressiveness (distributed slack) + extensibility (stochastic, ref bus)"
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-11]
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]

  - step: 10
    label: "SMALL scalability"
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]

  - step: 11
    label: "MEDIUM grade — expressiveness (DCPF, ACPF, DCOPF, AC feasibility, contingency)"
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-4, A-7]

  - step: 12
    label: "MEDIUM grade — extensibility (custom constraints, graph, contingency loop, interop, PTDF)"
    dimensions:
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5]

  - step: 13
    label: "MEDIUM grade — extensibility (AC feas extension, PTDF) + scalability batch 1"
    dimensions:
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-7, B-9]
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3]

  - step: 14
    label: "MEDIUM scalability batch 2 (contingency, SCOPF, PTDF, distributed slack, solver swap)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-5, C-7, C-8, C-9, C-10]

  - step: 15
    label: "Audit dimensions — accessibility, maturity, supply chain (parallel)"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-2, D-3, D-5]
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 16
    label: "Audit dimensions — maturity CI + adoption, supply chain"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]

  - step: 17
    label: "Audit dimensions — supply chain remaining"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]

  - step: 18
    label: "Phase 2 readiness findings"
    dimensions:
      - name: p2_readiness
        tier: TINY
        test_ids: [P2-1, P2-2, P2-3]

