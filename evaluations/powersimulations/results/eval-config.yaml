# eval-config.yaml — powersimulations
# Auto-generated from Phase 1 Evaluation Rubric and Test Protocol
# Rubric: evaluation_guides/Phase1_Evaluation_Rubric.md
# Protocol: evaluation_guides/Phase1_Test_Protocol.md
# Tool: PowerSimulations.jl (NREL Sienna)
# Protocol version: v11

tool: powersimulations
protocol_version: "v11"

# ---------------------------------------------------------------------------
# Network Tiers
# ---------------------------------------------------------------------------
network_tiers:
  TINY:
    name: "IEEE 39-bus (New England)"
    bus_count: 39
    branch_count: 46
    generator_count: 10
    file_path: "data/networks/case39.m"
    augmented_data: "data/timeseries/case39/"
  SMALL:
    name: "ACTIVSg 2k"
    bus_count: "~2000"  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10k"
    bus_count: "~10000"  # verify from .m file
    branch_count: "verify from .m file"
    generator_count: "verify from .m file"
    file_path: "data/networks/case_ACTIVSg10k.m"
  LARGE:
    name: "FNM Annual S01"
    bus_count: "~30000"
    source_path: "data/fnm/"
    fnm_path_gated: true
    intermediate_csvs: "data/fnm/reference/cleaned/intermediate/"
    matpower_fallback: "data/fnm/reference/cleaned/fnm_main_island.mat"

# ---------------------------------------------------------------------------
# Reference Counts (for gate validation)
# ---------------------------------------------------------------------------
reference_counts:
  TINY:
    buses: 39
    branches: 46
    generators: 10
  SMALL:
    buses: "verify from .m file"
    branches: "verify from .m file"
    generators: "verify from .m file"
  MEDIUM:
    buses: "verify from .m file"
    branches: "verify from .m file"
    generators: "verify from .m file"

# ---------------------------------------------------------------------------
# Dimensions
# ---------------------------------------------------------------------------
dimensions:
  - name: gate
    criterion_number: 0
    suite: G
    archetype: gate-evaluator
    weight_rank: 0  # gate — must pass first
    emits: []
    consumes: []

  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - convergence-quality
      - unit-mismatch
    consumes:
      - fnm-data-model
      - formulation-difference

  - name: extensibility
    criterion_number: 2
    suite: B
    archetype: code-evaluator
    weight_rank: 2
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - arch-quality
    consumes: []

  - name: scalability
    criterion_number: 3
    suite: C
    archetype: code-evaluator
    weight_rank: 3
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - cascaded-failure
    consumes:
      - solver-issues
      - convergence-quality
      - fnm-scale
      - formulation-difference

  - name: accessibility
    criterion_number: 4
    suite: D
    archetype: audit-evaluator
    weight_rank: 4
    emits: []
    consumes:
      - api-friction
      - doc-gaps
      - convergence-quality
      - unit-mismatch

  - name: maturity
    criterion_number: 5
    suite: E
    archetype: audit-evaluator
    weight_rank: 5
    emits: []
    consumes:
      - doc-gaps
      - arch-quality

  - name: supply_chain
    criterion_number: 6
    suite: F
    archetype: audit-evaluator
    weight_rank: 0  # gate criterion
    emits:
      - license-flags
    consumes: []

  - name: fnm_ingestion
    criterion_number: 0
    suite: G
    archetype: code-evaluator
    weight_rank: 0
    fnm_path_gated: true
    emits:
      - fnm-data-model
      - fnm-scale
      - formulation-difference
    consumes: []

  - name: p2_readiness
    criterion_number: 0
    suite: P2
    archetype: audit-evaluator
    informational: true
    weight_rank: 99
    emits: []
    consumes: []

# ---------------------------------------------------------------------------
# Observation Tags
# ---------------------------------------------------------------------------
observation_tags:
  api-friction:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: [accessibility]
  doc-gaps:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: []
  solver-issues:
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [scalability]
  convergence-quality:
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]
  unit-mismatch:
    emitted_by: [expressiveness]
    consumed_by: [accessibility]
  arch-quality:
    emitted_by: [extensibility]
    consumed_by: [maturity]
  cascaded-failure:
    emitted_by: [scalability]
    consumed_by: []  # consumed by synthesis
  fnm-data-model:
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness]  # + synthesis
  fnm-scale:
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability]  # + synthesis
  formulation-difference:
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, scalability]  # + synthesis
  license-flags:
    emitted_by: [supply_chain]
    consumed_by: []

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
tests:
  # --- Gate Tests (gate_minimum_bar — excluded from pass rate statistics) ---
  - id: G-1
    slug: ingest_tiny
    dimension: gate
    test_category: gate_minimum_bar
    description: "Ingest IEEE 39-bus reference network"
    functional_network: TINY
    grade_network: "N/A"
    pass_condition: >-
      Tool loads IEEE 39-bus without error. Bus count, branch count, and generator
      count match expected values (39 buses, 46 branches, 10 generators).
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "7f8c3606"

  - id: G-2
    slug: ingest_small
    dimension: gate
    test_category: gate_minimum_bar
    description: "Ingest ACTIVSg 2k reference network"
    functional_network: SMALL
    grade_network: "N/A"
    pass_condition: "Same verification on ACTIVSg 2k."
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "326e8597"

  - id: G-3
    slug: ingest_medium
    dimension: gate
    test_category: gate_minimum_bar
    description: "Ingest ACTIVSg 10k reference network"
    functional_network: MEDIUM
    grade_network: "N/A"
    pass_condition: "Same verification on ACTIVSg 10k."
    solver: null
    recorded_metrics: [pass_fail, bus_count, branch_count, gen_count]
    converges_ac: false
    test_hash: "d5cc0c0a"

  # --- Suite A: Problem Expressiveness ---
  - id: A-1
    slug: dcpf
    dimension: expressiveness
    description: "Solve DC power flow on TINY"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. Nodal injections, line flows, and voltage angles accessible as
      structured output (DataFrame, dict, or named array — not raw solver vector).
    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc, output_format]
    converges_ac: false
    test_hash: "05bc255c"

  - id: A-2
    slug: acpf
    dimension: expressiveness
    description: "Solve AC power flow (Newton-Raphson) on TINY"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Converges. AC solve convergence must be verified by checking max bus power
      mismatch < 1e-4 p.u. Convergence evidence must be documented at the highest
      tier achievable: (1) residual value reported and below tool's stated tolerance
      (preferred), (2) NR iteration count via any API including log capture, (3)
      binary convergence indicator via return type or exception, (4) voltage profile
      proxy as last resort. Record convergence_evidence_quality in frontmatter:
      residual_reported, iteration_count_reported, binary_convergence_api, or
      proxy_voltage. Voltage magnitudes must differ from flat-start defaults (1.0 pu)
      on >95% of buses. Bus voltage magnitudes and angles, line P/Q flows, and losses
      accessible as structured output. Tools that can only provide proxy-level
      convergence evidence receive a documented diagnostic quality finding in the
      Accessibility dimension.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, loc, convergence_evidence_quality, convergence_residual, nr_iterations, output_format]
    converges_ac: true
    test_hash: "eb349d9c"

  - id: A-3
    slug: dcopf
    dimension: expressiveness
    description: "Solve DC OPF with differentiated gen costs and 70% branch derating on TINY"
    functional_network: TINY
    grade_network: TINY
    tiny_params: "differentiated generator costs from gen_temporal_params.csv and 70% branch derating"
    pass_condition: >-
      Converges. Optimal dispatch and LMPs/shadow prices extractable from solution.
      With differentiated costs and 70% derating, at least 2 branches have non-zero
      shadow prices (binding flow constraints). Report max LMP spread across buses.
      Hard constraint verification: No branch may exceed its derated thermal limit in
      the optimal solution (max_loading <= 1.0 + 1e-4 p.u. tolerance). If the
      formulation uses soft branch flow constraints (LP slack variables), classify as
      partial_pass and document the penalty coefficient used. Soft-constraint DCOPF is
      not inherently wrong but must be explicitly labeled and distinguished from
      hard-constraint DCOPF. Report max branch loading achieved in the optimal solution.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, lmp_spread, binding_branches, max_branch_loading, output_format]
    converges_ac: false
    test_hash: "dcb5d18b"

  - id: A-4
    slug: ac_feasibility
    dimension: expressiveness
    description: "AC feasibility check on DC OPF dispatch from A-3"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable within the same model context (no export to file and reimport).
      Voltage violations and thermal limit violations identifiable from results.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, loc, voltage_violations, thermal_violations]
    converges_ac: true
    depends_on: [A-3]
    test_hash: "8531c61c"

  - id: A-5
    slug: scuc
    dimension: expressiveness
    description: "Solve 24-hour SCUC with min up/down, startup costs, ramp rates, reserves"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves to feasibility (MIP gap <= 1%). MIP gap must be extractable from the
      solver and reported in result frontmatter. At least 2 generators must cycle
      (commit/decommit) during the 24-hour horizon. Commitment schedule extractable
      as a time-indexed binary matrix or equivalent. Built-in constraint types vs.
      user-assembled noted. Binding verification (mandatory): Re-run SCUC with
      min_up_time=min_down_time=0 and compare the commitment schedule to the baseline.
      At least one generator's commitment schedule must change when temporal constraints
      are removed, confirming min up/down constraints were binding in the baseline
      solution. Report whether the binary commitment variable is directly readable from
      the solver model; if not, document this as a formulation transparency finding.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, cycling_generators, binding_verification, output_format]
    converges_ac: false
    test_hash: "1640c770"

  - id: A-6
    slug: sced
    dimension: expressiveness
    description: "Fix commitment from A-5, solve economic dispatch as LP/QP"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a
      two-stage workflow. Ramp rate constraints are demonstrably enforced between
      consecutive dispatch intervals in the ED stage — not just inherited from the
      UC formulation. Ramp binding evidence (mandatory): Re-run with ramp rates
      reduced to 10% of baseline values and verify that at least one ramp constraint
      dual value > 0 (binding), with the generator index, hour, and dual value
      reported. If ramp constraints cannot be tightened or dual values cannot be
      extracted, document as a formulation transparency finding. SCED mode
      classification: Record sced_mode in result frontmatter — full_sced (UC stage
      performed, security constraints enforced), ed_with_security (no UC stage,
      security constraints enforced), or ed_only (no UC stage, no security
      constraints). Only full_sced maps to pass; ed_with_security maps to
      qualified_pass; ed_only maps to fail with context that the tool does not
      support the UC stage.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, sced_mode, ramp_binding_evidence, output_format]
    converges_ac: false
    depends_on: [A-5]
    test_hash: "3343ccf1"

  - id: A-9
    slug: scopf
    dimension: expressiveness
    description: "Solve DC OPF with N-1 contingency constraints embedded in optimization"
    functional_network: TINY
    grade_network: TINY
    parameters: "feasible N-1 SCOPF configuration from eval-config.yaml"
    pass_condition: >-
      Solves. Base-case dispatch respects all contingency flow limits simultaneously.
      Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more
      expensive. Contingency constraints are part of the optimization, not checked
      post-hoc. Benders/iterative algorithm converges in >= 2 iterations, OR the
      evaluator demonstrates the joint N-1 problem is feasible and solved optimally in
      1 iteration with explicit feasibility confirmation. If achievable only by manually
      enumerating contingency constraints via B-1's custom constraint API, document the
      effort and classify the workaround.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, objective_value, cost_difference_from_a3, iterations]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares cost to A-3
    test_hash: "1771767b"

  - id: A-10
    slug: lossy_dcopf_lmp
    dimension: expressiveness
    description: "Solve DC OPF with loss approximation and LMP decomposition"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool produces loss-inclusive LMPs where loss components are non-zero. LMP
      decomposition extractable as structured output. Per-line congestion rent
      computed and reconciled against congestion LMP components. Validate internal
      consistency: (a) loss components have physically correct signs (positive
      marginal loss at load buses far from generation), (b) total losses are 0.5-3%
      of total load, (c) lossy objective exceeds lossless objective, (d) loss
      component LMPs sum with energy and congestion components to total LMP within
      1% tolerance.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, loss_pct, lmp_decomposition, congestion_rent]
    converges_ac: false
    test_hash: "0a550931"

  - id: A-11
    slug: distributed_slack_opf
    dimension: expressiveness
    description: "Solve DC OPF with distributed slack (load-proportional)"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Tool supports distributed slack formulation. LMPs differ from single-slack
      results in a physically consistent manner (SMEC reflects the distributed
      reference). Distributed slack weights are settable via API (e.g., proportional
      to load, proportional to generation, or custom weights).
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison_to_a3]
    converges_ac: false
    depends_on: [A-3]  # inferred — compares LMPs to A-3
    test_hash: "95a0e3ae"

  - id: A-12
    slug: multiperiod_dcopf_storage
    dimension: expressiveness
    description: "24-hour multi-period DCOPF with storage and congestion (Modified Tiny)"
    functional_network: TINY
    grade_network: TINY
    parameters: "Full Modified Tiny recipe: differentiated costs, quadratic costs (c2 = c1 * 0.001, mandatory), renewables (standard placement), BESS with cyclic SoC (mandatory), 70% branch derating, and 24-hour load profile"
    pass_condition: >-
      Three behavioral pass conditions: (1) Congestion reporting: Mean and std of
      branch shadow prices computed by hour. At least 2 of 24 hours must have >=2
      branches with non-zero shadow prices. (2) BESS arbitrage timing: Mean LMP at
      the BESS bus during discharge hours (P > 0.01 MW) must exceed mean LMP during
      charge hours (P < -0.01 MW). Hours with |P| <= 0.01 MW are excluded. (3) SoC
      feasibility: SoC in [0, energy_capacity] at all timesteps, AND energy balance
      trajectory consistent: |SoC[t] - SoC[t-1] - eta_ch*P_ch[t] + P_dis[t]/eta_dis|
      < 1.0 MWh for each t (dt=1h). Tools that lack multi-period or storage support
      receive a documented fail with the specific limitation noted (no multi-period,
      no storage, no quadratic costs).
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, shadow_prices, bess_dispatch, soc_trajectory, lmp_hourly]
    converges_ac: false
    test_hash: "5661f0de"

  # --- Suite B: Extensibility ---
  - id: B-1
    slug: custom_constraints
    dimension: extensibility
    description: "Add flow gate limit to DC OPF and assert on dual value"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Achievable through a documented API or extension mechanism. No source patching
      or forking required. Dual value of custom constraint extractable and correctly
      reflects binding status.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, loc, workaround_class, dual_value]
    converges_ac: false
    test_hash: "fececf15"

  - id: B-2
    slug: graph_access
    dimension: extensibility
    description: "BFS to depth 3 from a chosen bus"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Works via native graph primitives or clean, documented export to NetworkX
      (Python) or Graphs.jl (Julia).
    solver: null
    recorded_metrics: [pass_fail, loc, method_used]
    converges_ac: false
    test_hash: "5068a626"

  - id: B-3
    slug: contingency_sweep
    dimension: extensibility
    description: "N-M contingency sweep with pruning, x=3 m=3 on TINY"
    functional_network: TINY
    grade_network: TINY
    parameters: "x=3, m=3, all 46 branches"
    pass_condition: >-
      Completes without full model reconstruction per contingency case. Load loss
      per contingency case collected. Pruning logic is expressible without fighting
      the tool. Combinatorial enumeration and graph-distance scoping are achievable
      via the tool's API or a clean graph library bridge.
    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc, contingency_count, method_used]
    converges_ac: false
    test_hash: "f4d4e1ba"

  - id: B-4
    slug: stochastic_timeseries
    dimension: extensibility
    description: "20-scenario stochastic wrapping with 12hr multi-period DCOPF"
    functional_network: TINY
    grade_network: TINY
    parameters: "20 scenarios, 12hr multi-period DCOPF, correlated perturbations by resource type"
    pass_condition: >-
      Tool accepts timeseries inputs programmatically (not from config files only).
      Scenario loop is expressible without excessive per-scenario overhead. Results
      (prices, dispatch) are collectable in a structured format.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, per_scenario_overhead]
    converges_ac: false
    test_hash: "9eebb1b8"

  - id: B-5
    slug: interoperability
    dimension: extensibility
    description: "Export DCPF results to DataFrames.jl and CSV"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      Trivial — fewer than 5 lines of code beyond the solve. No custom
      serialization logic required.
    solver: null
    recorded_metrics: [pass_fail, loc]
    converges_ac: false
    test_hash: "3d423124"

  - id: B-6
    slug: code_architecture
    dimension: extensibility
    description: "Qualitative assessment of DCPF solve path architecture"
    functional_network: N/A
    grade_network: N/A
    pass_condition: >-
      Document: number of abstraction layers, whether network model / problem
      formulation / solver interface / results are separated, whether internal
      interfaces are documented.
    solver: null
    recorded_metrics: [abstraction_layers, separation_of_concerns, internal_docs]
    converges_ac: false
    test_hash: "0f337d8d"

  - id: B-8
    slug: reference_bus_config
    dimension: extensibility
    description: "Solve DC OPF with three slack configurations on TINY"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      The tool allows setting an arbitrary reference bus without error or model
      reconstruction. All three configurations must complete without exception. For
      DC OPF: LMP values are expected to be invariant across configurations (this is
      physically correct behavior for lossless DC OPF — invariance is a pass, not a
      failure). For AC OPF (if supported): LMPs may vary; document any variation.
      The test is primarily an API surface test — the key evaluation point is whether
      the tool's API allows reference bus changes without model reconstruction.
      Document the API calls required and workaround durability.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, workaround_class, lmp_comparison]
    converges_ac: false
    test_hash: "dad5cf97"

  - id: B-9
    slug: ptdf_extraction
    dimension: extensibility
    description: "Compute PTDF matrix for TINY (39-bus) and verify against DCPF"
    functional_network: TINY
    grade_network: TINY
    pass_condition: >-
      PTDF matrix accessible via native API, internal matrix extraction, or
      unit-injection computation. Flow predictions match DCPF results within
      numerical tolerance (1e-6). If the network contains phase-shifting
      transformers (nonzero SHIFT column in branch data), the PTDF validation
      must either (a) apply Pbusinj/Pfinj correction terms from the admittance
      matrix construction (corrected_flow = PTDF @ (Pinj - Pbusinj) + Pfinj),
      or (b) exclude branches with nonzero shift angles from the accuracy
      comparison. The 1e-6 tolerance applies to the corrected or filtered
      comparison.
    solver: null
    recorded_metrics: [pass_fail, wall_clock, loc, matrix_dimensions, method_used]
    converges_ac: false
    test_hash: "3c9003ed"

  # --- Suite C: Scalability ---
  - id: C-1
    slug: dcpf_scale
    dimension: scalability
    description: "DCPF on MEDIUM (ACTIVSg 10k)"
    functional_network: MEDIUM
    grade_network: MEDIUM
    pass_condition: "Completes. Wall-clock time and peak memory recorded."
    solver: null
    recorded_metrics: [pass_fail, wall_clock, peak_memory, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "a3d2aa6b"

  - id: C-2
    slug: acpf_scale
    dimension: scalability
    description: "ACPF on MEDIUM (ACTIVSg 10k)"
    functional_network: MEDIUM
    grade_network: MEDIUM
    pass_condition: >-
      Completes. Wall-clock time, peak memory, and iterations recorded. Convergence
      must be verified by checking max bus power mismatch < 1e-4 p.u. Record
      convergence_evidence_quality using the same four-tier hierarchy as A-2.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, peak_memory, iterations, convergence_evidence_quality, cpu_threads_used, cpu_threads_available]
    converges_ac: true
    test_hash: "e9e9d3e4"

  - id: C-3
    slug: dcopf_scale
    dimension: scalability
    description: "DC OPF on MEDIUM with HiGHS and GLPK"
    functional_network: MEDIUM
    grade_network: MEDIUM
    pass_condition: >-
      Completes with each solver. Wall-clock time per solver, peak memory, objective
      value (verify consistency across solvers). Max branch loading must be reported;
      if >1.0 + 1e-4 p.u. in optimal solution, record as soft-constraint finding.
    solver: "HiGHS, GLPK"
    recorded_metrics: [pass_fail, wall_clock_per_solver, peak_memory, objective_value, max_branch_loading, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "bac66bc2"

  - id: C-4
    slug: scuc_scale
    dimension: scalability
    description: "SCUC 24hr on SMALL with HiGHS and SCIP"
    functional_network: SMALL
    grade_network: SMALL
    pass_condition: >-
      Completes. Wall-clock time per solver, MIP gap at termination, peak memory.
      Report both 1-thread and max-thread timings if solver supports parallel
      execution.
    solver: "HiGHS, SCIP"
    recorded_metrics: [pass_fail, wall_clock_per_solver, wall_clock_1thread, wall_clock_maxthread, mip_gap, peak_memory, cpu_threads_used, cpu_threads_available]
    converges_ac: false
    test_hash: "15e96e8d"

  - id: C-5
    slug: ac_feasibility_progressive
    dimension: scalability
    description: "AC Feasibility — progressive relaxation on SMALL and MEDIUM"
    functional_network: SMALL
    grade_network: MEDIUM
    parameters: "DCPF warm-start, progressive relaxation 0%/10%/20%"
    pass_condition: >-
      Diagnostic finding. Record relaxation level required (0%, 10%, 20%, or
