        slug: ac_feasibility
        dimension: expressiveness
        description: "Take DC OPF dispatch from A-3, run full ACPF on that dispatch"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Achievable within the same model context (no export to file and reimport). Voltage violations and thermal limit violations identifiable from results."
        depends_on: [A-3]
        solver: Ipopt
        recorded_metrics: [pass_fail, wall_clock, loc, voltage_violations, thermal_violations, workarounds]
        converges_ac: true

      - id: A-5
        slug: scuc
        dimension: expressiveness
        description: "Solve 24-hour SCUC as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves to feasibility (MIP gap <= 1% on TINY, <= 10% on SMALL). Commitment schedule extractable as a time-indexed binary matrix. Built-in constraint types vs. user-assembled noted."
        depends_on: []
        solver: "HiGHS, SCIP"
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, commitment_schedule_format, builtin_vs_assembled, cost_curve_type, workarounds]
        converges_ac: false

      - id: A-6
        slug: sced
        dimension: expressiveness
        description: "Fix commitment from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a two-stage workflow. Ramp rate constraints are demonstrably enforced between consecutive dispatch intervals in the ED stage — not just inherited from the UC formulation."
        depends_on: [A-5]
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, dispatch_format, ramp_enforcement, workarounds]
        converges_ac: false

      - id: A-7
        slug: contingency_sweep
        dimension: expressiveness
        description: "N-M contingency sweep: enumerate branches within graph distance x of a bus, escalating outage order up to m with pruning"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Completes without full model reconstruction per contingency case. Load loss per contingency case collected. Pruning logic is expressible without fighting the tool. Combinatorial enumeration and graph-distance scoping are achievable via the tool's API or a clean graph library bridge. TINY: x=3, m=3. MEDIUM: x=5, m=4."
        depends_on: []
        solver: N/A
        recorded_metrics: [pass_fail, wall_clock, loc, cases_evaluated_per_order, pruning_ratio, workarounds]
        converges_ac: false

      - id: A-8
        slug: stochastic_timeseries
        dimension: expressiveness
        description: "Solve multi-period (12hr, hourly) DCOPF with stochastic load and renewable scenarios, independent perturbations by resource type"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool natively supports scenario-indexed timeseries for load, wind, and solar — the stochastic structure is part of the optimization formulation (e.g., scenario tree, two-stage stochastic program), not just independent deterministic solves in a loop. Perturbations are independent by resource type. Prices extractable from solution."
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, native_stochastic, price_extraction, workarounds]
        converges_ac: false

      - id: A-9
        slug: scopf
        dimension: expressiveness
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in the optimization"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Base-case dispatch respects all contingency flow limits simultaneously. Dispatch and cost differ from unconstrained DC OPF (A-3). Contingency constraints are part of the optimization, not checked post-hoc. TINY: all 46 branches as contingency set. SMALL: 50 monitored branches. If achievable only via B-1 custom constraint API, document effort and classify workaround. Thermal rating relaxation permitted on TINY if infeasible (150%, escalate to 200%)."
        depends_on: [A-3]  # inferred — needs A-3 baseline for comparison
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, cost_vs_a3, binding_contingencies, thermal_relaxation, workarounds]
        converges_ac: false

      - id: A-10
        slug: lossy_dcopf_lmp
        dimension: expressiveness
        description: "Solve DC OPF with loss approximation, decompose LMPs into energy/congestion/loss, compute per-line congestion rent"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool produces loss-inclusive LMPs where loss components are non-zero. LMP decomposition extractable as structured output. Per-line congestion rent computed and reconciled against congestion LMP components (5% tolerance). Validate against MATPOWER reference lossy DC OPF solution (1% tolerance on total LMP, directional consistency on loss component signs)."
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_decomposition, congestion_rent, matpower_validation, workarounds]
        converges_ac: false

      - id: A-11
        slug: distributed_slack_opf
        dimension: expressiveness
        description: "Solve DC OPF with distributed slack (load-proportional), compare LMPs to single-slack A-3"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool supports distributed slack formulation. LMPs differ from single-slack results in a physically consistent manner (SMEC reflects the distributed reference). Distributed slack weights are settable via API (e.g., proportional to load, proportional to generation, or custom weights)."
        depends_on: [A-3]  # inferred — needs A-3 for LMP comparison
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison_vs_a3, slack_weights, workarounds]
