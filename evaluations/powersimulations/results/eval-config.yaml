# ---------------------------------------------------------------------------
# Execution DAG
# ---------------------------------------------------------------------------
# Topological ordering respecting:
# 1. Gate tests first
# 2. TINY functional before SMALL/MEDIUM
# 3. Test dependencies (A-4 after A-3, A-6 after A-5, C-8 after C-3)
# 4. Audit dimensions parallel with code dimensions
# 5. Observation consumers after producers
# 6. Suite G independent of A-F, FNM_PATH-gated
# 7. Suite C SMALL gate with selective MILP gating (v11 semantics)
# 8. No more than 5 test IDs per dispatch batch
execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "Suite G — FNM ingestion gate"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]

  - step: 3
    label: "TINY functional — expressiveness core (DCPF, ACPF, DCOPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]

  - step: 4
    label: "TINY functional — expressiveness dependent (AC feasibility, SCUC, SCOPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5, A-9]

  - step: 5
    label: "TINY functional — expressiveness advanced (SCED, lossy DCOPF, distributed slack, multi-period storage)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-10, A-11, A-12]

  - step: 6
    label: "TINY functional — extensibility core (custom constraints, graph access, contingency sweep)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3]

  - step: 7
    label: "TINY functional — extensibility advanced (stochastic, interop, arch, ref bus, PTDF)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-4, B-5, B-6, B-8, B-9]

  - step: 8
    label: "Suite G — FNM field coverage and DCPF verification"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3]

  - step: 9
    label: "Suite G — FNM ACPF convergence and supplemental CSV"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-4, G-FNM-5]

  - step: 10
    label: "Scalability — SMALL tier gate"
    c_scale_gate: true
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-5]

  - step: 11
    label: "Scalability — MEDIUM LP/PF (unconditional, not gated by C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3]
        milp_gated: false

  - step: 12
    label: "Scalability — MEDIUM LP/PF continued + PTDF (unconditional)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-5, C-7, C-9, C-10]
        milp_gated: false

  - step: 13
    label: "Scalability — MEDIUM SCOPF (gated by C-3, not by C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-8]
        milp_gated: false

  - step: 14
    label: "Audit dimensions — accessibility"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]

  - step: 15
    label: "Audit dimensions — maturity batch 1"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 16
    label: "Audit dimensions — maturity batch 2 + supply chain batch 1"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3]

  - step: 17
    label: "Supply chain — inspectability and distribution"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-4, F-5, F-6, F-7, F-8]

  - step: 18
    label: "Supply chain — getting-started integrity"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-9]

  - step: 19
    label: "Phase 2 readiness findings"
    dimensions:
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2, P2-3]
