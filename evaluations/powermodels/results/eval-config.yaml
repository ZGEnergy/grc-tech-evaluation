# ═══════════════════════════════════════════════════
# Execution DAG
# ═══════════════════════════════════════════════════
#
# Topological ordering that respects:
#   1. Gate tests complete before everything else
#   2. TINY functional tests before SMALL/MEDIUM grade tests
#   3. Explicit test dependencies (A-4→A-3, A-6→A-5, A-11→A-3,
#      B-1→A-3, B-5→A-1, B-7→A-4, F-3→F-2)
#   4. Scalability tests after their functional counterparts
#   5. Audit dimensions can run in parallel with code dimensions
#   6. Observation consumers run after producers complete

execution_dag:
  - step: 1
    label: "Gate tests — data ingestion"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional verification — independent tests + audit kickoff"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-5, A-7, A-8, A-9, A-10]
        note: "A-4, A-6, A-11 have dependencies — deferred to step 3"
      - name: extensibility
        tier: TINY
        test_ids: [B-2, B-3, B-4, B-6, B-8, B-9]
        note: "B-1, B-5, B-7 depend on A-suite results — deferred to step 3"
      - name: accessibility
        tier: TINY
        test_ids: [D-1, D-4]
        note: "D-2, D-3, D-5 can run in parallel but D-2 references Suite A"
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-4, F-5, F-6, F-7, F-8, F-9]
        note: "Audit-based; no runtime dependency on code tests"
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5, E-6, E-7]
        note: "Audit-based; can run fully in parallel"
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2]

  - step: 3
    label: "TINY functional verification — dependent tests"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-6, A-11]
        note: "A-4 depends on A-3, A-6 depends on A-5, A-11 depends on A-3"
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-5, B-7]
        note: "B-1 depends on A-3, B-5 depends on A-1, B-7 depends on A-4"
      - name: supply_chain
        tier: N/A
        test_ids: [F-3]
        note: "F-3 depends on F-2"
      - name: accessibility
        tier: N/A
        test_ids: [D-2, D-3, D-5]
        note: "D-2 references Suite A tests; D-5 compares LOC across Suite A"

  - step: 4
    label: "SMALL grade assessment — expressiveness + extensibility"
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-6, A-8, A-9, A-10, A-11]
        note: "Tests whose grade_network is SMALL"
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]
        note: "Tests whose grade_network is SMALL"

  - step: 5
    label: "MEDIUM grade assessment — expressiveness + extensibility"
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-4, A-7]
        note: "Tests whose grade_network is MEDIUM"
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5, B-7, B-9]
        note: "Tests whose grade_network is MEDIUM"

  - step: 6
    label: "Scalability suite — SMALL"
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]
        note: "SMALL-tier scalability tests"

  - step: 7
    label: "Scalability suite — MEDIUM"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5, C-7, C-8, C-9, C-10]
        note: "MEDIUM-tier scalability tests. C-7 depends on C-3."

# ═══════════════════════════════════════════════════
# Observation Tags
# ═══════════════════════════════════════════════════

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]

  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]

  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [extensibility]

  solver-issues:
    description: "Solver-related findings (performance, compatibility, lock-in)"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]

  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]

  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]
