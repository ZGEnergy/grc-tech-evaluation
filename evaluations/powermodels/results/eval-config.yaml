        grade_network: MEDIUM
        pass_condition: >
          Wall-clock time and peak memory recorded.
        solver: "N/A (direct solve)"
        recorded_metrics: ["wall_clock_time", "peak_memory", "cpu_utilization", "parallelism_controls"]
        converges_ac: false
        test_hash: "746f2a0d"

      - id: C-2
        slug: acpf_scale
        dimension: scalability
        description: "ACPF performance at MEDIUM scale"
        functional_network: "N/A"
        grade_network: MEDIUM
        pass_condition: >
          Wall-clock time, peak memory, and iterations recorded.
        solver: "Ipopt"
        recorded_metrics: ["wall_clock_time", "peak_memory", "nr_iterations", "cpu_utilization", "parallelism_controls"]
        converges_ac: true
        test_hash: "c2fc9715"

      - id: C-3
        slug: dcopf_scale
        dimension: scalability
        description: "DC OPF performance at MEDIUM scale with multiple solvers"
        functional_network: "N/A"
        grade_network: MEDIUM
        pass_condition: >
          Wall-clock time per solver, peak memory, objective value (verify consistency
          across solvers) recorded.
        solver: "HiGHS, GLPK"
        recorded_metrics: ["wall_clock_time_per_solver", "peak_memory", "objective_value", "solver_consistency_check", "cpu_utilization"]
        converges_ac: false
        test_hash: "2a448a1f"

      - id: C-4
        slug: scuc_scale
        dimension: scalability
        description: "SCUC 24hr performance at SMALL scale"
        functional_network: "N/A"
        grade_network: SMALL
        depends_on: [A-5]  # inferred — SCUC scale test depends on SCUC being expressible
        pass_condition: >
          Wall-clock time per solver, MIP gap at termination, peak memory recorded.
        solver: "HiGHS, SCIP"
