    grade_network: MEDIUM
    pass_condition: >
      Achievable within the same model context (no export to file and reimport).
      Voltage violations and thermal limit violations identifiable from results.
    solver: "Ipopt"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory]
    converges_ac: true
    depends_on: [A-3]

  - id: A-5
    slug: scuc
    dimension: expressiveness
    description: "Solve 24-hour unit commitment as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
    functional_network: TINY
    grade_network: SMALL
    pass_condition: >
      Solves to feasibility (MIP gap <= 1% on TINY, <= 10% on SMALL). Commitment
      schedule extractable as a time-indexed binary matrix. Built-in constraint
      types vs. user-assembled noted.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory, mip_gap]
    converges_ac: false
    depends_on: []

  - id: A-6
    slug: sced
    dimension: expressiveness
    description: "Fix commitment schedule from A-5, solve economic dispatch as LP/QP"
    functional_network: TINY
    grade_network: SMALL
    pass_condition: >
      Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a
      two-stage workflow. Ramp rate constraints are demonstrably enforced between
      consecutive dispatch intervals in the ED stage — not just inherited from
      the UC formulation.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory]
    converges_ac: false
    depends_on: [A-5]

  - id: A-7
    slug: contingency_sweep
    dimension: expressiveness
    description: >
      N-M contingency sweep: enumerate branches within graph distance x of a
      bus, sweep with escalating order up to m simultaneous outages, prune
      branches causing total load loss at lower orders.
      TINY: x=3, m=3. MEDIUM: x=5, m=4.
    functional_network: TINY
    grade_network: MEDIUM
    pass_condition: >
      Completes without full model reconstruction per contingency case. Load loss
      per contingency case collected. Pruning logic is expressible without
      fighting the tool. Combinatorial enumeration and graph-distance scoping
      are achievable via the tool's API or a clean graph library bridge.
    solver: "N/A (direct solve)"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory, cases_evaluated, pruning_ratio]
    converges_ac: false
    depends_on: []

  - id: A-8
    slug: stochastic_timeseries
    dimension: expressiveness
    description: >
      Solve a multi-period (12hr, hourly resolution) DCOPF with stochastic load
      and renewable generation scenarios. Perturbations independent by resource
      type. Extract prices.
    functional_network: TINY
    grade_network: SMALL
    pass_condition: >
      Tool natively supports scenario-indexed timeseries for load, wind, and
      solar — the stochastic structure is part of the optimization formulation
      (e.g., scenario tree, two-stage stochastic program), not just independent
      deterministic solves in a loop. Perturbations are independent by resource
      type. Prices extractable from solution.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory]
    converges_ac: false
    depends_on: []

  - id: A-9
    slug: scopf
    dimension: expressiveness
    description: >
      Solve DC OPF with N-1 contingency flow constraints embedded in the
      optimization. TINY: all 46 branches. SMALL: 50 monitored branches.
      MEDIUM: 500 monitored branches. Iterative contingency screening allowed.
    functional_network: TINY
    grade_network: SMALL
    pass_condition: >
      Solves. Base-case dispatch respects all contingency flow limits
      simultaneously. Dispatch and cost differ from unconstrained DC OPF (A-3) —
      SCOPF should be more expensive. Contingency constraints are part of the
      optimization, not checked post-hoc. If achievable only by manually
      enumerating contingency constraints via B-1's custom constraint API,
      document the effort and classify the workaround.
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory, binding_contingencies]
    converges_ac: false
    depends_on: []

  - id: A-10
    slug: lossy_dcopf_lmp
    dimension: expressiveness
    description: >
      Solve DC OPF with loss approximation on TINY. Decompose LMPs into energy,
      congestion, and loss components. Compute per-line congestion rent and
      validate via LMP reconciliation.
    functional_network: TINY
    grade_network: SMALL
    pass_condition: >
      Tool produces loss-inclusive LMPs where loss components are non-zero. LMP
      decomposition extractable as structured output. Per-line congestion rent
      computed and reconciled against congestion LMP components (5% tolerance).
      Validate against MATPOWER reference lossy DC OPF solution on same case
      (tolerance: 1% on total LMP, directional consistency on loss component signs).
    solver: "HiGHS"
    recorded_metrics: [pass_fail, wall_clock, loc, peak_memory]
    converges_ac: false
    depends_on: []

  - id: A-11
