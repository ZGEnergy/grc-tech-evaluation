        functional_network: N/A
        grade_network: N/A
        pass_condition: "Full module list. Any opaque steps flagged."
        depends_on: []
        converges_ac: false
        recorded_metrics: [module_list, opaque_steps]
        test_hash: "4dbbf497"

      - id: F-6
        slug: distribution_integrity
        description: "Release distribution channel and integrity"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Versioned releases (yes/no), signed artifacts (yes/no), distribution channel (PyPI, Julia Registry, GitHub). Flag unversioned tarballs or blob store artifacts."
        depends_on: []
        converges_ac: false
        recorded_metrics: [versioned, signed, distribution_channel]
        test_hash: "c5701afa"

      - id: F-7
        slug: airgap_installability
        description: "Air-gap installability assessment"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Can all packages be downloaded as files and installed offline? Any dependencies that require network access at runtime?"
