        test_hash: "059e1be1"

# ---------------------------------------------------------------------------
# Execution DAG
# ---------------------------------------------------------------------------

execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "Supply chain audit + FNM ingestion gate"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]
        fnm_path_gated: true

  - step: 3
    label: "Supply chain audit (continued) + FNM field coverage"
    dimensions:
      - name: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2]
        fnm_path_gated: true

  - step: 4
    label: "TINY functional — expressiveness batch 1 (power flow + OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]

  - step: 5
    label: "TINY functional — expressiveness batch 2 (AC feasibility + SCUC + SCOPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5, A-9]

  - step: 6
    label: "TINY functional — expressiveness batch 3 (SCED + lossy + distributed slack + multiperiod)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-10, A-11, A-12]

  - step: 7
    label: "TINY functional — extensibility batch 1 (constraints + graph + interop + architecture)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-5, B-6]

  - step: 8
    label: "TINY functional — extensibility batch 2 (contingency sweep + stochastic + ref bus + PTDF)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-3, B-4, B-8, B-9]

  - step: 9
    label: "FNM power flow verification"
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-3, G-FNM-4, G-FNM-5]
        fnm_path_gated: true

  - step: 10
    label: "Accessibility audit"
    dimensions:
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]

  - step: 11
    label: "Maturity audit"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 12
    label: "Maturity audit (continued)"
    dimensions:
      - name: maturity
        tier: N/A
        test_ids: [E-6, E-7]

  - step: 13
    label: "Scalability — SMALL tier (C-SMALL gate)"
    c_scale_gate: true
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-5]

  - step: 14
    label: "Scalability — MEDIUM tier (runs only if SMALL passes)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5]

  - step: 15
    label: "Scalability — MEDIUM tier batch 2"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-7, C-8, C-9, C-10]

  - step: 16
    label: "Phase 2 readiness findings"
    dimensions:
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2, P2-3]

# ---------------------------------------------------------------------------
# Observation Tags
# ---------------------------------------------------------------------------

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: [accessibility]
  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility, fnm_ingestion]
    consumed_by: [extensibility]
  solver-issues:
    description: "Solver-related findings"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]
  convergence-quality:
    description: "Solver reports convergence but diagnostics indicate otherwise"
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]
  unit-mismatch:
    description: "MW vs per-unit inconsistency at analysis boundaries"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility]
  cascaded-failure:
    description: "Scalability test blocked by prerequisite expressiveness failure"
    emitted_by: [scalability]
    consumed_by: [synthesis]
  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]
  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]
  fnm-data-model:
    description: "Data model fidelity findings from FNM ingestion (missing record types, field gaps)"
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, synthesis]
  fnm-scale:
    description: "Scale-related findings on LARGE (~30K bus) FNM network"
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability, synthesis]
  formulation-difference:
    description: "DCPF formulation classification differences between tool and reference"
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, scalability, synthesis]
