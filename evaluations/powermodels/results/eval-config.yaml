observation_tags:
  api-friction:
    description: "Observations about API usability friction during code evaluation"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]

  doc-gaps:
    description: "Documentation gaps discovered during code evaluation"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility, maturity]

  workaround-needed:
    description: "Cases where workarounds were required, with durability classification"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: []

  solver-issues:
    description: "Solver compatibility or performance issues observed"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [scalability]

  arch-quality:
    description: "Software architecture quality observations"
    emitted_by: [extensibility]
    consumed_by: [maturity]

  license-flags:
    description: "License concerns flagged during supply chain audit"
    emitted_by: [supply_chain]
    consumed_by: []

execution_dag:
  # ── Step 1: Gate tests ────────────────────────────────────────────────────
  - step: 1
    label: "Gate tests — data ingestion"
    dispatches:
      - dimension: gate
        tier: TINY
        test_ids: [G-1]
      - dimension: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5]
        note: "Supply chain audit can begin in parallel with gate ingestion"

  - step: 2
    label: "Gate tests — SMALL/MEDIUM ingestion + supply chain cont."
    dispatches:
      - dimension: gate
        tier: SMALL
        test_ids: [G-2]
      - dimension: gate
        tier: MEDIUM
        test_ids: [G-3]
      - dimension: supply_chain
        tier: N/A
        test_ids: [F-6, F-7, F-8, F-9]

  # ── Step 3: TINY functional — expressiveness batch 1 ──────────────────────
  - step: 3
    label: "TINY functional — expressiveness core (DCPF, ACPF, DCOPF, AC feas, SCUC)"
    dispatches:
      - dimension: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-5]
        note: "A-4 depends on A-3, deferred to step 4. A-6 depends on A-5, deferred."

  - step: 4
    label: "TINY functional — expressiveness dependents + independent"
    dispatches:
      - dimension: expressiveness
        tier: TINY
        test_ids: [A-4, A-6, A-7, A-8, A-9]
        note: "A-4 depends on A-3, A-6 depends on A-5 (both from step 3)"

  - step: 5
    label: "TINY functional — expressiveness p2 tests + extensibility batch 1"
    dispatches:
      - dimension: expressiveness
        tier: TINY
        test_ids: [A-10, A-11]
        note: "A-11 depends on A-3 (step 3)"
      - dimension: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3]
        note: "B-1 depends on A-3 (step 3)"

  # ── Step 6: TINY functional — extensibility batch 2 ───────────────────────
  - step: 6
    label: "TINY functional — extensibility batch 2 + P2 readiness"
    dispatches:
      - dimension: extensibility
        tier: TINY
        test_ids: [B-4, B-5, B-7, B-8, B-9]
        note: "B-5 depends on A-1, B-7 depends on A-4, B-8 depends on A-3, B-9 depends on A-1"
      - dimension: p2_readiness
        tier: TINY
        test_ids: [P2-1, P2-2, P2-3]
        note: "P2-3 depends on A-5 (step 3)"

  # ── Step 7: Audit dimensions (parallel with code dimensions) ──────────────
  - step: 7
    label: "Audit dimensions — accessibility + maturity"
    dispatches:
      - dimension: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]
        note: "Consumes api-friction, doc-gaps from steps 3-6"
      - dimension: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 8
    label: "Audit dimensions — maturity cont."
    dispatches:
      - dimension: maturity
        tier: N/A
        test_ids: [E-6, E-7]
        note: "Consumes arch-quality from extensibility (step 5-6)"

  # ── Step 9: Qualitative extensibility (no tier) ───────────────────────────
  - step: 9
    label: "Extensibility — code architecture review"
    dispatches:
      - dimension: extensibility
        tier: N/A
        test_ids: [B-6]

  # ── Step 10-12: Scale tests — SMALL ────────────────────────────────────────
  - step: 10
    label: "SMALL grade — expressiveness batch 1"
    dispatches:
      - dimension: expressiveness
        tier: SMALL
        test_ids: [A-5, A-8, A-9, A-10, A-11]
        note: "Grade network for A-5, A-8, A-9, A-10, A-11 is SMALL"

  - step: 11
    label: "SMALL grade — expressiveness dependents"
    dispatches:
      - dimension: expressiveness
        tier: SMALL
        test_ids: [A-6]
        note: "A-6 depends on A-5 (step 10)"
      - dimension: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]
        note: "Grade network for B-4 and B-8 is SMALL"

  - step: 12
    label: "SMALL scalability"
    dispatches:
      - dimension: scalability
        tier: SMALL
        test_ids: [C-4, C-6]
        note: "C-4 depends on A-5, C-6 depends on A-8"

  # ── Step 13-15: Scale tests — MEDIUM ───────────────────────────────────────
  - step: 13
    label: "MEDIUM grade — expressiveness batch 1"
    dispatches:
      - dimension: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-7]
        note: "Grade network for A-1, A-2, A-3, A-7 is MEDIUM"

  - step: 14
    label: "MEDIUM grade — expressiveness batch 2 + extensibility batch 1"
    dispatches:
      - dimension: expressiveness
        tier: MEDIUM
        test_ids: [A-4]
        note: "A-4 depends on A-3 (step 13)"
      - dimension: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5]
        note: "B-1 depends on A-3, B-5 depends on A-1 (step 13)"

  - step: 15
    label: "MEDIUM grade — extensibility batch 2"
    dispatches:
      - dimension: extensibility
        tier: MEDIUM
        test_ids: [B-7, B-9]
        note: "B-7 depends on A-4 (step 14), B-9 depends on A-1 (step 13)"

  - step: 16
    label: "MEDIUM scalability — batch 1"
    dispatches:
      - dimension: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5]
        note: "C-1 depends on A-1, C-2 depends on A-2, C-3 depends on A-3, C-5 depends on A-7"

  - step: 17
    label: "MEDIUM scalability — batch 2"
    dispatches:
      - dimension: scalability
        tier: MEDIUM
        test_ids: [C-7, C-8, C-9, C-10]
        note: "C-7 depends on C-3 (step 16), C-8 depends on A-9, C-9 depends on B-9, C-10 depends on A-11"
