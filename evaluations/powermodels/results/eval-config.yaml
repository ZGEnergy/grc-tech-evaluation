# ---------------------------------------------------------------------------
# Observation Tags
# ---------------------------------------------------------------------------

observation_tags:

  api-friction:
    description: "API friction observations — awkward interfaces, undocumented behaviors, non-obvious usage patterns."
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]

  doc-gaps:
    description: "Documentation gaps — missing, outdated, or aspirational-ahead-of-implementation docs."
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility, maturity]

  workaround-needed:
    description: "Workaround required for a test that should be achievable natively."
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: []

  solver-issues:
    description: "Solver performance or compatibility limitations observed during testing."
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [scalability]

  convergence-quality:
    description: "Solver reports convergence but diagnostics disagree, or convergence metrics unavailable."
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]

  unit-mismatch:
    description: "MW vs pu inconsistency or other unit handling issues."
    emitted_by: [expressiveness]
    consumed_by: [accessibility]

  arch-quality:
    description: "Software architecture quality observations — separation of concerns, extensibility design."
    emitted_by: [extensibility]
    consumed_by: [maturity]

  cascaded-failure:
    description: "Test blocked by prerequisite failure — not an independent failing."
    emitted_by: [scalability]
    consumed_by: []  # consumed synthetically at synthesis/report stage

  fnm-data-model:
    description: "Data model fidelity findings from FNM ingestion — record type coverage, field fidelity."
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness]  # informs expressiveness grade narrative

  fnm-scale:
    description: "Scale-related findings on the LARGE network — OOM, timeout, solver failure at ~30K buses."
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability]  # informs scalability grade narrative

  formulation-difference:
    description: "DCPF/ACPF deviation attributable to legitimate formulation differences (transformer models, phase-shifter conventions)."
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, scalability]  # informs both grade narratives

  license-flags:
    description: "License findings from supply chain audit — copyleft, proprietary, or unknown licenses."
    emitted_by: [supply_chain]
    consumed_by: []

# ---------------------------------------------------------------------------
# Execution DAG
# ---------------------------------------------------------------------------

execution_dag:

  - step: 1
    label: "Gate tests — all networks"
    description: >
      Ingest all three reference networks. G-1 failure excludes the tool from all
      further evaluation. G-2/G-3 failure proceeds with reduced scalability grades.
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]
        fnm_path_gated: false

  - step: 2
    label: "Suite F — Supply chain audit (runs in parallel with functional tests)"
    description: >
      Gate criterion audit. Can start immediately after step 1 — does not require
      functional test results. A C+ or below disqualifies the tool.
    dimensions:
      - name: supply_chain
        tier: "N/A"
        test_ids: [F-1, F-2, F-3, F-4, F-5]
        fnm_path_gated: false
      - name: supply_chain
        tier: "N/A"
        test_ids: [F-6, F-7, F-8, F-9]
        fnm_path_gated: false

  - step: 3
    label: "TINY functional verification — expressiveness batch 1 (PF and OPF)"
    description: >
      Core power flow and OPF tests on TINY. A-3 depends on nothing; A-4 depends on A-3.
      Run A-1, A-2, A-3 in parallel; A-4 follows A-3.
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]
        fnm_path_gated: false
      - name: maturity
        tier: "N/A"
        test_ids: [E-1, E-2, E-3, E-4, E-5]
        fnm_path_gated: false

  - step: 4
    label: "TINY functional verification — expressiveness batch 2 (A-4, UC/ED, contingency)"
    description: >
      A-4 depends on A-3. A-5 is independent. A-6 depends on A-5. A-7 is independent.
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5, A-7]
        fnm_path_gated: false
      - name: maturity
        tier: "N/A"
        test_ids: [E-6, E-7]
        fnm_path_gated: false

  - step: 5
    label: "TINY functional verification — expressiveness batch 3 (A-6, stochastic, advanced OPF)"
    description: >
      A-6 depends on A-5 (from step 4). A-8, A-9, A-10, A-11, A-12 are independent of
      each other but A-9 is logically related to A-3 (needs OPF baseline).
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-8, A-9]
        fnm_path_gated: false

  - step: 6
    label: "TINY functional verification — expressiveness batch 4 (lossy OPF, distributed slack, storage)"
    description: >
      A-10, A-11, A-12 — independent of each other and of A-6/A-8/A-9 in step 5.
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-10, A-11, A-12]
        fnm_path_gated: false

  - step: 7
    label: "TINY functional verification — extensibility batch 1"
    description: >
      B-1 through B-5 can run after TINY expressiveness is complete (B-1 builds on A-3,
      B-5 builds on A-1, B-7 builds on A-4). B-6 is qualitative and independent.
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-4, B-5]
        fnm_path_gated: false

  - step: 8
    label: "TINY functional verification — extensibility batch 2 (architecture, AC extension, reference bus, PTDF)"
    description: >
      B-6 (qualitative, no runtime), B-7 (depends on A-4), B-8, B-9.
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-6, B-7, B-8, B-9]
        fnm_path_gated: false

  - step: 9
    label: "Accessibility audit (runs after TINY functional tests)"
    description: >
      D-1 through D-5 require TINY functional tests to be complete. D-2 assesses each
      Suite A test. D-5 collects LOC from all A-tests.
    dimensions:
      - name: accessibility
        tier: "N/A"
        test_ids: [D-1, D-2, D-3, D-4, D-5]
        fnm_path_gated: false

  - step: 10
    label: "SMALL grade assessment — expressiveness (A-5, A-6, A-8, A-9, A-10, A-11)"
    description: >
      TINY must pass for each test before running at SMALL. A-6 depends on A-5 at SMALL.
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-8, A-9]
        fnm_path_gated: false

  - step: 11
    label: "SMALL grade assessment — expressiveness batch 2 and extensibility"
    description: >
      A-6 at SMALL depends on A-5 at SMALL. B-4 and B-8 at SMALL.
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-6, A-10, A-11]
        fnm_path_gated: false
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]
        fnm_path_gated: false

  - step: 12
    label: "SMALL scalability — C-4 (SCUC) and C-6 (stochastic DCOPF)"
    description: >
      C-4 requires A-5 to have passed. C-6 runs independently.
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]
        fnm_path_gated: false

  - step: 13
    label: "MEDIUM grade assessment — expressiveness (A-1, A-2, A-3, A-4, A-7)"
    description: >
      A-4 at MEDIUM depends on A-3 at MEDIUM.
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3]
        fnm_path_gated: false

  - step: 14
    label: "MEDIUM grade assessment — expressiveness A-4 and A-7"
    description: >
      A-4 depends on A-3 at MEDIUM.
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-4, A-7]
        fnm_path_gated: false

  - step: 15
    label: "MEDIUM grade assessment — extensibility (B-1, B-2, B-3, B-5)"
    description: >
      Extensibility MEDIUM tests. B-5 depends on A-1 at MEDIUM.
    dimensions:
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5]
        fnm_path_gated: false

  - step: 16
    label: "MEDIUM grade assessment — extensibility (B-7, B-9)"
    description: >
      B-7 depends on A-4 at MEDIUM. B-9 is independent.
    dimensions:
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-7, B-9]
        fnm_path_gated: false

  - step: 17
    label: "MEDIUM scalability — batch 1 (DCPF, ACPF, DC OPF)"
    description: >
      Core scalability measurements. C-3 runs first; C-7 depends on C-3.
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3]
        fnm_path_gated: false

  - step: 18
    label: "MEDIUM scalability — batch 2 (solver swap, contingency sweep, SCOPF)"
    description: >
      C-7 depends on C-3. C-5 is independent. C-8 depends on A-9 passing.
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-5, C-7, C-8]
        fnm_path_gated: false

  - step: 19
    label: "MEDIUM scalability — batch 3 (PTDF, distributed slack)"
    description: >
      C-9 depends on B-9. C-10 depends on A-11.
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-9, C-10]
        fnm_path_gated: false

  - step: 20
    label: "Suite G — FNM ingestion (FNM_PATH-gated, parallel with MEDIUM scalability)"
    description: >
      All Suite G tests are gated by FNM_PATH. G-FNM-1 is the gate test. G-FNM-2
      through G-FNM-5 depend on G-FNM-1. G-FNM-3 and G-FNM-4 can run in parallel
      after G-FNM-1 passes. G-FNM-5 can also run in parallel with G-FNM-3/4.
      Suite G is independent of Suites A-F in both directions — it can start after
      step 1 (gate) whenever FNM_PATH is set, running in parallel with or after TINY
      functional tests.
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]
        fnm_path_gated: true

  - step: 21
    label: "Suite G — FNM field coverage, power flow verification, supplemental CSV"
    description: >
      G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5 all depend on G-FNM-1. G-FNM-3 and G-FNM-4
      can run in parallel. G-FNM-5 can also run in parallel.
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5]
        fnm_path_gated: true

  - step: 22
    label: "Phase 2 Readiness Findings (informational, runs after TINY functional tests)"
    description: >
      P2-1 and P2-2 are documentation/audit-based and can run after gate tests.
      P2-3 depends on A-5 (needs SCUC schedule from TINY).
    dimensions:
      - name: p2_readiness
        tier: TINY
        test_ids: [P2-1, P2-2, P2-3]
        fnm_path_gated: false

