      - id: F-9
        slug: getting_started_integrity
        description: "Getting-started artifact integrity"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Are examples pinned to a specific release version? Or do they reference unversioned downloads, main branch, or mutable URLs?"
        depends_on: []
        converges_ac: false
        recorded_metrics: [pinned_examples, mutable_urls]
        test_hash: "0aba8d44"

  # =========================================================================
  # FNM Ingestion (Suite G — FNM_PATH gated)
  # =========================================================================
  - name: fnm_ingestion
    criterion_number: 0
    suite: G
    archetype: code-evaluator
    fnm_path_gated: true
    emits: [fnm-data-model, fnm-scale, formulation-difference, workaround-needed]
    consumes: []
    tests:
      - id: G-FNM-1
        slug: intermediate_ingestion
        description: "Intermediate format ingestion (FNM gate, two-check)"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "G-FNM-1 has two sub-checks. (a) PSS/E compatibility: if the tool fails to parse the intermediate CSV tables, record failure_reason: psse_parse_error, emit a blocking api-friction observation, and proceed to G-FNM-3/4/5 via MATPOWER fallback — G-FNM-2 is blocked. (b) Record count fidelity (only checked if PSS/E parsing succeeds): all record counts must match the manifest exactly. Zero records missing, zero extra records. If the tool's data model merges record types (e.g., branches and transformers into a single table), the merged count must equal the sum of the constituent intermediate format table counts. If count check fails, skip G-FNM-2 through G-FNM-5."
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, per_table_counts]
        test_hash: "bd857ce4"

      - id: G-FNM-2
        slug: field_coverage_audit
        description: "Field coverage audit vs. criticality matrix (19 DCPF-critical fields)"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "100% of DCPF-critical fields must be present across all 19 DCPF-critical fields (field-criticality-matrix.md v10 count). This is a hard requirement — any missing DCPF-critical field is a finding that directly impacts the Expressiveness grade. ACPF-critical field coverage is reported but not gated — tools that omit some ACPF-critical fields receive a documented finding. Informational and Discardable field omissions are noted but carry no grade impact. The coverage report must identify each missing field by name, table, and criticality tier."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [pass_fail, dcpf_critical_coverage, acpf_critical_coverage, informational_coverage]
        test_hash: "2b7a381c"

      - id: G-FNM-3
        slug: dcpf_verification
        description: "DCPF verification against reference solution on LARGE network"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "Pass if all aggregate thresholds are met and no hard-fail condition is triggered, per the dcpf section of data/fnm/reference/pass_conditions.json. Buses and branches that exceed the aggregate tolerance but are classified as known outlier causes are reported as classified outliers, not unqualified failures. If the tool cannot solve DCPF on the FNM at all, record the failure mode."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, peak_memory, aggregate_metrics, outlier_breakdown]
        test_hash: "52baae11"

      - id: G-FNM-4
        slug: acpf_convergence
        description: "ACPF convergence — DCPF warm-start + progressive relaxation (0%/10%/20%)"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "No hard pass/fail gate. All outcomes are diagnostic findings. Record relaxation_level_achieved: 0%, 10%, 20%, or infeasible. If convergence occurs at any level, record as a discriminating solver robustness strength. Failure to converge at 20% is recorded but not penalized."
        depends_on: [G-FNM-1, G-FNM-3]  # inferred — reuses DCPF warm-start from G-FNM-3
        converges_ac: true
        recorded_metrics: [relaxation_level_achieved, wall_clock, peak_memory, dcpf_init_mean_deg, dcpf_init_max_abs_deg]
        solver: "Ipopt"
        test_hash: "de8f372d"

      - id: G-FNM-5
        slug: supplemental_csv_representability
        description: "Supplemental CSV representability — 7 CSVs, N/E/X classification"
        functional_network: LARGE
        grade_network: N/A
        pass_condition: "No hard pass/fail gate. This is an evidence-collection test. For each CSV, report: total fields, count and percentage by achieved representability tier (N/E/X), and per-field comparison against the analytical classification. E classifications without a documented concrete extension approach must be downgraded to X."
        depends_on: [G-FNM-1]
        converges_ac: false
        recorded_metrics: [per_csv_representability, market_solution_fidelity_summary]
        test_hash: "70115b7a"

  # =========================================================================
  # Phase 2 Readiness Findings (informational)
  # =========================================================================
  - name: p2_readiness
    criterion_number: 0
    suite: P2
