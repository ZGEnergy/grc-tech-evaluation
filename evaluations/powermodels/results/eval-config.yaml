tool: powermodels

networks:
  TINY:
    name: "IEEE 39-bus (New England)"
    buses: 39
    branches: 46
    generators: 10
    file: "data/networks/case39.m"
  SMALL:
    name: "ACTIVSg 2000"
    buses: ~2000  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10000"
    buses: ~10000  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg10k.m"

dimensions:
  # ──────────────────────────────────────────────
  # Gate
  # ──────────────────────────────────────────────
  - name: gate
    criterion_number: 0
    suite: G
    archetype: gate-evaluator
    weight_rank: null
    emits: []
    consumes: []
    tests:
      - id: G-1
        slug: ingest_tiny
        description: "Ingest IEEE 39-bus reference network"
        functional_network: TINY
        grade_network: TINY
        pass_condition: >
          Tool loads IEEE 39-bus without error. Bus count, branch count, and
          generator count match expected values (39 buses, 46 branches, 10 generators).
          If format conversion from MATPOWER .m is required, the conversion pipeline is
          documented and the converted file is verified against the original.
        depends_on: []
        solver: null
        recorded_metrics: [pass_fail, bus_count, branch_count, generator_count]
        converges_ac: false

      - id: G-2
        slug: ingest_small
        description: "Ingest ACTIVSg 2k reference network"
        functional_network: SMALL
        grade_network: SMALL
        pass_condition: >
          Same verification on ACTIVSg 2k — bus count, branch count, and generator
          count match expected values.
        depends_on: []
        solver: null
        recorded_metrics: [pass_fail, bus_count, branch_count, generator_count]
        converges_ac: false

      - id: G-3
        slug: ingest_medium
        description: "Ingest ACTIVSg 10k reference network"
        functional_network: MEDIUM
        grade_network: MEDIUM
        pass_condition: >
          Same verification on ACTIVSg 10k — bus count, branch count, and generator
          count match expected values.
        depends_on: []
        solver: null
        recorded_metrics: [pass_fail, bus_count, branch_count, generator_count]
        converges_ac: false

  # ──────────────────────────────────────────────
  # Criterion 1 — Problem Expressiveness
  # ──────────────────────────────────────────────
  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits: [api-friction, doc-gaps, workaround-needed, solver-issues]
    consumes: []
    tests:
      - id: A-1
        slug: dcpf
        description: "Solve DC Power Flow"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Nodal injections, line flows, and voltage angles accessible as
          structured output (DataFrame, dict, or named array — not raw solver vector).
        depends_on: []
        solver: null
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-2
        slug: acpf
        description: "Solve AC Power Flow (Newton-Raphson)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Bus voltage magnitudes and angles, line P/Q flows, and losses
          accessible as structured output.
        depends_on: []
        solver: Ipopt
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: true

      - id: A-3
        slug: dcopf
        description: "Solve DC OPF with generation costs and line flow limits"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Optimal dispatch and LMPs/shadow prices extractable from solution.
        depends_on: []
        solver: "HiGHS, GLPK"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-4
        slug: ac_feasibility
        description: "AC PF feasibility check on DC OPF dispatch from A-3"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Achievable within the same model context (no export to file and reimport).
          Voltage violations and thermal limit violations identifiable from results.
        depends_on: [A-3]
        solver: Ipopt
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: true

      - id: A-5
        slug: scuc
        description: "Solve 24-hour SCUC as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves to feasibility (MIP gap <= 1%). Commitment schedule extractable as a
          time-indexed binary matrix. Built-in constraint types vs. user-assembled noted.
        depends_on: []
        solver: "HiGHS, SCIP"
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, output_format, workarounds]
        converges_ac: false

      - id: A-6
        slug: sced
        description: "Fix commitment from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a
          two-stage workflow. Ramp rate constraints are demonstrably enforced between
          consecutive dispatch intervals in the ED stage — not just inherited from the
          UC formulation.
        depends_on: [A-5]
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-7
        slug: contingency_sweep
        description: "N-M contingency sweep with escalating order and pruning from a chosen bus"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Completes without full model reconstruction per contingency case. Load loss per
          contingency case collected. Pruning logic is expressible without fighting the tool.
          Combinatorial enumeration and graph-distance scoping are achievable via the tool's
          API or a clean graph library bridge. TINY: x=3, m=3. MEDIUM: x=5, m=4.
        depends_on: []
        solver: null
        recorded_metrics: [pass_fail, wall_clock, loc, cases_evaluated, pruning_ratio, workarounds]
        converges_ac: false

      - id: A-8
        slug: stochastic_timeseries
        description: "Multi-period (24hr) DC OPF or SCUC with stochastic load and renewable generation scenarios"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool natively supports scenario-indexed timeseries for load, wind, and solar —
          the stochastic structure is part of the optimization formulation (e.g., scenario
          tree, two-stage stochastic program), not just independent deterministic solves
          in a loop.
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        converges_ac: false

      - id: A-9
        slug: scopf
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in the optimization (preventive SCOPF)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves. Base-case dispatch respects all contingency flow limits simultaneously.
          Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more
          expensive. Contingency constraints are part of the optimization, not checked
          post-hoc. TINY: all 46 branches as contingency set. SMALL: 100 monitored
          branches with iterative screening allowed. If achievable only by manually
          enumerating contingency constraints via B-1's custom constraint API, document the
          effort and classify the workaround.
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, cost_vs_dcopf, output_format, workarounds]
        converges_ac: false

      - id: A-10
        slug: lossy_dcopf_lmp
        description: "Lossy DC OPF with LMP decomposition into energy, congestion, and loss components"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool produces loss-inclusive LMPs where loss components are non-zero. LMP
          decomposition extractable as structured output. Validate against MATPOWER
          reference lossy DC OPF solution on same case (tolerance: 1% on total LMP,
          directional consistency on loss component signs).
        depends_on: []
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_decomposition, output_format, workarounds]
        converges_ac: false

      - id: A-11
        slug: distributed_slack_opf
        description: "DC OPF with distributed slack (load-proportional). Compare LMPs to single-slack solution from A-3."
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool supports distributed slack formulation. LMPs differ from single-slack
          results in a physically consistent manner (SMEC reflects the distributed
          reference). Distributed slack weights are settable via API (e.g., proportional
          to load, proportional to generation, or custom weights).
        depends_on: [A-3]  # inferred — requires comparison to A-3 single-slack results
        solver: "HiGHS"
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison, output_format, workarounds]
        converges_ac: false

  # ──────────────────────────────────────────────
