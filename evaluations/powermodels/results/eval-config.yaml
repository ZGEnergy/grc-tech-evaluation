  # =========================================================================
  # Criterion 6 — Supply Chain, Inspectability & Licensing Risk (Suite F)
  # =========================================================================
  - name: supply_chain
    criterion_number: 6
    suite: F
    archetype: audit-evaluator
    weight_rank: 0  # gate criterion — evaluated first
    emits: [license-flags]
    consumes: []
    tests:
      - id: F-1
        slug: core_license
        description: "Identify license of the main package"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "License type. Flag if copyleft (requires legal review) or proprietary (disqualifying)."
        depends_on: []
        converges_ac: false
        recorded_metrics: [license_type, flag]
        test_hash: "041f355b"

      - id: F-2
        slug: dependency_tree
        description: "Full dependency tree enumeration"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Total dependency count, tree depth, any unresolvable or unpinned dependencies."
        depends_on: []
        converges_ac: false
        recorded_metrics: [dependency_count, tree_depth, unpinned_count]
        test_hash: "090796da"

      - id: F-3
        slug: dependency_license_audit
        description: "License audit of all direct and transitive dependencies"
        functional_network: N/A
        grade_network: N/A
        pass_condition: "Any proprietary, unknown, or problematic licenses flagged."
        depends_on: [F-2]  # inferred — needs dependency tree
        converges_ac: false
        recorded_metrics: [flagged_licenses]
        test_hash: "c1a2d460"

      - id: F-4
        slug: compiled_extension_audit
        description: "Identify compiled components in execution path"
        functional_network: N/A
        grade_network: N/A
