  - name: fnm_ingestion
    criterion_number: 0
    suite: "G"
    archetype: code-evaluator
    weight_rank: 0  # informational — informs expressiveness and extensibility grades
    fnm_path_gated: true
    description: >
      FNM Ingestion — data model fidelity on production-scale ISO network (~30K buses).
      All tests require FNM_PATH env var. G-FNM-1 is the gate; failure skips G-FNM-2
      through G-FNM-5. Tests run on LARGE network tier only.
    emits:
      - fnm-data-model
      - fnm-scale
      - formulation-difference
    consumes: []
    tests:
      - id: G-FNM-1
        slug: fnm_ingestion_gate
        dimension: fnm_ingestion
        description: "Ingest all intermediate format tables; verify record counts against manifest"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >
          All record counts match the manifest exactly. Zero records missing, zero extra
          records. If the tool's data model merges record types (e.g., branches and
          transformers into a single table), the merged count must equal the sum of the
          constituent intermediate format table counts. If any table fails the count
          check, the tool fails G-FNM-1 and G-FNM-2 through G-FNM-5 are skipped.
        solver: "N/A"
        recorded_metrics: ["pass/fail", "per_table_record_counts", "missing_records", "extra_records", "merge_accounting_notes"]
        converges_ac: false
        test_hash: "9b6b545f"
        reference_docs:
          - "data/fnm/docs/intermediate-schema.md"
          - "$FNM_PATH/intermediate/manifest.json"

      - id: G-FNM-2
        slug: fnm_field_coverage
        dimension: fnm_ingestion
        description: "Field coverage audit against criticality matrix; report per-tier coverage %"
        functional_network: LARGE
        grade_network: LARGE
        depends_on: [G-FNM-1]
        pass_condition: >
          100% of DCPF-critical fields must be present across all tables. ACPF-critical
          field coverage is reported but not gated — tools that omit some ACPF-critical
          fields receive a documented finding. Informational and Discardable field
          omissions are noted but carry no grade impact. The coverage report must identify
          each missing field by name, table, and criticality tier.
        solver: "N/A"
        recorded_metrics: ["dcpf_critical_coverage_pct", "acpf_critical_coverage_pct", "informational_coverage_pct", "discardable_coverage_pct", "missing_fields_by_tier"]
        converges_ac: false
        test_hash: "32a351ec"
        reference_docs:
          - "data/fnm/docs/field-criticality-matrix.md"

      - id: G-FNM-3
        slug: fnm_dcpf_verification
        dimension: fnm_ingestion
        description: "DCPF verification on cleaned FNM; compare against reference solution"
        functional_network: LARGE
        grade_network: LARGE
        depends_on: [G-FNM-1]
        pass_condition: >
          Pass if all aggregate thresholds are met and no hard-fail condition is
          triggered, per the dcpf section of data/fnm/reference/pass_conditions.json.
          Buses and branches that exceed the aggregate tolerance but are classified as
          known outlier causes are reported as classified outliers, not unqualified
          failures.
        solver: "N/A (direct solve)"
        recorded_metrics: ["pass/fail", "input_path", "wall_clock_time", "peak_memory", "bus_va_deviation_fraction", "branch_p_deviation_fraction", "classified_outlier_breakdown", "formulation_difference_detail"]
        converges_ac: false
        test_hash: "96876ab1"
        reference_docs:
          - "data/fnm/reference/cleaned/intermediate/"
          - "data/fnm/reference/cleaned/fnm_main_island.mat"
          - "data/fnm/reference/pass_conditions.json"
          - "data/fnm/reference/dcpf/"

      - id: G-FNM-4
        slug: fnm_acpf_convergence
        dimension: fnm_ingestion
        description: "ACPF convergence capability test on cleaned FNM (MATPOWER itself fails — convergence is a positive finding)"
        functional_network: LARGE
        grade_network: LARGE
        depends_on: [G-FNM-1]
        pass_condition: >
          Convergence is a positive finding, not a requirement. If the tool converges,
          record it as a discriminating strength in solver robustness. If the tool fails
          to converge, record the failure mode but do not penalize — MATPOWER itself
          cannot solve this case. If multiple tools converge, cross-tool consistency
          checks apply.
        solver: "Ipopt"
        recorded_metrics: ["converged", "input_path", "wall_clock_time", "peak_memory", "solver_algorithm", "convergence_residual", "nr_iterations", "vm_min", "vm_max", "vm_mean", "total_losses_mw"]
        converges_ac: true
        test_hash: "e9cf3d66"
        reference_docs:
          - "data/fnm/reference/cleaned/intermediate/"
          - "data/fnm/reference/cleaned/fnm_main_island.mat"
          - "data/fnm/reference/acpf/summary_acpf.json"
          - "data/fnm/reference/pass_conditions.json"

      - id: G-FNM-5
        slug: fnm_supplemental_csv_representability
        dimension: fnm_ingestion
        description: "Representability assessment of 7 supplemental CSVs using N/E/X tier classification"
        functional_network: LARGE
        grade_network: LARGE
        depends_on: [G-FNM-1]
        pass_condition: >
          No hard pass/fail gate. For each CSV, report: total fields, count and percentage
          by achieved representability tier (N/E/X), and per-field comparison against the
          analytical classification.
        solver: "N/A"
        recorded_metrics: ["per_csv_field_count", "per_csv_representability_pct_N", "per_csv_representability_pct_E", "per_csv_representability_pct_X", "classification_discrepancies", "overall_tool_external_burden_pct"]
        converges_ac: false
        test_hash: "7ead4cfb"
        reference_docs:
          - "data/fnm/docs/supplemental-csvs.md"
          - "data/fnm/docs/supplemental-csv-representability.md"

