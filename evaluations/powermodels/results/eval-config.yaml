# eval-config.yaml
# Auto-generated from evaluation guides. Do not hand-edit.
# Rubric: evaluation_guides/Phase1_Evaluation_Rubric.md
# Protocol: evaluation_guides/Phase1_Test_Protocol.md
# Tool: powermodels
# Generated: 2026-03-11

tool: powermodels
protocol_version: "v9"

# ---------------------------------------------------------------------------
# Reference Networks
# ---------------------------------------------------------------------------

networks:
  TINY:
    name: "IEEE 39-bus (New England) — Modified Tiny"
    buses: 39
    branches: 46
    generators: 10
    file: "data/networks/case39.m"
    timeseries_dir: "data/timeseries/case39"
    notes: >
      Base topology from case39.m; augmented data (differentiated costs, renewables,
      BESS, DR, 24h loads, stochastic scenarios) from data/timeseries/case39/.
      Topology-only tests use the .m file alone; OPF and multi-period tests load
      augmented CSVs as specified per test.

  SMALL:
    name: "ACTIVSg 2000"
    buses: ~2000
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg2000.m"
    notes: >
      Preprocessing: zero-reactance fix (x=0.0001 pu for x=0 branches),
      zero-RATE_A fix (RATE_A=9999 MVA for zero-rated branches).

  MEDIUM:
    name: "ACTIVSg 10000"
    buses: ~10000
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg10k.m"
    notes: >
      Preprocessing: zero-reactance fix, zero-RATE_A fix, congestion induction
      (thermal limits tightened to 90% of base-case DCPF flow on 10-20 highest-flow
      branches). Enables binding constraints and non-uniform LMPs for tests A-3,
      A-9, A-10, A-11, B-8, C-3, C-8, C-10.

  LARGE:
    name: "FNM Annual S01"
    buses: ~30000
    branches: "verify from manifest"
    generators: "verify from manifest"
    source: "$FNM_PATH/intermediate/"
    manifest: "$FNM_PATH/intermediate/manifest.json"
    fallback: "data/fnm/reference/cleaned/fnm_main_island.mat"
    fnm_path_gated: true
    notes: >
      Primary input for G-FNM-3/G-FNM-4: intermediate CSV tables at
      data/fnm/reference/cleaned/intermediate/. Fallback: pre-cleaned MATPOWER
      case. G-FNM-1/G-FNM-2 use raw intermediate format at FNM_PATH.

# ---------------------------------------------------------------------------
# Dimensions
# ---------------------------------------------------------------------------

dimensions:
  - name: gate
    criterion_number: 0
    suite: "gate"
    archetype: gate-evaluator
    weight_rank: 0
    description: "Data ingestion gate — tool must ingest all reference networks before criterion evaluation proceeds."
    emits: []
    consumes: []
    tests:
      - id: G-1
        slug: ingest_tiny
        dimension: gate
        description: "Ingest IEEE 39-bus reference network"
        functional_network: TINY
        grade_network: TINY
        pass_condition: >
          Tool loads IEEE 39-bus without error. Bus count, branch count, and generator
          count match expected values (39 buses, 46 branches, 10 generators).
        solver: "N/A"
        recorded_metrics: ["pass/fail", "bus_count", "branch_count", "gen_count", "format_conversion_notes"]
        converges_ac: false
        test_hash: "0a74adbf"

      - id: G-2
        slug: ingest_small
        dimension: gate
        description: "Ingest ACTIVSg 2k reference network"
        functional_network: SMALL
        grade_network: SMALL
        pass_condition: >
          Same verification on ACTIVSg 2k.
        solver: "N/A"
        recorded_metrics: ["pass/fail", "bus_count", "branch_count", "gen_count", "format_conversion_notes"]
        converges_ac: false
        test_hash: "84277a12"

      - id: G-3
        slug: ingest_medium
        dimension: gate
        description: "Ingest ACTIVSg 10k reference network"
        functional_network: MEDIUM
        grade_network: MEDIUM
        pass_condition: >
          Same verification on ACTIVSg 10k.
        solver: "N/A"
        recorded_metrics: ["pass/fail", "bus_count", "branch_count", "gen_count", "format_conversion_notes"]
        converges_ac: false
        test_hash: "2da513c6"

  # -------------------------------------------------------------------------

  - name: expressiveness
    criterion_number: 1
    suite: "A"
    archetype: code-evaluator
    weight_rank: 1
    description: "Problem Expressiveness — can the tool formulate all required problem types natively?"
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - convergence-quality
      - unit-mismatch
    consumes: []
    tests:
      - id: A-1
        slug: dcpf
        dimension: expressiveness
        description: "Solve DC Power Flow on TINY (functional), MEDIUM (grade)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Nodal injections, line flows, and voltage angles accessible as
          structured output (DataFrame, dict, or named array — not raw solver vector).
        solver: "N/A (direct solve)"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "output_format", "workaround_class"]
        converges_ac: false
        test_hash: "27447b9e"

      - id: A-2
        slug: acpf
        dimension: expressiveness
        description: "Solve AC Power Flow (Newton-Raphson) on TINY (functional), MEDIUM (grade)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Convergence residual must be reported and below the tool's stated
          tolerance. Number of NR iterations must be reported. Voltage magnitudes must
          differ from flat-start defaults (1.0 pu) on >95% of buses. Bus voltage
          magnitudes and angles, line P/Q flows, and losses accessible as structured
          output. If the tool cannot report iteration count or residual, document this
          as a diagnostic quality finding.
        solver: "Ipopt"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "convergence_residual", "nr_iterations", "voltage_non_flat_fraction", "workaround_class"]
        converges_ac: true
        test_hash: "23f50ea3"

      - id: A-3
        slug: dcopf
        dimension: expressiveness
        description: "Solve DC OPF with gen costs and line flow limits. TINY uses Modified Tiny data."
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Optimal dispatch and LMPs/shadow prices extractable from solution.
          TINY additional: With differentiated costs and 70% derating, at least 2 branches
          have non-zero shadow prices (binding flow constraints). Report max LMP spread
          across buses.
        parameters:
          tiny_augmented_files: ["gen_temporal_params.csv"]
          tiny_branch_derating: 0.70
        solver: "HiGHS, GLPK"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "lmp_extraction", "shadow_prices", "binding_branch_count", "max_lmp_spread", "workaround_class"]
        converges_ac: false
        test_hash: "7e613cf3"

      - id: A-4
        slug: ac_feasibility_check
        dimension: expressiveness
        description: "Take DC OPF dispatch from A-3, run full ACPF feasibility check"
        functional_network: TINY
        grade_network: MEDIUM
        depends_on: [A-3]
        pass_condition: >
          Achievable within the same model context (no export to file and reimport).
          Voltage violations and thermal limit violations identifiable from results.
        solver: "Ipopt"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "voltage_violations", "thermal_violations", "workaround_class"]
        converges_ac: true
        test_hash: "2e877921"

      - id: A-5
        slug: scuc
        dimension: expressiveness
        description: "Solve 24-hour unit commitment as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves to feasibility (MIP gap <= 1% on TINY, <= 10% on SMALL). At least 2
          generators must cycle (commit/decommit) during the 24-hour horizon. Commitment
          schedule extractable as a time-indexed binary matrix. Built-in constraint types
          vs. user-assembled noted.
        parameters:
          tiny_augmented_files: ["gen_temporal_params.csv", "load_24h.csv", "reserve_requirements_24h.csv", "reserve_eligibility.csv"]
          mip_gap_tiny: 0.01
          mip_gap_small: 0.10
          horizon_hours: 24
        solver: "HiGHS, SCIP"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "mip_gap", "cycling_generator_count", "commitment_schedule_format", "constraint_type_notes", "workaround_class"]
        converges_ac: false
        test_hash: "0f7e3d47"

      - id: A-6
        slug: sced
        dimension: expressiveness
        description: "Fix commitment from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        depends_on: [A-5]
        pass_condition: >
          Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a
          two-stage workflow. Ramp rate constraints are demonstrably enforced between
          consecutive dispatch intervals in the ED stage — not just inherited from the
          UC formulation.
        parameters:
          tiny_augmented_files: ["gen_temporal_params.csv", "load_24h.csv", "reserve_requirements_24h.csv", "reserve_eligibility.csv"]
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "ramp_enforcement_evidence", "two_stage_separation", "workaround_class"]
        converges_ac: false
        test_hash: "88fa3558"

      - id: A-7
        slug: contingency_sweep
        dimension: expressiveness
        description: "N-M contingency sweep from chosen bus with graph-distance scoping and pruning"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Completes without full model reconstruction per contingency case. Load loss per
          contingency case collected. Pruning logic is expressible without fighting the
          tool. Combinatorial enumeration and graph-distance scoping are achievable via
          the tool's API or a clean graph library bridge.
        parameters:
          tiny_x: 3
          tiny_m: 3
          medium_x: 5
          medium_m: 2
        solver: "N/A"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "cases_per_order", "pruning_ratio", "model_reconstruction_required", "workaround_class"]
        converges_ac: false
        test_hash: "fc535c5d"

      - id: A-8
        slug: stochastic_timeseries
        dimension: expressiveness
        description: "Multi-period (12hr) DCOPF with stochastic load and renewable scenarios"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool natively supports scenario-indexed timeseries for load, wind, and solar —
          the stochastic structure is part of the optimization formulation (e.g., scenario
          tree, two-stage stochastic program), not just independent deterministic solves in
          a loop. Perturbations are independent by resource type. Prices extractable from
          solution.
        parameters:
          tiny_augmented_files: ["renewable_units.csv", "wind_forecast_24h.csv", "solar_forecast_24h.csv", "load_24h.csv", "scenarios/scenario_multipliers_50x24.csv"]
          horizon_hours: 12
          resolution_hours: 1
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "native_stochastic_support", "scenario_structure_description", "prices_extracted", "workaround_class"]
        converges_ac: false
        test_hash: "513931f7"

      - id: A-9
        slug: scopf
        dimension: expressiveness
        description: "DC OPF with N-1 contingency flow constraints embedded in optimization (preventive SCOPF)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves. Base-case dispatch respects all contingency flow limits simultaneously.
          Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more
          expensive. Contingency constraints are part of the optimization, not checked
          post-hoc. If achievable only by manually enumerating contingency constraints via
          B-1's custom constraint API, document the effort and classify the workaround.
        parameters:
          tiny_contingency_count: 46
          small_contingency_count: 50
          medium_contingency_count: 50
          iterative_screening_permitted: true
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "cost_vs_unconstrained", "contingency_constraints_internal", "screening_iterations", "workaround_class"]
        converges_ac: false
        test_hash: "4c844fba"

      - id: A-10
        slug: lossy_dcopf_lmp_decomposition
        dimension: expressiveness
        description: "DC OPF with loss approximation and LMP decomposition into energy/congestion/loss components"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool produces loss-inclusive LMPs where loss components are non-zero. LMP
          decomposition extractable as structured output. Per-line congestion rent computed
          and reconciled against congestion LMP components. Validate internal consistency:
          (a) loss components have physically correct signs (positive marginal loss at load
          buses far from generation), (b) total losses are 0.5–3% of total load, (c) lossy
          objective exceeds lossless objective, (d) loss component LMPs sum with energy and
          congestion components to total LMP within 1% tolerance.
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "loss_method", "lmp_decomposition_format", "congestion_rent_reconciliation", "internal_consistency_checks", "workaround_class"]
        converges_ac: false
        test_hash: "9314de95"

      - id: A-11
        slug: distributed_slack_opf
        dimension: expressiveness
        description: "DC OPF with load-proportional distributed slack; compare LMPs to single-slack A-3"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool supports distributed slack formulation. LMPs differ from single-slack
          results in a physically consistent manner (SMEC reflects the distributed
          reference). Distributed slack weights are settable via API (e.g., proportional
          to load, proportional to generation, or custom weights).
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "slack_configuration_api", "lmp_difference_vs_single_slack", "workaround_class"]
        converges_ac: false
        test_hash: "45b8d158"

      - id: A-12
        slug: multiperiod_dcopf_storage
        dimension: expressiveness
        description: "24-hour multi-period DCOPF with renewables, BESS cyclic SoC, quadratic costs, and congestion (TINY-only)"
        functional_network: TINY
        grade_network: "N/A"
        pass_condition: >
          Three behavioral pass conditions:
          (1) Congestion reporting: Mean and std of branch shadow prices computed by hour.
          At least 2 of 24 hours must have >=2 branches with non-zero shadow prices.
          (2) BESS arbitrage timing: Mean LMP at the BESS bus during discharge hours
          (P > 0.01 MW) must exceed mean LMP during charge hours (P < -0.01 MW). Hours
          with |P| <= 0.01 MW are excluded.
          (3) SoC feasibility: SoC in [0, energy_capacity] at all timesteps, AND energy
          balance trajectory consistent: |SoC[t] - SoC[t-1] - eta_ch*P_ch[t] + P_dis[t]/eta_dis|
          < 1.0 MWh for each t (dt=1h).
        parameters:
          tiny_augmented_files:
            - "gen_temporal_params.csv"
            - "renewable_units.csv"
            - "wind_forecast_24h.csv"
            - "solar_forecast_24h.csv"
            - "load_24h.csv"
            - "bess_units.csv"
          branch_derating: 0.70
          bess_power_mw: 150
          bess_energy_mwh: 600
          bess_eta_charge: 0.92
          bess_eta_discharge: 0.95
          cyclic_soc: true
          quadratic_cost_c2_factor: 0.001
          horizon_hours: 24
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "congestion_hours_count", "bess_arbitrage_timing_result", "soc_feasibility_result", "hourly_lmps", "bess_dispatch", "soc_trajectory", "workaround_class"]
        converges_ac: false
        test_hash: "3dff58a1"

  # -------------------------------------------------------------------------

  - name: extensibility
    criterion_number: 2
    suite: "B"
    archetype: code-evaluator
    weight_rank: 2
    description: "Extensibility — can analysts build beyond built-in problem types?"
    emits:
      - api-friction
      - doc-gaps
      - workaround-needed
      - solver-issues
      - arch-quality
    consumes: []
    tests:
      - id: B-1
        slug: custom_constraints
        dimension: extensibility
        description: "Add flow gate limit to DC OPF; assert dual value and binding constraint report"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Achievable through a documented API or extension mechanism. No source patching
          or forking required. Dual value of custom constraint extractable and correctly
          reflects binding status.
        parameters:
          tiny_augmented_files: ["flowgates.csv"]
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "extension_api_used", "dual_value_extracted", "binding_constraint_report", "workaround_class"]
        converges_ac: false
        test_hash: "224f17c2"

      - id: B-2
        slug: graph_access
        dimension: extensibility
        description: "BFS to depth 3 from chosen bus; return all buses and branches in subgraph"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Works via native graph primitives or clean, documented export to NetworkX
          (Python) or Graphs.jl (Julia).
        solver: "N/A"
        recorded_metrics: ["pass/fail", "wall_clock_time", "loc", "graph_api_method", "workaround_class"]
        converges_ac: false
        test_hash: "df63b316"

      - id: B-3
        slug: contingency_loop
        dimension: extensibility
        description: "N-1 DCPF contingency loop; collect max line loading across all cases"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Runs in a loop without re-parsing or re-instantiating the base model from file
          each iteration. Base model is modified in-place or cloned efficiently.
        parameters:
          tiny_contingency_count: 46
          medium_contingency_count: 50
        solver: "N/A"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "model_reconstruction_required", "loop_overhead", "workaround_class"]
        converges_ac: false
        test_hash: "3907fb16"

      - id: B-4
        slug: stochastic_scenario_wrapping
        dimension: extensibility
        description: "Wrap tool for 20-scenario 12hr stochastic DCOPF with correlated perturbations by resource type"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool accepts timeseries inputs programmatically (not from config files only).
          Scenario loop is expressible without excessive per-scenario overhead. Results
          (prices, dispatch) are collectable in a structured format.
        parameters:
          tiny_augmented_files: ["renewable_units.csv", "wind_forecast_24h.csv", "solar_forecast_24h.csv", "load_24h.csv", "scenarios/scenario_multipliers_50x24.csv"]
          scenario_count: 20
          horizon_hours: 12
          max_infeasibility_fraction: 0.20
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "total_time", "per_scenario_avg_time", "peak_memory", "loc", "timeseries_injection_method", "per_scenario_overhead", "results_collection_method", "workaround_class"]
        converges_ac: false
        test_hash: "50ef59c5"

      - id: B-5
        slug: interoperability
        dimension: extensibility
        description: "Export DCPF results from A-1 to DataFrame and write to CSV"
        functional_network: TINY
        grade_network: MEDIUM
        depends_on: [A-1]
        pass_condition: >
          Trivial — fewer than 5 lines of code beyond the solve. No custom serialization
          logic required.
        solver: "N/A"
        recorded_metrics: ["pass/fail", "loc_beyond_solve", "export_method", "workaround_class"]
        converges_ac: false
        test_hash: "372e1903"

      - id: B-6
        slug: code_architecture
        dimension: extensibility
        description: "Qualitative assessment: trace DCPF solve path from API call to solver invocation"
        functional_network: "N/A"
        grade_network: "N/A"
        pass_condition: >
          Document: number of abstraction layers, whether network model / problem
          formulation / solver interface / results are separated, whether internal
          interfaces are documented.
        solver: "N/A"
        recorded_metrics: ["abstraction_layers", "separation_of_concerns", "internal_interface_documentation", "architecture_quality_notes"]
        converges_ac: false
        test_hash: "0f337d8d"

      - id: B-7
        slug: ac_feasibility_extension
        dimension: extensibility
        description: "If A-4 required a workaround, document and classify it here"
        functional_network: TINY
        grade_network: MEDIUM
        depends_on: [A-4]
        pass_condition: >
          Workaround durability assessed. Effort level documented.
        solver: "Ipopt"
        recorded_metrics: ["pass/fail", "workaround_class", "effort_level", "loc"]
        converges_ac: true
        test_hash: "181fa512"

      - id: B-8
        slug: reference_bus_configuration
        dimension: extensibility
        description: "DC OPF with three slack configurations: default single, alternate single, custom distributed"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Reference bus / slack formulation is configurable via API without model
          reconstruction. LMP values change consistently across configurations. Evaluator
          documents the API calls required and workaround durability.
        solver: "HiGHS"
        recorded_metrics: ["pass/fail", "wall_clock_time", "loc", "api_calls_required", "lmp_consistency_across_configs", "workaround_class"]
        converges_ac: false
        test_hash: "2460b2bb"

      - id: B-9
        slug: ptdf_extraction
        dimension: extensibility
        description: "Compute PTDF matrix for TINY (39-bus); verify dimensions and flow predictions"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          PTDF matrix accessible via native API, internal matrix extraction, or
          unit-injection computation. Flow predictions match DCPF results within numerical
          tolerance (1e-6). If the network contains phase-shifting transformers (nonzero
          SHIFT column in branch data), the PTDF validation must either (a) apply
          Pbusinj/Pfinj correction terms from the admittance matrix construction, or (b)
          exclude branches with nonzero shift angles from the accuracy comparison. On
          MEDIUM, document computation time and method.
        solver: "N/A"
        recorded_metrics: ["pass/fail", "wall_clock_time", "peak_memory", "loc", "ptdf_method", "matrix_dimensions", "flow_prediction_error", "phase_shifter_correction_applied", "workaround_class"]
        converges_ac: false
        test_hash: "a0509725"

  # -------------------------------------------------------------------------

  - name: scalability
    criterion_number: 4
    suite: "C"
    archetype: code-evaluator
    weight_rank: 3
    description: "Scalability — performance at large regional scale with open-source solvers."
