        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Completes without full model reconstruction per contingency case. Load loss per contingency case collected. Pruning logic is expressible without fighting the tool. Combinatorial enumeration and graph-distance scoping are achievable via the tool's API or a clean graph library bridge."
        depends_on: []
        solver: "N/A"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, cases_per_order, pruning_ratio, workarounds]
        test_hash: "e3e8be8a"

      - id: A-8
        slug: stochastic_timeseries
        description: "Solve 12hr multi-period DCOPF with stochastic load and renewable generation scenarios"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool natively supports scenario-indexed timeseries for load, wind, and solar — the stochastic structure is part of the optimization formulation (e.g., scenario tree, two-stage stochastic program), not just independent deterministic solves in a loop. Perturbations are independent by resource type. Prices extractable from solution."
        depends_on: []
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, stochastic_structure_type, price_extraction, workarounds]
        test_hash: "14062ed9"

      - id: A-9
        slug: scopf
        description: "Solve DC OPF with N-1 contingency flow constraints embedded in the optimization (SCOPF)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Base-case dispatch respects all contingency flow limits simultaneously. Dispatch and cost differ from unconstrained DC OPF (A-3) — SCOPF should be more expensive. Contingency constraints are part of the optimization, not checked post-hoc. If achievable only by manually enumerating contingency constraints via B-1's custom constraint API, document the effort and classify the workaround."
        depends_on: [A-3]  # inferred: uses OPF setup from A-3
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, cost_vs_a3, binding_contingencies, workarounds]
        test_hash: "64237949"

      - id: A-10
        slug: lossy_dcopf_lmp
        description: "Solve DC OPF with loss approximation; decompose LMPs into energy, congestion, and loss components"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool produces loss-inclusive LMPs where loss components are non-zero. LMP decomposition extractable as structured output. Per-line congestion rent computed and reconciled against congestion LMP components. Validate internal consistency: (a) loss components have physically correct signs, (b) total losses are 0.5–3% of total load, (c) lossy objective exceeds lossless objective, (d) loss component LMPs sum with energy and congestion components to total LMP within 1% tolerance."
        depends_on: []
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_decomposition, congestion_rent_reconciliation, loss_percentage, workarounds]
        test_hash: "be7f7108"

