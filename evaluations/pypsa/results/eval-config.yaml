    consumes: [fnm-data-model]
    tests:
      - id: A-1
        slug: dcpf
        description: "Solve DC Power Flow on TINY, grade on MEDIUM"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Nodal injections, line flows, and voltage angles accessible as structured output (DataFrame, dict, or named array — not raw solver vector)."
        depends_on: []
        solver: "N/A"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        test_hash: "32fb2553"

      - id: A-2
        slug: acpf
        description: "Solve AC Power Flow (Newton-Raphson) on TINY, grade on MEDIUM"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Convergence residual must be reported and below the tool's stated tolerance. Number of NR iterations must be reported. Voltage magnitudes must differ from flat-start defaults (1.0 pu) on >95% of buses. Bus voltage magnitudes and angles, line P/Q flows, and losses accessible as structured output. If the tool cannot report iteration count or residual, document this as a diagnostic quality finding."
        depends_on: []
        solver: "Ipopt"
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, convergence_residual, nr_iterations, output_format, workarounds]
        test_hash: "97f53d76"

