        slug: dcopf
        description: "Solve DC OPF with gen costs and line flow limits; Modified Tiny on TINY, grade on MEDIUM"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: "Converges. Optimal dispatch and LMPs/shadow prices extractable from solution. TINY additional: With differentiated costs and 70% derating, at least 2 branches have non-zero shadow prices (binding flow constraints). Report max LMP spread across buses."
        depends_on: []
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_output, shadow_prices, binding_branch_count, workarounds]
        test_hash: "06c6eba9"

