# ─── Execution DAG ──────────────────────────────────────────────────────
# Topological ordering that respects:
#   1. Gate tests first
#   2. TINY functional before SMALL/MEDIUM grade assessment
#   3. Test dependencies (A-4 after A-3, A-6 after A-5, etc.)
#   4. Audit dimensions parallel with code dimensions
#   5. Observation consumers after producers

execution_dag:
  - step: 1
    label: "Gate tests — data ingestion"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional verification + audit dimensions (no runtime deps)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-5, A-7, A-8, A-9, A-10, A-11]
        note: "A-4 deferred to step 3 (depends on A-3); A-6 deferred (depends on A-5)"
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2, B-3, B-4, B-5, B-6, B-9]
        note: "B-7 and B-8 deferred (depend on A-4 / A-3 results); B-5 may run here since A-1 is in this step"
      - name: accessibility
        tier: N/A
        test_ids: [D-1, D-2, D-3, D-4, D-5]
        note: "D-1 runs on TINY; D-2/D-3/D-5 are audit-based"
      - name: maturity
        tier: N/A
        test_ids: [E-1, E-2, E-3, E-4, E-5, E-6, E-7]
      - name: supply_chain
        tier: N/A
        test_ids: [F-1, F-2, F-3, F-4, F-5, F-6, F-7, F-8, F-9]
      - name: p2_readiness
        tier: N/A
        test_ids: [P2-1, P2-2]

  - step: 3
    label: "TINY dependent functional tests"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-6]
        note: "A-4 depends on A-3; A-6 depends on A-5"
      - name: extensibility
        tier: TINY
        test_ids: [B-7, B-8]
        note: "B-7 depends on A-4; B-8 depends on A-3"

  - step: 4
    label: "SMALL grade assessment (expressiveness + extensibility)"
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-6, A-8, A-9, A-10, A-11]
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]

  - step: 5
    label: "MEDIUM grade assessment (expressiveness + extensibility)"
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-4, A-7]
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5, B-7, B-9]

  - step: 6
    label: "Scalability suite — SMALL and MEDIUM"
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5, C-7, C-8, C-9, C-10]

# ─── Observation Tags ───────────────────────────────────────────────────

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]
  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [extensibility]
  solver-issues:
    description: "Solver-related findings (interface, performance, compatibility)"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]
  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]
  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]
