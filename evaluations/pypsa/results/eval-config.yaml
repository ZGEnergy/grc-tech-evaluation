        description: "Solve DC OPF with distributed slack (load-proportional); compare LMPs to single-slack from A-3"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Tool supports distributed slack formulation. LMPs differ from single-slack results in a physically consistent manner (SMEC reflects the distributed reference). Distributed slack weights are settable via API (e.g., proportional to load, proportional to generation, or custom weights)."
        depends_on: [A-3]  # inferred: comparison against single-slack from A-3
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_diff_vs_single_slack, slack_weight_api, workarounds]
        test_hash: "768396cc"

      - id: A-12
        slug: multiperiod_dcopf_storage
        description: "Solve 24-hour multi-period DCOPF with BESS, renewables, differentiated costs, and congestion (Modified Tiny)"
        functional_network: TINY
        grade_network: "N/A"
        pass_condition: "Three behavioral pass conditions: (1) Congestion reporting: mean and std of branch shadow prices computed by hour; at least 2 of 24 hours must have >= 2 branches with non-zero shadow prices. (2) BESS arbitrage timing: mean LMP at the BESS bus during discharge hours (P > 0.01 MW) must exceed mean LMP during charge hours (P < -0.01 MW); hours with |P| <= 0.01 MW excluded. (3) SoC feasibility: SoC in [0, energy_capacity] at all timesteps, AND energy balance trajectory consistent: |SoC[t] - SoC[t-1] - eta_ch*P_ch[t] + P_dis[t]/eta_dis| < 1.0 MWh for each t (dt=1h)."
        depends_on: []
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, hourly_lmps, bess_dispatch, soc_trajectory, shadow_prices_by_hour, workarounds]
        test_hash: "fdd193e7"

