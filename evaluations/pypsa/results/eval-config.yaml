execution_dag:
  - step: 1
    label: "Gate tests — network ingestion (all tiers)"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "TINY functional verification — expressiveness (batch 1: PF and OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3, A-7, A-10]

  - step: 3
    label: "TINY functional verification — expressiveness (batch 2: OPF extensions, requires A-3)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-9, A-11, A-12]

  - step: 4
    label: "TINY functional verification — expressiveness (batch 3: SCUC/SCED and stochastic)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-5, A-8]

  - step: 5
    label: "TINY functional verification — expressiveness (batch 4: SCED, requires A-5)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6]

  - step: 6
    label: "TINY functional verification — extensibility (batch 1: graph, loop, interop, architecture)"
    # B-2, B-3, B-6 have no upstream code-test dependencies
    # B-5 depends on A-1 (done in step 2), B-1 depends on A-3 (done in step 2)
    # B-7 depends on A-4 (done in step 3), B-9 depends on A-1 (done in step 2)
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-2, B-3, B-5, B-6, B-9]

  - step: 7
    label: "TINY functional verification — extensibility (batch 2: custom constraints, AC feasibility, stochastic wrap, slack config)"
    dimensions:
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-4, B-7, B-8]

  - step: 8
    label: "Accessibility and supply chain audits (parallel with TINY functional; no code dependencies)"
    dimensions:
      - name: accessibility
        tier: "N/A"
        test_ids: [D-1, D-2, D-3, D-4, D-5]
      - name: supply_chain
        tier: "N/A"
        test_ids: [F-1, F-2, F-3, F-4, F-5, F-6, F-7, F-8, F-9]

  - step: 9
    label: "Maturity audit (parallel; no code dependencies)"
    dimensions:
      - name: maturity
        tier: "N/A"
        test_ids: [E-1, E-2, E-3, E-4, E-5, E-6, E-7]

  - step: 10
    label: "SMALL grade assessment — expressiveness (SCUC/SCED and stochastic)"
    # Depends on A-5/A-6 (step 4/5) and A-8 (step 4) passing on TINY
    dimensions:
      - name: expressiveness
        tier: SMALL
        test_ids: [A-5, A-6, A-8, A-9, A-10, A-11]

  - step: 11
    label: "MEDIUM grade assessment — expressiveness (PF, OPF, contingency)"
    # A-1, A-2, A-3 pass conditions verified in step 2/3
    dimensions:
      - name: expressiveness
        tier: MEDIUM
        test_ids: [A-1, A-2, A-3, A-4, A-7]

  - step: 12
    label: "MEDIUM grade assessment — extensibility (batch 1)"
    dimensions:
      - name: extensibility
        tier: MEDIUM
        test_ids: [B-1, B-2, B-3, B-5, B-7, B-9]

  - step: 13
    label: "SMALL grade assessment — extensibility (batch 2)"
    dimensions:
      - name: extensibility
        tier: SMALL
        test_ids: [B-4, B-8]

  - step: 14
    label: "Scalability — MEDIUM (batch 1: PF, OPF, solver swap)"
    # Depends on gate MEDIUM (G-3) and functional TINY passing
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-7, C-9]

  - step: 15
    label: "Scalability — MEDIUM (batch 2: contingency sweep, SCOPF, distributed slack)"
    # C-5 depends on A-7, C-8 depends on A-9, C-10 depends on A-11
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-5, C-8, C-10]

  - step: 16
    label: "Scalability — SMALL (SCUC and stochastic DCOPF)"
    # C-4 depends on A-5, C-6 depends on A-8
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-6]

  - step: 17
    label: "FNM ingestion — Suite G (FNM_PATH-gated; runs after gate, parallel with or after TINY functional)"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1, G-FNM-2, G-FNM-3, G-FNM-4, G-FNM-5]

  - step: 18
    label: "Phase 2 readiness findings (informational only)"
    dimensions:
      - name: p2_readiness
        tier: "N/A"
        test_ids: [P2-1, P2-2, P2-3]

observation_tags:
  api-friction:
    description: "API usability issues encountered during testing"
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [accessibility]

  doc-gaps:
    description: "Documentation gaps found during testing"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility, maturity]

  workaround-needed:
    description: "Workarounds required for test completion"
    emitted_by: [expressiveness, extensibility, fnm_ingestion]
    consumed_by: [extensibility]

  solver-issues:
    description: "Solver-related findings (solver failure, timeouts, compatibility problems)"
    emitted_by: [expressiveness, scalability]
    consumed_by: [scalability]

  convergence-quality:
    description: "Solver reports convergence but diagnostics indicate otherwise"
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]

  unit-mismatch:
    description: "MW vs per-unit inconsistency at analysis boundaries"
    emitted_by: [expressiveness, extensibility]
    consumed_by: [accessibility]

  cascaded-failure:
    description: "Scalability test blocked by prerequisite expressiveness failure"
    emitted_by: [scalability]
    consumed_by: [synthesis]

  license-flags:
    description: "Licensing or supply chain concerns"
    emitted_by: [supply_chain]
    consumed_by: [supply_chain]

  arch-quality:
    description: "Software architecture observations (positive or negative)"
    emitted_by: [extensibility]
    consumed_by: [maturity]

  fnm-data-model:
    description: "Data model fidelity findings from FNM ingestion (missing record types, field gaps)"
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, synthesis]

  fnm-scale:
    description: "Scale-related findings on LARGE (~30K bus) FNM network"
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability, synthesis]
