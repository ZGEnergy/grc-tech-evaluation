        solver: "Ipopt"
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, voltage_violations, thermal_violations, workarounds]
        test_hash: "1734eea4"

      - id: A-5
        slug: scuc
        description: "Solve 24-hour SCUC as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves to feasibility (MIP gap <= 1% on TINY, <= 10% on SMALL). At least 2 generators must cycle (commit/decommit) during the 24-hour horizon. Commitment schedule extractable as a time-indexed binary matrix. Built-in constraint types vs. user-assembled noted."
        depends_on: []
        solver: "HiGHS, SCIP"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, cycling_count, commitment_matrix_format, workarounds]
        test_hash: "314538b0"

      - id: A-6
        slug: sced
        description: "Fix commitment from A-5, solve economic dispatch as LP/QP (SCED)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: "Solves. Dispatch schedule extractable. UC and ED are cleanly separable as a two-stage workflow. Ramp rate constraints are demonstrably enforced between consecutive dispatch intervals in the ED stage — not just inherited from the UC formulation."
        depends_on: [A-5]
        solver: "HiGHS"
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, ramp_enforcement_evidence, workarounds]
        test_hash: "19bc14b5"

