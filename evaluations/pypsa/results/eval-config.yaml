        test_hash: 0f337d8d
      - id: B-8
        slug: reference_bus_config
        description: "Solve DC OPF on TINY with three different slack configurations"
        functional_network: TINY
        grade_network: TINY
        pass_condition: >-
          The tool allows setting an arbitrary reference bus without error or
          model reconstruction. All three configurations must complete without
          exception. For DC OPF: LMP values are expected to be invariant across
          configurations (this is physically correct behavior for lossless DC
          OPF — invariance is a pass, not a failure). For AC OPF (if
          supported): LMPs may vary; document any variation. The test is
          primarily an API surface test — the key evaluation point is whether
          the tool's API allows reference bus changes without model
          reconstruction. Document the API calls required and workaround
          durability.
        solver: "HiGHS"
        recorded_metrics: [pass/fail, wall_clock, loc, workaround_class]
        converges_ac: false
        test_hash: dad5cf97
      - id: B-9
        slug: ptdf_extraction
        description: "Compute the PTDF matrix for TINY (39-bus) and verify against DCPF"
        functional_network: TINY
        grade_network: TINY
        pass_condition: >-
          PTDF matrix accessible via native API, internal matrix extraction, or
          unit-injection computation. Flow predictions match DCPF results
          within numerical tolerance (1e-6). If the network contains
          phase-shifting transformers (nonzero SHIFT column in branch data),
          the PTDF validation must either (a) apply Pbusinj/Pfinj correction
          terms from the admittance matrix construction, or (b) exclude
          branches with nonzero shift angles from the accuracy comparison.
          The 1e-6 tolerance applies to the corrected or filtered comparison.
        solver: null
        recorded_metrics: [pass/fail, wall_clock, loc, ptdf_dimensions, max_flow_error]
        converges_ac: false
        test_hash: d8e7210b

