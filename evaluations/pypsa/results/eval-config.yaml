observation_tags:
  # Tags emitted by code-evaluator dimensions
  api-friction:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: [accessibility]
  doc-gaps:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: [accessibility, maturity]
  workaround-needed:
    emitted_by: [expressiveness, extensibility, scalability, fnm_ingestion]
    consumed_by: []
  solver-issues:
    emitted_by: [expressiveness, extensibility, scalability]
    consumed_by: [scalability]
  convergence-quality:
    emitted_by: [expressiveness]
    consumed_by: [scalability, accessibility]
  unit-mismatch:
    emitted_by: [expressiveness]
    consumed_by: [accessibility]
  arch-quality:
    emitted_by: [extensibility]
    consumed_by: [maturity]
  cascaded-failure:
    emitted_by: [scalability]
    consumed_by: []  # consumed by synthesis
  fnm-data-model:
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness]  # + synthesis
  fnm-scale:
    emitted_by: [fnm_ingestion]
    consumed_by: [scalability]  # + synthesis
  formulation-difference:
    emitted_by: [fnm_ingestion]
    consumed_by: [expressiveness, scalability]  # + synthesis
  license-flags:
    emitted_by: [supply_chain]
    consumed_by: []

execution_dag:
  - step: 1
    label: "Gate tests"
    dimensions:
      - name: gate
        tier: ALL
        test_ids: [G-1, G-2, G-3]

  - step: 2
    label: "Suite G — FNM ingestion gate"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-1]

  - step: 3
    label: "TINY functional — Expressiveness batch 1 (power flow + OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-1, A-2, A-3]

  - step: 4
    label: "TINY functional — Expressiveness batch 2 (AC feasibility + SCUC + SCOPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-4, A-5, A-9]
      - name: extensibility
        tier: TINY
        test_ids: [B-1, B-2]

  - step: 5
    label: "TINY functional — Expressiveness batch 3 (SCED + advanced OPF)"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-6, A-10, A-11]
      - name: extensibility
        tier: TINY
        test_ids: [B-5, B-6]

  - step: 6
    label: "TINY functional — Expressiveness batch 4 (multi-period storage) + Extensibility batch 3"
    dimensions:
      - name: expressiveness
        tier: TINY
        test_ids: [A-12]
      - name: extensibility
        tier: TINY
        test_ids: [B-3, B-4, B-8, B-9]

  - step: 7
    label: "Suite G — FNM field coverage + power flow verification"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-2, G-FNM-3]

  - step: 8
    label: "Suite G — FNM ACPF convergence + supplemental CSV"
    fnm_path_gated: true
    dimensions:
      - name: fnm_ingestion
        tier: LARGE
        test_ids: [G-FNM-4, G-FNM-5]

  - step: 9
    label: "Scalability — SMALL tier (C-4 MILP gate + C-5 diagnostic)"
    c_scale_gate: true
    dimensions:
      - name: scalability
        tier: SMALL
        test_ids: [C-4, C-5]

  - step: 10
    label: "Scalability — MEDIUM LP/PF batch (unconditional, not gated by C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-1, C-2, C-3, C-5]
        milp_gated: false

  - step: 11
    label: "Scalability — MEDIUM batch 2 (LP: solver swap + PTDF + distributed slack)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-7, C-9, C-10]
        milp_gated: false

  - step: 12
    label: "Scalability — MEDIUM SCOPF (gated by C-3 MEDIUM, not C-4)"
    dimensions:
      - name: scalability
        tier: MEDIUM
        test_ids: [C-8]
        milp_gated: false

  - step: 13
    label: "Audit dimensions — Accessibility"
    dimensions:
      - name: accessibility
        tier: "N/A"
        test_ids: [D-1, D-2, D-3, D-4, D-5]

  - step: 14
    label: "Audit dimensions — Maturity batch 1"
    dimensions:
      - name: maturity
        tier: "N/A"
        test_ids: [E-1, E-2, E-3, E-4, E-5]

  - step: 15
    label: "Audit dimensions — Maturity batch 2 + Supply Chain batch 1"
    dimensions:
      - name: maturity
        tier: "N/A"
        test_ids: [E-6, E-7]
      - name: supply_chain
        tier: "N/A"
        test_ids: [F-1, F-2, F-3, F-4, F-5]

  - step: 16
    label: "Audit dimensions — Supply Chain batch 2"
    dimensions:
      - name: supply_chain
        tier: "N/A"
        test_ids: [F-6, F-7, F-8, F-9]

  - step: 17
    label: "Phase 2 Readiness Findings"
    dimensions:
      - name: p2_readiness
        tier: "N/A"
        test_ids: [P2-1, P2-2, P2-3]
