  - name: fnm_ingestion
    criterion_number: 0
    suite: G
    archetype: code-evaluator
    weight_rank: null
    fnm_path_gated: true
    emits: [api-friction, doc-gaps, workaround-needed, fnm-data-model, fnm-scale, formulation-difference]
    consumes: []
    tests:
      - id: G-FNM-1
        slug: intermediate_format_ingestion
        description: "Intermediate format ingestion — two-check gate (PSS/E compat + record count)"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >-
          G-FNM-1 has two sub-checks. (a) PSS/E compatibility: if the tool
          fails to parse the intermediate CSV tables, record failure_reason:
          psse_parse_error and ingestion_path: matpower_fallback, emit a
          blocking api-friction observation, and proceed to G-FNM-3/4/5 via
          MATPOWER fallback — G-FNM-2 is blocked but G-FNM-3/4/5 proceed.
          (b) Record count fidelity (only checked if PSS/E parsing succeeds):
          all record counts must match the manifest exactly. Zero records
          missing, zero extra records. If the tool's data model merges record
          types, the merged count must equal the sum of the constituent
          intermediate format table counts. If count check fails, skip
          G-FNM-2 through G-FNM-5.
        solver: null
        recorded_metrics: [pass/fail, per_table_counts, ingestion_path]
        converges_ac: false
        test_hash: 62aeab18
      - id: G-FNM-2
        slug: field_coverage_audit
        description: "Field coverage audit against criticality matrix"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >-
          100% of DCPF-critical fields must be present across all 19
          DCPF-critical fields. ACPF-critical field coverage reported but not
          gated. Informational and Discardable field omissions noted but carry
          no grade impact. The coverage report must identify each missing
          field by name, table, and criticality tier.
        solver: null
        recorded_metrics: [dcpf_critical_pct, acpf_critical_pct, informational_pct, discardable_pct]
        converges_ac: false
        depends_on: [G-FNM-1]
        test_hash: 64cf2500
      - id: G-FNM-3
        slug: dcpf_verification
        description: "DCPF verification against reference solution on LARGE"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >-
          Pass if all aggregate thresholds are met and no hard-fail condition
          is triggered, per the dcpf section of
          data/fnm/reference/pass_conditions.json. Buses and branches that
          exceed the aggregate tolerance but are classified as known outlier
          causes are reported as classified outliers, not unqualified failures.
          Bus injection power balance check must pass. Deviation values stored
          in scientific notation.
        solver: null
        recorded_metrics: [pass/fail, wall_clock, peak_memory, aggregate_metrics, outlier_counts, ingestion_path]
        converges_ac: false
        depends_on: [G-FNM-1]
        test_hash: 64141acc
      - id: G-FNM-4
        slug: acpf_convergence
        description: "ACPF convergence — DCPF warm-start + progressive relaxation on LARGE"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >-
          No hard pass/fail gate. All outcomes are diagnostic findings. Record
          relaxation_level_achieved: 0%, 10%, 20%, or infeasible. If
          convergence occurs at any level, record as a discriminating solver
          robustness strength.
        solver: Ipopt
        recorded_metrics: [relaxation_level, wall_clock, peak_memory, converged, ingestion_path]
        converges_ac: true
        depends_on: [G-FNM-1]
        test_hash: cea622c5
      - id: G-FNM-5
        slug: supplemental_csv_representability
        description: "Supplemental CSV representability assessment on LARGE"
        functional_network: LARGE
        grade_network: LARGE
        pass_condition: >-
          No hard pass/fail gate. Evidence-collection test. For each CSV,
          report: total fields, count and percentage by achieved
          representability tier (N/E/X), and per-field comparison against the
          analytical classification. E classifications without a documented
          concrete extension approach must be downgraded to X.
        solver: null
        recorded_metrics: [per_csv_fields, representability_tiers, comparison]
        converges_ac: false
        depends_on: [G-FNM-1]
        test_hash: d1538e6c

