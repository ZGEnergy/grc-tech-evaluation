# eval-config.yaml
# Auto-generated from evaluation guides. Do not hand-edit.
# Rubric: evaluation_guides/Phase1_Evaluation_Rubric.md
# Protocol: evaluation_guides/Phase1_Test_Protocol.md
# Tool: pypsa
# Generated: 2026-03-05

tool: pypsa

networks:
  TINY:
    name: "IEEE 39-bus (New England)"
    buses: 39
    branches: 46
    generators: 10
    file: "data/networks/case39.m"
  SMALL:
    name: "ACTIVSg 2000"
    buses: "~2000"  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg2000.m"
  MEDIUM:
    name: "ACTIVSg 10000"
    buses: "~10000"  # verify from .m file
    branches: "verify from .m file"
    generators: "verify from .m file"
    file: "data/networks/case_ACTIVSg10k.m"

dimensions:
  # ── Gate ──────────────────────────────────────────────────────────────
  - name: gate
    criterion_number: 0
    suite: G
    archetype: gate-evaluator
    emits: []
    consumes: []
    tests:
      - id: G-1
        slug: ingest_tiny
        description: "Ingest IEEE 39-bus reference network"
        functional_network: TINY
        grade_network: N/A
        pass_condition: >
          Tool loads IEEE 39-bus without error. Bus count, branch count, and
          generator count match expected values (39 buses, 46 branches,
          10 generators).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count, conversion_notes]

      - id: G-2
        slug: ingest_small
        description: "Ingest ACTIVSg 2k reference network"
        functional_network: SMALL
        grade_network: N/A
        pass_condition: >
          Same verification on ACTIVSg 2k. Bus, branch, generator counts
          match expected values.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count, conversion_notes]

      - id: G-3
        slug: ingest_medium
        description: "Ingest ACTIVSg 10k reference network"
        functional_network: MEDIUM
        grade_network: N/A
        pass_condition: >
          Same verification on ACTIVSg 10k. Bus, branch, generator counts
          match expected values.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, bus_count, branch_count, gen_count, conversion_notes]

  # ── Criterion 1: Problem Expressiveness ───────────────────────────────
  - name: expressiveness
    criterion_number: 1
    suite: A
    archetype: code-evaluator
    weight_rank: 1
    emits: [api-friction, doc-gaps, workaround-needed, solver-issues]
    consumes: []
    tests:
      - id: A-1
        slug: dcpf
        description: "Solve DC power flow"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Nodal injections, line flows, and voltage angles
          accessible as structured output (DataFrame, dict, or named array
          — not raw solver vector).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-2
        slug: acpf
        description: "Solve AC power flow (Newton-Raphson)"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Bus voltage magnitudes and angles, line P/Q flows,
          and losses accessible as structured output.
        depends_on: []
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]

      - id: A-3
        slug: dcopf
        description: "Solve DC OPF with gen costs and line flow limits"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Converges. Optimal dispatch and LMPs/shadow prices extractable
          from solution.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        solver: "HiGHS"

      - id: A-4
        slug: ac_feasibility
        description: "AC PF feasibility check on DC OPF dispatch from A-3"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Achievable within the same model context (no export to file and
          reimport). Voltage violations and thermal limit violations
          identifiable from results.
        depends_on: [A-3]
        converges_ac: true
        recorded_metrics: [pass_fail, wall_clock, loc, workarounds, workaround_durability]

      - id: A-5
        slug: scuc
        description: "Solve 24-hour SCUC as MILP with min up/down times, startup costs, ramp rates, reserve requirements"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves to feasibility (MIP gap <= 1%). Commitment schedule
          extractable as a time-indexed binary matrix. Built-in constraint
          types vs. user-assembled noted.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, mip_gap, output_format, workarounds, builtin_vs_user_constraints]
        solver: "HiGHS"

      - id: A-6
        slug: sced
        description: "Fix commitment from A-5, solve economic dispatch as LP/QP"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves. Dispatch schedule extractable. UC and ED are cleanly
          separable as a two-stage workflow. Ramp rate constraints are
          demonstrably enforced between consecutive dispatch intervals in
          the ED stage — not just inherited from the UC formulation.
        depends_on: [A-5]
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, output_format, workarounds]
        solver: "HiGHS"

      - id: A-7
        slug: contingency_sweep
        description: "N-M contingency sweep with graph-distance scoping, escalating order, and pruning"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Completes without full model reconstruction per contingency case.
          Load loss per contingency case collected. Pruning logic is
          expressible without fighting the tool. Combinatorial enumeration
          and graph-distance scoping are achievable via the tool's API or a
          clean graph library bridge. TINY: x=3, m=3. MEDIUM: x=5, m=4.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, num_cases_per_order, pruning_ratio, workarounds]

      - id: A-8
        slug: stochastic_timeseries
        description: "Multi-period DC OPF or SCUC with stochastic load/renewable scenarios"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool natively supports scenario-indexed timeseries for load,
          wind, and solar — the stochastic structure is part of the
          optimization formulation (e.g., scenario tree, two-stage
          stochastic program), not just independent deterministic solves
          in a loop.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, scenario_formulation_type, workarounds]
        solver: "HiGHS"

      - id: A-9
        slug: scopf
        description: "DC OPF with N-1 contingency flow constraints in the optimization"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Solves. Base-case dispatch respects all contingency flow limits
          simultaneously. Dispatch and cost differ from unconstrained DC OPF
          (A-3) — SCOPF should be more expensive. Contingency constraints
          are part of the optimization, not checked post-hoc. If achievable
          only by manually enumerating contingency constraints via B-1's
          custom constraint API, document the effort and classify the
          workaround. TINY: all 46 branches. SMALL: 100 monitored branches.
          MEDIUM: 500 monitored branches. Iterative screening allowed.
        depends_on: [A-3]  # inferred — compares cost against A-3
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, num_contingencies, cost_vs_a3, workarounds, workaround_durability]
        solver: "HiGHS"

      - id: A-10
        slug: lossy_dcopf_lmp
        description: "Lossy DC OPF with LMP decomposition into energy, congestion, and loss components"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool produces loss-inclusive LMPs where loss components are
          non-zero. LMP decomposition extractable as structured output.
          Validate against MATPOWER reference lossy DC OPF solution on same
          case (tolerance: 1% on total LMP, directional consistency on loss
          component signs).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_decomposition, matpower_validation, workarounds]
        solver: "HiGHS"

      - id: A-11
        slug: distributed_slack_opf
        description: "DC OPF with distributed slack (load-proportional)"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool supports distributed slack formulation. LMPs differ from
          single-slack results in a physically consistent manner (SMEC
          reflects the distributed reference). Distributed slack weights are
          settable via API (e.g., proportional to load, proportional to
          generation, or custom weights).
        depends_on: [A-3]  # inferred — compares LMPs against A-3
        converges_ac: false
        recorded_metrics: [pass_fail, wall_clock, loc, lmp_comparison_vs_a3, workarounds]
        solver: "HiGHS"

  # ── Criterion 2: Extensibility ────────────────────────────────────────
  - name: extensibility
    criterion_number: 2
    suite: B
    archetype: code-evaluator
    weight_rank: 2
    emits: [api-friction, doc-gaps, workaround-needed, arch-quality]
    consumes: []
    tests:
      - id: B-1
        slug: custom_constraints
        description: "Add a flow gate limit to DC OPF from A-3"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Achievable through a documented API or extension mechanism. No
          source patching or forking required.
        depends_on: [A-3]  # inferred — builds on A-3 formulation
        converges_ac: false
        recorded_metrics: [pass_fail, loc, workaround_durability]

      - id: B-2
        slug: graph_access
        description: "BFS from a chosen bus to depth 3; return buses and branches in subgraph"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Works via native graph primitives or clean, documented export to
          NetworkX (Python) or Graphs.jl (Julia).
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, method_used, workaround_durability]

      - id: B-3
        slug: contingency_loop
        description: "N-1 DCPF contingency loop; collect max line loading across all cases"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Runs in a loop without re-parsing or re-instantiating the base
          model from file each iteration. Base model is modified in-place or
          cloned efficiently. TINY: all 46 branches. MEDIUM: 100-branch
          subset.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, workaround_durability]

      - id: B-4
        slug: stochastic_wrapping
        description: "50-scenario stochastic DCPF with correlated load/renewable perturbations"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Tool accepts timeseries inputs programmatically (not from config
          files only). Scenario loop is expressible without excessive
          per-scenario overhead. Results are collectable in a structured
          format.
        depends_on: []
        converges_ac: false
        recorded_metrics: [pass_fail, loc, wall_clock, workaround_durability]

      - id: B-5
        slug: interoperability
        description: "Export DCPF results to pandas DataFrame and CSV"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Trivial — fewer than 5 lines of code beyond the solve. No custom
          serialization logic required.
        depends_on: [A-1]  # inferred — exports A-1 results
        converges_ac: false
        recorded_metrics: [pass_fail, loc]

      - id: B-6
        slug: code_architecture
        description: "Qualitative architecture assessment: trace DCPF solve path from API to solver"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Document: number of abstraction layers, whether network model /
          problem formulation / solver interface / results are separated,
          whether internal interfaces are documented.
        depends_on: []
        converges_ac: false
        recorded_metrics: [abstraction_layers, separation_of_concerns, internal_docs]

      - id: B-7
        slug: ac_feasibility_extension
        description: "Document AC feasibility workaround if A-4 required one"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          Workaround durability assessed. Effort level documented. Only
          applicable if A-4 required a workaround.
        depends_on: [A-4]
        converges_ac: true
        recorded_metrics: [workaround_durability, effort_level]

      - id: B-8
        slug: reference_bus_config
        description: "DC OPF with three slack configurations: default, different single slack, custom distributed"
        functional_network: TINY
        grade_network: SMALL
        pass_condition: >
          Reference bus / slack formulation is configurable via API without
          model reconstruction. LMP values change consistently across
          configurations. Evaluator documents the API calls required and
          workaround durability.
        depends_on: [A-3]  # inferred — builds on DC OPF
        converges_ac: false
        recorded_metrics: [pass_fail, loc, lmp_comparison, workaround_durability]

      - id: B-9
        slug: ptdf_extraction
        description: "Compute PTDF matrix for TINY (39-bus); verify dimensions and flow prediction accuracy"
        functional_network: TINY
        grade_network: MEDIUM
        pass_condition: >
          PTDF matrix accessible via native API, internal matrix extraction,
          or unit-injection computation. Flow predictions match DCPF results
          within numerical tolerance (1e-6). On MEDIUM, document computation
          time and method.
        depends_on: [A-1]  # inferred — validates against DCPF flows
        converges_ac: false
        recorded_metrics: [pass_fail, loc, method_used, wall_clock, matrix_dimensions, workaround_durability]

  # ── Criterion 4: Scalability ──────────────────────────────────────────
  - name: scalability
    criterion_number: 4
    suite: C
    archetype: code-evaluator
    weight_rank: 3
    emits: [solver-issues]
    consumes: [solver-issues]
    tests:
      - id: C-1
        slug: dcpf_scale
        description: "DCPF on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Converges. Wall-clock time and peak memory recorded."
        depends_on: [A-1]
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, cpu_utilization, parallelism_controls]

      - id: C-2
        slug: acpf_scale
        description: "ACPF on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Converges. Wall-clock time, peak memory, and iterations recorded."
        depends_on: [A-2]
        converges_ac: true
        recorded_metrics: [wall_clock, peak_memory, iterations, cpu_utilization, parallelism_controls]
        solver: "Ipopt"

      - id: C-3
        slug: dcopf_scale
        description: "DC OPF on MEDIUM with HiGHS and GLPK"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: >
          Converges with both solvers. Objective values consistent across
          solvers.
        depends_on: [A-3]
        converges_ac: false
        recorded_metrics: [wall_clock_per_solver, peak_memory, objective_value, cpu_utilization, parallelism_controls]
        solver: "HiGHS, GLPK"

      - id: C-4
        slug: scuc_scale
        description: "SCUC 24hr on SMALL with HiGHS and SCIP"
        functional_network: N/A
        grade_network: SMALL
        pass_condition: "Solves. MIP gap, wall-clock, and peak memory recorded per solver."
        depends_on: [A-5]
        converges_ac: false
        recorded_metrics: [wall_clock_per_solver, mip_gap, peak_memory, cpu_utilization, parallelism_controls]
        solver: "HiGHS, SCIP"

      - id: C-5
        slug: contingency_sweep_scale
        description: "N-M contingency sweep (x=5, m=4) on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: >
          Completes. Total time, per-case average, peak memory, case counts
          per order, and pruning ratio recorded.
        depends_on: [A-7]
        converges_ac: false
        recorded_metrics: [wall_clock_total, wall_clock_per_case, peak_memory, cases_per_order, pruning_ratio, cpu_utilization]

      - id: C-6
        slug: stochastic_dcpf_scale
        description: "50-scenario stochastic DCPF on SMALL"
        functional_network: N/A
        grade_network: SMALL
        pass_condition: "Completes. Total time, per-scenario average, and peak memory recorded."
        depends_on: [B-4]
        converges_ac: false
        recorded_metrics: [wall_clock_total, wall_clock_per_scenario, peak_memory, cpu_utilization]
        solver: "HiGHS"

      - id: C-7
        slug: solver_swap
        description: "Repeat C-3 with each available open-source solver"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: >
          Whether solver swap requires reformulation or just a parameter
          change. Time per solver recorded.
        depends_on: [C-3]
        converges_ac: false
        recorded_metrics: [reformulation_required, wall_clock_per_solver, cpu_utilization]
        solver: "HiGHS, GLPK, SCIP"

      - id: C-8
        slug: scopf_scale
        description: "SCOPF (N-1, 500 contingencies) on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: >
          Solves. Wall-clock time, peak memory, iteration count (if screening),
          and binding contingency count recorded.
        depends_on: [A-9]
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, num_iterations, num_binding_contingencies, cpu_utilization]
        solver: "HiGHS"

      - id: C-9
        slug: ptdf_scale
        description: "PTDF matrix computation on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: "Completes. Wall-clock time, peak memory, and matrix density recorded."
        depends_on: [B-9]
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, matrix_density, cpu_utilization]

      - id: C-10
        slug: distributed_slack_scale
        description: "Distributed slack DC OPF on MEDIUM"
        functional_network: N/A
        grade_network: MEDIUM
        pass_condition: >
          Solves. Wall-clock time, peak memory, and LMP comparison vs
          single-slack recorded.
        depends_on: [A-11]
        converges_ac: false
        recorded_metrics: [wall_clock, peak_memory, lmp_comparison_vs_single_slack, cpu_utilization]
        solver: "HiGHS"

  # ── Criterion 3: Workforce Accessibility ──────────────────────────────
  - name: accessibility
    criterion_number: 3
    suite: D
    archetype: audit-evaluator
    weight_rank: 4
    emits: []
    consumes: [api-friction, doc-gaps]
    tests:
      - id: D-1
        slug: install_to_first_solve
        description: "Install-to-first-solve timing on TINY"
        functional_network: TINY
        grade_network: N/A
        pass_condition: >
          Wall-clock time from clean environment to successful DCPF solve
          on TINY. Number and severity of issues encountered documented.
        depends_on: []
        converges_ac: false
        recorded_metrics: [wall_clock, issues_encountered, issue_severity]

      - id: D-2
        slug: documentation_audit
        description: "Documentation audit: attempt each Suite A test from official docs alone"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Which tests were completable from docs alone. Where did the
          evaluator have to read source, search issues, or guess?
        depends_on: []
        converges_ac: false
        recorded_metrics: [tests_completable_from_docs, doc_gaps_found]

      - id: D-3
        slug: example_verification
        description: "Run every getting-started example and tutorial from official docs"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          How many run without modification? How many require fixes? How
          many are silently broken?
        depends_on: []
        converges_ac: false
        recorded_metrics: [total_examples, run_unmodified, require_fixes, silently_broken]

      - id: D-4
        slug: error_quality
        description: "Introduce deliberate errors: infeasible OPF, missing cost curve, invalid bus type"
        functional_network: TINY
        grade_network: N/A
        pass_condition: >
          For each: does the tool surface a meaningful diagnostic, a cryptic
          solver error, or fail silently?
        depends_on: []
        converges_ac: false
        recorded_metrics: [error_a_diagnostic, error_b_diagnostic, error_c_diagnostic]

      - id: D-5
        slug: code_volume_comparison
        description: "LOC comparison for each Suite A test across all tools"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          LOC comparison table produced. Lower is better for accessibility,
          all else equal.
        depends_on: []
        converges_ac: false
        recorded_metrics: [loc_per_test]

  # ── Criterion 5: Maturity & Sustainability ────────────────────────────
  - name: maturity
    criterion_number: 5
    suite: E
    archetype: audit-evaluator
    weight_rank: 5
    emits: []
    consumes: [doc-gaps, arch-quality]
    tests:
      - id: E-1
        slug: release_cadence
        description: "Release history for last 24 months"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Number of releases, date of last release, whether releases are
          versioned (semver or equivalent).
        depends_on: []
        converges_ac: false
        recorded_metrics: [num_releases_24mo, last_release_date, versioning_scheme]

      - id: E-2
        slug: commit_activity
        description: "Commit history for last 12 months"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Total commits, number of unique committers, ratio of substantive
          commits (features, fixes) to maintenance (dependency bumps, CI).
        depends_on: []
        converges_ac: false
        recorded_metrics: [total_commits_12mo, unique_committers, substantive_ratio]

      - id: E-3
        slug: contributor_concentration
        description: "Top 3 contributors by commit volume over project lifetime"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Percentage of total commits from top contributor. Bus factor
          assessment.
        depends_on: []
        converges_ac: false
        recorded_metrics: [top_contributor_pct, bus_factor]

      - id: E-4
        slug: funding_model
        description: "Institutional backing and funding durability"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Funding source(s), grant dependency, institutional affiliation.
          Assess durability.
        depends_on: []
        converges_ac: false
        recorded_metrics: [funding_sources, institutional_affiliation, durability_assessment]

      - id: E-5
        slug: issue_tracker_health
        description: "Sample last 20 closed and last 10 open issues"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Median time-to-close, ratio of acknowledged to ignored issues,
          quality of responses.
        depends_on: []
        converges_ac: false
        recorded_metrics: [median_time_to_close, acknowledged_ratio, response_quality]

      - id: E-6
        slug: ci_test_coverage
        description: "CI configuration and test suite assessment"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          CI exists (yes/no), test suite exists (yes/no), approximate
          coverage if measurable, whether tests pass on current release.
        depends_on: []
        converges_ac: false
        recorded_metrics: [ci_exists, test_suite_exists, coverage_estimate, tests_pass_current_release]

      - id: E-7
        slug: operational_adoption
        description: "Evidence of use by utilities, ISOs, government entities, or production contexts"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          Documented deployments, case studies, or credible references.
          Distinguish from academic-only citation.
        depends_on: []
        converges_ac: false
        recorded_metrics: [deployments, case_studies, academic_vs_operational]

  # ── Criterion 6: Supply Chain, Inspectability & Licensing Risk (GATE) ─
  - name: supply_chain
    criterion_number: 6
    suite: F
    archetype: audit-evaluator
    weight_rank: 0  # gate criterion — evaluated first
    emits: [license-flags]
    consumes: [license-flags]
    tests:
      - id: F-1
        slug: core_license
        description: "Identify license of the main package"
        functional_network: N/A
        grade_network: N/A
        pass_condition: >
          License type documented. Flag if copyleft (requires legal review)
          or proprietary (disqualifying).
        depends_on: []
        converges_ac: false
        recorded_metrics: [license_type, copyleft_flag, proprietary_flag]

      - id: F-2
        slug: dependency_tree
