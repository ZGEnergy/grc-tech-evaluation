---
# Proposed Protocol, Rubric, and Skill Changes — v10-to-v11 Sweep
# Evidence threshold: 3+ tools for protocol/rubric changes; 2+ for skill-only changes.
# All proposals are framed as improvements to the evaluation framework, not judgments about tools.

proposed_changes:

  - id: PC-01
    type: redesign_test
    target: C-SMALL gate (C-4 dependency for C-1, C-2, C-3, C-7, C-9, C-10)
    title: "Decouple LP/PF MEDIUM tests from the MILP C-SMALL gate"
    rationale: >-
      The C-SMALL gate ties all MEDIUM tests to C-4 (SCUC on SMALL), which requires MILP
      capability. LP and power-flow MEDIUM tests (C-1 DCPF, C-2 ACPF, C-3 DC OPF, C-9
      PTDF, C-10 distributed slack) are independent of MILP and provide essential
      scalability evidence that is currently suppressed for any tool failing C-4. A tool
      that lacks SCUC (pandapower, powermodels) or whose MILP solver fails at scale
      (pypsa, matpower) cannot have its LP/PF scalability measured, producing structurally
      incomplete scalability grades that undersell tools with genuinely strong LP performance.
    evidence_tools: [pypsa, pandapower, matpower, powermodels]
    evidence_findings: [pypsa-F09, pandapower-F01, matpower-F01, pm-F13]
    priority: high
    implementation: >-
      The C-SMALL gate should gate only tests that depend on MILP: C-4 itself (SCUC SMALL)
      and any future MILP MEDIUM tests. LP/PF MEDIUM tests (C-1, C-2, C-3, C-7, C-9, C-10)
      should run unconditionally. C-8 SCOPF (which uses LP) should also be gated only by
      C-3 (DCOPF MEDIUM) rather than C-4.

  - id: PC-02
    type: modify_test
    target: A-5
    title: "Add min up/down binding verification to SCUC pass condition"
    rationale: >-
      A-5's 2-cycling-generator threshold is easily met on the 10-generator 39-bus network
      but does not verify that min up/down time constraints are actually binding. With a
      1.18x capacity-to-load ratio and generous headroom, the optimizer can satisfy the
      cycling count by cost-driven shutdowns without the temporal constraints ever being
      active. This means a tool could pass A-5 using an LP relaxation that happens to
      produce near-binary outputs. Adding a binding check (re-run with min_up=min_down=0
      and compare commitment schedules) would verify behavioral correctness, not just
      formulation completeness.
    evidence_tools: [pypsa, powermodels, powersimulations, matpower, gridcal]
    evidence_findings: [pypsa-F02, pm-F09, powersimulations-F12, matpower-F05, gridcal-F04]
    priority: high
    implementation: >-
      Pass condition addition: "At least one generator's commitment schedule must change when
      min_up_time=min_down_time=0 (binding verification). The MIP gap must be extractable
      from the solver and reported." The TINY network's capacity margin may also need to
      be reduced (e.g., remove 2 of the highest-capacity generators) to force more cycling.

  - id: PC-03
    type: redesign_test
    target: C-8 (SCOPF MEDIUM)
    title: "Replace ACTIVSg10k with a congested MEDIUM network for SCOPF"
    rationale: >-
      The ACTIVSg10k MEDIUM network is uncongested (max branch loading ~84.72%), so
      N-1 contingencies produce no post-contingency violations requiring redispatch.
      Any correctly functioning SCOPF produces results numerically identical to base-case
      DCOPF on this network. C-8 MEDIUM therefore provides no signal about SCOPF
      expressiveness or the quality of security-constrained redispatch — only about
      solve time and solver robustness. Three of three tools that ran C-8 MEDIUM
      confirmed this vacuousness independently.
    evidence_tools: [gridcal, powermodels, powersimulations]
    evidence_findings: [gridcal-F02, pm-F02, powersimulations-F09]
    priority: high
    implementation: >-
      Option A: Load-scale the ACTIVSg10k network to ~120% of its base case until at
      least 5% of branches are above 95% loading. Option B: Use ACTIVSg2000 (SMALL) as
      the benchmark network for SCOPF (which has confirmed congestion at C-8 SMALL level).
      Option C: Use a synthetic stressed version of ACTIVSg10k with reduced thermal
      ratings on critical paths. The pass condition must include minimum redispatch
      magnitude (e.g., at least 5 MW aggregate dispatch change vs base DCOPF).

  - id: PC-04
    type: modify_test
    target: A-2 (ACPF), C-2 (ACPF MEDIUM)
    title: "Formalize convergence verification hierarchy for tools without residual API"
    rationale: >-
      The protocol requires reporting the convergence residual, but at least three tools
      have no public API path to extract it. Probe-013 (powersimulations) showed that the
      iteration count IS available at @info log level and the return type structurally
      guarantees convergence — the evaluation's proxy was weaker than the API actually
      provides. The protocol should establish a tiered evidence hierarchy: (1) residual
      value preferred, (2) iteration count via any API (including logging), (3) binary
      convergence indicator via return type or exception, (4) voltage profile proxy as
      last resort. Each tier should carry a corresponding documentation note.
    evidence_tools: [pandapower, powermodels, powersimulations]
    evidence_findings: [pandapower-F02, pm-F05, powersimulations-F02]
    probe_evidence: [probe-013]
    priority: medium
    implementation: >-
      Add a convergence_evidence_quality field to result files with values:
      residual_reported | iteration_count_reported | binary_convergence_api | proxy_voltage.
      Adjust A-2/C-2 pass conditions to accept any tier while documenting the tier achieved.
      Tools with proxy-only convergence evidence should receive a mild notation in the
      accessibility dimension (convergence diagnostic quality).

  - id: PC-05
    type: modify_test
    target: A-6 (SCED)
    title: "Add binding ramp constraint evidence requirement to A-6"
    rationale: >-
      A-6's pass condition accepts ramp constraint enforcement based on constraint count
      (formulation) rather than binding evidence (behavioral). RTS-GMLC technology-median
      ramp rates are 100-1000x larger than the dispatch changes driven by the 39-bus load
      profile, ensuring no ramp constraints ever bind. This means any tool that can
      formulate multi-period OPF without crashing passes A-6, with no discrimination
      between tools that correctly enforce tight ramp limits and those that merely include
      the constraints. Three or more tools confirmed zero binding ramp constraints.
    evidence_tools: [matpower, powermodels, powersimulations]
    evidence_findings: [matpower-F04, pm-F13, powersimulations-F08]
    priority: medium
    implementation: >-
      Option A: Scale ramp rates down by a factor of 10x in gen_temporal_params.csv to
      force binding. Option B: Add a mandatory re-run with 50% ramp rate tightening and
      verify that at least one generator shows a different dispatch pattern. The pass
      condition should require: "At least one ramp constraint dual value > 0 (binding),
      with the generator index, hour, and dual value reported."

  - id: PC-06
    type: modify_test
    target: A-6 (SCED)
    title: "Distinguish SCED-with-UC from ED-only when SCUC is absent"
    rationale: >-
      When a tool cannot do SCUC, A-6 reduces to a pure economic dispatch with ramp
      constraints. The rubric criterion for A-6 is Security-Constrained Economic Dispatch
      (includes UC stage and security constraints), but the test result is granted the
      same qualified_pass label regardless of whether UC was performed. This inflates
      the apparent SCED capability for tools that only perform ED. The distinction matters
      for the expressiveness grade, which should reflect the full SCED capability.
    evidence_tools: [powermodels, pandapower, powersimulations]
    evidence_findings: [pm-F13, pandapower-F07, powersimulations-F08]
    priority: medium
    implementation: >-
      Add an explicit sub-category to A-6 results: sced_mode: full_sced | ed_only |
      ed_with_security. Score full_sced as pass, ed_only as fail (with context that
      the tool does not support the UC stage), ed_with_security as qualified_pass.
      This requires the skill to check A-5 outcome before scoring A-6.

  - id: PC-07
    type: scoring_change
    target: "qualified_pass status definition (rubric section: grading standards)"
    title: "Add severity tiers to qualified_pass: qualified_pass vs partial_pass vs constrained_pass"
    rationale: >-
      The qualified_pass label is applied to results ranging from 'stable workaround
      with minimal friction' to 'blocking architectural impossibility' to 'non-converged
      result' to 'solver crash'. The workaround_class field documents the distinction, but
      status aggregation collapses it. For cross-tool comparison matrices, qualified_pass
      vs qualified_pass appears equivalent even when one is a near-pass and another is a
      near-fail. This affects expressiveness and scalability grades.
    evidence_tools: [pypsa, powermodels, powersimulations, pandapower, matpower]
    evidence_findings:
      - pypsa-F12     # A-6 stable vs A-11 blocking both qualified_pass
      - pm-F02        # C-8 non-converged awarded pass
      - pm-F06        # A-12 three workarounds awarded pass
      - powersimulations-F09  # C-8 solver crash awarded qualified_pass
      - pandapower-F10  # B-9 vs B-1 inconsistent internal-path classification
    priority: high
    implementation: >-
      Introduce three outcome categories to replace qualified_pass:
        qualified_pass: workaround exists, stable, low friction, full capability demonstrated
        partial_pass: capability partially demonstrated, non-trivial workaround, some criterion unmet
        constrained_pass: capability demonstrated under constraints that affect generalizability
      workaround_class: blocking should map to partial_pass or fail, never qualified_pass.
      Non-converged SCOPF runs should be constrained_pass.
      Solver crash on grade_network should be fail with context (not qualified_pass).

  - id: PC-08
    type: modify_test
    target: G-FNM-3 (and all deviation-reporting result files)
    title: "Require full float64 precision for deviation reporting in G-FNM-3"
    rationale: >-
      The 6-decimal-place rounding in result files causes sub-1e-6 deviations to display
      as 0.000000. Probe-001 confirmed that PyPSA's reported 0.0 bus angle deviation is
      actually 1.07e-8 degrees — non-zero floating-point noise that rounds to zero.
      While the PASS grade is unaffected, the display format conflates numerical noise
      with true machine-zero agreement, which is misleading for cross-tool comparison.
      A tool that uses identical code paths as the reference (true machine zero) would
      be indistinguishable from a tool with correct but independent code (float64 noise).
    evidence_tools: [pypsa, matpower]
    evidence_findings: [pypsa-F06, matpower-F02]
    probe_evidence: [probe-001]
    priority: low
    implementation: >-
      Result files should store deviation values in scientific notation (:.6e format) rather
      than fixed-point (:.6f). The skill should output max_deviation_deg using Python's
      f'{value:.6e}' or Julia's @sprintf("%.6e", value) format. Pass/fail thresholds
      remain unchanged; only reporting precision changes.

  - id: PC-09
    type: redesign_test
    target: G-FNM-1 (FNM ingestion gate)
    title: "Separate PSS/E format support assessment from power-system capability assessment in FNM suite"
    rationale: >-
      G-FNM-1 failure for PSS/E ingestion is a data-format support gap (interoperability
      dimension) but cascades to affect G-FNM-2 (field coverage) and G-FNM-3 (DCPF
      accuracy) through the MATPOWER fallback path. This conflates PSS/E format support
      (which varies by tool for format-version and parser completeness reasons) with
      power-system modeling capability (which should be assessed independently). All
      four tools that attempted PSS/E ingestion failed, meaning the FNM suite actually
      tests only MATPOWER-preprocessed input across all tools, making cross-tool comparison
      conditionally equivalent rather than format-varied.
    evidence_tools: [pypsa, pandapower, gridcal, powermodels]
    evidence_findings: [pypsa-F05, pandapower-F13, gridcal-F08, pm-F07]
    priority: high
    implementation: >-
      Option A: Add explicit ingestion_path metadata to all G-FNM results (native_csv |
      matpower_fallback | native_psse | other) and report it in cross-tool comparisons.
      G-FNM-1 FAIL should not cascade to G-FNM-2 and G-FNM-3; field coverage and DCPF
      accuracy should always be assessed via the best available path.
      Option B: Provide the FNM in both PSS/E and MATPOWER formats as named protocol
      inputs, making the MATPOWER fallback a first-class path (not a fallback).
      Option C: Separate G-FNM-1 into two sub-tests: G-FNM-1a (PSS/E format support,
      informational) and G-FNM-1b (can ingest the FNM via any supported path).

  - id: PC-10
    type: modify_test
    target: A-3 (DC OPF)
    title: "Add hard constraint enforcement verification to DCOPF pass condition"
    rationale: >-
      The A-3 pass condition verifies LMP extractability and shadow price availability
      but does not verify that branch thermal limits are enforced as hard constraints.
      Probe-005 confirmed that GridCal's DCOPF uses soft branch flow constraints
      (LP slack variables), allowing branches to exceed their thermal limits in the
      optimal solution. The A-3 pass was awarded despite branch loading of 103.5%.
      Standard DCOPF definitions require hard thermal limit enforcement; any tool with
      soft constraints should be distinguished from one with hard constraints, as this
      affects market clearing validity and congestion revenue adequacy.
    evidence_tools: [gridcal]
    evidence_findings: [gridcal-F06]
    probe_evidence: [probe-005]
    priority: high
    implementation: >-
      Add to A-3 pass condition: "No branch may exceed its derated thermal limit in the
      optimal solution (max_loading <= 1.0 + epsilon, where epsilon = 1e-4 for numerical
      tolerance). If the formulation uses soft constraints, classify as partial_pass and
      document the penalty coefficient used." This requires the skill to check
      max(res_line.loading_percent) after solve. Soft-constraint DCOPF is not inherently
      wrong but must be explicitly labeled.

  - id: PC-11
    type: redesign_test
    target: B-8 (reference bus configuration)
    title: "Redesign B-8 to test API configurability rather than LMP variation"
    rationale: >-
      B-8 requires that 'LMP values change consistently across configurations' when
      the slack bus is moved. In standard DC OPF, LMPs are invariant to slack bus
      choice (the angle reference cancels out of all KCL dual variables). The pass
      condition cannot be satisfied in any meaningful way for any correct DC OPF
      implementation — either LMPs are invariant (correct, test passes trivially) or
      they vary (incorrect behavior, test would fail). The test actually measures
      whether the API allows setting a different reference bus without error, which
      is a valid API configurability test but should be stated as such.
    evidence_tools: [pypsa, matpower]
    evidence_findings: [pypsa-F01, matpower-F06]
    priority: medium
    implementation: >-
      Rewrite pass condition: "The tool allows setting an arbitrary reference bus without
      error or model reconstruction. Three distinct configurations must complete without
      exception. For DC OPF: LMP values are expected to be invariant across configurations
      (this is physically correct behavior). For AC OPF: LMPs may vary; document any
      variation. The test is primarily an API surface test, not an LMP sensitivity test."

  - id: PC-12
    type: add_test
    target: G-FNM-3 (cross-reference validation sub-test)
    title: "Add cross-tool reference independence check to G-FNM-3"
    rationale: >-
      MATPOWER generates the G-FNM-3 reference DCPF solution from its own format
      (.m file) using its own solver. This makes MATPOWER's G-FNM-3 result self-referential
      (zero deviation is mathematically guaranteed). Any tool with identical B-matrix
      construction as MATPOWER would also show machine-noise-level deviation even if
      the formulation were incorrect for certain branch types. The reference needs an
      independent cross-check to validate that MATPOWER's solution is correct for the
      full network including transformer branches.
    evidence_tools: [matpower]
    evidence_findings: [matpower-F02]
    probe_evidence: [probe-001]
    priority: low
    implementation: >-
      Generate a secondary reference using an independently implemented DCPF (e.g.,
      from PSS/E, if accessible, or from a validated OpenDSS or PSCAD solution for
      a subset of buses). Alternatively: cross-validate the MATPOWER reference against
      bus injection power balance (sum of all branch flows at each bus = net injection)
      as a necessary condition for solution validity. This is tool-independent and
      computationally trivial.

  - id: PC-13
    type: scoring_change
    target: F-3, F-8 (supply chain license audit)
    title: "Fix SCIP license classification and add JLL binary-vs-wrapper license guidance"
    rationale: >-
      Probe-010 confirmed that F-3 (ZIB Academic for SCIP_jll v0.2.1 = SCIP 8.0.0) is
      correct and F-8 (Apache 2.0 claim) is incorrect. The Apache 2.0 switch happened at
      SCIP 8.0.3, not 8.0.0. The F-8 supply chain grade upgrade based on the incorrect
      Apache 2.0 determination should be reverted. More broadly, JLL packages in the
      Julia ecosystem bundle binaries whose license may differ from the wrapper package
      license; the evaluation skill should check the binary artifact license, not the
      Julia package metadata.
    evidence_tools: [powermodels]
    evidence_findings: [pm-F08]
    probe_evidence: [probe-010]
    priority: high
    implementation: >-
      Skill update: When auditing JLL packages, record both the Julia wrapper package
      license (from Pkg metadata) and the bundled binary artifact license (from the
      JuliaBinaryWrappers release README and the upstream source tarball). If they differ,
      the binary license governs the supply chain classification. For SCIP_jll v0.2.1:
      F-3 should remain qualified_pass (commercial excluded); F-8 should be corrected
      to qualified_pass. The net F-8 score should reflect ZIB Academic, not Apache 2.0.

  - id: PC-14
    type: scoring_change
    target: G-1, G-2, G-3 (gate ingestion tests)
    title: "Exclude gate test pass outcomes from cross-tool pass rate comparisons"
    rationale: >-
      All six evaluated tools pass all three gate tests, making them universally positive
      noise in pass rate statistics. Including them in per-tool pass rate numerators and
      denominators produces a floor that uniformly inflates apparent capabilities. The
      tests serve a valid minimum-bar purpose (a fail would be informative) but pass
      outcomes have zero discriminative signal. Multiple per-tool findings confirm this
      pattern independently.
    evidence_tools: [pypsa, pandapower, gridcal, powermodels, powersimulations, matpower]
    evidence_findings: [pypsa-F11, pandapower-F09, gridcal-F12, powersimulations-F15, matpower-F07]
    priority: low
    implementation: >-
      Add a test_category: gate_minimum_bar tag to G-1/G-2/G-3 result schema. Cross-tool
      comparison matrices and summary statistics should exclude gate_minimum_bar tests from
      the pass rate denominator and numerator. These tests remain in the evaluation as
      preconditions only. Optional enhancement: add a data quality sub-check (does cost
      data import at all? does gen reactive limit data survive?) that would provide
      discriminative signal if any tool fails it.

  - id: PC-15
    type: modify_test
    target: C-4 (SCUC scalability), D-1 (installation timing)
    title: "Standardize solver thread count reporting in scalability tests"
    rationale: >-
      powersimulations C-4 records 404s for SCUC with HiGHS at 1 thread on a 32-core
      machine. MILP performance scales significantly with thread count for branch-and-bound.
      Without thread normalization, cross-tool timing comparisons for MILP tests are
      invalid: a tool that runs multi-threaded by default will appear faster than one
      constrained to single-thread, even if both are using HiGHS. The D-1 installation
      timing issue (matpower records an estimate, not a measurement) is a related
      protocol compliance gap.
    evidence_tools: [powersimulations, matpower]
    evidence_findings: [powersimulations-F16, matpower-F10]
    priority: medium
    implementation: >-
      Add cpu_threads used and cpu_threads available to all C-suite scalability result
      frontmatter. For MILP tests (C-4, C-8), report both 1-thread and max-thread wall
      clock if the solver supports parallel execution. D-1 should require actual stopwatch
      measurement from a clean devcontainer state, not a retrospective estimate.

  - id: PC-16
    type: redesign_test
    target: A-9 (SCOPF TINY)
    title: "Provide a feasible N-1 SCOPF test scenario for TINY network"
    rationale: >-
      The IEEE 39-bus network under the Modified Tiny load profile is N-1 infeasible at
      nominal ratings, and N-1 infeasible under various derating strategies. This means
      no tool can demonstrate multi-iteration Benders convergence on this network —
      the algorithm terminates after 1 iteration at an infeasible subproblem. Probe-009
      confirmed the finding is accurately documented but left the Benders convergence
      claim inconclusive. The test design gap (no feasible SCOPF scenario) affects all
      tools that attempt iterative SCOPF.
    evidence_tools: [pypsa, powermodels, powersimulations]
    evidence_findings: [pypsa-F04, pm-F03, powersimulations-F04]
    probe_evidence: [probe-009]
    priority: medium
    implementation: >-
      Pre-compute and publish a feasible N-1 SCOPF configuration for case39 (e.g., by
      reducing the contingency set to the 10 most critical lines, or by using a reduced
      load profile at 80% of peak). The protocol should provide this configuration in
      eval-config.yaml so all tools use the same feasible subset. The pass condition
      should require: "Benders/iterative algorithm converges to a security-constrained
      dispatch in >= 2 iterations OR demonstrates the joint N-1 problem is feasible and
      solved in 1 iteration."

  - id: PC-17
    type: skill_change
    target: A-5 skill (SCUC evaluation)
    title: "Require binary commitment variable verification in SCUC skill"
    rationale: >-
      GridCal's A-5 infers commitment from generator power output (gen_power > 0.1 MW
      threshold), not from a binary commitment variable. If the solver is running an LP
      relaxation that happens to produce near-binary values, the commitment schedule
      appears valid but is not guaranteed to be MILP-generated. The skill should
      attempt to extract the binary variable directly from the solver model, and if
      unavailable, document it as a formulation transparency limitation.
    evidence_tools: [gridcal, powermodels]
    evidence_findings: [gridcal-F04, pm-F01]
    priority: medium
    implementation: >-
      Add to the A-5 skill: after solving, attempt to read binary commitment variables
      from the solver model. If not directly readable, add MIP gap extraction attempt.
      If MIP gap is unavailable, add probe: re-solve with LP relaxation (all binaries
      relaxed) and compare commitment schedule — if identical, flag as potential LP
      relaxation rather than true MILP solve.
