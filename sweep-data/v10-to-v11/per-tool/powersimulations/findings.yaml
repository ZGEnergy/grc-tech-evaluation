  - id: powersimulations-F05
    category: misleading_result
    severity: medium
    test_ids: [A-12]
    title: "A-12 qualified_pass masks BESS arbitrage condition failure with test design gap"
    description: >-
      A-12 is scored as qualified_pass despite the BESS arbitrage behavioral pass condition
      explicitly failing (discharge LMP $35.68 < charge LMP $36.61). The failure is attributed
      to linear costs producing degenerate LP LMPs (non-unique at the margin), which is itself
      caused by a separate workaround: HiGHS cannot solve multi-period QP (a tool limitation).
      The qualified_pass status obscures a fundamental behavioral failure that is tightly
      linked to a compounded solver-formulation mismatch. A reader viewing only the status
      sees "pass" where the core economic behavior being tested did not demonstrate correctly.
    evidence:
      - file: "evaluations/powersimulations/results/expressiveness/A-12_multiperiod_dcopf_storage.md"
        excerpt: "Condition 2: BESS Arbitrage (FAIL). Average charge LMP: $36.61/MWh. Average discharge LMP: $35.68/MWh. Discharge LMP is NOT greater than charge LMP."
      - file: "evaluations/powersimulations/results/expressiveness/A-12_multiperiod_dcopf_storage.md"
        excerpt: "The LP with linear costs produces non-unique LMPs at the margin, which causes the BESS to behave as a net load rather than an arbitrageur. Quadratic costs would resolve this but require a different solver."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: powersimulations-F06
    category: infrastructure_friction
    severity: medium
    test_ids: [A-10]
    title: "A-10 fail is solver-ecosystem mismatch, not a tool formulation gap"
    description: >-
      The A-10 fail for lossy DCOPF is correctly recorded as a blocking failure, but the
      root cause is a mismatch between the protocol's solver constraint (HiGHS) and the
      DCPLLPowerModel formulation's requirement for quadratic constraint support (SOCP/QCP).
      DCPLLPowerModel exists in PowerModels.jl and is accessible through PSI. The failure
      would not occur if the protocol permitted Ipopt (an NLP solver that handles these
      constraints) or a commercial solver. This distinguishes PSI from tools that have no
      lossy DC formulation whatsoever — but the current fail status does not capture this
      nuance. The finding is cross-tool relevant because other JuMP-based tools face the
      same solver-formulation compatibility constraint.
    evidence:
      - file: "evaluations/powersimulations/results/expressiveness/A-10_lossy_dcopf_lmp.md"
        excerpt: "DCPLLPowerModel discovered: PowerModels.jl does provide a DCPLLPowerModel formulation that includes linearized losses. However, this formulation uses quadratic constraints (ScalarQuadraticFunction-in-GreaterThan) in the Ohm's law constraint."
      - file: "evaluations/powersimulations/results/expressiveness/A-10_lossy_dcopf_lmp.md"
        excerpt: "This requires a solver supporting SOCP or general quadratic constraints (e.g., Gurobi, CPLEX, or potentially SCIP). The evaluation protocol specifies HiGHS as the solver."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_test

  - id: powersimulations-F07
    category: missing_verification
    severity: medium
