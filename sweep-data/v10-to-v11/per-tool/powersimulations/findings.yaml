  - id: powersimulations-F10
    category: extraordinary_claim
    severity: medium
    test_ids: [B-9]
    title: "Machine-precision PTDF claim (1.15e-14 error) may not generalize to networks with phase shifters"
    description: >-
      B-9 reports machine-precision PTDF verification with max error 1.15e-14 p.u. on the
      39-bus network. The result notes "IEEE 39-bus has no phase-shifting transformers
      (all SHIFT=0)" and explicitly states no phase-shifter correction is needed. However,
      C-9 (PTDF at MEDIUM scale) finds PTDF values outside [-1,1] on the 10K-bus network
      (due to 776 non-unity tap transformers) and documents that the protocol requires
      Pbusinj/Pfinj corrections for networks with phase shifters. The B-9 result provides
      strong validation on a simple network but cannot establish that the claimed precision
      holds on real-world networks with off-nominal taps — which is where PTDF accuracy
      matters most for SCOPF applications.
    evidence:
      - file: "evaluations/powersimulations/results/extensibility/B-9_ptdf_extraction.md"
        excerpt: "Max error: 1.15e-14 p.u. (1.15e-12 MW). All 46 branches match to machine precision. IEEE 39-bus has no phase-shifting transformers (all SHIFT=0 in MATPOWER branch data)."
      - file: "evaluations/powersimulations/results/scalability/C-9_ptdf_scale.md"
        excerpt: "Values outside [-1, 1] indicate the presence of phase-shifting or tap-changing transformers (PTDF entries can exceed unity when phase shifters are present). The ACTIVSg10k network contains 970 TapTransformers, of which 776 have non-unity tap ratios."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_test

  - id: powersimulations-F11
    category: misleading_result
    severity: low
    test_ids: [G-FNM-3]
    title: "G-FNM-3 formulation-difference classification understates the practical impact"
    description: >-
      The G-FNM-3 DCPF failure (86.8% of bus angles outside 1 degree tolerance) is
      classified as a formulation-difference, which is technically accurate: PowerFlows.jl
      uses a simplified B-matrix that ignores transformer tap ratios. However, calling this
      a formulation difference implies it is a methodological choice rather than a limitation.
      In practice, the 2,340 off-nominal tap transformers in the FNM are essential to realistic
      power flow computation — and there is no configuration option in PowerFlows.jl to use
      the full B-matrix. The classification correctly avoids calling it a bug, but framing
      it as a "formulation difference" in the synthesis may understate the practical consequence
      for any workflow that needs DCPF accuracy on real-world transmission networks.
    evidence:
      - file: "evaluations/powersimulations/results/fnm_ingestion/G-FNM-3_fnm_dcpf_verification.md"
        excerpt: "PowerFlows.jl uses a simplified B-matrix that ignores transformer tap ratios, while the MATPOWER reference uses the full B-matrix. With 2,340 off-nominal tap transformers in the network, this produces systematic angle deviations (mean 2.66 deg)."
      - file: "evaluations/powersimulations/results/fnm_ingestion/G-FNM-3_fnm_dcpf_verification.md"
        excerpt: "There is no configuration option in PowerFlows.jl to switch to a full B-matrix for DCPF."
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: null

