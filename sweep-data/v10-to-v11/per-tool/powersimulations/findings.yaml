    title: "SCOPF 17.7% cost increase claim based on only 7 of 34 contingencies"
    description: >-
      The A-9 SCOPF result reports a 17.7% cost increase from N-1 security constraints,
      but only 7 of 34 line contingencies were applied. Twenty-seven contingencies were
      skipped because they produced |LODF| >= 0.95 on at least one monitored line
