  - id: powersimulations-F14
    category: test_design_gap
    severity: low
    test_ids: [C-5]
    title: "C-5 progressive relaxation test has no discriminative value for ACPF convergence"
    description: >-
      The C-5 protocol applies progressive thermal limit relaxation (0%, 10%, 20%) as a
      diagnostic for ACPF convergence. For PowerSimulations.jl (using PowerFlows.jl NR),
      all three relaxation levels converge to identical voltage profiles because thermal
      limit relaxation only affects OPF branch constraints, not the NR power flow equations.
      The result correctly documents this: "thermal limit relaxation only affects OPF branch
      constraints, not the NR power flow equations." The protocol design assumes that thermal
      limit relaxation helps convergence (appropriate for OPF-based ACPF using Ipopt), but
      is meaningless for direct NR solvers that do not enforce thermal limits during the
      power flow solve. The test measures convergence capability but cannot be used to
      compare across tools that use fundamentally different ACPF approaches.
    evidence:
      - file: "evaluations/powersimulations/results/scalability/C-5_ac_feasibility_progressive_MEDIUM.md"
        excerpt: "Key finding: ACPF converges at 0% relaxation (nominal thermal limits) on MEDIUM. No progressive relaxation was needed. All three relaxation levels converge to the same voltage profile, consistent with SMALL behavior — thermal limit relaxation only affects OPF branch constraints, not the NR power flow equations."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

