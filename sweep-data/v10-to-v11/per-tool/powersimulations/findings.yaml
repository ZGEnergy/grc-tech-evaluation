    title: "LMP values produced with undocumented unit conversion not independently verified"
    description: >-
      Both A-3 (DCOPF LMPs) and B-1 (custom constraint dual) require an undocumented
      unit conversion: dividing raw dual values by base_power (100 MVA) and negating. The
      D-2 documentation audit confirms this conversion is not documented anywhere in the
      official PSI documentation. The LMP values reported ($7.76-$290.11/MWh) are not
      independently verified against a reference solution or an alternative extraction
      path. A 100x error in either direction (missing base_power division) would produce
      plausible-looking but wrong LMPs, and the result files do not show the raw dual
      values alongside the converted values to allow independent checking.
    evidence:
      - file: "evaluations/powersimulations/results/expressiveness/A-3_dcopf.md"
        excerpt: "The raw dual values are in internal units (per-unit basis); conversion to $/MWh requires dividing by base_power (100 MVA) and negating per shadow price sign convention. unit-mismatch: read_variable returns MW but read_dual returns per-unit-based values requiring manual division by base_power and negation — undocumented."
      - file: "evaluations/powersimulations/results/accessibility/D-2_documentation_audit.md"
        excerpt: "Dual unit conversion (divide by base_power, negate): No — Discovered empirically. A user following only official docs would not produce correct LMP values."
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: claim_verification
    proposed_action: add_verification

