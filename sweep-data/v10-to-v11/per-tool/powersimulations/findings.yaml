findings:
  - id: powersimulations-F01
    category: misleading_result
    severity: high
    test_ids: [C-3]
    title: "DCOPF qualified_pass on MEDIUM masks a fundamentally relaxed problem"
    description: >-
      C-3 receives a qualified_pass for DCOPF on the 10K-bus MEDIUM network, but one of the
      five stacked workarounds removes all branch flow limit constraints (StaticBranchUnbounded
      replaces StaticBranch). The result is an uncongested economic dispatch, not a network-
      constrained DCOPF. The qualification notation does not convey that the flow limit
      removal invalidates the primary measure the test is meant to assess — whether the tool
      can enforce thermal ratings at scale. The objective ($3.66M) and solver agreement are
      real, but they reflect an unconstrained problem.
    evidence:
      - file: "evaluations/powersimulations/results/scalability/C-3_dcopf_scale.md"
        excerpt: "StaticBranchUnbounded: Replaced StaticBranch with StaticBranchUnbounded for all branch types. Branch flow limit constraints cause numerical infeasibility at 10K scale (basis matrix condition number > 10^15). This removes branch flow limits but preserves DC network topology."
      - file: "evaluations/powersimulations/results/scalability/C-3_dcopf_scale.md"
        excerpt: "LMP extraction from duals was not successful with StaticBranchUnbounded — the dual structure differs from StaticBranch. Per the cross-tool watchpoint, LMPs should be uniform on ACTIVSg10k (no binding branch constraints at ~84% max loading), so this is not a material gap."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: powersimulations-F02
    category: missing_verification
    severity: high
    test_ids: [A-2, C-2]
    title: "ACPF convergence accepted without residual or iteration count"
    description: >-
      PowerFlows.jl does not expose Newton-Raphson iteration count or convergence residual
      in its public API. Both A-2 (TINY) and C-2 (MEDIUM) infer convergence solely from
      non-flat voltage profiles, which is a necessary but not sufficient condition for true
      NR convergence. At 10K scale (C-2), the first ACPF call logged a convergence warning
      ("NewtonRaphsonACPowerFlow solver failed to converge") but still returned results —
      this silent partial-convergence behavior is particularly concerning and is not
      flagged in the result status.
    evidence:
      - file: "evaluations/powersimulations/results/expressiveness/A-2_acpf.md"
        excerpt: "PowerFlows.jl v0.9.0 does not expose Newton-Raphson iteration count or convergence residual in its public return value. Convergence quality is verified indirectly through non-trivial voltage profiles."
      - file: "evaluations/powersimulations/results/scalability/C-2_acpf_scale.md"
        excerpt: "The warm-start NR solver on the first call logged a convergence warning (NewtonRaphsonACPowerFlow solver failed to converge) but still returned results. On the timed second call, convergence was clean."
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification

