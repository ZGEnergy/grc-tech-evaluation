  - id: powersimulations-F16
    category: extraordinary_claim
    severity: medium
    test_ids: [C-4]
    title: "SCUC 404s wall-clock measured at single-threaded; actual production capability is potentially 20-30x better"
    description: >-
      C-4 reports HiGHS solving the 2K-bus 24h SCUC (22,608 binary variables) in 404 seconds.
      The result notes CPU threads = 1 explicitly: "CPU cores used: 1 (32 available)." Modern
      MILP solvers including HiGHS scale near-linearly with thread count on branch-and-bound
      problems. A 32-thread run would likely reduce solve time to 15-30 seconds, potentially
      changing the grade interpretation for SCUC scalability. The single-threaded measurement
      is reproducible but unrepresentative of practical deployment. The result file does not
      discuss whether multi-threaded HiGHS was attempted or why it was restricted to 1 thread.
    evidence:
      - file: "evaluations/powersimulations/results/scalability/C-4_scuc_scale.md"
        excerpt: "Termination status: OPTIMAL. Wall-clock: 404.2 s. MIP gap: 0.93%. Threads: 1. CPU cores used: 1 (32 available)."
      - file: "evaluations/powersimulations/results/scalability/C-4_scuc_scale.md"
        excerpt: "HiGHS solved to 0.93% optimality in 404 seconds... the 22,608 binary variables represent a substantial MILP problem."
    cross_tool_relevance: confirmed
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: add_verification

extraordinary_claims:
  - test_id: A-9
    claim: "SCOPF produces 17.7% cost increase from N-1 contingency constraints on 39-bus network"
    concern: >-
      Only 7 of 34 contingencies are applied after filtering. The 17.7% cost increase
      is real but measured against a minimal contingency set on a small, radially-connected
      network. The claim implies robust N-1 security enforcement but the test exercises
      only 20% of available contingencies.
    evidence_quality: moderate
    probe_recommended: false
    probe_type: formulation_audit

  - test_id: B-9
    claim: "PTDF matrix achieves machine precision (max error 1.15e-14 p.u.) verified against DCPF"
    concern: >-
      Machine-precision verification is on the 39-bus case with no phase-shifting
      transformers. The C-9 PTDF at 10K scale shows PTDF values outside [-1, 1] due
      to tap transformers, with no flow accuracy check performed. The precision claim
      may not hold at practical scale.
    evidence_quality: moderate
    probe_recommended: false
    probe_type: claim_verification

  - test_id: C-4
    claim: "SCUC on 2K-bus network solves in 404 seconds at 0.93% MIP gap"
    concern: >-
      Single-threaded measurement on a 32-core machine. Multi-threaded HiGHS would
      likely achieve this in 15-30 seconds. The 404s figure could mislead cross-tool
      comparisons if other tools use multi-threading by default.
    evidence_quality: strong
    probe_recommended: true
    probe_type: timing_verification
