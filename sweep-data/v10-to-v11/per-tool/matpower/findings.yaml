findings:
  - id: matpower-F01
    category: infrastructure_friction
    severity: high
    test_ids: [A-5, C-4]
    title: GLPK exit flag mapping bug cascades into an 8-test scalability blackout
    description: >-
      MATPOWER's miqps_glpk.m wrapper maps GLPK's MIP-gap-termination code (GLP_EMIPGAP,
      errnum=9) to a failure exit flag (-9), causing MOST's post-processing to skip solution
      extraction even when GLPK finds a feasible integer solution. This single solver
      integration bug cascades: A-5 becomes a qualified_pass (validated on a bundled 3-bus
      test case, not case39), C-4 fails (blocking the Suite C SMALL gate), and all 8 MEDIUM
      scalability tests are skipped. The 162K-variable SCUC problem was actually solved by
      GLPK in 1.1 seconds; only the exit-flag mapping prevents result extraction.
    evidence:
      - file: evaluations/matpower/results/expressiveness/A-5_scuc.md
        excerpt: "GLPK finds an integer feasible solution (MIP gap ~0.8%) but returns errnum=9 (GLP_EMIPGAP), which MATPOWER's miqps_glpk.m maps to exitflag=-9. MOST's most.m line 2111 checks 'if mdo.QP.exitflag > 0' and skips all post-processing when the flag is negative."
      - file: evaluations/matpower/results/scalability/C-4_scuc_scale_SMALL.md
        excerpt: "GLPK finds a feasible integer solution ... but returned exitflag=-10 (mapped from GLPK's internal termination code)... The solution vector exists (162,048 variables) but cannot be accessed via most_summary()."
      - file: evaluations/matpower/results/scalability/C-1_dcpf_scale_MEDIUM.md
        excerpt: "C-4 (SCUC on SMALL) failed, triggering the Suite C SMALL gate. All MEDIUM-tier scalability tests are skipped per protocol."
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: claim_verification
    proposed_action: >-
      The gate logic tying MEDIUM scalability access to SCUC passing (C-4) conflates a solver
      integration bug with a scalability limitation. Protocol should either (a) gate MEDIUM
      access on a non-MILP test (e.g., C-1 DCPF), or (b) add an exception for cascaded
      infrastructure failures where the underlying solve succeeded. Immediate probe: patch
      miqps_glpk.m to accept exitflag=-9/-10 as feasible and re-run A-5 and C-4 on case39
      to verify the SCUC solution is valid.

  - id: matpower-F02
    category: misleading_result
    severity: medium
    test_ids: [G-FNM-3]
    title: G-FNM-3 DCPF pass is self-referential (reference generated by MATPOWER itself)
    description: >-
      G-FNM-3 reports 100% pass with zero deviation (max VA error = 0.0000 deg, max branch
      deviation = 0.00%) because the reference DCPF solution was generated by MATPOWER from
      the same .mat file. This is a round-trip consistency check, not a cross-tool accuracy
      check. The result confirms determinism and self-consistency but provides no evidence
      of correctness relative to an independent reference. The synthesis and result file both
      acknowledge this; however, the pass grade and cited 0.168s timing may create a false
      impression of independently validated accuracy.
    evidence:
      - file: evaluations/matpower/results/fnm_ingestion/G-FNM-3_fnm_dcpf_verification.md
        excerpt: "The reference DCPF solution was generated by MATPOWER itself from the same .mat file, so this test verifies round-trip consistency rather than cross-tool accuracy. All zero deviations are expected because..."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      The protocol should require a cross-tool reference for G-FNM-3 verification, or
      explicitly label the self-referential case as "consistency check" rather than
      "verification." As-is, each tool that uses its own native format will trivially
      produce perfect scores. The timing result (0.168s) is legitimately meaningful
      and should be retained as a scalability data point, but accuracy claims need
      the cross-tool context.

  - id: matpower-F03
    category: misleading_result
    severity: medium
    test_ids: [A-9]
    title: A-9 SCOPF fail may be a solver-environment artifact rather than a tool capability gap
    description: >-
      A-9 fails because MIPS (the only available QP solver in the Octave devcontainer)
      produces numerical singularity when user constraints are added to DC OPF. The result
      file explicitly notes that HiGHS or commercial solvers would likely succeed, and that
      MOST's contingency framework (Approach 3) was not pursued. The protocol specification
      calls for HiGHS as the solver for A-9, but HiGHS has no Octave binding in the
      devcontainer. A fail grade on A-9 may overstate MATPOWER's actual SCOPF limitations:
      the constraint formulation API exists (mpc.A/l/u + LODF), only the solver coupling
      is broken in this environment.
    evidence:
      - file: evaluations/matpower/results/expressiveness/A-9_scopf.md
        excerpt: "Durability: blocking -- MIPS solver (the only available solver in the devcontainer for QP problems) cannot handle the N-1 constraint matrix with quadratic costs. HiGHS was unavailable. A commercial solver (Gurobi, CPLEX) or HiGHS might succeed."
      - file: evaluations/matpower/results/expressiveness/A-9_scopf.md
        excerpt: "Approach 3: MOST contingency framework -- MOST supports contingency states with probability weighting. However... was not pursued after Approaches 1 and 2 failed, as the test protocol prioritizes the standard OPF extension mechanism."
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: >-
      Probe Approach 3 (MOST contingency table) before finalizing A-9 as a fail. If MOST's
      contingency framework produces a valid SCOPF solution, the result should be reclassified
      as qualified_pass. Additionally, note in the cross-tool report that several A-9 "fails"
      across tools may reflect solver-environment constraints rather than formulation gaps.

  - id: matpower-F04
    category: test_design_gap
    severity: medium
    test_ids: [A-6]
    title: A-6 ramp rate constraints are never binding, providing no signal on ramp enforcement quality
    description: >-
      The A-6 pass condition requires that "ramp rate constraints are demonstrably enforced
      between consecutive dispatch intervals." The result shows no generators hit binding
      ramp limits across all 24 periods, with the most-constrained generator (G1) using only
      48.5 MW/hr of a 62,400 MW/hr ramp limit. The ramp rates from RTS-GMLC technology
      medians are orders-of-magnitude larger than the dispatch changes driven by the 39-bus
      load profile. The test demonstrates that ramp constraints are formulated and do not
      error, but provides no signal about whether they would bind correctly if the network
      were designed to force them to bind. This is a network insufficiency for the specific
      sub-criterion of ramp enforcement quality.
    evidence:
      - file: evaluations/matpower/results/expressiveness/A-6_sced.md
        excerpt: "No ramp violations detected across all 24 periods... No generators hit binding ramp limits because the ramp rates from RTS-GMLC technology medians are generous relative to the dispatch changes driven by the load profile."
      - file: evaluations/matpower/results/expressiveness/A-6_sced.md
        excerpt: "G1: Max Ramp 48.5 MW/hr, Ramp Limit 62,400 MW/hr, Binding? No"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      The protocol should specify minimum ramp constraint tightness to ensure binding.
      For a 39-bus 10-generator network with a 0.7x-1.3x load swing over 24 hours, ramp
      limits should be set at no more than 2x the maximum expected per-period dispatch change
      for the marginal unit. As designed, this test passes for any tool that can formulate
      a multi-period OPF without crashing.

  - id: matpower-F05
    category: network_insufficiency
    severity: medium
    test_ids: [A-5]
    title: A-5 SCUC qualified_pass validated on 3-bus bundled test case, not the specified TINY network
    description: >-
      A-5's qualified_pass is based on validation against MOST's bundled ex_case3b (3 buses,
      5 generators, 12 periods), not the case39 39-bus network specified by the protocol.
      The 3-bus test case has only 1 generator cycling, while the protocol requires at least
      2. The case39 attempt failed due to the GLPK exit flag bug. The qualified_pass therefore
      conflates two separate issues: (a) MOST's SCUC formulation is correct (demonstrated on
      the 3-bus case), and (b) the case39 result is unavailable. A result on a 3-bus network
      is not equivalent evidence for a 39-bus network with differentiated costs and cycling
      behavior.
    evidence:
      - file: evaluations/matpower/results/expressiveness/A-5_scuc.md
        excerpt: "Validation on standard MOST test case (ex_case3b): The MOST SCUC formulation was first verified on the bundled ex_case3b test case (3-bus, 5 generators including wind, 12 periods)."
      - file: evaluations/matpower/results/expressiveness/A-5_scuc.md
        excerpt: "ex_case3b: Cycling generators: 1 (G2). The protocol requires at least 2 generators cycling."
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: claim_verification
    proposed_action: >-
      Fix the GLPK exit flag mapping (see F01) and re-run A-5 on case39 to obtain the
      intended result. Until then, the qualified_pass should note that the cycling count
      requirement (>=2 generators) was not verified on the target network.

  - id: matpower-F06
    category: missing_verification
    severity: medium
    test_ids: [A-11]
    title: A-11 distributed slack qualified_pass provides no evidence that the dispatch changed
    description: >-
      A-11's pass condition requires that "LMPs differ from single-slack results in a
      physically consistent manner." The result shows LMPs shift by a uniform constant
      (-$180.30/MWh for load-proportional slack) with std dev = $0.00. The result file
      acknowledges this is mathematically expected for lossless DC OPF. However, the
      protocol pass condition implies the distributed slack should affect something beyond
      a rigid shift -- the "SMEC reflects the distributed reference" language. The test
      passes because the shift is uniform (which is correct), but the congestion LMP
      components do change ($58.82/MWh max abs change), suggesting the test does
      distinguish behavior but the explanation could be clearer. The dispatch is identical
      to A-3, which is correctly noted but may not be visible to report readers.
    evidence:
      - file: evaluations/matpower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "Key insight: In DC OPF, the distributed slack formulation only changes the LMP reference point, not the dispatch. All LMPs shift by a uniform constant equal to the negative weighted average of single-slack LMPs."
      - file: evaluations/matpower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "LMP shift std dev: $0.00/MWh (perfectly uniform)"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      The protocol should clarify that for lossless DC OPF, distributed slack produces
      only a uniform LMP shift, and that this is the physically correct behavior. The
      test should explicitly verify that (a) the uniform shift magnitude equals the
      weighted average of single-slack LMPs, and (b) congestion components change
      consistent with the new PTDF reference. Both are met in this result but neither
      is explicitly required by the current pass condition language.

  - id: matpower-F07
    category: low_signal
    severity: low
    test_ids: [G-1, G-2, G-3]
    title: Gate tests are expected to pass for all mature tools and provide no differentiation
    description: >-
      G-1, G-2, and G-3 test network ingestion with bus/branch/generator count verification.
      For a tool like MATPOWER that ships the IEEE 39-bus and ACTIVSg cases as native format
      distributions, these tests are trivially satisfied. The tests correctly gate the
      evaluation but provide no signal that distinguishes tool capability. All tools that
      have reached maturity-level stability are expected to pass these tests.
    evidence:
      - file: evaluations/matpower/results/gate/G-1_ingest_tiny.md
        excerpt: "MATPOWER loads its native .m case format without any conversion or adaptation. The IEEE 39-bus (New England) test case is a standard MATPOWER distribution case."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      Gate tests serve their intended purpose as preconditions. Their low signal is by
      design. No change recommended, but cross-tool aggregation should not weight gate
      test results in capability comparisons.

  - id: matpower-F08
    category: test_design_gap
    severity: medium
    test_ids: [C-5]
    title: C-5 AC feasibility relaxation test is uninformative when no constraints bind at any relaxation level
    description: >-
      C-5 progressive relaxation produces identical ACPF solutions at 0%, 10%, and 20%
      relaxation because the ACTIVSg2000 base case has no binding voltage or thermal
      constraints (all 3,206 branches have 0 binding constraints at base load). The test
      was designed as a diagnostic tool for networks near their feasibility boundary, but
      the SMALL network is well within limits. The result records "relaxation_level_achieved: 0%
      (no relaxation needed)" which is informative but means the test provides no signal
      about the tool's ability to handle progressively relaxed constraints.
    evidence:
      - file: evaluations/matpower/results/scalability/C-5_ac_feasibility_relaxation_SMALL.md
        excerpt: "The solution is identical across all three levels because the base case has no binding constraints -- the relaxation has no effect on the solution. Binding branches: 0 / 3206"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      C-5 should be run on a network with pre-confirmed constraint violations at base
      loading, or the loading should be increased until at least one thermal or voltage
      constraint binds before applying progressive relaxation. The current design produces
      uniform pass outcomes for any tool whose ACPF solver converges on the SMALL network.

  - id: matpower-F09
    category: scoring_inconsistency
    severity: low
    test_ids: [B-5]
    title: B-5 qualified_pass classification is ambiguous given the protocol's <5 LOC criterion
    description: >-
      The protocol pass condition for B-5 states "Trivial -- fewer than 5 lines of code
      beyond the solve." The result file documents that a minimal export (no headers) is
      3 lines -- meeting the criterion. A production-quality export with headers is 12 lines.
      The qualified_pass is assessed based on the production-quality version. The synthesis
      flags this as an open question: "Verify whether the '<5 lines' criterion applies to the
      minimal or production-quality version." If the criterion is interpreted as minimal
      functionality, B-5 should be a pass.
    evidence:
      - file: evaluations/matpower/results/extensibility/B-5_interoperability.md
        excerpt: "Minimal export (no column headers): 3 lines of code. With column headers (production-quality): requires fopen/fprintf/fclose/dlmwrite pattern -- 4 lines per table (12 lines total)."
      - file: evaluations/matpower/results/synthesis.md
        excerpt: "Verify whether the '<5 lines' criterion applies to the minimal or production-quality version."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      The protocol should specify whether the LOC criterion applies to minimal functionality
      (data written, no headers) or production-quality output (headers included). If the
      intent is to measure friction for analyst use, production-quality is the right target.
      This ambiguity likely affects multiple tools.

  - id: matpower-F10
    category: extraordinary_claim
    severity: medium
    test_ids: [D-1]
    title: D-1 install time is an estimate, not a measured wall-clock time
    description: >-
      D-1 reports timing_source: estimated and wall_clock_seconds: null. The result
      claims "approximately 2-3 minutes of human effort" from clean environment to first
      solve, but this is a retrospective estimate. The protocol specifies "Measure
      wall-clock time from clean environment to successful DCPF solve on TINY." No
      stopwatch measurement was made. The result is useful qualitative evidence but
      does not satisfy the protocol's measurement requirement.
    evidence:
      - file: evaluations/matpower/results/accessibility/D-1_install_to_first_solve.md
        excerpt: "timing_source: estimated ... wall_clock_seconds: null ... Time from clean environment to first successful DCPF solve is approximately 2-3 minutes of human effort"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: timing_verification
    proposed_action: >-
      D-1 should be re-run with actual stopwatch timing starting from a clean devcontainer
      state. The qualitative friction findings (interactive installer, hidden path deps) are
      well-documented; only the timing claim needs verification. This finding likely applies
      across all tools evaluated.

  - id: matpower-F11
    category: misleading_result
    severity: low
    test_ids: [C-3]
    title: C-3 qualified_pass reflects solver availability gap, not tool scalability quality
    description: >-
      C-3 is scored as qualified_pass because HiGHS (the protocol-specified solver) is
      unavailable in Octave, and GLPK failed with a singular basis matrix on the 2000-bus
      network. MIPS succeeded in 0.507s. The result is correct but the qualified_pass
      framing may suggest a scalability concern when the actual issue is solver ecosystem
      limitation. The synthesis correctly identifies this as a "solver ecosystem" cross-cutting
      issue rather than a scalability deficiency.
    evidence:
      - file: evaluations/matpower/results/scalability/C-3_dcopf_scale_SMALL.md
        excerpt: "The test specified HiGHS and GLPK per the config, but HiGHS is unavailable in Octave. MIPS was used as the primary solver... MIPS: Wall clock 0.507s, Converged."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      The scoring rubric should distinguish between (a) tool unable to solve the problem
      and (b) specified solver unavailable in the evaluation environment. When the tool
      solves correctly using its built-in solver (MIPS), a pass with environment note is
      more informative than a qualified_pass that suggests a tool deficiency.

  - id: matpower-F12
    category: redundant_test
    severity: low
    test_ids: [B-9, A-9]
    title: B-9 PTDF extraction is substantially redundant with the PTDF computation already done in A-9
    description: >-
      B-9 demonstrates makePTDF() with TINY network, achieving machine-precision accuracy
      (error < 1e-12 MW). However, A-9's SCOPF attempt already uses makePTDF() and
      makeLODF() as the primary computation mechanism, documented with essentially the same
      API calls. The additional signal from B-9 is the explicit dimension and accuracy
      verification, but the core capability (native PTDF computation) is already well
      established from A-9. For MATPOWER specifically, this is not an issue since both
      tests pass/fail consistently; for cross-tool comparison, B-9 provides incremental value
      in the accuracy quantification.
    evidence:
      - file: evaluations/matpower/results/extensibility/B-9_ptdf_extraction.md
        excerpt: "Used MATPOWER's native makePTDF(baseMVA, bus, branch) function. Max absolute error: 2.27e-12 MW."
      - file: evaluations/matpower/results/expressiveness/A-9_scopf.md
        excerpt: "Built LODF matrix via makeLODF(branch, PTDF) (documented API). For each N-1 contingency (41 non-radial branches), computed post-contingency flow coefficients..."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: >-
      B-9 provides additive value through explicit accuracy quantification. No removal
      recommended, but the cross-tool report should note that tools with native PTDF APIs
      may appear to have higher differentiation than is warranted between B-9 and A-9/B-3.

extraordinary_claims:
  - test_id: G-FNM-3
    claim: >-
      MATPOWER solves DCPF on a 27,862-bus FNM network in 0.168 seconds with 100% bus
      angle accuracy (zero deviation) and 100% branch flow accuracy (zero deviation).
    concern: >-
      The zero-deviation accuracy is mathematically guaranteed (self-referential test) and
      not independently verified. The 0.168s timing is measured and credible given sparse
      linear algebra on a DCPF, but the implied accuracy claim (cross-tool comparison
      potential) is undermined by the self-referential reference. The timing alone is the
      extraordinary and valuable claim.
    evidence_quality: moderate
    probe_recommended: false
    probe_type: null

  - test_id: A-5
    claim: >-
      MATPOWER's MOST SCUC formulation supports all required constraint types (min up/down,
      startup costs, ramp rates, reserves) and produces a valid commitment schedule on a
      24-hour horizon.
    concern: >-
      The primary validation was on a 3-bus, 12-period bundled test case (ex_case3b), not
      on the 39-bus, 24-period case specified by the protocol. The case39 attempt failed
      due to a solver integration bug. The 3-bus validation demonstrates API correctness
      but is insufficient evidence for the SCUC formulation under realistic cost
      differentiation and network topology.
    evidence_quality: weak
    probe_recommended: true
    probe_type: claim_verification
