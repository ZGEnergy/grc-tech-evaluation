  - id: pm-F13
    category: test_design_gap
    severity: low
    test_ids: [A-6]
    title: "SCED test bypasses UC stage by design, making it an independent ED test"
    description: >
      A-6 explicitly bypasses the SCUC stage because PowerModels cannot do UC, treating
      all generators as committed. This reduces SCED to a pure multi-period ED LP. The
      test correctly documents this as a "stable scope reduction" workaround. However,
      the rubric criterion for A-6 is SCED (Security-Constrained Economic Dispatch with
      commitment), not standalone ED. The resulting qualified_pass grades a capability
      PowerModels does have (multi-period LP with ramp constraints) rather than the
      capability being assessed. The test result is accurate but the scoring may overstate
      SCED capability since the security-constraint component (binding N-1 contingency
      constraints on dispatch) is also absent.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-6_sced_TINY.md"
        excerpt: "Since A-5 (SCUC) is a blocking fail, the UC stage is bypassed: all generators are assumed committed across all periods."
      - file: "evaluations/powermodels/results/expressiveness/A-6_sced_TINY.md"
        excerpt: "workaround_class: stable ... Grade impact: B-level. The two-stage architecture is cleanly separable. The ED stage is fully implemented via documented API. The UC gap is a hard capability boundary"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

extraordinary_claims:

  - test_id: C-8
    claim: >
      SCOPF MEDIUM awarded status: pass after completing only 1 Benders iteration within
      the 600s budget, with 17 identified binding contingencies and 8 blocks added, but
      without converging to a security-constrained optimal solution.
    concern: >
      The protocol states C-8 is a "measurement test," but pass status is awarded for a
      non-converged run. The remaining 9 binding contingency blocks were not added within
      budget, meaning the "optimal" objective ($2,162,360/h) reflects only partial
      security constraint coverage. A tool that runs faster on the contingency screening
      loop could produce a converged result within the same budget.
    evidence_quality: strong
    probe_recommended: true
    probe_type: convergence_check

  - test_id: A-9
    claim: >
      SCOPF TINY mechanism is "fully demonstrated" via a qualified_pass on a network
      where the full N-1 SCOPF is provably infeasible, and the iterative algorithm
      completed only 1 iteration before terminating.
    concern: >
      The claim that the mechanism is verified rests on 46 individual single-contingency
      SCOPFs being feasible, but the key question -- does the Benders cutting-plane
      algorithm converge to a security-constrained dispatch when one exists? -- is
      never answered because the network chosen is N-1 infeasible under the evaluation
      load profile. A different network configuration or load profile would be needed to
      demonstrate convergence.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: formulation_audit

  - test_id: G-FNM-3
    claim: >
      DCPF hard-fails on the FNM production network (2.43% bus angle pass rate) due to
      DCPPowerModel ignoring transformer tap ratios, but DCMPPowerModel (full B-matrix)
      was not tested despite being available in PowerModels.
    concern: >
      The test result presents a tool failure that may actually be a test design failure:
      constraining the test to solve_dc_pf (which hardcodes DCPPowerModel) when
      DCMPPowerModel is available and would produce a physically correct result for a
      transformer-heavy network. The synthesis calls this out as a human spot-check item.
    evidence_quality: strong
    probe_recommended: true
    probe_type: formulation_audit
