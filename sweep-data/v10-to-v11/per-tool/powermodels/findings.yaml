findings:

  - id: pm-F01
    category: misleading_result
    severity: high
    test_ids: [A-5, C-4]
    title: "SCUC qualified_pass awarded when PowerModels provides zero UC capability"
    description: >
      Both A-5 (TINY) and C-4 (SMALL) receive qualified_pass status despite PowerModels
      contributing nothing to the unit commitment formulation beyond file parsing. The
      entire MILP -- binary commitment variables, min up/down time constraints, startup
      cost terms, ramp coupling -- was assembled by the evaluator from scratch using raw
      JuMP. A qualified_pass with a "blocking" workaround class on the tool's most
      operationally important expressiveness feature conveys that PowerModels can do SCUC
      with effort; the accurate characterization is that PowerModels cannot do SCUC and
      the result measures the evaluator's ability to write a JuMP MILP.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-5_scuc_TINY.md"
        excerpt: "PowerModels used ONLY for data parsing ... Everything else is raw JuMP"
      - file: "evaluations/powermodels/results/scalability/C-4_scuc_scale_SMALL.md"
        excerpt: "PowerModels v0.21.5 does NOT natively support SCUC; the entire UC formulation (~300 LOC) was user-assembled"
      - file: "evaluations/powermodels/results/expressiveness/A-5_scuc_TINY.md"
        excerpt: "workaround_class: blocking"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pm-F02
    category: misleading_result
    severity: high
    test_ids: [C-8]
    title: "SCOPF MEDIUM awarded pass despite not converging within the time budget"
    description: >
      C-8 records status: pass even though the Benders decomposition completed only 1 of
      an unknown required number of iterations before the 600s time budget was exhausted.
      The result file itself states "Benders converged: No (1 iteration, time budget)."
      The protocol states C-8 is a "measurement test" where metrics are recorded regardless
      of convergence, but awarding pass to a non-converged SCOPF run overstates capability.
      A qualified_pass noting incomplete convergence would more accurately represent the
      result. The same SCOPF algorithm converged in ~110s at SMALL scale (A-9), so the
      MEDIUM result meaningfully limits practical usability.
    evidence:
      - file: "evaluations/powermodels/results/scalability/C-8_scopf_scale_MEDIUM.md"
        excerpt: "Benders converged: No (1 iteration, time budget)"
      - file: "evaluations/powermodels/results/scalability/C-8_scopf_scale_MEDIUM.md"
        excerpt: "status: pass ... wall_clock_seconds: 595.18"
      - file: "evaluations/powermodels/results/synthesis.md"
        excerpt: "C-8 SCOPF MEDIUM (pass, 1 iteration, not converged) -- Only 1 Benders iteration completed within 595s budget. Verify whether a non-converged result qualifies as pass vs. qualified_pass"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pm-F03
    category: extraordinary_claim
    severity: medium
    test_ids: [A-9]
    title: "SCOPF TINY qualified_pass on an N-1 infeasible network"
    description: >
      A-9 demonstrates the two-level API SCOPF mechanism on a network that is provably
      N-1 infeasible under the Modified Tiny load profile. The iterative algorithm runs
      exactly 1 iteration, then hits infeasibility because the joint N-1 constraint set
      is overconstrained. The mechanism verification claim -- that SCOPF "works correctly"
      -- rests entirely on confirming that 46/46 individual single-contingency SCOPFs are
      feasible and that joint N-1 infeasibility is mathematically correct for this network.
      This is plausible but the test does not verify that the Benders algorithm converges
      to a secure solution on any network; the only convergence evidence is for the trivial
      base-case OPF. The qualified_pass may overstate what was demonstrated.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-9_scopf_TINY.md"
        excerpt: "Full SCOPF LP (all 46 N-1 simultaneously): INFEASIBLE ... Iterative iterations: 1 (hits infeasibility at iteration 2)"
      - file: "evaluations/powermodels/results/expressiveness/A-9_scopf_TINY.md"
        excerpt: "convergence_iterations: 1"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: add_verification

  - id: pm-F04
    category: test_design_gap
    severity: medium
    test_ids: [G-FNM-3]
    title: "DCPF verification test mandates solve_dc_pf (DCPPowerModel) when DCMPPowerModel exists and would likely pass"
    description: >
      G-FNM-3 hard-fails (2.43% bus angle pass rate) because the test specification
      requires solve_dc_pf, which internally uses DCPPowerModel's simplified B-matrix
      that ignores transformer tap ratios. The evaluator identifies that DCMPPowerModel
      (full B-matrix including taps) exists in PowerModels and "could potentially produce
      results closer to the MATPOWER reference" but was not tested because the spec
      requires a specific function. The failure reflects a test design choice (constraining
      the API to use) rather than a fundamental tool limitation. A production user would
      select the appropriate formulation for their network characteristics.
    evidence:
      - file: "evaluations/powermodels/results/fnm_ingestion/G-FNM-3_dcpf_verification.md"
        excerpt: "PowerModels' DCMPPowerModel formulation would incorporate taps into the B-matrix but is not available through solve_dc_pf ... this was not tested because the task specification explicitly requires solve_dc_pf"
      - file: "evaluations/powermodels/results/fnm_ingestion/G-FNM-3_dcpf_verification.md"
        excerpt: "Bus angle pass rate: 678 (2.43%) ... Root cause: DCPPowerModel uses a simplified B-matrix"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: redesign_test

  - id: pm-F05
    category: missing_verification
    severity: medium
    test_ids: [A-2, A-4, C-5]
    title: "ACPF convergence accepted without residual or iteration count due to API gap"
    description: >
      compute_ac_pf returns only a Bool termination_status with no NR iteration count and
      no convergence residual exposed in the result dict. At TINY and SMALL scale the
      result file validates convergence indirectly (100% of PQ buses have Vm != 1.0 pu,
      Vm range within physical bounds). This indirect check does not verify convergence
      residual below the standard tolerance and cannot detect partial convergence where
      the solver stopped early due to iteration limits. The protocol requires reporting
      both iteration count and residual; both are structurally unavailable for the
      compute_ac_pf path.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-2_acpf_TINY.md"
        excerpt: "convergence_residual: null ... convergence_iterations: null ... NR iteration count and convergence residual not exposed"
      - file: "evaluations/powermodels/results/expressiveness/A-2_acpf_TINY.md"
        excerpt: "Convergence verified indirectly from: termination_status == true ... 100% of PQ buses (29/29) have Vm ≠ 1.0 pu"
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification

  - id: pm-F06
    category: scoring_inconsistency
    severity: medium
    test_ids: [A-12, A-5]
    title: "A-12 awarded pass (not qualified_pass) despite three simultaneous stable workarounds"
    description: >
      A-12 records status: pass with three simultaneous workarounds -- solver switch to
      SCIP for MIQP, manual cyclic SoC constraint injection, and two-phase LMP extraction
      via fix-and-price. The evaluation synthesis flags this as a human spot-check item:
      "verify whether three simultaneous workarounds should remain pass or be reclassified
      as qualified_pass." By contrast, A-5 receives qualified_pass with a blocking
      workaround. The distinction between pass-with-three-stable-workarounds and
      qualified_pass is not consistently applied. All three workarounds in A-12 are
      non-obvious and domain-specific; a new user would not discover any of them from
      PowerModels documentation.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-12_multiperiod_dcopf_storage_TINY.md"
        excerpt: "status: pass ... Three workarounds were required: 1. Solver switch (SCIP) ... 2. Cyclic SoC via manual JuMP constraint injection ... 3. Two-phase LMP extraction"
      - file: "evaluations/powermodels/results/synthesis.md"
        excerpt: "A-12 (pass with 3 stable workarounds) -- SCIP solver switch, cyclic SoC manual constraint, two-phase LMP extraction. Verify whether three simultaneous workarounds should remain pass or be reclassified as qualified_pass"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pm-F07
    category: infrastructure_friction
    severity: medium
    test_ids: [G-FNM-1, G-FNM-2, G-FNM-3, G-FNM-4]
    title: "FNM ingestion suite tests MATPOWER fallback capability, not PowerModels PSS/E parsing"
    description: >
      The entire FNM ingestion suite was executed against the MATPOWER fallback file
      (fnm_main_island.m) because PowerModels' PSS/E v31 parser crashes on the Case
      Identification header. The fallback is a pre-cleaned main-island subset with
      record deficits vs. the manifest (bus -8.1%, load -42.7%). G-FNM-2's 100%
      DCPF-critical field coverage and G-FNM-1's qualified_pass both measure MATPOWER
      PPC format ingestion, not PowerModels' claimed PSS/E capability. The PSS/E failure
      is characterized as a 1-2 day fix, but its effect on the FNM test suite results
      is structural: all FNM test conclusions apply to the MATPOWER fallback path only.
    evidence:
