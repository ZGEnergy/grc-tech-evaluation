        excerpt: "input_path: matpower"
      - file: "evaluations/powermodels/results/synthesis.md"
        excerpt: "FNM ingestion used the MATPOWER .m fallback because PowerModels' PSS/E v31 RAW parser crashes on the Case Identification header"
      - file: "evaluations/powermodels/results/synthesis.md"
        excerpt: "Record counts show deficits vs. manifest (bus -8.1%, load -42.7%, gen -0.5%, branch -3.6%) because the fallback is a pre-cleaned main-island subset"
    cross_tool_relevance: none
