  - id: pm-F09
    category: network_insufficiency
    severity: low
    test_ids: [A-5]
    title: "39-bus network cycling guardrail is weak: only 3 of 10 generators cycle, all at end-of-horizon"
    description: >
      A-5 demonstrates UC cycling by showing 3 of 10 generators decommitting in hours
      H22-H24 of a 24-hour horizon with no recommitment. All transitions are shutdowns
      (3 shutdown events, 0 startups). The 39-bus network's high capacity-to-load ratio
      (7,367 MW / 6,254 MW peak = 1.18x) means commitment decisions are economically
      marginal: the optimizer sheds expensive gas CC units during the last few hours
      only. A network with tighter capacity margins or more diverse cost structure would
      force more meaningful cycling (mid-cycle startups, alternating unit commitment).
      The result verifies the MILP constraint logic but does not demonstrate robust
      UC cycling behavior.
    evidence:
      - file: "evaluations/powermodels/results/expressiveness/A-5_scuc_TINY.md"
        excerpt: "Total shutdowns: 3. Total startups: 0 (generators only decommit toward end of horizon, no recommitment needed within 24h)"
      - file: "evaluations/powermodels/results/expressiveness/A-5_scuc_TINY.md"
        excerpt: "case39 has a high capacity-to-load ratio (7,367 MW capacity vs 6,254 MW peak load)"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

  - id: pm-F10
    category: extraordinary_claim
    severity: medium
    test_ids: [C-3, C-7]
    title: "GLPK convergence on MEDIUM DCOPF contradicts v9 timeout failure; no explanation for improvement"
    description: >
      C-3 reports GLPK converging on the MEDIUM 10k-bus DC OPF in 61.86s wall-clock
      time. The result file notes: "In the v9 evaluation, GLPK hit the 300s time limit
      without finding an optimal solution. In this v10 run, GLPK converged in 61.86s.
      The difference may be due to JIT warm-up improving the model construction or solver
      configuration differences." No definitive explanation is provided. The 5x speedup
      (300s+ to 61.86s) without a protocol change is extraordinary and could reflect a
      solver configuration difference, a cost linearization change (v10 linearizes 45.5%
      of quadratic costs which v9 may not have), or a test artifact. This matters because
      the GLPK comparison is part of C-7 solver swap testing and affects the A- supply
      chain assessment (GLPK is GPL v3).
    evidence:
      - file: "evaluations/powermodels/results/scalability/C-3_dcopf_scale_MEDIUM.md"
        excerpt: "Improvement from v9: In the v9 evaluation, GLPK hit the 300s time limit without finding an optimal solution. In this v10 run, GLPK converged in 61.86s. The difference may be due to JIT warm-up improving the model construction or solver configuration differences."
      - file: "evaluations/powermodels/results/scalability/C-3_dcopf_scale_MEDIUM.md"
        excerpt: "Generators cost-linearized: 1,130 (45.5%) ... GLPK wall-clock: 63.20s"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: add_verification

