    category: extraordinary_claim
    severity: low
    test_ids: [C-9]
    title: "PTDF timing discrepancy: B-9 MEDIUM (106s) vs C-9 MEDIUM (7.55s) on identical API call"
    description: >
      B-9 ran at MEDIUM scale (same 10k-bus network, same calc_basic_ptdf_matrix call)
      in 106.44s total. C-9 ran the same call in 7.55s total. The result file attributes
