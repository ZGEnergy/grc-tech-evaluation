findings:
  - id: pypsa-F01
    category: scoring_inconsistency
    severity: medium
    test_ids: [B-8]
    title: "B-8 slack reconfiguration produces zero LMP variation — pass condition is vacuous for DC OPF"
    description: >-
      B-8 tests reference bus reconfigurability by solving DC OPF with three different
      slack bus assignments and checking that "LMP values change consistently across
      configurations." All three configurations produce identical objectives and
      identical LMPs (spread = 0.0 across all configs). The evaluator correctly
      explains this is mathematically expected for DC OPF (dual variables are
      invariant to angle reference choice), but the pass condition as written
      ("LMP values change consistently") cannot be satisfied for any well-functioning
      DC OPF solver. The test silently measures only configurability of the API call,
      not meaningful LMP sensitivity. The same structural issue would affect all
      tools implementing standard DC OPF.
    evidence:
      - file: evaluations/pypsa/results/extensibility/B-8_reference_bus_config.md
        excerpt: "Objective spread: 0.0000 (identical across all three configs)\nLMP spread variation: 0.0000 (identical across all three configs)\nLMP shift (config 1 vs 2): mean=0.0000, std=0.000000"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test
    notes: >-
      The test should be redesigned to use DCPF (not DC OPF) for the LMP comparison,
      or the pass condition should be rewritten to check API configurability only
      (API calls required, no model reconstruction needed) without requiring LMP
      variation. For AC OPF, slack choice does affect LMPs. If the intent is to
      test slack reconfigurability under a formulation where it matters, the test
      should use AC OPF or DCPF with non-uniform losses.

  - id: pypsa-F02
    category: network_insufficiency
    severity: medium
    test_ids: [A-5]
    title: "A-5 SCUC on 10-generator TINY network exercises UC constraints but cannot stress min up/down cycling"
    description: >-
      The TINY network has only 10 generators spanning 4 cost tiers. The A-5 result
      shows 3 generators cycling (G3/coal, G6/gas CC, G9/gas CC) across a 4,237-6,254
      MW load range with a capacity-to-peak ratio of 1.18. This passes the numeric
      threshold (>=2 cycling generators), but the constraint that min up/down times
      actually force commitment decisions is not verifiable: min_up_time=min_down_time
      are set to values from gen_temporal_params.csv, but with only 10 generators and
      generous capacity headroom, the optimizer has many degrees of freedom. The test
      cannot confirm that the min up/down time constraints are binding (as opposed to
      merely present in the formulation). A network with tighter capacity margins and
      more generators with heterogeneous min up/down times would be needed to verify
      that the MILP constraints meaningfully constrain the solution.
    evidence:
      - file: evaluations/pypsa/results/expressiveness/A-5_scuc.md
        excerpt: "Capacity-to-peak-load ratio: 1.18. Load range: 4,237--6,254 MW.\nG9 (gas CC, $40/MWh) shuts down during hours 3--8 (low load), restarts at hour 9, shuts down again at hour 22."
      - file: evaluations/pypsa/results/eval-config.yaml
        excerpt: "pass_condition: >-\n  Solves to feasibility (MIP gap <= 1%). At least 2 generators must\n  cycle (commit/decommit) during the 24-hour horizon."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    notes: >-
      A supplementary check should verify that at least one generator's min up/down
      time constraint is binding in the optimal solution (i.e., the generator would
      have switched status earlier/later if the min time constraint were removed).
      This is feasible by re-running with min_up_time=min_down_time=0 and comparing
      the cycling pattern.

  - id: pypsa-F03
    category: missing_verification
    severity: medium
    test_ids: [A-10]
    title: "A-10 lossy DCOPF LMP decomposition check (d) does not verify loss+energy+congestion sum to total LMP"
    description: >-
      The A-10 pass condition requires four internal consistency checks including
      "(d) loss component LMPs sum with energy and congestion components to total LMP
      within 1% tolerance." The result file reports checks (a), (b), (c), and
      (d-partial): it confirms LMPs change between lossy and lossless, but does not
      show the three-component decomposition (energy + congestion + loss = total LMP)
      with numerical verification. The loss component is defined as "bus LMP difference
      from the slack bus energy component" — a two-component decomposition — but the
      protocol requires a three-component additive check. The result records "Buses
      with LMP change (lossy vs lossless): 38 of 39" as check (d), which is a
      weaker criterion than the protocol's additive decomposition requirement.
    evidence:
      - file: evaluations/pypsa/results/expressiveness/A-10_lossy_dcopf_lmp.md
        excerpt: "| (d) Bus LMPs change between lossy and lossless | PASS (38/39 buses) |\n\nAll four consistency checks passed."
      - file: evaluations/pypsa/results/eval-config.yaml
        excerpt: "(d) loss component LMPs sum with energy and congestion components to total LMP within 1% tolerance."
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: claim_verification
    proposed_action: add_verification
    notes: >-
      The probe should compute per-bus LMP components (energy = slack bus LMP,
      congestion = row of PTDF * shadow_prices, loss = total - energy - congestion)
      and verify the three sum to within 1% of the total LMP for each bus. If PyPSA's
      `transmission_losses` formulation does not expose a standalone congestion
      component separately from the loss component, this is itself a finding about
      LMP decomposition API completeness.

  - id: pypsa-F04
    category: test_design_gap
    severity: medium
    test_ids: [A-9]
    title: "A-9 SCOPF uses only 19 of 46 branches due to infeasibility — reduced contingency set may not stress the formulation adequately"
    description: >-
      The A-9 protocol specifies "DC OPF with N-1 contingency flow constraints on TINY
      (all 46 branches)." The result uses a progressive fallback: all 35 lines tried first
      (infeasible), then lines <70% utilization (infeasible), then lines <50% utilization
      (feasible with 19 lines). The test passes on this 19-line reduced contingency set.
      The transformer contingency exclusion (11 of 46 branches not accepted by the API)
      is a genuine tool limitation. The infeasibility reduction is a network topology
      characteristic: 2 lines are already at 100% utilization in the base case, so any
      N-1 contingency set that includes them creates infeasibility. The resulting SCOPF
      (19 contingencies from 35 total lines) may not adequately stress the formulation
      relative to the protocol's intent of all 46 branches.
    evidence:
      - file: evaluations/pypsa/results/expressiveness/A-9_scopf.md
        excerpt: "The test used a progressive fallback strategy: all 35 lines -> lines <70%\nutilization -> lines <50% utilization. The SCOPF became feasible with 19\nlines at <50% base-case utilization."
      - file: evaluations/pypsa/results/eval-config.yaml
        excerpt: "description: \"Solve DC OPF with N-1 contingency flow constraints on TINY (all 46 branches)\""
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test
    notes: >-
      The test design should either (a) specify a contingency subset that is
      known to be feasible for a well-functioning SCOPF (e.g., contingencies
      excluding branches already at >90% base-case utilization), or (b) change
      the pass condition to permit progressive fallback with documentation of
      the fallback depth. As written, the "all 46 branches" specification is
      impossible to satisfy on the IEEE 39-bus at standard loading for any tool.

  - id: pypsa-F05
    category: infrastructure_friction
    severity: medium
    test_ids: [G-FNM-1, G-FNM-2]
    title: "G-FNM-1 PSS/E ingestion failure is an architectural format gap, not a power system capability gap"
    description: >-
      G-FNM-1 fails because PyPSA has no PSS/E import path. This is correctly recorded
      as a format gap. However, the downstream consequence — G-FNM-2 is blocked and
      cannot assess field coverage — means the evaluation cannot measure PyPSA's data
      model fidelity via the PSS/E path. This blocks a meaningful dimension of comparison
      between tools. Tools that happen to support PSS/E ingestion get field coverage
      assessment; tools that don't (like PyPSA) get a pass on that dimension via the
      MATPOWER fallback. The failure is real but the framing in the rubric conflates
      data format support (supply chain/interoperability concern) with power system
      modeling capability (expressiveness concern).
    evidence:
      - file: evaluations/pypsa/results/fnm_ingestion/G-FNM-1_intermediate_format_ingestion.md
        excerpt: "PyPSA v1.1.2 has no native capability to read PSS/E-format data, whether in raw `.raw` format or in the intermediate CSV format derived from PSS/E v31 record types."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: add_test
    notes: >-
      The protocol should include a separate sub-criterion for PSS/E ingestion support
      (as an interoperability/format concern) distinct from the power system modeling
      capability assessed in the rest of the FNM suite. Tools failing G-FNM-1 should
      still receive a complete G-FNM-5 assessment using the MATPOWER fallback path,
      since representability of supplemental data is tool-model-dependent, not
      format-dependent.

  - id: pypsa-F06
    category: extraordinary_claim
    severity: high
    test_ids: [G-FNM-3]
    title: "G-FNM-3 reports 0.0 deviation on 27,862-bus DCPF — perfect agreement with reference is an extraordinary claim"
    description: >-
      G-FNM-3 reports mean deviation = 0.0 deg, max deviation = 0.0 deg for bus voltage
      angles, and mean deviation = 0.0%, max deviation = 0.0% for branch flows across
      27,862 buses and 32,532 branches. The result attributes this to both PyPSA and
      MATPOWER using identical DCPF formulations (b = 1/(x*tap)) and the shared
      matpower_loader applying the same branch status patch. While this explanation
      is plausible, a perfect 0.0 numerical result on a 27,862-bus problem with
      floating-point arithmetic is unusual and warrants verification. The result file
      rounds to 0.0 in its reporting tables — it is unclear whether this represents
      true machine-zero agreement or agreement within the reported decimal precision.
      Additionally, the validation report (validation-report.md) lists G-FNM-3 in
      its Failures table with reason "DCPF verification failed — systematic impedance
      conversion differences via MATPOWER fallback," which contradicts the result
      file's status: pass. This discrepancy indicates the result file was updated
      after the validation report was written and the validation report was not
      regenerated.
    evidence:
      - file: evaluations/pypsa/results/fnm_ingestion/G-FNM-3_dcpf_verification.md
        excerpt: "| Mean deviation | 0.0 deg |\n| Max deviation | 0.0 deg |\n...\n| Mean deviation | 0.0% |\n| Max deviation | 0.0% |"
      - file: evaluations/pypsa/results/validation-report.md
        excerpt: "| G-FNM-3 | DCPF verification failed — systematic impedance conversion differences via MATPOWER fallback |"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification
    notes: >-
      The probe should re-extract the raw numerical deviations (not rounded to display
      precision) and confirm the maximum absolute bus angle deviation and maximum
      branch flow percent deviation. If both PyPSA and MATPOWER use the same numerical
      B-matrix (which is plausible since both trace to matpowercaseframes), exact
      agreement is expected. The probe should also resolve the validation-report
      discrepancy by confirming whether the report reflects the current or a superseded
      result.

  - id: pypsa-F07
    category: misleading_result
    severity: low
    test_ids: [A-11]
    title: "A-11 qualified_pass with blocking workaround is more severe than the qualified_pass label suggests"
    description: >-
      A-11 is scored as qualified_pass with workaround_class=blocking. The synthesis
      describes this as "blocking — no workaround exists." The qualified_pass status
      implies partial success, but the actual result is that distributed slack DC OPF
      is architecturally impossible in PyPSA's optimize() path — not partially supported
      or approximable. The workaround that is reported (distributed slack in n.pf())
      tests a different capability (AC power flow, not DC OPF) under different protocol
      conditions. The qualification language "capability exists in one context (PF) but
      not the other (OPF)" credits PyPSA for a capability that the test explicitly does
      not require. A-11's pass condition specifies "Solve DC OPF on TINY with distributed
      slack (load-proportional)." The AC PF distributed slack result does not satisfy this
      condition and should not count toward the pass.
    evidence:
      - file: evaluations/pypsa/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "status: qualified_pass\nworkaround_class: blocking\n...No Bus-v_ang variable. Distributed slack OPF is NOT achievable."
      - file: evaluations/pypsa/results/eval-config.yaml
        excerpt: "description: \"Solve DC OPF on TINY with distributed slack (load-proportional)\""
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring
    notes: >-
      A-11 should be scored as fail (not qualified_pass) since the protocol's pass
      condition requires distributed slack DC OPF, which is demonstrably impossible
      in PyPSA's optimize() path. Documenting the AC PF distributed slack as an
      observation is appropriate, but it should not convert a fail to a qualified_pass.
      This affects the expressiveness grade calculation.

  - id: pypsa-F08
    category: missing_verification
    severity: low
    test_ids: [A-12]
    title: "A-12 fragile workaround for branch shadow prices is classified as pass — the frailty of the extraction path creates result credibility risk"
    description: >-
      A-12 extracts branch shadow prices via the internal linopy constraint naming
      convention (n.model.constraints['Line-fix-s-upper'].dual), which the evaluator
      correctly classifies as fragile. Pass condition 1 (congestion reporting) depends
      on these shadow prices: "At least 2 of 24 hours must have >=2 branches with
      non-zero shadow prices." If the internal naming convention changes in future
      PyPSA versions, this extraction will silently fail. More critically, the result
      confirms the documented bug: "The solver log confirms shadow prices were computed
      ('shadow-prices of the constraints ... were not assigned to the network')." The
      test passes on the extracted values, but the documented attribute path
      (n.lines_t.mu_upper) is broken. This is a real bug in the tool, not a workaround
      choice, and the test's pass status depends on working around a documented bug
      rather than a supported API. The overall test status of pass is technically
      correct given the workaround, but the bug should be flagged as a tool defect.
    evidence:
      - file: evaluations/pypsa/results/expressiveness/A-12_multiperiod_dcopf_storage.md
        excerpt: "Branch shadow prices extracted from linopy model constraint duals (`n.model.constraints['Line-fix-s-upper'].dual`) instead of the documented `n.lines_t.mu_upper`/`mu_lower` attributes.\n...Durability: fragile -- depends on the internal linopy constraint naming convention"
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    notes: >-
      The shadow price bug (n.lines_t.mu_upper empty after optimize()) also affects
      A-3 and should be tracked as a tool defect finding. The A-3 result acknowledges
      the same bug. Cross-test consistency suggests this is a systematic issue across
      all OPF solves, not test-specific.

  - id: pypsa-F09
    category: test_design_gap
    severity: medium
    test_ids: [C-4]
    title: "C-SMALL gate triggered by MILP solver scalability causes 7 MEDIUM tests to be skipped — gate design conflates problem type scalability with general scalability"
    description: >-
      The C-SMALL-gate triggers on C-4 (SCUC on 2,000-bus SMALL network) and cascades
      to skip 7 MEDIUM-tier tests: C-1 (DCPF), C-2 (ACPF), C-3 (DC OPF), C-7 (solver
      swap), C-8 (SCOPF), C-9 (PTDF), C-10 (distributed slack). These 7 skipped tests
      cover LP/linear algebra problems, not MILP. PyPSA's failure on C-4 is a MILP
      scalability limitation (HiGHS single-threaded cannot solve 39,168-variable
      MILP within 600s). The tool's LP and power flow scalability — which C-1, C-2,
      C-3 would have measured — is demonstrably good: C-5 passes ACPF on 10,000-bus
      MEDIUM, and G-FNM-3 passes DCPF on 27,862-bus LARGE. The gate design prevents
      collecting LP/PF scalability evidence for tools that fail MILP at SMALL scale,
      even though LP/PF scalability is an independent capability.
    evidence:
      - file: evaluations/pypsa/results/synthesis.md
        excerpt: "C-1 | MEDIUM | skip | C-SMALL-gate | -- | -- | --\nC-2 | MEDIUM | skip | C-SMALL-gate | -- | -- | --\nC-3 | MEDIUM | skip | C-SMALL-gate | -- | -- | --"
      - file: evaluations/pypsa/results/scalability/C-4_scuc_small.md
        excerpt: "The MILP formulation has 347,272 rows, 129,168 columns (39,168 binary variables), and 1,689,312 nonzeros. After presolve: 85,868 rows, 73,378 columns (25,474 binary), 957,923 nonzeros. HiGHS could not solve the root LP relaxation within the 600-second time limit."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test
    notes: >-
      The C-SMALL gate should be specific to MILP scalability (C-4). LP/PF MEDIUM
      tests (C-1, C-2, C-3, C-7, C-9, C-10) should run regardless of C-4 outcome.
      Only MILP MEDIUM tests (C-8 SCOPF has LP foundation, but C-4-equivalent SCUC
      at MEDIUM would be the true gate) should be conditional on C-4. This affects
      the scalability grade for PyPSA (and potentially other tools that fail MILP
      at SMALL but have strong LP/PF scalability).

  - id: pypsa-F10
    category: missing_verification
    severity: low
    test_ids: [G-FNM-1]
    title: "G-FNM-1 failure determination based on API inspection without code execution"
    description: >-
      The G-FNM-1 result states: "No test script was written. The verification was an
      API surface inspection confirming the absence of any PSS/E ingestion path in
      PyPSA's public interface." The result correctly identifies that PyPSA has no
      PSS/E ingestion, and the conclusion is almost certainly correct. However, the
      protocol's pass condition specifies that the tool should attempt to parse the
      intermediate CSV tables and record failure_reason. An API inspection rather than
      an actual parse attempt means the failure mode (e.g., column schema mismatch vs.
      format not recognized vs. silent empty import) is not confirmed by execution.
      This is a minor issue since the conclusion is correct, but it diverges from the
      protocol's verification standard.
    evidence:
      - file: evaluations/pypsa/results/fnm_ingestion/G-FNM-1_intermediate_format_ingestion.md
        excerpt: "No test script was written. The verification was an API surface inspection confirming the absence of any PSS/E ingestion path in PyPSA's public interface."
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    notes: >-
      A minimal probe could attempt import_from_csv_folder on the intermediate CSV
      directory and capture the actual error message. This would confirm the failure
      mode and produce an executable record consistent with protocol standards.

  - id: pypsa-F11
    category: low_signal
    severity: low
    test_ids: [G-1, G-2, G-3]
    title: "Gate ingestion tests G-1/G-2/G-3 have low discriminative value — any functioning tool passes"
    description: >-
      The gate tests (G-1, G-2, G-3) test only that a tool can load MATPOWER .m files
      and return correct bus/branch/generator counts. These tests produce pass/fail
      outcomes that would be identical for any tool with a MATPOWER importer. The only
      discriminating information is the loader method used and any data quality issues
      encountered. G-1 does note a meaningful finding (generator cost data NOT imported
      by import_from_pypower_ppc), but this finding is not captured in the gate test
      status — it affects downstream tests (A-3 onward) but is not part of the gate
      outcome. The gate tests serve their purpose as a minimum bar, but they add no
      signal to the cross-tool comparison.
    evidence:
      - file: evaluations/pypsa/results/gate/G-1_ingest_tiny.md
        excerpt: "Generator cost data NOT imported — `import_from_pypower_ppc` does not support gencost"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    notes: >-
      The gate tests could include a data quality check — specifically, whether
      generator cost data is correctly imported. This is a meaningful discriminator
      (PyPSA's import_from_pypower_ppc silently drops gencost, requiring the shared
      loader patch) that currently falls between the gate pass/fail and the
      expressiveness tests.

  - id: pypsa-F12
    category: scoring_inconsistency
    severity: low
    test_ids: [A-6, A-11]
    title: "Inconsistent qualified_pass criteria: A-6 (stable workaround) and A-11 (blocking) receive the same status label"
    description: >-
      Both A-6 and A-11 are classified as qualified_pass, but the workaround_class
      values are "stable" (A-6: undocumented but functional two-stage pattern) and
      "blocking" (A-11: architectural impossibility). The schema allows
      workaround_class to distinguish these, but both map to the same status outcome
      (qualified_pass), which masks the severity difference when statuses are counted
      or aggregated. A-6 is a genuine partial pass: the capability exists with a
      documented approach but without a convenience API. A-11 is effectively a fail
      in the OPF context. This inconsistency in status assignment will propagate to
      cross-tool comparisons where qualified_pass is treated as a homogeneous outcome.
    evidence:
      - file: evaluations/pypsa/results/synthesis.md
        excerpt: "| A-6 | TINY | qualified_pass | -- | stable | 3.0s | 453 |\n| A-11 | TINY | qualified_pass | -- | blocking | 1.9s | 326 |"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring
    notes: >-
      The schema should distinguish between workaround_class=blocking (effectively
      a fail, should score as fail or fail_with_context) and workaround_class=stable
      (partial pass with low-friction workaround). This affects the expressiveness
      grade and cross-tool comparisons. See also pypsa-F07.

extraordinary_claims:
  - test_id: G-FNM-3
    claim: >-
      PyPSA achieves 0.0 mean and max deviation (both bus angles and branch flows)
      compared to the MATPOWER reference on a 27,862-bus network.
    concern: >-
      Perfect 0.0 agreement on a floating-point computation at 27,862-bus scale is
      unusual. The result tables round to one decimal place for bus angles and one
      decimal place for branch flow percentages, so the reported 0.0 may reflect
      display rounding rather than true machine-zero agreement. Additionally,
      validation-report.md lists this test as a failure (status superseded by result
      file update), creating ambiguity about whether the reported pass reflects the
      final or an intermediate evaluation state.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: convergence_check
