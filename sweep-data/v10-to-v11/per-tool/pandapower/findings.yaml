  - id: pandapower-F10
    category: scoring_inconsistency
    severity: medium
    test_ids: [B-1, B-9]
    title: B-9 PTDF extraction via internal net._ppc scores as clean pass while B-1 accessing _ppc for duals scores as fragile qualified_pass
    description: >
      B-9 (PTDF extraction) is scored as a clean pass (workaround_class: null) even
      though it requires accessing net._ppc["bus"] and net._ppc["branch"] to get the
      PYPOWER bus/branch arrays. The result notes "Access to these arrays requires the
      internal net._ppc attribute (set after solving DCPF), but this is the standard
      pandapower pattern for accessing PYPOWER-level data." In contrast, B-1 (custom
      constraints) is scored as qualified_pass/fragile partly because it requires
      capturing data from the PYPOWER result dict before pandapower discards it.
      Both tests access the same _ppc internal structure, but B-9 is treated as
      no-workaround while B-1 is fragile. The distinction is that B-9 only reads from
      _ppc (post-solve, stable) while B-1 intercepts _ppc during solve (requiring
      monkey-patching), but this distinction is not made explicit in the scoring rationale.
    evidence:
      - file: evaluations/pandapower/results/extensibility/B-9_ptdf_extraction.md
        excerpt: "Workarounds: None required. Access to these arrays requires the internal net._ppc attribute (set after solving DCPF), but this is the standard pandapower pattern for accessing PYPOWER-level data."
      - file: evaluations/pandapower/results/extensibility/B-1_custom_constraints.md
        excerpt: "Workaround: Replicated pandapower's internal _optimal_powerflow function to inject a PYPOWER userfcn callback and capture the PYPOWER result dict. Durability: fragile."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring
    # Proposed: Explicitly define the line between "standard pandapower pattern for
    # internal access" (acceptable, no-workaround) and "fragile internal intercept"
    # (workaround-fragile). Reading post-solve _ppc arrays should be documented as
    # a stable pattern; intercepting the solve pipeline should remain fragile.

  - id: pandapower-F11
    category: missing_verification
    severity: low
    test_ids: [B-3]
    title: B-3 contingency sweep counts every DCPF call as converged but connectivity may mask topology errors
    description: >
      B-3 reports "3,276 contingency cases, 100% converged." However, pandapower's
      DCPF is a direct linear solve that always "converges" (the system Ax=b either
      has a solution or the network is disconnected). The convergence rate is checked
      via check_connectivity=True in the rundcpp call, which raises an error for
      disconnected networks. The 100% figure therefore reflects "no disconnection
      errors" rather than "physically meaningful convergence." For cases with load
      loss (924 of 3,276), the DCPF may produce solution values for the connected
      components while ignoring the disconnected load — which is correct behavior but
      means the result includes some trivial cases. This is an accurate characterization
      of DCPF behavior but is not explicitly noted in the result.
    evidence:
      - file: evaluations/pandapower/results/extensibility/B-3_contingency_sweep.md
        excerpt: "Converged cases: 3,276 (100%) | Cases with load loss: 924 (28.2%)"
      - file: evaluations/pandapower/results/extensibility/B-3_contingency_sweep.md
        excerpt: "Ran pp.rundcpp(net, check_connectivity=True), detected unsupplied buses via top.unsupplied_buses(net)"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    # Proposed: Protocol should clarify that for DCPF contingency sweeps, "converged"
    # means "direct solve completed on connected components" and should require
    # distinguishing this from ACPF-style iterative convergence.

  - id: pandapower-F12
    category: test_design_gap
    severity: medium
    test_ids: [A-11]
    title: Silent **kwargs absorption is a test-design boundary case — FAIL and feature-absent-with-misleading-API are distinct failure modes
    description: >
      A-11 fails because pandapower does not support distributed slack OPF. However,
      the failure mode is more nuanced than simple feature absence: rundcopp() silently
      accepts distributed_slack=True via **kwargs, produces identical results to
      single-slack, and raises no warning. This is qualitatively different from a tool
      that raises NotImplementedError (unambiguous absence) and different from a tool
      that actually implements the feature. The protocol currently has no scoring
      category for "feature absent with misleading API behavior" — it records the
      same FAIL as a tool that raises an error. The misleading API could cause real
      users to believe the feature is active, which is a safety concern for production
      use. The A-11 result correctly documents this, but the FAIL status does not
      capture the severity distinction.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "rundcopp() accepts arbitrary **kwargs and silently ignores distributed_slack=True without raising an error or warning. This could mislead users into thinking the feature is active."
      - file: evaluations/pandapower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "OPF LMP comparison: LMPs are identical across all 39 buses. Difference: 0.0 at every bus."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring
    # Proposed: Add a sub-category for fails: "absent" (tool raises error or lacks
    # function) vs "silent-mismatch" (tool accepts parameter, runs, but produces
    # incorrect results). Silent-mismatch should carry a penalty in accessibility
    # scoring beyond the expressiveness FAIL.

  - id: pandapower-F13
    category: infrastructure_friction
    severity: medium
    test_ids: [G-FNM-1, G-FNM-3, G-FNM-4]
    title: FNM MATPOWER fallback path required for all pandapower FNM tests — tests measure format-compatibility, not pandapower capability
    description: >
      pandapower has no native intermediate CSV ingestion capability. All FNM Suite G
      tests use the MATPOWER PPC fallback path (matpowercaseframes.CaseFrames + from_ppc).
      This means the FNM tests for pandapower are measuring the quality of the
      MATPOWER fallback preprocessing rather than pandapower's own data model. The
      G-FNM-3 failure (localized 596.6% flow deviation) is attributed to "the MATPOWER
      PPC import path's handling of specific impedance details" — which may not be a
      pandapower problem at all. The G-FNM-4 ACPF infeasibility is partly attributed
      to "PPC import path loses AC-critical transformer data." A tool with native CSV
      import might handle these cases differently. The FNM tests therefore measure
      pandapower's performance on a preprocessed, format-converted version of the FNM
      rather than on the FNM directly.
    evidence:
      - file: evaluations/pandapower/results/fnm_ingestion/G-FNM-1_intermediate_ingestion.md
        excerpt: "input_path: matpower"
      - file: evaluations/pandapower/results/fnm_ingestion/G-FNM-3_dcpf_verification.md
        excerpt: "pandapower has no native CSV import capability. The MATPOWER PPC format is the standard programmatic entry point."
      - file: evaluations/pandapower/results/synthesis.md
        excerpt: "The ACPF non-convergence is attributable to a combination of factors: 1. Data ingestion path limitations. pandapower ingests the FNM via the MATPOWER PPC path, which flattens transformer-specific data."
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: add_test
    # Proposed: G-FNM test results for tools using the MATPOWER fallback path should
    # be tagged with a path_type field (native_csv | matpower_fallback) so cross-tool
    # comparison of FNM results appropriately accounts for the preprocessing step.

extraordinary_claims:
  - test_id: A-3
    claim: "All 46 branches have non-zero shadow prices with 70% branch derating on the 39-bus TINY network"
    concern: >
      In a well-posed DC OPF on a 39-bus network with 46 branches and 10 generators,
      having every single branch simultaneously at its flow limit (all 46 binding) is
      physically unexpected. Interior-point solvers can produce small non-zero duals
      on inactive constraints due to complementary slackness relaxation. Only 7 branches
      are reported above 95% loading, which is inconsistent with all 46 having binding
      shadow prices. The threshold for "non-zero" shadow price is not reported.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: convergence_check
    # Probe: Extract branch shadow prices with an explicit magnitude threshold
    # (|dual| > 1e-4 or > 0.1 $/MWh), compare against branch loading_percent,
    # and verify that claimed-binding branches are actually at or near flow limit.
    # Expected: 7-15 branches binding (matching the 7 branches >95% loading),
    # not all 46.

  - test_id: B-4
    claim: "240 DC OPF solves at 22.3 ms/solve with 100% convergence rate across all 20 scenarios x 12 hours"
    concern: >
      22.3 ms per DC OPF solve on a 39-bus network is physically reasonable. The
      concern is the 100% convergence rate across scenarios with differentiated costs
