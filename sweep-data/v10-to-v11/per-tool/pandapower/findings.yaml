findings:
  - id: pandapower-F01
    category: test_design_gap
    severity: high
    test_ids: [C-4, C-1, C-2, C-3, C-5, C-7, C-8, C-9, C-10]
    title: C-SMALL gate design conflates feature absence with scale failure, muting 8 MEDIUM tests
    description: >
      The protocol requires C-4 (SCUC on SMALL) to pass before unlocking MEDIUM-tier
      scalability tests. For pandapower, C-4 fails because SCUC is absent from the
      tool's scope, not because of any scale limitation. This design choice causes 8
      MEDIUM tests — covering DCPF, ACPF, DC OPF, solver swap, SCOPF, PTDF, and
      distributed-slack OPF at scale — to be reported as skipped rather than executed.
      The tool demonstrably handles DCPF at 28K buses in 0.4 s (G-FNM-3) and ACPF at
      2K buses in 1.3 s (C-5 SMALL), yet these observations cannot be compared across
      tools at the MEDIUM tier because the gate design blocks execution. The net effect
      is that the scalability grade for a tool with a narrow feature scope is always
      under-evidenced, regardless of its actual scale performance within its scope.
    evidence:
      - file: evaluations/pandapower/results/scalability/C-4_scuc_small.md
        excerpt: "Skipped because Suite C SMALL gate failed (C-4 failed with blocked_by: A-5). The SMALL gate failure was a cascaded failure from A-5 (SCUC unsupported), not a scale-related failure."
      - file: evaluations/pandapower/results/scalability/C-1_dcpf_medium.md
        excerpt: "Result: SKIP — Skipped because Suite C SMALL gate failed (C-4 failed with blocked_by: A-5)."
      - file: evaluations/pandapower/results/synthesis.md
        excerpt: "8 MEDIUM-tier tests skipped due to C-SMALL-gate; no actual scale failures observed; FNM DCPF solved 28K buses in 0.4s"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test
    # Redesign: C-SMALL gate should only block MEDIUM tests that *depend* on the
    # failed feature (e.g., C-4 fail blocks C-SCUC-MEDIUM). Feature-agnostic MEDIUM
    # tests (C-1 DCPF, C-2 ACPF, C-3 DC OPF) should be independently runnable.

  - id: pandapower-F02
    category: missing_verification
    severity: medium
    test_ids: [A-2, C-5]
    title: ACPF convergence residual not verifiable — protocol accepts private-attribute iteration count as verification
    description: >
      The A-2 pass condition requires the convergence residual to be "reported and
      below the tool's stated tolerance." pandapower does not expose the final NR
      residual as a scalar from the public API; the exact mismatch value is not stored
      in any result attribute. The test records "convergence_residual: null" in the
      frontmatter and notes "below 1e-8 (tolerance_mva setting; exact value not
      extractable)." Iteration count (4) is accessible only via the private
      net._ppc["iterations"] attribute. The pass is accepted on the basis of 100%
      of buses diverging from the flat-start 1.0 pu, which demonstrates convergence
      indirectly but does not satisfy the letter of the pass condition. The tolerance_mva
      parameter itself has an unfixed unit-interpretation bug (issue #2750) that is noted
      but not flagged as a qualification.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-2_acpf.md
        excerpt: "Convergence residual: below 1e-8 (tolerance_mva setting; exact value not extractable)"
      - file: evaluations/pandapower/results/expressiveness/A-2_acpf.md
        excerpt: "Note on tolerance_mva: pandapower documents this parameter as MVA but internally compares against per-unit mismatches (known bug #2750, unfixed in v3.4.0)."
      - file: evaluations/pandapower/results/observations/convergence-quality-expressiveness-A-2_acpf.md
        excerpt: "pandapower's Newton-Raphson solver reports iteration count via net._ppc['iterations'] (private attribute) but does not expose the final convergence residual as a scalar."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: add_verification
    # Proposed: Protocol should accept indirect convergence evidence (voltage profile
    # divergence from flat start + iteration count) as sufficient when the tool does
    # not expose a residual scalar, documenting this as a diagnostic quality limitation
    # rather than treating residual-absence as a pass-condition gap.

  - id: pandapower-F03
    category: misleading_result
    severity: medium
    test_ids: [A-3]
    title: DC OPF branch shadow prices extracted from internal _ppc structure, but result counted as "no workaround"
    description: >
      A-3 is scored as a clean pass with workaround_class: null. The pass condition
      requires shadow prices (dual values on flow limits) to be "extractable." The
      result shows LMPs are available via the public res_bus.lam_p column, which is
      correctly labeled as no-workaround. However, branch shadow prices (MU_SF/MU_ST)
      are extracted from net._ppc["branch"][:, 13:15] — a private internal PYPOWER
      array requiring knowledge of PYPOWER column indices. The result text notes "Branch
      shadow prices require accessing the internal net._ppc structure" but still counts
      the test as no-workaround. The synthesis reiterates "OPF duals discarded during
      result extraction" as an arch-quality finding. This is accurately documented but
      the scoring does not reflect the friction involved in extracting branch duals.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-3_dcopf.md
        excerpt: "Branch shadow prices: Extracted from net._ppc['branch'][:, 13:15] (MU_SF, MU_ST columns). With 70% derating, all 46 branches have non-zero shadow prices."
      - file: evaluations/pandapower/results/expressiveness/A-3_dcopf.md
        excerpt: "Branch shadow prices require accessing the internal net._ppc structure, but the test's pass condition only requires LMP/shadow price extractability, which is satisfied by the public API."
      - file: evaluations/pandapower/results/synthesis.md
        excerpt: "OPF duals discarded during result extraction: The 6-layer architecture is clean, but constraint multipliers and shadow prices from the PYPOWER result dict are dropped during DataFrame conversion (B-6, severity: medium)"
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring
    # Proposed: Pass condition for A-3 should distinguish between LMP extraction
    # (public API) and branch dual extraction (internal API), scoring the branch
    # dual extraction as a mild workaround rather than no-workaround.

  - id: pandapower-F04
    category: network_insufficiency
    severity: medium
    test_ids: [A-11, B-8]
    title: Distributed slack tests on 39-bus TINY network — single slack bus and no physical evidence of LMP sensitivity
    description: >
      A-11 (distributed slack OPF) and B-8 (reference bus configuration) both run on
      the 39-bus TINY network. A-11 fails because pandapower does not support distributed
      slack OPF — a correct and well-supported finding. However, B-8's comparative LMP
      analysis would be poorly designed even for a capable tool: with only 1 ext_grid
      (slack) in the base model, the "three slack configurations" test manually
      reconstructs the network with different element types. For distributed slack
      specifically, the TINY network has no quantitative evidence that LMPs differ in
      a "physically consistent manner" because the feature is absent; the protocol's
      pass condition for A-11 requires LMP comparison against single-slack results —
      impossible to verify when the feature is missing. The network size itself is not
      the core issue, but a network with only one existing slack element limits the
      ability to stress-test slack configuration behavior for tools that do support it.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "LMPs are identical across all 39 buses. The distributed_slack=True kwarg is silently accepted by rundcopp() via **kwargs but has zero effect on the PYPOWER optimization."
      - file: evaluations/pandapower/results/extensibility/B-8_reference_bus_config.md
        excerpt: "Maximum LMP change: 8.58 $/MWh (between configs 1 and 2/3)"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: add_test
    # Proposed: A-11 pass condition should clarify that for tools not supporting
    # distributed slack OPF, the test measures API transparency (does the tool
    # surface a clear error or silently absorb the parameter?) rather than LMP
    # comparison. A "silent kwarg absorption" outcome should have an explicit scoring
    # category distinct from "feature not implemented."

  - id: pandapower-F05
    category: missing_verification
    severity: high
    test_ids: [A-3, A-9]
    title: A-3 binding branch count inflated — all 46 branches reported as shadow-price-nonzero under 70% derating
    description: >
      A-3's pass condition requires "at least 2 branches with non-zero shadow prices
      (binding flow constraints)" with 70% derating. The pandapower result reports
      "Binding branches: 46 of 46" — every branch has a nonzero shadow price. This
      is anomalous: in a well-posed DC OPF on a 39-bus system with differentiated
      costs, far fewer than all 46 branches would typically be at their flow limit
      simultaneously. A possible explanation is that the PYPOWER interior-point solver
      returns small nonzero duals on inactive constraints (numerical noise) rather
      than true structural binding. The result does not distinguish between genuinely
      binding constraints and near-zero duals, and there is no reported threshold for
      what qualifies as a "non-zero shadow price." The test passes because the minimum
      threshold (2 binding) is easily met, but the 46-of-46 result is suspicious and
      was not investigated further.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-3_dcopf.md
        excerpt: "Binding branches: 46 of 46 | Lines > 95% loading: 7"
      - file: evaluations/pandapower/results/expressiveness/A-3_dcopf.md
        excerpt: "Branch shadow prices: Extracted from net._ppc['branch'][:, 13:15] (MU_SF, MU_ST columns). With 70% derating, all 46 branches have non-zero shadow prices, far exceeding the 2-branch minimum threshold."
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification
    # Probe: Re-run A-3 DC OPF, extract branch shadow prices with an explicit
    # threshold (e.g., |dual| > 1e-4 $/MWh), compare against the loading_percent
    # column for the same branches, and verify that shadow-price-nonzero branches
    # are actually at or near (>99%) their thermal limit.

  - id: pandapower-F06
