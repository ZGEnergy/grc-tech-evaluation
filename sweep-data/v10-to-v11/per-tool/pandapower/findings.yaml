  - id: pandapower-F07
    category: test_design_gap
    severity: medium
    test_ids: [A-5, A-6, A-9, A-10, A-11, A-12]
    title: Six expressiveness tests are structural scope assessments, not capability probes — all confirm tool-design-boundary in same way
    description: >
      Five of the six expressiveness failures (A-5 SCUC, A-9 SCOPF, A-10 Lossy OPF,
      A-11 Distributed Slack OPF, A-12 Multi-Period Storage OPF) follow the same
      pattern: the test checks for a feature that is architecturally outside pandapower's
      scope as a steady-state network analysis tool, confirms its absence by API
      inspection, and correctly records a blocking fail. While each failure is accurate
      and correctly scored, the tests function as scope boundary audits rather than
      capability probes. The timing entries for these tests (0.75–2.07 s) are
      "import and capability check only" — not solves — and the LOC (73–338) reflects
      the length of the audit code rather than any implemented capability. The cumulative
      effect is that 60% of expressiveness tests are measuring what pandapower is not,
      rather than how well it does what it claims to do. The remaining 4 tests (A-1,
      A-2, A-3, A-4) that pandapower passes are all within its declared scope and
      pass cleanly. This is a protocol-design issue, not an evaluator error.
    evidence:
      - file: evaluations/pandapower/results/expressiveness/A-5_scuc.md
        excerpt: "Wall-clock: 0.79 s (import and capability check only — no solve attempted)"
      - file: evaluations/pandapower/results/expressiveness/A-9_scopf.md
        excerpt: "Wall-clock: 0.83 s (includes network loading, base-case DC OPF solve, and contingency analysis attempt)"
      - file: evaluations/pandapower/results/expressiveness/A-11_distributed_slack_opf.md
        excerpt: "Result: FAIL — rundcopp() accepts arbitrary **kwargs and silently ignores distributed_slack=True without raising an error or warning."
      - file: evaluations/pandapower/results/synthesis.md
        excerpt: "5 independent blocking failures (SCUC, SCOPF, lossy OPF, distributed slack OPF, multi-period OPF)"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: add_test
    # Proposed: Add a sub-dimension or secondary scoring axis for "expressiveness within
    # declared scope" to distinguish scope-boundary tools (pandapower, matpower) from
    # scope-broader tools (pypsa, gridcal). The current protocol scores all failures
    # equally regardless of whether the tool claims the capability.

