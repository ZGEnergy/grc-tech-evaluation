  - id: gridcal-F13
    category: missing_verification
    severity: medium
    test_ids: [A-9, C-8]
    title: SCOPF convergence not verified by residual — only converged flag and binding branch count reported
    description: >
      A-9 (SCOPF on TINY) and C-8 (SCOPF on MEDIUM) both report pass based on the tool's
      convergence flag and qualitative dispatch comparison. No residual or optimality gap
      is reported for either test. The protocol specifies convergence verification for OPF
      results, but no MIP gap or LP duality gap is extracted. For SCOPF on MEDIUM specifically,
      the near-zero differences from base-case DCOPF (to 1e-8 precision) are consistent with
      a correctly solved LP — but also consistent with the solver terminating early on a
      numerically ill-conditioned problem with a trivial incumbent. The lack of a reported
      optimality gap prevents distinguishing these cases.
    evidence:
      - file: evaluations/gridcal/results/scalability/C-8_scopf_scale_MEDIUM.md
        excerpt: "convergence_residual: null. convergence_iterations: null. The SCOPF produces results nearly identical to the base-case DCOPF. The maximum dispatch difference is 2.67e-07 MW."
      - file: evaluations/gridcal/results/expressiveness/A-9_scopf.md
        excerpt: "convergence_residual: null. convergence_iterations: null. SCOPF solve time: 0.067 s."
    cross_tool_relevance: likely
    probe_recommended: false
