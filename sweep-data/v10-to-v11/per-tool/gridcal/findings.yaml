extraordinary_claims:
  - test_id: A-3
    claim: >
      DCOPF passes with 7 binding branches and valid LMPs despite one branch showing 112%
      loading — attributed to soft-constraint formulation without explicit verification.
    concern: >
      If GridCal's DCOPF uses soft constraints (overload slacks) as a design choice, all
      branch thermal limits in the evaluation are unenforced hard constraints. This would
      mean every DCOPF/SCOPF/SCUC pass result may reflect soft-constrained optimization
      rather than physically feasible dispatch. The D-4 error quality test confirms that
      zero-rated branches are handled via soft constraints. The extent to which the base
      DCOPF formulation enforces hard limits vs soft limits is not documented and was not
      independently verified.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: formulation_audit

  - test_id: G-FNM-3
    claim: >
      326 branches with deviations up to 562,955% classified as "formulation_difference"
      (B-matrix simplification for transformer taps) rather than data ingestion error,
      earning a qualified_pass.
    concern: >
      The four top-5 deviating branches labeled "Line" (not transformer) cast doubt on
      the purely transformer-tap explanation. Extreme flow values (e.g., 111,582 MW vs
      reference -19.82 MW, a factor of ~5,630x) on line-type elements suggest possible
      data ingestion corruption or incorrect unit conversion rather than a formulation
      sophistication difference. The classification was made by inference from result
      patterns, not by comparing B-matrix entries or inspecting the numerical circuit
      compilation for those specific branches.
    evidence_quality: weak
    probe_recommended: true
    probe_type: formulation_audit

  - test_id: E-7
    claim: >
      GridCal is claimed to be in operational use at Redeia (Spanish TSO), Schneider
      Electric, and GE Vernova.
    concern: >
      These claims originate from the project's own documentation (research-context.md)
      and are not independently verifiable from public sources. If accurate, they
      substantially offset the bus-factor-1 and no-CI-testing maturity concerns. If
      inaccurate, the maturity grade narrative may be too lenient.
    evidence_quality: weak
    probe_recommended: true
    probe_type: claim_verification
