probes:
  # ── PYPSA ────────────────────────────────────────────────────────────────────
  - id: probe-001
    tool: pypsa
    claim: "G-FNM-3 achieves 0.0 mean and max deviation across all 27,862 buses and 32,532 branches"
    source_test: G-FNM-3
    source_file: evaluations/pypsa/results/gate/fnm_ingestion_results.yaml
    probe_type: convergence_check
    priority: high
    concern: "Perfect 0.0 deviations are display-rounded; raw numerics not captured. validation-report.md lists G-FNM-3 as FAIL (possible superseded state). Need unrounded residuals."
    requires_devcontainer: true

  - id: probe-002
    tool: pypsa
    claim: "A-10 lossy DCOPF LMP decomposition verified via condition (d)"
    source_test: A-10
    source_file: evaluations/pypsa/results/expressiveness/A-10-lossy-dcopf.md
    probe_type: claim_verification
    priority: medium
    concern: "Check (d) verifies LMP change between scenarios, not the required three-component additivity (energy + congestion + loss = total LMP). May pass a weaker criterion."
    requires_devcontainer: true

  # ── PANDAPOWER ──────────────────────────────────────────────────────────────
  - id: probe-003
    tool: pandapower
    claim: "All 46 branches have non-zero shadow prices in A-3 DC OPF"
    source_test: A-3
    source_file: evaluations/pandapower/results/expressiveness/A-3-dcopf-lmp.md
    probe_type: convergence_check
    priority: high
    concern: "Only 7 branches are above 95% loading; interior-point solvers produce numerically small but nonzero duals on inactive constraints. No magnitude threshold applied — 46/46 is internally inconsistent with loading data."
    requires_devcontainer: true

  - id: probe-004
    tool: pandapower
    claim: "DC OPF optimal cost $156,929 is verified convergence"
    source_test: A-3
    source_file: evaluations/pandapower/results/expressiveness/A-3-dcopf-lmp.md
    probe_type: convergence_check
    priority: medium
    concern: "Convergence accepted from boolean flag only; PYPOWER DC OPF does not report iteration count. Dual feasibility not checked (LMP ≈ marginal cost at unconstrained generators)."
    requires_devcontainer: true

  # ── GRIDCAL ──────────────────────────────────────────────────────────────────
  - id: probe-005
    tool: gridcal
    claim: "DCOPF passes on IEEE 39-bus with all branches within limits (A-3)"
    source_test: A-3
    source_file: evaluations/gridcal/results/expressiveness/A-3-dcopf-lmp.md
    probe_type: formulation_audit
    priority: high
    concern: "Result shows 112% loading on one branch. Soft-constraint status (slack variable vs hard limit) not disclosed. Need to confirm whether branch limits are enforced as hard constraints."
    requires_devcontainer: true

  - id: probe-006
    tool: gridcal
    claim: "SCUC commitment schedule reflects binary UC decisions (A-5)"
    source_test: A-5
    source_file: evaluations/gridcal/results/expressiveness/A-5-scuc.md
    probe_type: formulation_audit
    priority: medium
    concern: "Commitment inferred from dispatch threshold (P > 0) rather than binary variable. MIP gap not extractable. Cannot confirm MILP was solved to integrality."
    requires_devcontainer: true

  - id: probe-007
    tool: gridcal
    claim: "G-FNM-3 has 326 branches with deviations up to 562,955% classified as formulation_difference"
    source_test: G-FNM-3
    source_file: evaluations/gridcal/results/gate/fnm_ingestion_results.yaml
    probe_type: formulation_audit
    priority: high
    concern: "Deviations of 562,955% are extreme outliers. Classification as 'formulation_difference' rather than bug needs verification — check whether those branches have transformers or other non-trivial elements."
    requires_devcontainer: false

  - id: probe-008
    tool: gridcal
    claim: "GridCal is in operational use at Redeia, Schneider Electric, and GE Vernova (E-7)"
    source_test: E-7
    source_file: evaluations/gridcal/results/maturity/E-7-user-base.md
    probe_type: claim_verification
    priority: low
    concern: "Adoption claims sourced from project's own documentation. Independent verification (press releases, LinkedIn, conference papers) not attempted."
    requires_devcontainer: false

  # ── POWERMODELS ──────────────────────────────────────────────────────────────
  - id: probe-009
    tool: powermodels
    claim: "SCOPF TINY qualified_pass demonstrates Benders convergence (A-9)"
    source_test: A-9
    source_file: evaluations/powermodels/results/expressiveness/A-9-scopf.md
    probe_type: formulation_audit
    priority: high
    concern: "Network is N-1 infeasible under test load — Benders runs 1 iteration before hitting infeasibility. The key question (does it converge to a secure solution when one exists?) is never answered."
    requires_devcontainer: true

  - id: probe-010
    tool: powermodels
    claim: "SCIP_jll v0.2.1 license is ZIB Academic (F-3) vs Apache 2.0 (F-8)"
    source_test: F-3
    source_file: evaluations/powermodels/results/supply_chain/F-3-dependency-licenses.md
    probe_type: claim_verification
    priority: high
    concern: "Same artifact classified under two incompatible licenses within the same evaluation. Material for supply chain scoring — one of these is wrong."
    requires_devcontainer: false

  - id: probe-011
    tool: powermodels
    claim: "GLPK solves MEDIUM DCOPF in 61.86s where v9 timed out at 300s (C-3)"
    source_test: C-3
    source_file: evaluations/powermodels/results/scalability/C-3-dcopf-medium.md
    probe_type: timing_verification
    priority: medium
    concern: "Speedup unexplained. v10 cost linearization (45.5% of generators) may convert QP to LP (GLPK can handle LP, rejects QP), but this is not confirmed in the result file."
    requires_devcontainer: true

  - id: probe-012
    tool: powermodels
    claim: "PTDF MEDIUM extraction: B-9 cold 106s vs C-9 warm 7.55s (14x ratio)"
    source_test: C-9
    source_file: evaluations/powermodels/results/scalability/C-9-ptdf-medium.md
    probe_type: timing_verification
    priority: low
    concern: "14x difference attributed to Julia JIT. Plausible but should be confirmed — a second cold run of B-9 would distinguish JIT from a genuine computation change."
    requires_devcontainer: true

  # ── POWERSIMULATIONS ─────────────────────────────────────────────────────────
  - id: probe-013
    tool: powersimulations
    claim: "ACPF convergence verified at TINY and SMALL (A-2, C-2)"
    source_test: A-2
    source_file: evaluations/powersimulations/results/expressiveness/A-2-acpf.md
    probe_type: convergence_check
    priority: high
    concern: "Convergence accepted without residual or iteration count. C-2 documents a convergence warning on first call that was silently suppressed. Second call taken as verified."
    requires_devcontainer: true

  - id: probe-014
    tool: powersimulations
    claim: "LMP values require undocumented divide-by-base_power and negate conversion (A-3)"
    source_test: A-3
    source_file: evaluations/powersimulations/results/expressiveness/A-3-dcopf-lmp.md
    probe_type: claim_verification
    priority: medium
    concern: "Unit conversion (divide by base_power, negate) not documented in PowerSystems.jl or PowerSimulations.jl API docs. Cannot confirm LMPs are correctly extracted without independent derivation."
    requires_devcontainer: false

  - id: probe-015
    tool: powersimulations
    claim: "SCUC on 2K-bus network solves in 404s single-threaded (C-4)"
    source_test: C-4
    source_file: evaluations/powersimulations/results/scalability/C-4-scuc-medium.md
    probe_type: timing_verification
    priority: medium
    concern: "404s measured single-threaded on a 32-core machine. Multi-threaded HiGHS (the default) would likely achieve 15-30s, which may change the qualified_pass to a pass for the timing criterion."
    requires_devcontainer: true

  # ── MATPOWER ─────────────────────────────────────────────────────────────────
  - id: probe-016
    tool: matpower
    claim: "GLPK exit-flag bug causes A-5 SCUC to report failure when solve succeeded (A-5, C-4)"
    source_test: A-5
    source_file: evaluations/matpower/results/expressiveness/A-5-scuc.md
    probe_type: claim_verification
    priority: high
    concern: "SCUC solve succeeded (162K variables in 1.1s) but GLP_EMIPGAP mapped to failure cascades into C-4 fail and blanks all 8 MEDIUM scalability tests. A one-line fix should recover the result. Verify the fix actually produces a pass."
    requires_devcontainer: true

  - id: probe-017
    tool: matpower
    claim: "A-9 SCOPF fail is a solver-environment artifact (MIPS singularity, HiGHS unavailable)"
    source_test: A-9
    source_file: evaluations/matpower/results/expressiveness/A-9-scopf.md
    probe_type: formulation_audit
    priority: medium
    concern: "MOST Approach 3 (contingency table) was not attempted. If HiGHS is available in the devcontainer, the fail may be recoverable."
    requires_devcontainer: true

  - id: probe-018
    tool: matpower
    claim: "A-5 SCUC qualified_pass validated on 3-bus bundled test case (not TINY network)"
    source_test: A-5
    source_file: evaluations/matpower/results/expressiveness/A-5-scuc.md
    probe_type: claim_verification
    priority: medium
    concern: "Protocol requires TINY (10-bus, 4-generator). 3-bus case has too few generators to confirm min up/down cycling. Need to run on actual TINY network."
    requires_devcontainer: true
