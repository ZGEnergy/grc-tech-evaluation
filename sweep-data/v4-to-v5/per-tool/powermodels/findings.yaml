  - id: pm-F12
    category: test_design_gap
    severity: medium
    test_ids: [A-7, C-5]
    title: "N-M contingency sweep conflates combinatorial complexity with tool capability"
    description: >
      A-7 TINY passes (1,561 solves in 2.25s) but A-7 MEDIUM and C-5 fail due to
      combinatorial explosion (millions of solve combinations). The test measures the
      mathematical complexity of N-M enumeration at scale rather than the tool's
      contingency analysis capability. N-1 contingency analysis (B-3) scales adequately
      to MEDIUM (50 contingencies in 3.43s). The test design conflates a problem that no
      tool can solve at high order with tool-specific limitations.
    evidence:
      - file: expressiveness/A-7_contingency_sweep_MEDIUM.md
        excerpt: "Result: FAIL ... 333 lines of code ... infeasible at MEDIUM scale due to combinatorial explosion"
      - file: extensibility/B-3_contingency_loop_MEDIUM.md
        excerpt: "pass ... 50 N-1 in 3.43s on MEDIUM"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

