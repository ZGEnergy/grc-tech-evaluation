    title: "SCOPF cost comparison uses incompatible cost functions"
    description: >
      A-9 TINY compares SCOPF objective (1,878.27, linearized cost) to unconstrained DC OPF
      objective (41,263.94, quadratic cost). The result acknowledges this mismatch and focuses
