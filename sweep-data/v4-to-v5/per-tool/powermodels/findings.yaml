findings:
  - id: pm-F01
    category: network_insufficiency
    severity: medium
    test_ids: [A-11]
    title: "Distributed slack LMP validation defeated by uncongested network"
    description: >
      A-11 on both TINY and SMALL produces identical LMPs for single-slack and distributed-slack
      because neither network has binding flow constraints. The distributed slack mechanism is
      structurally implemented but never differentially validated -- the test cannot confirm that
      LMP decomposition responds correctly to the slack distribution under congestion.
    evidence:
      - file: expressiveness/A-11_distributed_slack_opf_TINY.md
        excerpt: "LMP range: 2.5e-6 (nearly uniform) ... The IEEE 39-bus network under uncongested conditions produces nearly uniform LMPs regardless of slack distribution."
      - file: expressiveness/A-11_distributed_slack_opf_SMALL.md
        excerpt: "Max LMP difference: 0.0 (identical) ... no binding flow constraints in the LP-relaxed (linearized cost) DC OPF"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: redesign_test

  - id: pm-F02
    category: misleading_result
    severity: medium
    test_ids: [A-9]
    title: "A-9 SMALL SCOPF uses only 20 of 3,206 contingencies vs protocol's 50 requirement"
    description: >
      The protocol specifies 50 monitored branches for SMALL-scale SCOPF. The evaluation used
      only 20 contingencies (the 20 most-loaded branches). While the SCOPF formulation is correct
      and produces a meaningful security premium (4.74%), the reduced contingency count means the
      test does not meet the stated protocol parameters, potentially understating the difficulty
      of SCOPF at scale.
    evidence:
      - file: expressiveness/A-9_scopf_SMALL.md
        excerpt: "Valid contingencies: 20 (no islanding excluded from top candidates)"
      - file: eval-config.yaml
        excerpt: "A-9 ... SMALL: 50 monitored branches"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pm-F03
    category: extraordinary_claim
    severity: medium
    test_ids: [C-5, C-8]
    title: "Scale tests C-5 and C-8 scored as fail without execution"
    description: >
      C-5 (contingency sweep MEDIUM) and C-8 (SCOPF MEDIUM) were recorded as fails based on
      projected infeasibility estimates, not actual execution. While the estimates are
      physically plausible, the results contain no runtime evidence. The combinatorial
      estimates in C-5 assume worst-case BFS scope without verifying the actual branch count
      at depth 5 on the 10k-bus network.
    evidence:
      - file: scalability/C-5_contingency_sweep_scale_MEDIUM.md
        excerpt: "Result: NOT ATTEMPTED (expected timeout) ... Estimated 500-2,000 branches in scope (depending on seed bus connectivity)"
      - file: scalability/C-8_scopf_scale_MEDIUM.md
        excerpt: "Result: NOT ATTEMPTED (expected timeout) ... ~10,000,000 constraints and ~11,500,000 variables"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: add_verification

  - id: pm-F04
    category: test_design_gap
    severity: high
    test_ids: [A-5, A-6, C-4]
    title: "SCUC/SCED failures conflate tool capability with open-source solver limitations"
    description: >
      A-5 SMALL, A-6 SMALL, and C-4 fail because HiGHS cannot solve the LP relaxation of a
      ~500k constraint MILP within 300s. The evaluation correctly notes this is a solver
      limitation not a PowerModels limitation, but the tests are scored as fails against
      PowerModels. The protocol requires single-threaded open-source solvers, which creates
      a confound: the test measures solver capability at scale rather than tool expressiveness
      or scalability.
    evidence:
      - file: expressiveness/A-5_scuc_SMALL.md
        excerpt: "The timeout is a solver capability issue, not a PowerModels expressiveness issue per se."
      - file: scalability/C-4_scuc_scale_SMALL.md
        excerpt: "HiGHS MIP is not competitive with commercial solvers (Gurobi, CPLEX) at this scale"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pm-F05
    category: scoring_inconsistency
    severity: medium
    test_ids: [A-8, B-4]
    title: "A-8 blocking fail vs B-4 pass creates scoring tension"
    description: >
      A-8 is a blocking fail because PowerModels lacks native stochastic optimization (scenario
      indexing, probability weighting, recourse structure). B-4 passes because the scenario
      wrapping loop works cleanly. The protocol distinguishes these correctly (A-8 tests native
      stochastic support, B-4 tests wrapping capability), but the grade impact is asymmetric:
      A-8 fail pulls Expressiveness down significantly while B-4 pass contributes to a strong
      Extensibility grade. The synthesis correctly handles this, but the extreme score
      divergence on what is operationally the same workflow warrants attention.
    evidence:
      - file: expressiveness/A-8_stochastic_timeseries_TINY.md
        excerpt: "PowerModels.jl does not natively support scenario-indexed stochastic optimization"
      - file: extensibility/B-4_stochastic_wrapping_SMALL.md
        excerpt: "Result: PASS ... Same deepcopy + replicate + solve_mn_opf pattern from TINY works identically at SMALL scale"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: null

  - id: pm-F06
    category: missing_verification
