    title: "Lossy DCOPF MATPOWER reference comparison uses mismatched formulations"
    description: >
      The A-10 protocol requires validation against MATPOWER reference lossy DC OPF solution
      with 1% LMP tolerance. The evaluation could not perform this comparison because the
      MATPOWER reference used lossless DC OPF with post-hoc loss estimation, while PowerModels
      used DCPLLPowerModel (losses in optimization). The result file acknowledges this
      mismatch but the protocol's validation requirement is effectively unmet.
    evidence:
      - file: expressiveness/A-10_lossy_dcopf_lmp_TINY.md
        excerpt: "Direct 1% LMP comparison is not applicable because MATPOWER used lossless DC OPF with post-hoc loss estimation"
    cross_tool_relevance: confirmed
