extraordinary_claims:
  - test_id: C-5
    claim: "N-M contingency sweep at MEDIUM would take 28-70 hours based on extrapolation"
    concern: >
      The estimate assumes 0.2-0.5s per DCPF solve at 10k-bus and 500-2,000 branches in BFS
      scope, but neither the actual BFS scope nor the per-solve time were measured at MEDIUM
      scale. The estimate is an order-of-magnitude projection, not a measurement.
    evidence_quality: weak
    probe_recommended: true
    probe_type: timing_verification

  - test_id: C-8
    claim: "SCOPF at MEDIUM with 500 contingencies would produce ~10M constraints, exceeding solver capacity"
    concern: >
      The constraint count estimate is reasonable but was not verified by attempting model
      construction. It is possible that iterative contingency screening (solve base OPF,
      add violated contingencies) could produce a feasible workflow, as was done at SMALL scale.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: timing_verification

  - test_id: C-10
    claim: "PTDF computation 6.6x faster at 10k-bus than 2k-bus"
    concern: >
      This violates expected O(n^2) to O(n^3) scaling. Attributed to JIT cache effects but
      not verified with a cold-start measurement at MEDIUM scale.
    evidence_quality: weak
    probe_recommended: true
    probe_type: timing_verification
