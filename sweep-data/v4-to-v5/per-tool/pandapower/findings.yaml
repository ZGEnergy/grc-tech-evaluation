findings:
  - id: pandapower-F01
    category: misleading_result
    severity: high
    test_ids: [C-6, B-4]
    title: "Qualified pass with 2.1% solver convergence rate masks practical unusability"
    description: >-
      C-6 and B-4 both report qualified_pass for stochastic DCOPF wrapping, but the
      PYPOWER interior point solver converges on only 5 of 240 solves (2.1%) on the
      SMALL network. A 97.9% failure rate renders the approach practically unusable,
      yet the test outcome is "qualified_pass" with workaround_class "stable". The
      qualification understates the severity -- a user following this result would
      expect the approach to work at scale.
    evidence:
      - file: "scalability/C-6_stochastic_scale.md"
        excerpt: "Converged: 5 (2.1%), Failed: 235 (97.9%)"
      - file: "extensibility/B-4_stochastic_wrapping.md"
        excerpt: "Converged: 5 (2.1%), Failed: 235 (97.9%)"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: adjust_scoring

  - id: pandapower-F02
    category: missing_verification
    severity: medium
    test_ids: [A-3, C-3]
    title: "Uniform LMPs on 10k-bus network suggest no binding constraints -- result lacks verification"
    description: >-
      A-3 and C-3 report uniform LMPs across all 10,000 buses (20.738 everywhere),
      indicating zero congestion on the MEDIUM network. This means the DC OPF is
      effectively unconstrained -- line limits never bind. While this could be a
      property of the ACTIVSg10k case data, it means the test does not actually verify
      that pandapower correctly produces spatially differentiated LMPs from congestion.
      The LMP extraction is verified on a trivial (uncongested) case.
    evidence:
      - file: "expressiveness/A-3_dcopf.md"
        excerpt: "LMP range: 20.738 -- 20.738, LMPs are nearly uniform across all buses"
      - file: "scalability/C-3_dcopf_scale.md"
        excerpt: "LMP max: 20.738, LMP min: 20.738, LMP mean: 20.738"
    cross_tool_relevance: confirmed
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: add_verification

  - id: pandapower-F03
    category: extraordinary_claim
    severity: medium
    test_ids: [B-9, C-9]
    title: "PTDF flow prediction diverges on MEDIUM but test still passes"
    description: >-
      B-9 reports PTDF flow predictions diverge from DCPF results on the 10k-bus
      network (max diff 7.43 pu, mean diff 0.027 pu), far exceeding the 1e-6 tolerance
      in the pass condition. The test passes because the PTDF matrix has correct
      dimensions and structural properties, but the core validation requirement --
      that PTDF-predicted flows match DCPF flows -- fails on MEDIUM. The result is
      classified as qualified_pass but the divergence is attributed to "shunt elements
      and tap-ratio effects" without verification.
    evidence:
      - file: "extensibility/B-9_ptdf_extraction.md"
        excerpt: "Max flow difference: 7.43 pu, Mean flow difference: 0.027 pu"
      - file: "scalability/C-9_ptdf_scale.md"
        excerpt: "Max flow diff (pu): 7.435, Accurate (< 1e-4): No"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification

