extraordinary_claims:
  - test_id: C-6
    claim: "Stochastic DCOPF wrapping approach is a qualified pass despite 2.1% solver convergence rate"
    concern: >-
      A 97.9% solver failure rate makes the approach practically unusable on the SMALL
      network. Calling this a qualified_pass with a "stable" workaround is misleading --
      the loop-based approach works mechanically but produces results for almost no
      scenarios. The convergence rate on TINY should be checked to determine whether this
      is a SMALL-network-specific solver sensitivity or a general PYPOWER OPF fragility.
    evidence_quality: strong
    probe_recommended: true
    probe_type: convergence_check

  - test_id: B-9
    claim: "PTDF matrix is correctly computed despite 7.43 pu max flow prediction error on MEDIUM"
    concern: >-
      The pass condition states flow predictions should match within 1e-6 tolerance.
      The result attributes the divergence to "shunt elements and tap-ratio effects"
      without verifying this explanation. This could indicate a bug in the PTDF
      computation, an incorrect bus injection vector reconstruction, or genuine
      limitations of the DC PTDF on networks with transformers. A probe should
      verify by computing PTDF flows on a subnetwork without transformers.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: formulation_audit

  - test_id: P2-3
    claim: "PYPOWER interior point solver diverges with lambda values ~1e25 when generators decommitted via in_service=False"
    concern: >-
      This suggests fundamental numerical instability in the bundled OPF solver. If
      the solver cannot handle generator decommitment on a 39-bus network, it raises
      questions about all pandapower OPF results where the generator set differs from
      the default case data. The 2.1% convergence rate on C-6 may be a manifestation
      of the same underlying solver fragility.
    evidence_quality: strong
    probe_recommended: true
    probe_type: convergence_check
