  - id: pandapower-F05
    category: scoring_inconsistency
    severity: medium
    test_ids: [B-8]
    title: "Distributed slack silently ignored in OPF -- qualified_pass vs A-11 fail inconsistency"
    description: >-
      B-8 gives qualified_pass for reference bus configuration even though config (c)
      -- distributed slack OPF -- produces identical results to single slack (the
      parameter is silently ignored). Meanwhile A-11 correctly fails pandapower for
      lacking distributed slack OPF. The B-8 qualified_pass is justified by configs
      (a) and (b) succeeding, but the result could mislead readers into thinking
      distributed slack OPF is partially functional when it is not functional at all.
    evidence:
      - file: "extensibility/B-8_reference_bus_config.md"
        excerpt: "Config (c) produced identical results to (a), suggesting distributed slack in OPF may reduce to single-slack behavior"
      - file: "expressiveness/A-11_distributed_slack_opf_TINY.md"
        excerpt: "FAIL -- rundcopp() API does not expose distributed slack formulation"
