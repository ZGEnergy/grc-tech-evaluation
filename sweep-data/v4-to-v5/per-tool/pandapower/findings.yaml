  - id: pandapower-F07
    category: infrastructure_friction
    severity: low
    test_ids: [A-3, C-3, C-7]
    title: "Solver lock-in to PYPOWER prevents protocol-specified multi-solver comparison"
    description: >-
      The protocol specifies HiGHS/GLPK for DC OPF tests, but pandapower's rundcopp()
      exclusively uses PYPOWER's interior point solver. This is an architectural
      property of the tool, not a test infrastructure issue, but it means several
      protocol-specified comparisons cannot be performed. C-7 (solver swap) correctly
      fails, and C-3 cannot fulfill its multi-solver comparison requirement.
    evidence:
      - file: "scalability/C-7_solver_swap.md"
        excerpt: "pandapower's rundcopp() exclusively uses PYPOWER's built-in interior point solver"
      - file: "scalability/C-3_dcopf_scale.md"
        excerpt: "HiGHS: N/A -- not available, GLPK: N/A -- not available"
    cross_tool_relevance: none
    probe_recommended: false
    probe_type: null
    proposed_action: null

