extraordinary_claims:
  - test_id: C-9
    claim: "PTDF matrix is usable despite 743 MW flow prediction mismatch on MEDIUM"
    concern: >
      A 743 MW maximum absolute difference between PTDF-predicted flows and DCPF-solved
      flows suggests either a bug in multi-island handling or fundamentally different
      assumptions between the two solve paths. The claim that the PTDF is "usable for
      relative sensitivity analysis" despite this mismatch needs verification.
    evidence_quality: moderate
    probe_recommended: true
    probe_type: convergence_check

  - test_id: A-10
    claim: "Loss approximation produces physically meaningful LMPs"
    concern: >
      The TINY loss-inclusive LMP spread is only 0.000031 $/MWh, which is at the edge of
      numerical noise. No MATPOWER cross-validation was performed as required by the
      protocol. The SMALL result shows a wider spread (0.172 $/MWh) but still lacks
      reference validation.
    evidence_quality: weak
    probe_recommended: true
    probe_type: claim_verification

  - test_id: D-1
    claim: "Install to first solve takes 2-3 minutes"
    concern: >
      This is an estimate, not a measurement. The protocol requires wall-clock timing.
      The estimate seems plausible given the description but is not verified.
    evidence_quality: moderate
    probe_recommended: false
