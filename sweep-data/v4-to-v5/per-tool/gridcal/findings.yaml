  - id: gridcal-F08
    category: missing_verification
    severity: medium
    test_ids: [A-10, A-10]
    title: "Lossy DC OPF not validated against MATPOWER reference"
    description: >
      The protocol requires A-10 results to be validated against MATPOWER's rundcopf with
      loss option enabled (tolerance 1% on total LMP, directional consistency on loss
      component signs). No such validation appears in either the TINY or SMALL result files.
      The LMP spread on TINY is extremely small (0.000031 $/MWh range), which could indicate
      that loss approximation is barely active or that the uniform cost structure masks
      the effect. Without MATPOWER cross-validation, the physical accuracy of the loss
      approximation cannot be confirmed.
