    title: "ACPF convergence claimed but iteration count not reported"
    description: >
      Both A-2 (TINY) and C-2 (MEDIUM) report ACPF convergence with Newton-Raphson and
      provide convergence error values (3.32e-11 and 2.73e-07 respectively), which is good.
