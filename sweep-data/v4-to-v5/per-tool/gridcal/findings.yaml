findings:
  - id: gridcal-F01
    category: low_signal
    severity: low
    test_ids: [A-3, B-8, C-3, C-7]
    title: "Uniform LMPs on case39 mask congestion-dependent test differentiation"
    description: >
      All 10 generators in IEEE 39-bus have identical cost curves (0.3 $/MWh linear),
      producing uniform LMPs regardless of congestion. This renders tests that depend on
      LMP variation (A-3 shadow prices, B-8 slack bus LMP comparison) unable to verify
      meaningful economic signals on TINY. The B-8 TINY result shows identical LMPs across
      all three slack configurations, which is correct but provides zero discriminative value.
    evidence:
      - file: "results/expressiveness/A-3_dcopf_TINY.md"
        excerpt: "All 10 generators have identical cost (0.3 $/MWh linear + 0.01 quadratic + 0.2 constant), so LMPs are uniform at 0.3 when no lines are binding."
      - file: "results/extensibility/B-8_reference_bus_config_TINY.md"
        excerpt: "LMPs are identical across all three configurations. This is mathematically correct: in a DC OPF LP formulation, the slack bus determines the voltage angle reference but does not affect the economic dispatch or LMPs."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: gridcal-F02
    category: misleading_result
    severity: high
    test_ids: [A-5, A-6, A-8, C-4, C-6]
    title: "TapPhaseControl bug cascades single defect into five test failures"
    description: >
      A single bug in GridCal's time-series OPF compiler (ValueError: 0 is not a valid
      TapPhaseControl) causes failures across A-5 (SCUC), A-6 (SCED), A-8 (stochastic),
      C-4, and C-6. The bug occurs on any MATPOWER network with transformers (including
      all standard IEEE test cases). This amplifies one defect into five separate test
      failures, overstating the breadth of capability gaps. However, the evaluation correctly
      notes that even without this bug, A-5 has additional issues (UC constraints not
      enforced per issue #397) and A-8 lacks native stochastic formulation.
    evidence:
      - file: "results/expressiveness/A-5_scuc_TINY.md"
        excerpt: "ValueError: 0 is not a valid TapPhaseControl"
      - file: "results/expressiveness/A-8_stochastic_timeseries_TINY.md"
        excerpt: "All 5 scenarios failed: Scenario 0: ValueError: 0 is not a valid TapPhaseControl"
      - file: "results/synthesis.md"
        excerpt: "This single defect is responsible for 3 test failures and 1 downgrade."
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: null

