    title: "SCOPF consider_contingencies flag confirmed non-functional via identical dispatch"
    description: >
      The A-9 result provides strong evidence that GridCal's consider_contingencies OPF
      option is non-functional: it produces byte-identical dispatch to the baseline DC OPF.
      The evaluation correctly identifies this as a capability gap (issue #364). This is
      well-verified -- not an extraordinary claim about what the tool can do, but rather
      a well-documented claim about what it cannot do. The identical dispatch comparison
      is the right verification method.
    evidence:
