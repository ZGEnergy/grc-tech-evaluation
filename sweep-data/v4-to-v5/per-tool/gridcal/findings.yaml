        excerpt: "Pruning ratio: 0.0 (all order-1 contingencies produced measurable load loss)"
      - file: "results/expressiveness/A-7_contingency_sweep.md"
        excerpt: "Pruning ratio: 0.0 (all N-1 contingencies had measurable load loss > 1e-3 MW)"
      - file: "results/synthesis.md"
