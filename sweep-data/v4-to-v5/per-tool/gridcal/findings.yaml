  - id: gridcal-F04
    category: extraordinary_claim
    severity: medium
    test_ids: [C-9, B-9]
    title: "PTDF flow predictions diverge significantly from DCPF on MEDIUM network"
    description: >
      On TINY (39-bus), PTDF-predicted flows match DCPF exactly (max diff 0.0). On MEDIUM
      (10k-bus), the LinearAnalysis direct flows differ from DCPF by up to 743 MW, and
      PTDF @ Sbus differs by up to 15,139 MW. The result is scored as qualified_pass with
      the explanation that slack bus and injection conventions differ between the two solvers.
      This is a significant discrepancy that calls into question whether the PTDF matrix is
      correct for this network or whether there is a bug in island handling at scale.
    evidence:
      - file: "results/extensibility/B-9_ptdf_extraction_MEDIUM.md"
        excerpt: "LA direct flows vs DCPF | 743.46 | 2.68 | No"
      - file: "results/scalability/C-9_ptdf_scale.md"
        excerpt: "LA direct flows vs DCPF | 743.46 MW"
      - file: "results/extensibility/B-9_ptdf_extraction_TINY.md"
        excerpt: "Max absolute difference: 0.0"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification

  - id: gridcal-F05
    category: network_insufficiency
    severity: medium
    test_ids: [A-3, A-10, C-3]
    title: "No binding branches on MEDIUM DC OPF reduces congestion test signal"
    description: >
      The ACTIVSg 10k DC OPF produces zero binding branches (max loading 84.7%) with
      uniform LMPs at $20.064/MWh. This means the MEDIUM network does not exercise
      congestion-related features for DC OPF: LMP spatial variation, congestion rent,
      and binding constraint identification all return trivial results. The lossy DC OPF
      (A-10) similarly shows minimal LMP spread on TINY (0.000031 $/MWh) due to uniform
      generator costs and limited congestion.
    evidence:
      - file: "results/expressiveness/A-3_dcopf.md"
        excerpt: "LMP range | 20.064 (uniform) ... Binding branches | 0"
      - file: "results/scalability/C-3_dcopf_scale.md"
        excerpt: "Max loading | 84.72% ... Binding branches | 0"
      - file: "results/expressiveness/A-10_lossy_dcopf_TINY.md"
        excerpt: "LMP range ($/MWh) | 0.3 -- 0.300031"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

  - id: gridcal-F06
    category: missing_verification
    severity: medium
