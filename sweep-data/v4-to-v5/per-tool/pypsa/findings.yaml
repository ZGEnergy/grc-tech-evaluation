extraordinary_claims:
  - test_id: A-2 MEDIUM
    claim: "ACPF converges on 10k-bus network despite solver reporting non-convergence"
    concern: >
      The Newton-Raphson solver explicitly warns 'Power flow did not converge' but
      the test classifies the result as pass based on voltage magnitude ranges.
      A non-converged power flow may produce physically plausible-looking but
      mathematically incorrect results.
    evidence_quality: moderate
    probe_recommended: true
