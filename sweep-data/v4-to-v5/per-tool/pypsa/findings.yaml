findings:
  - id: pypsa-F01
    category: infrastructure_friction
    severity: medium
    test_ids: [A-3, A-4, A-5, A-6, A-9, A-10, A-11, B-1, B-4, B-8]
    title: "Gencost import gap forces manual cost assignment across all OPF tests"
    description: >
      PyPSA's import_from_pypower_ppc() silently drops gencost data from MATPOWER
      files (emitting only a warning). This forces manual cost parsing and assignment
      (~5 LOC) as a prerequisite for every OPF-based test. The workaround is stable
      and uses public API, but it is test infrastructure friction that affects all
      tools using MATPOWER .m format via PPC import.
    evidence:
      - file: expressiveness/A-3_dcopf.md
        excerpt: "PPC importer does not import gencost data (PyPSA warns: 'some PYPOWER features not supported: areas, gencosts, component status')"
      - file: gate/G-1_tiny_case39.md
        excerpt: "Generator marginal_cost is zero for all 10 generators. PyPSA's import_from_pypower_ppc explicitly does not import gencost data"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: null

  - id: pypsa-F02
    category: infrastructure_friction
    severity: high
    test_ids: [A-1, A-3, A-4, A-7, B-1, B-3, B-5, B-9, C-1, C-3, C-5, C-7, C-8, C-9, C-10]
    title: "ACTIVSg10k zero-impedance branches cause cascading MEDIUM failures"
    description: >
      The ACTIVSg10k MATPOWER case contains 2,462 branches with s_nom=0 and 3
      transformers with zero reactance. This causes DCOPF infeasibility (A-3 MEDIUM),
      singular B-matrix (A-1 MEDIUM produces NaN flows), and PTDF computation failure
      (B-9 MEDIUM). Scalability tests applied data fixes (x=0.0001, s_nom=9999) but
      expressiveness tests did not, creating an inconsistency where the same tool
      passes scalability but fails expressiveness on the same network.
    evidence:
      - file: expressiveness/A-3_dcopf_MEDIUM.md
        excerpt: "The MATPOWER case file contains 2,462 branches with s_nom == 0. PyPSA interprets s_nom == 0 as a zero-capacity line constraint"
      - file: scalability/C-1_dcpf_scale_MEDIUM.md
        excerpt: "Required fixing 3 transformers with zero reactance (x=0.0001) to avoid singular matrix"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

