  - id: pypsa-F12
    category: missing_verification
    severity: low
    test_ids: [C-3, C-7, C-8, C-10]
    title: "Scalability wall-clock times dominated by linopy post-processing, not solver"
    description: >
      Multiple MEDIUM scalability tests report wall-clock times of 600s+ but with
      HiGHS solve times of 6-21s. The remaining time is linopy's shadow-price
      assignment (dual variable extraction and network assignment). This is a real
      scalability limitation but the reported wall-clock times may mislead cross-tool
      comparisons where other tools do not have this post-processing overhead. The
      solver time vs post-processing time should be clearly separated in any
      comparison.
    evidence:
      - file: scalability/C-3_dcopf_scale_MEDIUM.md
        excerpt: "HiGHS solve time: 19.9 s... linopy's shadow-price assignment takes 10+ minutes"
      - file: scalability/C-8_scopf_scale_MEDIUM.md
        excerpt: "Baseline DCOPF HiGHS solve: 7.1 s, Post-processing: 10+ min (exceeded budget)"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: add_verification

