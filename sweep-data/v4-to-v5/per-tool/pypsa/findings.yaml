  - test_id: D-2
    claim: "A-8 stochastic optimization is documented with dedicated page and example notebook"
    concern: >
      A-8 FAIL demonstrates the feature does not work in v1.1.2. Either the
      documentation describes a non-functional feature (aspirational docs), or the
      evaluation missed a working API path. The synthesis flags this for human
      spot-check.
    evidence_quality: moderate
    probe_recommended: true
