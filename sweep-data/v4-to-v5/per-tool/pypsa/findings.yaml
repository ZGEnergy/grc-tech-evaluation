  - id: pypsa-F04
    category: misleading_result
    severity: medium
    test_ids: [C-9]
    title: "PTDF C-9 qualified_pass with 702 MW flow prediction error"
    description: >
      C-9 (PTDF at MEDIUM) is classified as qualified_pass but the flow prediction
      accuracy is severely degraded: max diff of 702 MW vs the 1e-6 tolerance
      specified in the B-9 pass condition. The PTDF matrix computed correctly in
      structure but the zero-impedance workaround (x=0.0001) fundamentally altered
      the sensitivity structure. This is a data issue rather than a tool issue, but
      the qualified_pass status may mislead readers into thinking PTDF works at
      MEDIUM scale.
    evidence:
      - file: scalability/C-9_ptdf_scale_MEDIUM.md
        excerpt: "Flow prediction match: No (max diff 702 MW)"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: adjust_scoring

  - id: pypsa-F05
    category: extraordinary_claim
    severity: medium
    test_ids: [A-2, C-2]
    title: "ACPF MEDIUM pass despite non-convergence warning"
    description: >
      A-2 MEDIUM reports convergence: true and pass, but the result file notes that
      PyPSA emitted "Power flow did not converge for ['now']". The test classified
      it as a pass because voltage magnitudes were in a reasonable range (0.96-1.08
      pu), but the solver itself reported non-convergence. The 3,935 MW total losses
      and transformer flows up to 14,700 MW suggest modeling artifacts. C-2 reports
      pass with 18.1s solve time but notes voltage angles are all zero, which is
      physically suspicious for a 10k-bus network.
    evidence:
      - file: expressiveness/A-2_acpf_MEDIUM.md
        excerpt: "Despite a convergence warning ('Power flow did not converge for [\"now\"]'), the test code reports converged: true"
      - file: scalability/C-2_acpf_scale_MEDIUM.md
        excerpt: "Voltage angle range: 0 rad (DC angles not populated in ACPF)"
    cross_tool_relevance: likely
    probe_recommended: true
    probe_type: convergence_check
    proposed_action: add_verification

  - id: pypsa-F06
    category: missing_verification
    severity: medium
    test_ids: [A-9]
    title: "SCOPF objective equality masks test signal due to uniform costs"
    description: >
      A-9 (SCOPF) shows identical objectives for DCOPF and SCOPF ($1876.269) because
      all generators in case39 have identical marginal costs (c1=0.3). The synthesis
      correctly notes this, but the test cannot verify that SCOPF is more expensive
      than unconstrained DCOPF -- a key pass condition. The dispatch redistribution
      is verified but the cost signal is absent. A network with diverse generator
      costs would better exercise this test.
    evidence:
      - file: expressiveness/A-9_scopf.md
        excerpt: "Both objectives are 1876.269 because all generators have identical marginal costs (C1=0.3 $/MWh)"
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

