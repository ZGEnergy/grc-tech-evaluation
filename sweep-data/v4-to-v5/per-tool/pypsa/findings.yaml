  - id: pypsa-F10
    category: low_signal
    severity: low
    test_ids: [A-11]
    title: "Distributed slack OPF test has low signal -- OPF LMPs identical regardless of slack"
    description: >
      A-11 and B-8 both demonstrate that changing the slack bus in PyPSA's DCOPF
      produces identical LMPs because OPF enforces power balance as a constraint
      (not via a slack bus). The distributed slack only affects PF voltage angles,
      not OPF results. This is architecturally correct but means the test cannot
      differentiate tools where the slack bus does vs does not affect OPF LMPs.
      The test exercises PF distributed slack, not OPF distributed slack.
    evidence:
      - file: extensibility/B-8_reference_bus_config.md
        excerpt: "All three OPF configurations produce identical LMPs and objectives"
      - file: expressiveness/A-11_distributed_slack_opf.md
        excerpt: "OPF inherently distributes generation optimally... There is no single slack bus absorbing the mismatch"
    cross_tool_relevance: likely
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

  - id: pypsa-F11
    category: misleading_result
    severity: medium
    test_ids: [A-1]
    title: "A-1 MEDIUM pass despite all flows being NaN"
    description: >
      A-1 DCPF at MEDIUM is classified as pass, but all voltage angles and line
      flows are NaN due to the singular B-matrix from zero-impedance branches. The
      result file states "Despite the NaN flows... the test passes because convergence,
