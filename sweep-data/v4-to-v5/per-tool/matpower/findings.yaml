  - id: matpower-F09
    category: scoring_inconsistency
    severity: low
    test_ids: [A-10]
    title: "A-10 qualified_pass for lossless tool may be generous vs rubric intent"
    description: >
      The rubric asks whether LMPs can be decomposed into energy, congestion, and loss
      components. MATPOWER's rundcopf is strictly lossless and has no loss option. The
      evaluator performed an exact lossless energy+congestion decomposition and a post-hoc
      (non-optimization) loss estimate. The qualified_pass with "stable workaround" framing
      may overstate capability, since the loss component is informational only and not part
      of the formulation. However, the rubric note says "any loss method accepted" and the
      evaluator documented this clearly.
    evidence:
      - file: "expressiveness/A-10_lossy_dcopf_lmp_TINY.md"
        excerpt: "These values are informational only -- they are NOT part of the optimization and do NOT affect dispatch or pricing."
    cross_tool_relevance: confirmed
    probe_recommended: false
