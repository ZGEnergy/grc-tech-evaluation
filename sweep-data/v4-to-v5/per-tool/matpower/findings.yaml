findings:
  - id: matpower-F01
    category: extraordinary_claim
    severity: high
    test_ids: [C-10]
    title: "C-10 distributed slack scale timing is anomalous (66 min vs expected ~30s)"
    description: >
      C-10 reports a total wall-clock of 3,969s (~66 min) for a distributed-slack DC OPF
      on MEDIUM, with the MIPS solve alone taking 3,878s. The synthesis estimated ~90-120s.
      The analogous single-slack DC OPF (C-3 with MIPS) solves in 9.7s on the same network.
      The manual opt_model formulation has fewer variables (1,937 vs ~10,000) and should be
      faster, not 400x slower. This suggests a formulation error in the opt_model construction
      (e.g., dense constraint matrix from PTDF instead of sparse B-theta) or an opt_model
      configuration issue causing MIPS to iterate excessively.
    evidence:
      - file: "scalability/C-10_distributed_slack_scale_MEDIUM.md"
        excerpt: "opt_model MIPS solve: 3,877.57s (~65 min)"
      - file: "scalability/C-3_dcopf_scale_MEDIUM.md"
        excerpt: "MIPS solve: 9.72s"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: add_verification

  - id: matpower-F02
    category: extraordinary_claim
    severity: medium
    test_ids: [C-5]
    title: "C-5 contingency sweep wall-clock dominated by Octave data structure overhead, not algorithm"
    description: >
      C-5 reports 2,476s total but only 50.4s for the actual LODF-based contingency screening
      (28,035 cases). The remaining ~2,400s is attributed to Octave containers.Map-based
      adjacency construction. This means 97% of the reported wall-clock measures Octave
      interpreter overhead, not MATPOWER or algorithmic performance. The synthesis marks
      this as a qualified_pass, but the actual screening performance (50s for 28K cases)
      is strong. The finding conflates Octave interpreter limitations with tool scalability.
    evidence:
      - file: "scalability/C-5_contingency_sweep_scale_MEDIUM.md"
        excerpt: "BFS + adjacency build: ~2,400s (Octave containers.Map is very slow for 10k-bus adjacency construction)"
      - file: "scalability/C-5_contingency_sweep_scale_MEDIUM.md"
        excerpt: "N-1 through N-4 screening: 50.4s"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: timing_verification
    proposed_action: adjust_scoring

  - id: matpower-F03
    category: network_insufficiency
    severity: medium
    test_ids: [A-3, A-9, B-8]
    title: "IEEE 39-bus case39 has no effective RATE_A limits, producing uniform LMPs"
    description: >
      The default case39.m has all branch RATE_A values set such that no congestion occurs
      under the base operating point. A-3 shows uniform LMPs (13.5169 $/MWh at all 39 buses),
      A-9 shows SCOPF dispatch identical to unconstrained OPF, and B-8 shows all LMP
      comparisons are trivially identical because there is no congestion to differentiate.
      The A-10 test explicitly tightens 8 branch limits to force congestion, demonstrating
      that the evaluator recognized this issue. However, A-3 and B-8 lose discriminative
      value when LMPs are uniform.
    evidence:
      - file: "expressiveness/A-3_dcopf_TINY.md"
        excerpt: "All buses: 13.5169 $/MWh (uniform). LMPs are uniform because case39 has zero RATE_A on all branches"
      - file: "extensibility/B-8_reference_bus_config_TINY.md"
        excerpt: "All LMPs are uniform because case39 has no RATE_A branch flow limits."
      - file: "expressiveness/A-9_scopf_TINY.md"
        excerpt: "Base-case dispatch is identical between SCOPF and unconstrained DC OPF."
    cross_tool_relevance: confirmed
    probe_recommended: false
    probe_type: null
    proposed_action: redesign_test

  - id: matpower-F04
    category: low_signal
    severity: low
    test_ids: [G-1, G-2, G-3]
    title: "Gate tests are trivially passed for native MATPOWER format"
    description: >
      MATPOWER loads its own .m case file format natively via loadcase(). The gate tests
      measure format ingestion capability, but for MATPOWER this is testing the tool
      against its own data format. Every other tool must convert from .m format, making
      this an infrastructure friction test for them and a no-op for MATPOWER. The gate
      tests have zero discriminative value for MATPOWER specifically.
    evidence:
