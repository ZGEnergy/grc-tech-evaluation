extraordinary_claims:
  - test_id: C-10
    claim: "Distributed slack DC OPF on MEDIUM takes 66 minutes via opt_model/MIPS"
    concern: >
      The single-slack DC OPF on the same network solves in 9.7s via MIPS. The manual
      opt_model formulation has fewer variables (1,937 Pg variables vs full bus/angle
      formulation). A 400x slowdown for a simpler problem strongly suggests a formulation
      issue (e.g., dense PTDF constraint matrix causing MIPS to work with dense linear
      algebra instead of sparse).
    evidence_quality: moderate
    probe_recommended: true
    probe_type: timing_verification

  - test_id: C-5
    claim: "Contingency sweep on MEDIUM takes 41 minutes"
    concern: >
      97% of the reported wall-clock (2,400s of 2,476s) is Octave containers.Map overhead
      for adjacency construction, not MATPOWER computation. The actual LODF-based screening
      completes in 50s. Reporting the total as the test result conflates interpreter
      performance with tool capability.
    evidence_quality: strong
    probe_recommended: true
    probe_type: timing_verification

  - test_id: C-4
    claim: "SCUC on SMALL fails due to solver capacity limits"
    concern: >
      The test actually failed at loadmd() data ingestion (bus numbering error), not at
      the solver stage. The claim about solver capacity is an extrapolation. The solver
      was never invoked.
    evidence_quality: weak
    probe_recommended: true
