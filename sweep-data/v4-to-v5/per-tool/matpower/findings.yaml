    title: "Stochastic test used only 3 scenarios with narrow load variation due to solver limits"
    description: >
      The protocol specifies stochastic optimization. A-8 used only 3 scenarios with +/-3%
      load variation. The result notes MIPS struggled with +/-10% variation, forcing
      reduction to +/-3%. With such narrow uncertainty bands, the stochastic formulation
