  - id: matpower-F05
    category: missing_verification
    severity: medium
    test_ids: [A-5, A-6]
    title: "SCUC produces all-committed schedule, failing to exercise unit commitment cycling"
    description: >
      A-5 reports all 10 generators committed for all 24 hours. The test augmented case39
      with PMIN=20% of PMAX, startup costs at 5x PMAX, and ramp rates at 30% of PMAX.
      However, the capacity-to-load ratio (7,367 MW capacity vs 6,254 MW peak) combined
      with these parameters means the optimizer correctly determined that de-commitment
      saves no cost. This means the UC binary variables are never exercised (all stay 1),
      min up/down time constraints never bind, and A-6's ED comparison shows zero dispatch
      difference. The test verifies the MILP formulation exists but does not verify that
      UC cycling logic works correctly.
    evidence:
      - file: "expressiveness/A-5_scuc_TINY.md"
        excerpt: "All 10 generators remain committed for all 24 hours."
      - file: "expressiveness/A-6_sced_TINY.md"
        excerpt: "Maximum total dispatch difference: 0.00 MW"
    cross_tool_relevance: confirmed
    probe_recommended: true
    probe_type: formulation_audit
    proposed_action: redesign_test

  - id: matpower-F06
    category: infrastructure_friction
    severity: medium
    test_ids: [C-4, C-6, C-8]
    title: "Three scalability failures stem from MOST ext2int bug, not proven solver limits"
    description: >
      C-4, C-6, and C-8 all fail at the loadmd() stage with a bus numbering error before
      the solver is even invoked. The synthesis attributes these to solver capacity limits,
      but the actual evidence shows they failed at data ingestion. While the synthesis
      correctly notes the underlying problem size would likely exceed solver capacity, this
      is conjecture -- the solvers never ran. The distinction matters: a loadmd bug is
      fixable, while solver capacity is architectural.
    evidence:
      - file: "scalability/C-4_scuc_scale_SMALL.md"
        excerpt: "MOST SCUC on SMALL failed at the loadmd() stage with: 'buses must be numbered consecutively'"
      - file: "scalability/C-6_stochastic_scale_SMALL.md"
        excerpt: "MOST stochastic DCOPF on SMALL failed at the loadmd() stage"
      - file: "scalability/C-8_scopf_scale_MEDIUM.md"
        excerpt: "MOST SCOPF on MEDIUM with 500 contingencies did not complete within the 10-minute timeout"
    cross_tool_relevance: none
    probe_recommended: true
    probe_type: claim_verification
    proposed_action: add_verification

