proposed_changes:
  # --- Protocol Changes (require 3+ tools evidence) ---

  - id: PC-01
    type: protocol
    target: data_preparation
    title: "Standardize ACTIVSg10k preprocessing to force binding constraints"
    rationale: >
      ACTIVSg10k DCOPF has no binding branch constraints (max loading 84-85%),
      producing uniform LMPs across all tools. Tests targeting congestion-driven
      capabilities (A-3, A-9, A-11, B-8, C-3, C-10) lose discriminative value
      at the grade-assessment scale.
    evidence_tools: [pypsa, pandapower, gridcal, powermodels, matpower]
    evidence_findings: [pypsa-F02, pandapower-F02, gridcal-F05, pm-F01, matpower-F03]
    evidence_probes: [probe-006, probe-007, probe-023]
    priority: high
    specific_change: >
      Add a protocol-level preprocessing step: (a) set zero-reactance transformers
      to x=0.0001 pu, (b) set zero thermal rating branches to RATE_A=9999 MVA,
      (c) tighten 10-20 highest-flow branch limits to 90% of base-case DCPF flow.
      Apply uniformly across all test dimensions. Document the preprocessing
      script in the protocol appendix.

  - id: PC-02
    type: protocol
    target: test_A-2
    title: "Strengthen ACPF convergence verification requirements"
    rationale: >
      Probe-001 debunked PyPSA's A-2 MEDIUM pass (0 NR iterations, 83% flat start).
      Multiple tools lack convergence diagnostics (PowerModels: no NLsolve access;
      PowerSimulations: silent Missing return). The current pass condition allows
      tools to claim convergence without demonstrating it.
    evidence_tools: [pypsa, pandapower, gridcal, powermodels, powersimulations]
    evidence_findings: [pypsa-F05, pandapower-F12, gridcal-F06, pm-F08, psi-F10]
    evidence_probes: [probe-001, probe-024]
    priority: high
    specific_change: >
      A-2 pass condition additions: (a) convergence residual must be reported and
      below the tool's stated tolerance, (b) number of NR iterations must be
      reported, (c) voltage magnitudes must differ from flat-start defaults (1.0 pu)
      on >95% of buses. If the tool cannot report iteration count or residual,
      document this as a diagnostic quality finding.

  - id: PC-03
    type: protocol
    target: test_B-9
    title: "Account for phase-shifting transformers in PTDF validation"
    rationale: >
      Probe-010 identified that ACTIVSg10k's 5 phase-shifting transformers create
      Pbusinj/Pfinj correction terms not included in the standard PTDF formula.
      This causes 743 MW errors in pandapower and gridcal (probes 008, 010, 012).
      Applying the correction eliminates all error to machine precision. The B-9
      pass condition (1e-6 tolerance) is unachievable without correction.
    evidence_tools: [pandapower, gridcal, pypsa]
    evidence_findings: [pandapower-F03, gridcal-F04, pypsa-F04]
    evidence_probes: [probe-008, probe-010, probe-012]
    priority: high
    specific_change: >
      B-9/C-9 pass condition: "If the network contains phase-shifting transformers
      (nonzero SHIFT column in branch data), the PTDF validation must either
      (a) apply Pbusinj/Pfinj correction terms from the admittance matrix
      construction, or (b) exclude branches with nonzero shift angles from the
      accuracy comparison. The tolerance of 1e-6 applies to the corrected or
      filtered comparison."

  - id: PC-04
    type: protocol
    target: test_A-5
    title: "Modify case39 UC parameters to force generator cycling"
    rationale: >
      All tools capable of SCUC report all generators committed for all 24 hours
      on case39. The capacity-to-load ratio makes decommitment uneconomical. UC
      binary variables, min up/down times, and startup costs are never exercised.
    evidence_tools: [pypsa, powersimulations, matpower]
    evidence_findings: [pypsa-F07, psi-F05, matpower-F05]
    evidence_probes: []
    priority: medium
    specific_change: >
      Either (a) increase PMIN to 30% of PMAX (forcing higher base capacity
      commitment that makes some generators uneconomical at low load), or
      (b) add 2-3 peaker generators with high startup cost and small capacity,
      or (c) widen the load range (min load to 40% of peak). Target: at least
      2 generators cycling during the 24-hour horizon.

  - id: PC-05
    type: protocol
    target: scalability_timing
    title: "Require measured wall-clock times for all scalability grades"
    rationale: >
      PowerSimulations has 4 C-tests with null wall_clock_seconds (estimated only).
      PowerModels has 2 C-tests scored as fail without execution. Probe-020
      confirmed C-3 was never executed. The protocol requires measured timings
      but does not explicitly prohibit grading on estimates.
    evidence_tools: [powersimulations, powermodels, gridcal]
    evidence_findings: [psi-F01, pm-F03, gridcal-F13]
    evidence_probes: [probe-016, probe-020]
    priority: high
    specific_change: >
      Add to Test Execution Protocol: "Estimated or projected timings must be
      clearly labeled with 'estimated' in the frontmatter and cannot support
      pass or qualified_pass on scalability tests. If a test cannot be executed
      within the time budget (including JIT/startup overhead for first runs),
      record fail with the projected timing as supplementary context."

  - id: PC-06
    type: protocol
    target: cascaded_failures
    title: "Distinguish independent from cascaded failures in scoring"
    rationale: >
      4 tools have scalability tests that fail solely because prerequisite
      expressiveness tests failed. These cascaded failures inflate fail counts
      without adding signal.
    evidence_tools: [pandapower, gridcal, powersimulations, powermodels]
    evidence_findings: [pandapower-F11, gridcal-F02, psi-F04, pm-F13]
    evidence_probes: []
    priority: medium
    specific_change: >
      Add `blocked_by: <test_id>` field to result frontmatter. When tabulating
      outcomes, report "X independent fails + Y blocked" rather than a single
      count. Blocked tests do not contribute to the criterion's fail count but
      are listed for completeness.

  - id: PC-07
    type: protocol
    target: test_C-8
    title: "Reduce C-8 MEDIUM contingency count from 500 to 50"
    rationale: >
      500-contingency SCOPF on 10k-bus is a unanimous fail across all 6 tools.
      Probe-016 shows even 5 contingencies time out for PowerModels. The test
      produces zero discriminative value at the current parameter.
    evidence_tools: [pypsa, pandapower, gridcal, powermodels, powersimulations, matpower]
    evidence_findings: [pypsa-F03, pm-F03]
    evidence_probes: [probe-016]
    priority: medium
    specific_change: >
      C-8 MEDIUM: reduce from 500 to 50 monitored contingencies (matching the
      SMALL parameter). Allow iterative screening. This makes the test feasible
      for tools with working SCOPF while still testing scalability beyond SMALL.

  - id: PC-08
    type: protocol
    target: test_C-5
    title: "Cap N-M contingency sweep at N-2 for MEDIUM"
    rationale: >
      N-4 on 10k-bus produces combinatorial explosion infeasible for all tools.
      The discriminative signal is at N-1 and N-2 only.
    evidence_tools: [pypsa, powermodels, matpower]
    evidence_findings: [pypsa-F03, pm-F12, matpower-F02]
    evidence_probes: [probe-016, probe-029]
    priority: medium
    specific_change: >
      C-5 MEDIUM: change parameters from x=5/m=4 to x=5/m=2 for graded
      assessment. N-3 and N-4 are informational only and do not affect the
      pass/fail determination.

  - id: PC-09
    type: protocol
    target: test_A-10
    title: "Replace MATPOWER lossy reference with internal consistency checks"
    rationale: >
      The A-10 pass condition requires MATPOWER reference validation, but MATPOWER's
      rundcopf has no loss option producing comparable LMPs. No tool can fulfill
      this requirement. 4 tools document the inability to perform this validation.
    evidence_tools: [pypsa, gridcal, powermodels, matpower]
    evidence_findings: [pypsa-F09, gridcal-F08, pm-F06, matpower-F09]
    evidence_probes: []
    priority: medium
    specific_change: >
      Replace "Validate against MATPOWER reference lossy DC OPF solution" with:
      "Validate internal consistency: (a) loss components have physically correct
      signs (positive marginal loss at load buses far from generation), (b) total
      losses are 0.5-3% of total load, (c) lossy objective exceeds lossless
      objective, (d) loss component LMPs sum with energy and congestion components
      to total LMP within 1% tolerance."

  - id: PC-10
    type: protocol
    target: stochastic_perturbation
    title: "Calibrate B-4/C-6 perturbation bounds to limit infeasibility"
    rationale: >
      Uncalibrated perturbations cause 53-99.6% infeasibility across 3 tools.
      Probe-006 showed the base case converges and uniform load scaling works;
      combined perturbations are the issue.
    evidence_tools: [pandapower, gridcal, powersimulations]
    evidence_findings: [pandapower-F01, gridcal-F10, psi-F13]
    evidence_probes: [probe-006]
    priority: medium
    specific_change: >
      Add to B-4/C-6: "Perturbation bounds should be calibrated to produce
      at most 20% infeasible scenarios on the target network. If infeasibility
      exceeds 20%, reduce perturbation sigma until the threshold is met and
      document the final sigma. Alternatively, OPF formulations may include
      slack variables for load shedding to prevent infeasibility."

  # --- Rubric Changes (require 3+ tools evidence) ---

  - id: RC-01
    type: rubric
    target: workaround_scoring
    title: "Clarify that pass+workaround should be qualified_pass"
    rationale: >
      Multiple tools have tests scored as pass with workaround_class: stable.
      The protocol states stable workarounds receive B-range grades, implying
      qualified_pass, but this is not enforced consistently.
    evidence_tools: [powersimulations, pypsa, pandapower]
    evidence_findings: [psi-F04, pypsa-F03, pandapower-F05]
    evidence_probes: []
    priority: low
    specific_change: >
      Add explicit rule: "A test requiring any workaround (stable, fragile, or
      blocking) must be classified as qualified_pass, not pass. The workaround
      class affects the grade within the B range but never produces a clean pass."

  - id: RC-02
    type: rubric
    target: solver_capability_separation
    title: "Separate tool expressiveness from solver performance in scoring"
    rationale: >
      A-5/C-4 failures on 2000-bus UC conflate HiGHS single-threaded MIP timeout
      with tool capability. A tool that expresses SCUC in 140 LOC but cannot solve
      it receives the same fail as one that cannot express it.
    evidence_tools: [pypsa, powermodels, matpower]
    evidence_findings: [pm-F04, pypsa-F07]
    evidence_probes: []
    priority: medium
    specific_change: >
      For expressiveness tests (Suite A): if a tool can express the formulation
      but the open-source solver times out, score as qualified_pass with
      solver-limitation note (not fail). The solver limitation is recorded
      as a scalability finding (Suite C). For scalability tests (Suite C):
      retain fail classification for solver timeouts but note the tool's
      expressiveness separately.

  # --- Skill-Only Changes (require 2+ tools evidence) ---

  - id: SC-01
    type: skill
    target: evaluate-tool
    title: "Add peak memory measurement template per language"
    rationale: >
      Peak memory missing or estimated across all tools. Python, Julia, and
      Octave each need different measurement approaches.
    evidence_tools: [pandapower, powermodels, matpower]
    evidence_findings: [pandapower-F08, pm-F14, matpower-F11]
    evidence_probes: []
    priority: low
    specific_change: >
      Add to test script templates: Python: `import tracemalloc; tracemalloc.start()
      ... tracemalloc.get_traced_memory()`. Julia: `@allocated` or parse
      /proc/self/status. Octave: parse /proc/self/status before and after solve.

  - id: SC-02
    type: skill
    target: evaluate-tool
    title: "Add binding constraint test to B-1 template"
    rationale: >
      Both PSI and pandapower verified custom constraint duals only for
      non-binding cases (dual=0). Probe-022 showed PSI binding dual works
      when tested properly.
    evidence_tools: [powersimulations, pandapower]
    evidence_findings: [psi-F03]
    evidence_probes: [probe-022]
    priority: low
    specific_change: >
      B-1 template should include both a non-binding gate limit (verify dual=0)
      AND a binding gate limit (set at 50% of unconstrained flow, verify
      dual != 0 and objective increases).

  - id: SC-03
    type: skill
    target: evaluate-tool
    title: "Add E-6 badge verification step"
    rationale: >
      Probe-025 debunked PSI's 100% coverage claim (actual: 78%). Coverage
      badges can be stale or misread.
    evidence_tools: [powersimulations]
    evidence_findings: [psi-F12]
    evidence_probes: [probe-025]
    priority: low
    specific_change: >
      E-6 template should include: "Verify coverage percentage by fetching the
      badge SVG or checking the Codecov/Coveralls detail page. Do not rely on
      the badge rendering in the README alone."

  - id: SC-04
    type: skill
    target: evaluate-tool
    title: "Add unit consistency check to dispatch-to-ACPF transfer"
    rationale: >
      Probe-021 debunked PSI's 100x unit mismatch (actually MW vs pu labeling
      error). The evaluation script applied MW values where pu was expected.
    evidence_tools: [powersimulations]
    evidence_findings: [psi-F02]
    evidence_probes: [probe-021]
    priority: low
    specific_change: >
      A-4/B-7 template should include explicit unit logging: print base_power,
      print dispatch units, print limit units, verify consistency before transfer.
